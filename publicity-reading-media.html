<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共读影像制作 - 宣委管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <link rel="stylesheet" href="css/reading-media.css?v=1" />
    <link rel="stylesheet" href="css/publicity-reading-poster.css?v=20" />
    <style>
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
      }
      .header-card {
        padding: 16px 18px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .header-body {
        display: flex;
        gap: 16px;
      }
      .header-col {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 8px;
      }
      .header-col + .header-col {
        padding-left: 16px;
        border-left: 1px solid var(--border);
      }
      .header-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .header-label {
        width: 42px;
        flex-shrink: 0;
        color: var(--ink-muted);
        font-size: 12px;
      }
      .header-value {
        overflow: hidden;
        color: var(--ink-dark);
        font-size: 13px;
        font-weight: 500;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .header-value.date {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
      }
      .section {
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 600;
      }
      .section-icon {
        display: flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--gold-light);
      }
      .empty-panel {
        padding: 42px 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--ink-muted);
        text-align: center;
        font-size: 13px;
        line-height: 1.7;
      }
      @media (max-width: 390px) {
        .container {
          padding-inline: 12px;
        }
      }
    </style>
  </head>
  <body class="app-loading">
    <main class="container">
      <header class="page-header">
        <a class="back-btn" href="publicity-dashboard.html" aria-label="返回宣委管理首页"></a>
        <h1 class="page-title">每日共读影像</h1>
      </header>

      <div class="header-card">
        <div class="semester-wrap" id="semesterName"></div>
        <div class="header-body">
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">日期</span><span class="header-value date" id="currentDate">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">星期</span><span class="header-value" id="currentWeekday">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">制作人</span><span class="header-value" id="operatorName">--</span>
            </div>
          </div>
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">大班</span><span class="header-value" id="bigClassName">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">班级</span><span class="header-value" id="className">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">小组</span><span class="header-value" id="groupName">--</span>
            </div>
          </div>
        </div>
      </div>

      <section class="section" id="orgSelectorSection">
        <div class="section-title">
          <span class="section-icon" data-icon="BuildingIcon"></span>
          选择制作小组
        </div>
        <div class="org-cascade">
          <div class="org-group">
            <label class="org-label" for="bigClassSelect">大班</label>
            <select class="org-select" id="bigClassSelect" onchange="onBigClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group">
            <label class="org-label" for="classSelect">班级</label>
            <select class="org-select" id="classSelect" onchange="onClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group">
            <label class="org-label" for="groupSelect">小组</label>
            <select class="org-select" id="groupSelect" onchange="onGroupChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
        </div>
      </section>

      <div class="empty-panel" id="emptyPanel">正在加载今日共读影像...</div>

      <section class="reading-panel poster-workbench" id="editorPanel" hidden>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title" id="editorTitle">文字设置</h2>
            <p class="reading-section-note" id="editorMeta"></p>
          </div>
          <button class="section-collapse open" id="editorPanelToggle" type="button" data-icon="ChevronRightIcon" aria-label="收起文字设置" aria-expanded="true" onclick="toggleSettingsPanel('editorPanelBody','editorPanelToggle','文字设置')"></button>
        </div>

        <div id="editorPanelBody">
        <div class="poster-editor-grid">
          <div class="reading-field">
            <label for="posterTitle">封面标题</label>
            <input class="reading-input" id="posterTitle" maxlength="40" oninput="handlePosterFieldInput()" />
          </div>
          <div class="reading-field">
            <label for="posterSubtitle">共读类型</label>
            <input class="reading-input" id="posterSubtitle" maxlength="30" oninput="handlePosterFieldInput()" />
          </div>
          <div class="reading-field">
            <label for="participantCount">实际参与人数（选填）</label>
            <input
              class="reading-input"
              id="participantCount"
              type="number"
              min="0"
              max="9999"
              placeholder="未填写时不显示"
              oninput="handlePosterFieldInput()"
            />
          </div>
          <div class="reading-field wide">
            <label for="closingText">封底文字</label>
            <input class="reading-input" id="closingText" maxlength="100" oninput="handlePosterFieldInput()" />
          </div>
        </div>
        </div>

      </section>

      <section class="reading-panel" id="assetEditorPanel" hidden>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title">图片设置</h2>
            <p class="reading-section-note">可指定封面、岗位人物或全员画面；裁切只保存位置参数，不会修改原图。</p>
          </div>
          <button class="section-collapse open" id="assetPanelToggle" type="button" data-icon="ChevronRightIcon" aria-label="收起图片设置" aria-expanded="true" onclick="toggleSettingsPanel('assetPanelBody','assetPanelToggle','图片设置')"></button>
        </div>
        <div id="assetPanelBody"><div class="poster-asset-list" id="posterAssetList"></div></div>
      </section>

      <section class="reading-panel" id="previewPanel" hidden>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title">长图预览</h2>
            <p class="reading-section-note">实际导出宽度为1080px，预览已按当前屏幕缩放。</p>
          </div>
          <button class="reading-btn vermillion" id="exportButton" type="button" onclick="exportPoster()">
            <span data-icon="DownloadIcon"></span><span>导出当前长图</span>
          </button>
        </div>
        <div class="poster-preview-shell" id="posterPreviewShell">
          <div class="poster-preview-stage" id="posterPreviewStage"></div>
        </div>
        <div class="export-result" id="exportResult" hidden></div>
      </section>
    </main>

    <div id="bottomNavContainer"></div>
    <div class="poster-render-host" id="posterRenderHost" aria-hidden="true"></div>

    <div class="crop-modal" id="cropModal" hidden>
      <div class="crop-dialog" role="dialog" aria-modal="true" aria-labelledby="cropTitle">
        <div class="crop-dialog-head">
          <div>
            <h2 id="cropTitle">调整照片取景</h2>
            <p class="reading-section-note" id="cropSubtitle"></p>
          </div>
        </div>
        <div class="crop-stage" id="cropStage">
          <img id="cropImage" alt="照片裁切预览" />
        </div>
        <div class="crop-readout" id="cropReadout">水平 50% · 垂直 50% · 缩放 1.00×</div>
        <div class="crop-control">
          <input id="cropX" type="hidden" value="50" />
        </div>
        <div class="crop-control">
          <input id="cropY" type="hidden" value="50" />
        </div>
        <div class="crop-control">
          <input id="cropZoom" type="hidden" value="1" />
        </div>
        <div class="crop-gamepad" aria-label="裁切手柄控件">
          <button class="zoom-out" type="button" onclick="adjustCropZoom(-0.05)"><span>−</span><small>缩放</small></button>
          <button class="up" type="button" data-crop-edge="top" onclick="selectCropEdge('top')"><span>↑</span><small>上边</small></button>
          <button class="zoom-in" type="button" onclick="adjustCropZoom(0.05)"><span>＋</span><small>缩放</small></button>
          <button class="left" type="button" data-crop-edge="left" onclick="selectCropEdge('left')"><span>←</span><small>左边</small></button>
          <div class="crop-gamepad-status" id="cropEdgeStatus">上边</div>
          <button class="right" type="button" data-crop-edge="right" onclick="selectCropEdge('right')"><span>→</span><small>右边</small></button>
          <button class="minus" type="button" onclick="adjustCropEdge(-1)"><span>−</span><small>1px</small></button>
          <button class="down" type="button" data-crop-edge="bottom" onclick="selectCropEdge('bottom')"><span>↓</span><small>下边</small></button>
          <button class="plus" type="button" onclick="adjustCropEdge(1)"><span>＋</span><small>1px</small></button>
        </div>
        <div class="crop-actions">
          <button class="reading-btn" type="button" onclick="rotateCrop()">旋转90°</button>
          <button class="reading-btn" type="button" onclick="resetCrop()">重置</button>
          <button class="reading-btn primary" id="applyCropButton" type="button" onclick="applyCrop()">应用裁切</button>
          <button class="reading-btn" type="button" onclick="closeCropEditor()">关闭</button>
        </div>
      </div>
    </div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=17"></script>
    <script src="js/reading-media.js?v=3"></script>
    <script src="js/publicity-reading-poster.js?v=11"></script>
    <script>
      renderModuleBottomNav('publicity', 'media');

      var publicityReadingContext = null;
      var currentUser = null;
      var accessibleGroups = [];
      var dailySchedules = [];
      var currentGroup = null;
      var selectedSchedule = null;
      var selectedBundle = null;
      var currentPoster = null;
      var currentItems = [];
      var legacyCropFrameItems = [];
      var cropItem = null;
      var cropRotation = 0;
      var cropDrag = null;
      var cropActiveEdge = 'top';
      var cropFrame = null;
      var cropFrameDirty = false;
      var cropPreviewFrame = null;
      var cropSaving = false;
      var posterAutoSaveTimer = null;
      var posterItemSaveTimers = {};
      var assetReorderDrag = null;
      var weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      var readingPageParams = new URLSearchParams(location.search);
      var requestedGroupId = Number(readingPageParams.get('group_id')) || null;
      var requestedScheduleId = Number(readingPageParams.get('schedule_id')) || null;
      var requestedDate = /^\d{4}-\d{2}-\d{2}$/.test(readingPageParams.get('date') || '')
        ? readingPageParams.get('date')
        : getToday();

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;
        if (!(await guardModuleAccess('publicity'))) return;

        try {
          publicityReadingContext = await ReadingMedia.loadContext('publicity');
          var semesterResult = await window.db
            .from('semesters')
            .select('semester_name')
            .eq('id', publicityReadingContext.semesterId)
            .single();
          setCurrentSemester(
            'semesterName',
            semesterResult.data ? semesterResult.data.semester_name : '当前学期',
            'tag-lg'
          );
          renderTodayInfo();
          accessibleGroups = getAccessibleGroups();
          if (!accessibleGroups.length) {
            renderOrganizationSelector(null);
            showEmpty('当前账号在本学期没有可制作影像的下属小组');
            return;
          }
          dailySchedules = await ReadingMedia.loadSchedules(publicityReadingContext, requestedDate);
          var detectedGroup = await resolveCurrentUserGroup();
          currentGroup =
            accessibleGroups.find(function (group) { return Number(group.id) === requestedGroupId; }) ||
            accessibleGroups.find(function (group) {
              return detectedGroup && Number(group.id) === Number(detectedGroup.id);
            }) || accessibleGroups[0];
          renderOrganizationSelector(currentGroup);
          bindCropDrag();
          bindCropHoldControls();
          await loadCurrentGroup();
          window.addEventListener('resize', fitPosterPreview);
        } catch (error) {
          showEmpty('晨读影像加载失败：' + (error.message || error));
        }
      }

      function renderTodayInfo() {
        document.getElementById('currentDate').textContent = requestedDate;
        document.getElementById('currentWeekday').textContent = weekDays[new Date(requestedDate + 'T00:00:00').getDay()];
        document.getElementById('operatorName').textContent = currentUser.name || '未知';
      }

      function getAccessibleGroups() {
        return (publicityReadingContext.orgs || [])
          .filter(function (org) {
            return org.level === '小组' && ReadingMedia.canAccessOrg(publicityReadingContext, org.id);
          })
          .sort(function (a, b) {
            return (
              (a.sort_order || 0) - (b.sort_order || 0) ||
              String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN')
            );
          });
      }

      async function resolveCurrentUserGroup() {
        if (currentUser.phone) {
          var personResult = await window.db.from('people').select('id').eq('phone', currentUser.phone).maybeSingle();
          if (personResult.error) throw personResult.error;
          if (personResult.data) {
            var assignmentResult = await window.db
              .from('person_org_assignments')
              .select('org_id,sort_order')
              .eq('semester_id', publicityReadingContext.semesterId)
              .eq('person_id', personResult.data.id)
              .eq('org_level', '小组')
              .eq('status', 'active')
              .order('sort_order')
              .limit(1);
            if (assignmentResult.error) throw assignmentResult.error;
            var assignment = (assignmentResult.data || [])[0];
            var assignedGroup = assignment ? publicityReadingContext.orgMap[Number(assignment.org_id)] : null;
            if (assignedGroup && assignedGroup.level === '小组') return assignedGroup;
          }
        }
        return (
          (publicityReadingContext.memberships || [])
            .map(function (membership) {
              return publicityReadingContext.orgMap[Number(membership.org_id)];
            })
            .find(function (org) {
              return org && org.level === '小组';
            }) || null
        );
      }

      function uniqueOrgs(orgs) {
        var seen = {};
        return orgs.filter(function (org) {
          if (!org || seen[org.id]) return false;
          seen[org.id] = true;
          return true;
        });
      }

      function getClassesForBigClass(bigClassId) {
        return uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = publicityReadingContext.orgMap[Number(group.parent_id)];
            return classOrg && Number(classOrg.parent_id) === Number(bigClassId) ? classOrg : null;
          })
        );
      }

      function getGroupsForClass(classId) {
        return accessibleGroups.filter(function (group) {
          return Number(group.parent_id) === Number(classId);
        });
      }

      function renderOptions(select, orgs, placeholder) {
        select.innerHTML =
          (orgs.length === 1 ? '' : '<option value="">' + placeholder + '</option>') +
          orgs
            .map(function (org) {
              return '<option value="' + org.id + '">' + escapeHtml(org.name) + '</option>';
            })
            .join('');
      }

      function renderOrganizationSelector(defaultGroup) {
        var bigClassSelect = document.getElementById('bigClassSelect');
        var classSelect = document.getElementById('classSelect');
        var groupSelect = document.getElementById('groupSelect');
        var bigClasses = uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = publicityReadingContext.orgMap[Number(group.parent_id)];
            return classOrg ? publicityReadingContext.orgMap[Number(classOrg.parent_id)] : null;
          })
        );
        renderOptions(bigClassSelect, bigClasses, '请选择');
        if (!defaultGroup) {
          classSelect.innerHTML = '<option value="">--</option>';
          groupSelect.innerHTML = '<option value="">--</option>';
          renderCurrentPath(null);
          return;
        }
        var classOrg = publicityReadingContext.orgMap[Number(defaultGroup.parent_id)];
        var bigClass = classOrg ? publicityReadingContext.orgMap[Number(classOrg.parent_id)] : null;
        if (!classOrg || !bigClass) return;
        bigClassSelect.value = String(bigClass.id);
        var classes = getClassesForBigClass(bigClass.id);
        renderOptions(classSelect, classes, '请选择');
        classSelect.value = String(classOrg.id);
        var groups = getGroupsForClass(classOrg.id);
        renderOptions(groupSelect, groups, '请选择');
        groupSelect.value = String(defaultGroup.id);
        renderCurrentPath(defaultGroup);
      }

      async function onBigClassChange(bigClassId) {
        resetWorkbench();
        renderCurrentPath(null);
        var classes = bigClassId ? getClassesForBigClass(bigClassId) : [];
        var classSelect = document.getElementById('classSelect');
        var groupSelect = document.getElementById('groupSelect');
        renderOptions(classSelect, classes, '请选择');
        groupSelect.innerHTML = '<option value="">请选择</option>';
        if (classes.length === 1) {
          classSelect.value = String(classes[0].id);
          await onClassChange(classes[0].id);
        } else {
          showEmpty('请选择班级和小组');
        }
      }

      async function onClassChange(classId) {
        resetWorkbench();
        renderCurrentPath(null);
        var groups = classId ? getGroupsForClass(classId) : [];
        var groupSelect = document.getElementById('groupSelect');
        renderOptions(groupSelect, groups, '请选择');
        if (groups.length === 1) {
          groupSelect.value = String(groups[0].id);
          await onGroupChange(groups[0].id);
        } else {
          showEmpty('请选择小组后制作今日共读影像');
        }
      }

      async function onGroupChange(groupId) {
        currentGroup =
          accessibleGroups.find(function (group) {
            return Number(group.id) === Number(groupId);
          }) || null;
        renderCurrentPath(currentGroup);
        if (!currentGroup) {
          showEmpty('请选择小组后制作今日共读影像');
          return;
        }
        showEmpty('正在加载该小组今日共读影像...');
        try {
          await loadCurrentGroup();
        } catch (error) {
          showEmpty('共读影像加载失败：' + (error.message || error));
        }
      }

      function renderCurrentPath(group) {
        var classOrg = group ? publicityReadingContext.orgMap[Number(group.parent_id)] : null;
        var bigClass = classOrg ? publicityReadingContext.orgMap[Number(classOrg.parent_id)] : null;
        document.getElementById('bigClassName').textContent = bigClass ? bigClass.name : '--';
        document.getElementById('className').textContent = classOrg ? classOrg.name : '--';
        document.getElementById('groupName').textContent = group ? group.name : '--';
      }

      function resetWorkbench() {
        currentGroup = null;
        selectedSchedule = null;
        selectedBundle = null;
        currentPoster = null;
        currentItems = [];
        legacyCropFrameItems = [];
        ['editorPanel', 'assetEditorPanel', 'previewPanel'].forEach(function (id) {
          document.getElementById(id).hidden = true;
        });
      }

      function showEmpty(message) {
        ['editorPanel', 'assetEditorPanel', 'previewPanel'].forEach(function (id) {
          document.getElementById(id).hidden = true;
        });
        var panel = document.getElementById('emptyPanel');
        panel.textContent = message;
        panel.hidden = false;
      }

      function hideEmpty() {
        document.getElementById('emptyPanel').hidden = true;
      }

      async function loadCurrentGroup() {
        selectedSchedule = requestedScheduleId
          ? dailySchedules.find(function(schedule) { return Number(schedule.id) === requestedScheduleId; }) || null
          : null;
        if (!selectedSchedule) {
          selectedSchedule = ReadingMedia.findScheduleForSourceOrg(
            dailySchedules,
            currentGroup,
            publicityReadingContext.orgMap
          );
        }
        if (!selectedSchedule) {
          showEmpty('该小组今天没有共读日程');
          return;
        }
        selectedBundle = await ReadingMedia.loadScheduleBundle(selectedSchedule, currentGroup.id);
        if (!selectedBundle.assets.length) {
          showEmpty('该小组尚未提交今日共读照片');
          return;
        }
        await loadPosterState();
        hideEmpty();
        renderWorkbench();
        await syncLegacyCropFrames();
      }

      async function loadPosterState() {
        var posterResult = await window.db
          .from('publicity_reading_posters')
          .select('*')
          .eq('schedule_instance_id', selectedSchedule.id)
          .eq('source_org_id', currentGroup.id)
          .maybeSingle();
        if (posterResult.error) throw posterResult.error;
        var org = currentGroup;
        currentPoster = posterResult.data || {
          id: null,
          semester_id: publicityReadingContext.semesterId,
          schedule_instance_id: Number(selectedSchedule.id),
          org_id: Number(selectedSchedule.org_id),
          source_org_id: Number(currentGroup.id),
          title: ReadingMedia.getDefaultTitle(selectedSchedule, org, selectedBundle.readingType),
          subtitle: ReadingMedia.getDefaultSubtitle(selectedSchedule, selectedBundle.readingType),
          closing_text: '在共读中照见彼此，在践行中抵达良知。',
          participant_count: null,
          layout_style: 'auto',
          status: 'draft'
        };

        var savedItems = [];
        if (currentPoster.id) {
          var itemResult = await window.db
            .from('publicity_reading_poster_items')
            .select('*')
            .eq('poster_id', currentPoster.id)
            .order('sort_order')
            .order('id');
          if (itemResult.error) throw itemResult.error;
          savedItems = itemResult.data || [];
        }
        var savedMap = {};
        savedItems.forEach(function (item) {
          savedMap[Number(item.asset_id)] = item;
        });
        var featureAssetId = null;

        legacyCropFrameItems = [];
        currentItems = selectedBundle.assets.map(function (asset, index) {
          var saved = savedMap[Number(asset.id)];
          var merged;
          if (saved) {
            merged = mergeStoredCropState(Object.assign({}, saved, {
              asset: asset,
              slot_kind: asset.asset_kind === 'overview' && saved.slot_kind === 'feature' ? 'overview' : saved.slot_kind
            }));
          } else {
            var slotKind =
              Number(asset.id) === featureAssetId
                ? 'feature'
                : asset.asset_kind === 'role'
                  ? 'role'
                  : asset.asset_kind === 'overview'
                    ? 'overview'
                    : 'moment';
            merged = mergeStoredCropState({
              id: null,
              poster_id: currentPoster.id,
              asset_id: Number(asset.id),
              asset: asset,
              slot_kind: slotKind,
              sort_order: index,
              crop_x: 50,
              crop_y: 50,
              crop_zoom: 1,
              rotation: 0,
              is_visible: true
            });
          }
          if (merged.crop_frame && (!saved || !saved.crop_frame)) legacyCropFrameItems.push(merged);
          return merged;
        });
      }

      async function syncLegacyCropFrames() {
        if (!legacyCropFrameItems.length) return;
        var itemsToSync = legacyCropFrameItems.slice();
        legacyCropFrameItems = [];
        try {
          await ensurePoster(currentPoster.status || 'draft');
          await persistItems(itemsToSync);
          updatePosterPreview();
          showToast('已同步此前保存的图片裁切结果', 'success');
        } catch (error) {
          legacyCropFrameItems = itemsToSync;
          showToast('图片裁切结果同步失败：' + (error.message || error), 'error');
        }
      }

      function renderWorkbench() {
        var org = currentGroup;
        document.getElementById('editorTitle').textContent = '文字设置';
        document.getElementById('editorMeta').textContent =
          ReadingMedia.formatDisplayDate(selectedSchedule.schedule_date) +
          ' · ' +
          ReadingMedia.getWeekday(selectedSchedule.schedule_date);
        document.getElementById('posterTitle').value = currentPoster.title || '';
        document.getElementById('posterSubtitle').value = currentPoster.subtitle || '';
        document.getElementById('participantCount').value =
          currentPoster.participant_count === null ? '' : currentPoster.participant_count;
        document.getElementById('closingText').value = currentPoster.closing_text || '';
        ['editorPanel', 'assetEditorPanel', 'previewPanel'].forEach(function (id) {
          document.getElementById(id).hidden = false;
        });
        document.getElementById('exportResult').hidden = true;
        renderAssetEditor();
        updatePosterPreview();
      }

      function getItemLabel(item) {
        var asset = item.asset;
        if (asset.asset_kind === 'role') {
          return (item.role_name_override || asset.role_name_snapshot || '岗位') + ' · ' + (item.person_name_override || asset.person_name_snapshot || '未命名人员');
        }
        if (asset.asset_kind === 'overview') return '全员画面';
        if (asset.asset_kind === 'moment') return '现场花絮';
        return '其他素材';
      }

      function renderAssetEditor() {
        document.getElementById('posterAssetList').innerHTML = currentItems
          .map(function (item) {
            var roleValue = item.role_name_override || item.asset.role_name_snapshot || '';
            var personValue = item.person_name_override || item.asset.person_name_snapshot || '';
            var identityFields =
              item.asset.asset_kind === 'role'
                ? '<div class="poster-asset-identity"><label>岗位<input aria-label="岗位名称" value="' +
                  escapeHtml(roleValue) +
                  '" oninput="updatePosterItemText(' +
                  item.asset_id +
                  ',\'role_name_override\',this.value)"></label><label>姓名<input aria-label="人员姓名" value="' +
                  escapeHtml(personValue) +
                  '" oninput="updatePosterItemText(' +
                  item.asset_id +
                  ',\'person_name_override\',this.value)"></label></div>'
                : '';
            var placementControl =
              '<div class="poster-asset-controls"><label class="poster-asset-placement"><span>位置</span><select aria-label="版面位置" onchange="changeItemSlot(' +
              item.asset_id +
              ',this.value)">' +
              (item.asset.asset_kind === 'overview' ? '' : slotOption('feature', '封面主图', item.slot_kind)) +
              slotOption('role', '岗位人物', item.slot_kind) +
              slotOption('overview', '全员画面', item.slot_kind) +
              slotOption('moment', '其它照片', item.slot_kind) +
              '</select></label><div class="poster-asset-actions"><label class="visibility-switch" title="显示或隐藏此照片"><input type="checkbox" ' +
              (item.is_visible === false ? '' : 'checked') +
              ' onchange="toggleItemVisibility(' +
              item.asset_id +
              ',this.checked)"><span></span></label></div></div>';
            return (
              '<article class="poster-asset-row" data-asset-id="' +
              item.asset_id +
              '"><button class="poster-asset-move-handle" type="button" aria-label="移动图片位置" onpointerdown="startAssetReorder(event,' +
              item.asset_id +
              ')"></button><div class="poster-asset-media"><img alt="' +
              escapeHtml(getItemLabel(item)) +
              '" src="' +
              escapeHtml(item.asset.signed_url) +
              '"><span class="poster-asset-file">' +
              escapeHtml(item.asset.caption || item.asset.file_name || '原始图片') +
              '</span></div><div class="poster-asset-copy"><strong>' +
              escapeHtml(getItemLabel(item)) +
              '</strong>' +
              '<div class="poster-asset-detail-row">' +
              identityFields +
              placementControl +
              '</div></div><button class="reading-btn poster-crop-button" type="button" onclick="openCropEditor(' +
              item.asset_id +
              ')">裁切</button></article>'
            );
          })
          .join('');
      }

      function slotOption(value, label, current) {
        return '<option value="' + value + '"' + (value === current ? ' selected' : '') + '>' + label + '</option>';
      }

      function getPosterDraft() {
        return Object.assign({}, currentPoster, {
          title: document.getElementById('posterTitle').value.trim(),
          subtitle: document.getElementById('posterSubtitle').value.trim(),
          participant_count: ReadingMedia.numberOrNull(document.getElementById('participantCount').value),
          closing_text: document.getElementById('closingText').value.trim()
        });
      }

      function handlePosterFieldInput() {
        updatePosterPreview();
        clearTimeout(posterAutoSaveTimer);
        posterAutoSaveTimer = setTimeout(function () {
          savePoster('draft', true);
        }, 550);
      }

      function updatePosterPreview(previewItems) {
        if (!selectedSchedule || !selectedBundle) return;
        currentPoster = getPosterDraft();
        var org = currentGroup;
        var stage = document.getElementById('posterPreviewStage');
        stage.innerHTML = '';
        stage.appendChild(
          PublicityReadingPoster.create({
            schedule: selectedSchedule,
            org: org,
            orgPath: ReadingMedia.getOrgPath(currentGroup.id, publicityReadingContext.orgMap),
            readingType: selectedBundle.readingType,
            poster: currentPoster,
            items: previewItems || currentItems
          })
        );
        requestAnimationFrame(fitPosterPreview);
        stage.querySelectorAll('img').forEach(function (image) {
          if (!image.complete) image.addEventListener('load', fitPosterPreview, { once: true });
        });
      }

      function fitPosterPreview() {
        var shell = document.getElementById('posterPreviewShell');
        var stage = document.getElementById('posterPreviewStage');
        var poster = stage && stage.firstElementChild;
        if (!shell || !stage || !poster) return;
        var scale = Math.min(1, shell.clientWidth / 1080);
        stage.style.transform = 'scale(' + scale + ')';
        shell.style.height = Math.ceil(poster.offsetHeight * scale) + 'px';
      }

      function changeItemSlot(assetId, slotKind) {
        var item = findItem(assetId);
        if (!item) return;
        if (slotKind === 'feature' && item.asset.asset_kind === 'overview') {
          slotKind = 'overview';
        }
        if (slotKind === 'feature') {
          currentItems.forEach(function (candidate) {
            if (candidate !== item && candidate.slot_kind === 'feature') {
              candidate.slot_kind =
                candidate.asset.asset_kind === 'role'
                  ? 'role'
                  : candidate.asset.asset_kind === 'overview'
                    ? 'overview'
                    : 'moment';
            }
          });
        }
        item.slot_kind = slotKind;
        renderAssetEditor();
        updatePosterPreview();
        queuePosterItemSave(item);
      }

      function toggleItemVisibility(assetId, checked) {
        var item = findItem(assetId);
        if (!item) return;
        item.is_visible = !!checked;
        updatePosterPreview();
        queuePosterItemSave(item);
      }

      function updatePosterItemText(assetId, field, value) {
        var item = findItem(assetId);
        if (!item || ['role_name_override', 'person_name_override'].indexOf(field) === -1) return;
        item[field] = String(value || '').trim();
        updatePosterPreview();
        queuePosterItemSave(item);
      }

      function queuePosterItemSave(item) {
        if (!item) return;
        var assetId = Number(item.asset_id);
        clearTimeout(posterItemSaveTimers[assetId]);
        posterItemSaveTimers[assetId] = setTimeout(async function () {
          try {
            await ensurePoster(currentPoster.status || 'draft');
            await persistItems([item]);
          } catch (error) {
            showToast('图片信息保存失败：' + (error.message || error), 'error');
          }
        }, 550);
      }

      function startAssetReorder(event, assetId) {
        if (event.button && event.button !== 0) return;
        var handle = event.currentTarget;
        var card = handle && handle.closest('.poster-asset-row');
        if (!card) return;
        event.preventDefault();
        assetReorderDrag = {
          pointerId: event.pointerId,
          assetId: Number(assetId),
          targetAssetId: Number(assetId),
          card: card,
          targetCard: card
        };
        card.classList.add('is-reordering');
        if (handle.setPointerCapture) handle.setPointerCapture(event.pointerId);
        document.addEventListener('pointermove', updateAssetReorder);
        document.addEventListener('pointerup', finishAssetReorder, { once: true });
        document.addEventListener('pointercancel', finishAssetReorder, { once: true });
      }

      function updateAssetReorder(event) {
        if (!assetReorderDrag || event.pointerId !== assetReorderDrag.pointerId) return;
        var target = document.elementFromPoint(event.clientX, event.clientY);
        var targetCard = target && target.closest ? target.closest('.poster-asset-row') : null;
        if (!targetCard || targetCard === assetReorderDrag.targetCard) return;
        if (assetReorderDrag.targetCard) assetReorderDrag.targetCard.classList.remove('is-reorder-target');
        assetReorderDrag.targetCard = targetCard;
        assetReorderDrag.targetAssetId = Number(targetCard.dataset.assetId);
        targetCard.classList.add('is-reorder-target');
      }

      function finishAssetReorder(event) {
        document.removeEventListener('pointermove', updateAssetReorder);
        document.removeEventListener('pointerup', finishAssetReorder);
        document.removeEventListener('pointercancel', finishAssetReorder);
        if (!assetReorderDrag || event.pointerId !== assetReorderDrag.pointerId) return;
        var drag = assetReorderDrag;
        assetReorderDrag = null;
        drag.card.classList.remove('is-reordering');
        if (drag.targetCard) drag.targetCard.classList.remove('is-reorder-target');
        if (!drag.targetAssetId || drag.targetAssetId === drag.assetId) return;
        var sourceIndex = currentItems.findIndex(function (item) { return Number(item.asset_id) === drag.assetId; });
        var targetIndex = currentItems.findIndex(function (item) { return Number(item.asset_id) === drag.targetAssetId; });
        if (sourceIndex < 0 || targetIndex < 0) return;
        var moved = currentItems.splice(sourceIndex, 1)[0];
        currentItems.splice(targetIndex, 0, moved);
        currentItems.forEach(function (item, index) {
          item.sort_order = index;
        });
        renderAssetEditor();
        updatePosterPreview();
        ensurePoster(currentPoster.status || 'draft')
          .then(function () {
            return persistItems(currentItems);
          })
          .catch(function (error) {
            showToast('图片排序保存失败：' + (error.message || error), 'error');
          });
      }

      function findItem(assetId) {
        return currentItems.find(function (item) {
          return Number(item.asset_id) === Number(assetId);
        });
      }

      function getCropStateKey(item) {
        if (!selectedSchedule || !currentGroup || !item) return '';
        return [
          'publicity-reading-crop',
          publicityReadingContext.semesterId,
          selectedSchedule.id,
          currentGroup.id,
          item.asset_id || (item.asset && item.asset.id)
        ].join(':');
      }

      function getStoredCropState(item) {
        try {
          var raw = localStorage.getItem(getCropStateKey(item));
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      function mergeStoredCropState(item) {
        var stored = getStoredCropState(item);
        // crop_frame 现在会同步到数据库。本地缓存只用于兼容旧草稿，避免
        // 某台设备遗留的缓存覆盖已经保存到服务端的正式裁切结果。
        if (!stored || item.crop_frame) return item;
        return Object.assign({}, item, stored);
      }

      function saveStoredCropState(item) {
        try {
          localStorage.setItem(
            getCropStateKey(item),
            JSON.stringify({
              crop_x: Number(item.crop_x || 50),
              crop_y: Number(item.crop_y || 50),
              crop_zoom: Number(item.crop_zoom || 1),
              rotation: Number(item.rotation || 0),
              crop_frame: item.crop_frame || null
            })
          );
        } catch (error) {
          // 本地缓存失败不影响数据库保存
        }
      }

      async function ensurePoster(status) {
        currentPoster = getPosterDraft();
        var payload = {
          semester_id: publicityReadingContext.semesterId,
          schedule_instance_id: Number(selectedSchedule.id),
          org_id: Number(selectedSchedule.org_id),
          source_org_id: Number(currentGroup.id),
          title: currentPoster.title,
          subtitle: currentPoster.subtitle,
          participant_count: currentPoster.participant_count,
          closing_text: currentPoster.closing_text,
          layout_style: 'auto',
          status: status || currentPoster.status || 'draft',
          updated_by: publicityReadingContext.user.id
        };
        var result;
        if (currentPoster.id) {
          result = await window.db
            .from('publicity_reading_posters')
            .update(payload)
            .eq('id', currentPoster.id)
            .select('*')
            .single();
        } else {
          payload.created_by = publicityReadingContext.user.id;
          result = await window.db.from('publicity_reading_posters').insert(payload).select('*').single();
        }
        if (result.error) throw result.error;
        currentPoster = result.data;
        return currentPoster;
      }

      async function persistItems(items) {
        var rows = (items || currentItems).map(function (item) {
          return {
            poster_id: Number(currentPoster.id),
            asset_id: Number(item.asset_id),
            slot_kind: item.slot_kind,
            sort_order: item.sort_order || 0,
            crop_x: Number(item.crop_x || 50),
            crop_y: Number(item.crop_y || 50),
            crop_zoom: clampCropZoom(Number(item.crop_zoom || 1)),
            rotation: Number(item.rotation || 0),
            crop_frame: item.crop_frame || null,
            role_name_override: String(item.role_name_override || '').trim() || null,
            person_name_override: String(item.person_name_override || '').trim() || null,
            is_visible: item.is_visible !== false
          };
        });
        if (!rows.length) return;
        var result = await window.db
          .from('publicity_reading_poster_items')
          .upsert(rows, { onConflict: 'poster_id,asset_id' })
          .select('*');
        if (result.error) throw result.error;
        var savedMap = {};
        (result.data || []).forEach(function (saved) {
          savedMap[Number(saved.asset_id)] = saved;
        });
        currentItems = currentItems.map(function (item) {
          var saved = savedMap[Number(item.asset_id)];
          return mergeStoredCropState(saved ? Object.assign({}, item, saved, { asset: item.asset }) : item);
        });
      }

      async function savePoster(status, silent) {
        var buttons = [document.getElementById('saveDraftButton'), document.getElementById('readyButton')].filter(Boolean);
        buttons.forEach(function (button) {
          button.disabled = true;
        });
        try {
          await ensurePoster(status);
          await persistItems();
          if (!silent) {
            showToast(status === 'ready' ? '已标记为可发布' : '晨读长图草稿已保存', 'success');
          }
          return true;
        } catch (error) {
          showToast('保存失败：' + (error.message || error), 'error');
          return false;
        } finally {
          buttons.forEach(function (button) {
            button.disabled = false;
          });
        }
      }

      function openCropEditor(assetId) {
        if (cropSaving) {
          showToast('当前裁切正在保存，请稍候', 'info');
          return;
        }
        cropItem = findItem(assetId);
        if (!cropItem) return;
        var activeItem = cropItem;
        cropRotation = Number(activeItem.rotation || 0);
        document.getElementById('cropSubtitle').textContent = getItemLabel(activeItem);
        var cropImage = document.getElementById('cropImage');
        var cropStage = document.getElementById('cropStage');
        ['--crop-left', '--crop-top', '--crop-width', '--crop-height'].forEach(function (property) {
          cropStage.style.removeProperty(property);
        });
        cropFrame = null;
        cropFrameDirty = false;
        document.getElementById('cropReadout').textContent = '正在读取照片尺寸...';
        cropImage.onload = function () {
          if (cropItem !== activeItem) return;
          restoreCropFrameFromItem();
          updateCropPreview();
        };
        // 先写入该素材已保存的状态，再设置图片地址；缓存图片可能在 src 设置后立即完成加载。
        document.getElementById('cropX').value = Number(activeItem.crop_x || 50);
        document.getElementById('cropY').value = Number(activeItem.crop_y || 50);
        document.getElementById('cropZoom').value = Number(activeItem.crop_zoom || 1);
        cropImage.classList.add('fit-contain');
        cropImage.src = activeItem.asset.signed_url;
        document.getElementById('cropModal').hidden = false;
        document.body.style.overflow = 'hidden';
        selectCropEdge(cropActiveEdge || 'top');
        if (cropImage.complete && cropImage.naturalWidth) {
          restoreCropFrameFromItem();
          updateCropPreview();
        }
      }

      function closeCropEditor() {
        if (cropSaving) return;
        if (cropPreviewFrame) {
          cancelAnimationFrame(cropPreviewFrame);
          cropPreviewFrame = null;
        }
        document.getElementById('cropModal').hidden = true;
        document.body.style.overflow = '';
        cropItem = null;
        cropDrag = null;
        cropFrame = null;
        cropFrameDirty = false;
        // 未应用时撤回临时预览；已应用时 currentItems 已更新，仍会保留新结果。
        updatePosterPreview();
      }

      function toggleSettingsPanel(bodyId, buttonId, label) {
        var body = document.getElementById(bodyId);
        var button = document.getElementById(buttonId);
        if (!body || !button) return;
        var collapsed = body.hidden;
        body.hidden = !collapsed;
        button.classList.toggle('open', collapsed);
        button.setAttribute('aria-expanded', String(collapsed));
        button.setAttribute('aria-label', (collapsed ? '收起' : '展开') + (label || '设置'));
      }

      function getLiveCropPreviewItems() {
        if (!cropItem) return currentItems;
        var previewFrame = getCropFrameRatios();
        var previewItem = Object.assign({}, cropItem, {
          crop_x: Number(document.getElementById('cropX').value),
          crop_y: Number(document.getElementById('cropY').value),
          crop_zoom: Number(document.getElementById('cropZoom').value),
          rotation: cropRotation,
          crop_frame: previewFrame
        });
        return currentItems.map(function (item) {
          return item === cropItem ? previewItem : item;
        });
      }

      function scheduleLiveCropPreview() {
        if (cropPreviewFrame || !cropItem) return;
        cropPreviewFrame = requestAnimationFrame(function () {
          cropPreviewFrame = null;
          updatePosterPreview(getLiveCropPreviewItems());
        });
      }

      function restoreCropFrameFromItem() {
        cropFrame = null;
        if (!cropItem || !cropItem.crop_frame) return;
        setCropFrameFromRatios(cropItem.crop_frame);
      }

      function updateCropPreview() {
        if (!cropItem) return;
        var x = Number(document.getElementById('cropX').value);
        var y = Number(document.getElementById('cropY').value);
        var zoom = Number(document.getElementById('cropZoom').value);
        var image = document.getElementById('cropImage');
        if (!image.naturalWidth) {
          document.getElementById('cropReadout').textContent = '正在读取照片尺寸...';
          return;
        }
        image.style.objectPosition = x + '% ' + y + '%';
        image.style.transformOrigin = x + '% ' + y + '%';
        image.style.transform = 'scale(' + zoom + ') rotate(' + cropRotation + 'deg)';
        ensureCropFrameFromImage(x, y, zoom);
        renderCropFrame();
        document.getElementById('cropReadout').textContent =
          '照片 ' +
          formatCropPercent(x) +
          ' / ' +
          formatCropPercent(y) +
          ' · 缩放 ' +
          zoom.toFixed(2) +
          '× · ' +
          getCropEdgeLabel(cropActiveEdge);
        scheduleLiveCropPreview();
      }

      function ensureCropFrameFromImage(x, y, zoom) {
        if (cropFrame) return;
        var imageRect = getRenderedCropImageRect();
        if (!imageRect.width || !imageRect.height) return;
        var size = getDefaultCropFrameSize(imageRect, zoom);
        var centerX = imageRect.left + (imageRect.width * clampCropValue(x)) / 100;
        var centerY = imageRect.top + (imageRect.height * clampCropValue(y)) / 100;
        cropFrame = {
          left: centerX - size.width / 2,
          top: centerY - size.height / 2,
          right: centerX + size.width / 2,
          bottom: centerY + size.height / 2
        };
        clampCropFrameToImage();
      }

      function getDefaultCropFrameSize(imageRect, zoom) {
        var frameWidth = imageRect.width;
        var frameHeight = imageRect.height;
        var safeZoom = clampCropZoom(zoom || 1);
        frameWidth = frameWidth / safeZoom;
        frameHeight = frameHeight / safeZoom;
        frameWidth = Math.min(frameWidth, imageRect.width);
        frameHeight = Math.min(frameHeight, imageRect.height);
        return { width: Math.max(42, frameWidth), height: Math.max(42, frameHeight) };
      }

      function renderCropFrame() {
        if (!cropFrame) return;
        var stage = document.getElementById('cropStage');
        clampCropFrameToImage();
        var frameWidth = cropFrame.right - cropFrame.left;
        var frameHeight = cropFrame.bottom - cropFrame.top;
        stage.style.setProperty('--crop-left', cropFrame.left + 'px');
        stage.style.setProperty('--crop-top', cropFrame.top + 'px');
        stage.style.setProperty('--crop-width', frameWidth + 'px');
        stage.style.setProperty('--crop-height', frameHeight + 'px');
      }

      function setCropFrameFromRatios(frame) {
        var imageRect = getRenderedCropImageRect();
        if (!imageRect.width || !imageRect.height || !frame) return;
        cropFrame = {
          left: imageRect.left + (imageRect.width * clampCropValue(frame.left)) / 100,
          top: imageRect.top + (imageRect.height * clampCropValue(frame.top)) / 100,
          right: imageRect.left + (imageRect.width * clampCropValue(frame.right)) / 100,
          bottom: imageRect.top + (imageRect.height * clampCropValue(frame.bottom)) / 100
        };
        clampCropFrameToImage();
      }

      function getCropFrameRatios() {
        if (!cropFrame) return null;
        clampCropFrameToImage();
        var imageRect = getRenderedCropImageRect();
        return {
          left: clampCropValue(((cropFrame.left - imageRect.left) / Math.max(1, imageRect.width)) * 100),
          top: clampCropValue(((cropFrame.top - imageRect.top) / Math.max(1, imageRect.height)) * 100),
          right: clampCropValue(((cropFrame.right - imageRect.left) / Math.max(1, imageRect.width)) * 100),
          bottom: clampCropValue(((cropFrame.bottom - imageRect.top) / Math.max(1, imageRect.height)) * 100)
        };
      }

      function clampCropFrameToImage() {
        if (!cropFrame) return;
        var imageRect = getRenderedCropImageRect();
        var minSize = 42;
        cropFrame.left = Math.max(imageRect.left, Math.min(cropFrame.left, imageRect.left + imageRect.width - minSize));
        cropFrame.top = Math.max(imageRect.top, Math.min(cropFrame.top, imageRect.top + imageRect.height - minSize));
        cropFrame.right = Math.max(cropFrame.left + minSize, Math.min(cropFrame.right, imageRect.left + imageRect.width));
        cropFrame.bottom = Math.max(cropFrame.top + minSize, Math.min(cropFrame.bottom, imageRect.top + imageRect.height));
      }

      function getRenderedCropImageRect() {
        var stage = document.getElementById('cropStage');
        var image = document.getElementById('cropImage');
        var stageRect = stage.getBoundingClientRect();
        var naturalWidth = image.naturalWidth || stageRect.width;
        var naturalHeight = image.naturalHeight || stageRect.height;
        var rotated = Math.abs(cropRotation % 180) === 90;
        var imageWidth = rotated ? naturalHeight : naturalWidth;
        var imageHeight = rotated ? naturalWidth : naturalHeight;
        var imageAspect = imageWidth / Math.max(1, imageHeight);
        var stageAspect = stageRect.width / Math.max(1, stageRect.height);
        var width;
        var height;
        if (stageAspect > imageAspect) {
          height = stageRect.height;
          width = height * imageAspect;
        } else {
          width = stageRect.width;
          height = width / imageAspect;
        }
        return {
          left: (stageRect.width - width) / 2,
          top: (stageRect.height - height) / 2,
          width: width,
          height: height
        };
      }

      function getCropFrameAspect() {
        if (!cropItem) return 4 / 3;
        if (cropItem.slot_kind === 'feature') return 16 / 8.3;
        if (cropItem.asset.asset_kind === 'overview' || cropItem.slot_kind === 'overview') return 16 / 8.6;
        return 4 / 3;
      }

      function formatCropPercent(value) {
        return Math.round(Number(value) * 10) / 10 + '%';
      }

      function clampCropValue(value) {
        return Math.max(0, Math.min(100, Number(value)));
      }

      function clampCropZoom(value) {
        return Math.max(0.2, Math.min(4, Number(value)));
      }

      function selectCropEdge(edge) {
        cropActiveEdge = edge || 'top';
        document.getElementById('cropEdgeStatus').textContent = getCropEdgeLabel(cropActiveEdge) + ' · 1px';
        document.querySelectorAll('[data-crop-edge]').forEach(function (button) {
          button.classList.toggle('active', button.dataset.cropEdge === cropActiveEdge);
        });
      }

      function getCropEdgeLabel(edge) {
        return (
          {
            top: '上边',
            right: '右边',
            bottom: '下边',
            left: '左边'
          }[edge] || '上边'
        );
      }

      function getCropPixelStep(edge) {
        var rect = getRenderedCropImageRect();
        var size = edge === 'left' || edge === 'right' ? rect.width : rect.height;
        return 100 / Math.max(1, size || 1);
      }

      function adjustCropEdge(pixelDelta) {
        var edge = cropActiveEdge || 'top';
        ensureCropFrameFromImage(
          Number(document.getElementById('cropX').value),
          Number(document.getElementById('cropY').value),
          Number(document.getElementById('cropZoom').value)
        );
        if (!cropFrame) return;
        var delta = Number(pixelDelta || 0);
        if (edge === 'top') cropFrame.top -= delta;
        if (edge === 'bottom') cropFrame.bottom += delta;
        if (edge === 'left') cropFrame.left -= delta;
        if (edge === 'right') cropFrame.right += delta;
        cropFrameDirty = true;
        renderCropFrame();
        document.getElementById('cropReadout').textContent =
          '取景框 · ' +
          getCropEdgeLabel(edge) +
          ' ' +
          Math.round(cropFrame.right - cropFrame.left) +
          '×' +
          Math.round(cropFrame.bottom - cropFrame.top);
      }

      function adjustCropZoom(delta) {
        var zoomInput = document.getElementById('cropZoom');
        zoomInput.value = clampCropZoom(Number(zoomInput.value) + Number(delta || 0)).toFixed(2);
        updateCropPreview();
      }

      function rotateCrop() {
        cropRotation = (cropRotation + 90) % 360;
        document.getElementById('cropX').value = 50;
        document.getElementById('cropY').value = 50;
        updateCropPreview();
      }

      function resetCrop() {
        document.getElementById('cropX').value = 50;
        document.getElementById('cropY').value = 50;
        document.getElementById('cropZoom').value = 1;
        cropRotation = 0;
        cropFrame = null;
        cropFrameDirty = false;
        updateCropPreview();
      }

      async function applyCrop() {
        if (!cropItem || cropSaving) return;
        // 保存期间固定当前素材，避免用户关闭或切换到下一张照片后把裁切写错位置。
        var item = cropItem;
        var cropState = {
          crop_x: Number(document.getElementById('cropX').value),
          crop_y: Number(document.getElementById('cropY').value),
          crop_zoom: Number(document.getElementById('cropZoom').value),
          rotation: cropRotation,
          crop_frame: getCropFrameRatios()
        };
        var button = document.getElementById('applyCropButton');
        button.disabled = true;
        cropSaving = true;
        // 取景框、拖拽位置和缩放均以用户当前操作值为准，不在保存时重新反算。
        Object.assign(item, cropState);
        saveStoredCropState(item);
        try {
          await ensurePoster(currentPoster.status || 'draft');
          await persistItems([item]);
          var freshItem = findItem(item.asset_id);
          if (freshItem) {
            Object.assign(freshItem, cropState);
          }
          cropSaving = false;
          closeCropEditor();
          showToast('裁切位置已保存，原图未修改', 'success');
        } catch (error) {
          showToast('裁切保存失败：' + (error.message || error), 'error');
        } finally {
          cropSaving = false;
          button.disabled = false;
        }
      }

      function syncCropValuesFromFrame() {
        if (!cropFrame) return;
        clampCropFrameToImage();
        var imageRect = getRenderedCropImageRect();
        var frameWidth = cropFrame.right - cropFrame.left;
        var frameHeight = cropFrame.bottom - cropFrame.top;
        var centerX = cropFrame.left + frameWidth / 2;
        var centerY = cropFrame.top + frameHeight / 2;
        var baseSize = getDefaultCropFrameSize(imageRect, 1);
        var frameZoom = Math.max(baseSize.width / Math.max(1, frameWidth), baseSize.height / Math.max(1, frameHeight));
        var currentZoom = Number(document.getElementById('cropZoom').value || 1);
        var zoom = cropFrameDirty ? Math.max(currentZoom, frameZoom) : currentZoom;
        document.getElementById('cropX').value = clampCropValue(((centerX - imageRect.left) / Math.max(1, imageRect.width)) * 100);
        document.getElementById('cropY').value = clampCropValue(((centerY - imageRect.top) / Math.max(1, imageRect.height)) * 100);
        document.getElementById('cropZoom').value = clampCropZoom(zoom).toFixed(2);
      }

      function bindCropDrag() {
        var stage = document.getElementById('cropStage');
        stage.addEventListener('pointerdown', function (event) {
          cropDrag = {
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            cropX: Number(document.getElementById('cropX').value),
            cropY: Number(document.getElementById('cropY').value)
          };
          stage.setPointerCapture(event.pointerId);
        });
        stage.addEventListener('pointermove', function (event) {
          if (!cropDrag || cropDrag.pointerId !== event.pointerId) return;
          var rect = getRenderedCropImageRect();
          var nextX = Math.max(
            0,
            Math.min(100, cropDrag.cropX - ((event.clientX - cropDrag.startX) / rect.width) * 100)
          );
          var nextY = Math.max(
            0,
            Math.min(100, cropDrag.cropY - ((event.clientY - cropDrag.startY) / rect.height) * 100)
          );
          document.getElementById('cropX').value = nextX;
          document.getElementById('cropY').value = nextY;
          updateCropPreview();
        });
        function endDrag(event) {
          if (cropDrag && cropDrag.pointerId === event.pointerId) cropDrag = null;
        }
        stage.addEventListener('pointerup', endDrag);
        stage.addEventListener('pointercancel', endDrag);
      }

      function bindCropHoldControls() {
        document.querySelectorAll('.crop-gamepad .minus,.crop-gamepad .plus').forEach(function (button) {
          var holdTimer = null;
          var repeatTimer = null;
          function stopHold() {
            clearTimeout(holdTimer);
            clearInterval(repeatTimer);
            holdTimer = null;
            repeatTimer = null;
          }
          button.addEventListener('pointerdown', function () {
            stopHold();
            var delta = button.classList.contains('plus') ? 1 : -1;
            holdTimer = setTimeout(function () {
              adjustCropEdge(delta);
              repeatTimer = setInterval(function () {
                adjustCropEdge(delta);
              }, 80);
            }, 280);
          });
          ['pointerup', 'pointerleave', 'pointercancel', 'lostpointercapture'].forEach(function (eventName) {
            button.addEventListener(eventName, stopHold);
          });
        });
      }

      function isMobileBrowser() {
        return /Android|iPhone|iPad|iPod|MicroMessenger/i.test(navigator.userAgent || '');
      }

      async function exportPoster() {
        var button = document.getElementById('exportButton');
        button.disabled = true;
        try {
          if (!(await savePoster(currentPoster.status || 'draft', true))) return;
          await loadHtml2Canvas();
          var org = currentGroup;
          var host = document.getElementById('posterRenderHost');
          host.innerHTML = '';
          var poster = PublicityReadingPoster.create({
            schedule: selectedSchedule,
            org: org,
            orgPath: ReadingMedia.getOrgPath(currentGroup.id, publicityReadingContext.orgMap),
            readingType: selectedBundle.readingType,
            poster: currentPoster,
            items: currentItems
          });
          host.appendChild(poster);
          await waitForImages(poster);
          if (document.fonts && document.fonts.ready) await document.fonts.ready;
          var height = Math.max(poster.scrollHeight, poster.offsetHeight);
          var scale = Math.min(2.5, Math.floor((30000 / Math.max(height, 1)) * 10) / 10);
          if (scale < 1) throw new Error('长图内容过长，请隐藏部分重复照片后再导出');
          var canvas = await html2canvas(poster, {
            scale: scale,
            backgroundColor: '#f5f0e6',
            useCORS: true,
            allowTaint: false,
            logging: false
          });
          var fileName =
            cleanFileName(((org && org.name) || '共读') + '_晨读影像_' + selectedSchedule.schedule_date) + '.jpg';
          var result = document.getElementById('exportResult');
          if (!isMobileBrowser()) {
            var blob = await canvasToBlob(canvas);
            if (blob) {
              triggerDownload(blob, fileName);
              showToast('晨读长图已导出', 'success');
              return;
            }
          }
          var dataUrl = canvas.toDataURL('image/jpeg', 0.94);
          result.innerHTML =
            '<img alt="晨读长图导出结果" src="' + dataUrl + '"><p>请长按上方图片，选择“保存图片”或“发送给朋友”。</p>';
          result.hidden = false;
          result.scrollIntoView({ behavior: 'smooth', block: 'start' });
          showToast('长图已生成，请长按图片保存或转发', 'success');
        } catch (error) {
          showToast('长图导出失败：' + (error.message || error), 'error');
        } finally {
          document.getElementById('posterRenderHost').innerHTML = '';
          button.disabled = false;
        }
      }

      function cleanFileName(value) {
        return String(value || '晨读影像').replace(/[\\/:*?"<>|]/g, '_');
      }

      function waitForImages(root) {
        return Promise.all(
          Array.from(root.querySelectorAll('img')).map(function (image) {
            if (image.complete && image.naturalWidth) return Promise.resolve();
            return new Promise(function (resolve, reject) {
              image.addEventListener('load', resolve, { once: true });
              image.addEventListener(
                'error',
                function () {
                  reject(new Error('部分照片读取失败，请刷新页面后重试'));
                },
                { once: true }
              );
            });
          })
        );
      }

      function canvasToBlob(canvas) {
        return new Promise(function (resolve) {
          canvas.toBlob(resolve, 'image/jpeg', 0.94);
        });
      }

      function triggerDownload(blob, fileName) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 2000);
      }

      function loadHtml2Canvas() {
        if (typeof html2canvas === 'function') return Promise.resolve();
        return new Promise(function (resolve, reject) {
          var script = document.createElement('script');
          script.src = 'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js';
          script.dataset.html2canvas = 'true';
          script.onload = resolve;
          script.onerror = function () {
            reject(new Error('图片导出组件加载失败，请检查网络'));
          };
          document.head.appendChild(script);
        });
      }

      init().finally(function () {
        document.body.classList.remove('app-loading');
      });
    </script>
  </body>
</html>
