<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>榜单 - 阳明心学督察管理系统</title>
    <link rel="stylesheet" href="css/common.css" />
    <style>
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 120px;
        min-height: calc(100vh - 64px);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0 20px;
      }
      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--ink-dark);
      }
      .back-btn:active {
        background: var(--border);
      }
      .header-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--ink-dark);
      }

      /* Week Selector */
      .date-selector {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 14px 20px;
        margin-bottom: 14px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .date-nav {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .date-nav-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--bg-primary);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .date-nav-btn:active {
        background: var(--border);
      }
      .date-current {
        text-align: center;
        min-width: 140px;
      }
      .date-week-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .date-week-range {
        font-size: 11px;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .date-today {
        font-size: 12px;
        color: var(--vermillion);
        padding: 6px 12px;
        background: var(--vermillion-light);
        border-radius: 6px;
        cursor: pointer;
        border: none;
      }

      /* Tab Selector */
      .tab-selector {
        display: flex;
        gap: 0;
        margin-bottom: 16px;
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
      }
      .tab-btn {
        flex: 1;
        padding: 14px 8px;
        border: none;
        background: transparent;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .tab-btn.active {
        color: var(--vermillion);
        font-weight: 600;
        background: var(--vermillion-light);
      }
      .tab-icon {
        margin-right: 4px;
      }

      /* Ranking Section */
      .bigclass-section {
        margin-bottom: 16px;
      }
      .bigclass-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: var(--bg-card);
        border-radius: var(--radius);
        cursor: pointer;
        box-shadow: 0 2px 8px var(--shadow);
        border: 1px solid var(--border);
      }
      .bigclass-header:active {
        background: var(--bg-primary);
      }
      .bigclass-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .bigclass-count {
        font-size: 12px;
        color: var(--ink-muted);
        margin-left: 8px;
      }
      .bigclass-arrow {
        font-size: 12px;
        color: var(--ink-muted);
        transition: transform 0.2s;
      }
      .bigclass-arrow.collapsed {
        transform: rotate(-90deg);
      }

      .rank-list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rank-list.collapsed {
        display: none;
      }

      /* Rank Card */
      .rank-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 14px 16px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }
      .rank-card.top-1 {
        border-left: 4px solid #ffd700;
      }
      .rank-card.top-2 {
        border-left: 4px solid #c0c0c0;
      }
      .rank-card.top-3 {
        border-left: 4px solid #cd7f32;
      }
      .rank-medal {
        font-size: 30px;
        width: 42px;
        text-align: center;
        flex-shrink: 0;
        line-height: 1;
      }
      .rank-number {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--ink-muted);
        width: 36px;
        text-align: center;
        flex-shrink: 0;
      }
      .rank-info {
        flex: 1;
        min-width: 0;
      }
      .rank-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .rank-meta {
        font-size: 11px;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .rank-progress {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
      }
      .rank-progress .progress-bar {
        flex: 1;
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .rank-progress .progress-fill {
        height: 100%;
        border-radius: 3px;
      }
      .progress-fill.high {
        background: #2e7d32;
      }
      .progress-fill.medium {
        background: var(--gold);
      }
      .progress-fill.low {
        background: var(--vermillion);
      }
      .rank-progress-label {
        font-size: 10px;
        color: var(--ink-muted);
        white-space: nowrap;
      }
      .rank-rate {
        text-align: right;
        flex-shrink: 0;
        min-width: 64px;
      }
      .rank-rate-value {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }
      .rank-rate-value.high {
        color: #2e7d32;
      }
      .rank-rate-value.medium {
        color: var(--ink-dark);
      }
      .rank-rate-value.low {
        color: var(--vermillion);
      }
      .rank-rate-label {
        font-size: 10px;
        color: var(--ink-muted);
      }
      .cert-btn-small {
        display: inline-block;
        margin-top: 8px;
        padding: 5px 14px;
        font-size: 12px;
        color: var(--vermillion);
        background: var(--vermillion-light);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .cert-btn-small:active {
        opacity: 0.7;
      }

      /* Cascading Selector for Group Board */
      .cascade-row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .cascade-select {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-card);
        font-size: 14px;
        color: var(--ink-dark);
        appearance: auto;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--ink-muted);
      }
      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .empty-state-text {
        font-size: 14px;
      }

      /* Certificate Overlay */
      .cert-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s,
          visibility 0.3s;
      }
      .cert-overlay.show {
        opacity: 1;
        visibility: visible;
      }
      .cert-backdrop {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.65);
      }
      .cert-wrapper {
        position: relative;
        max-width: 440px;
        width: calc(100vw - 24px);
        max-height: 92vh;
        overflow-y: auto;
        z-index: 1;
      }

      /* ---- 证书主题变量 ---- */
      :root {
        --cert-bg1: #fdfcf8;
        --cert-bg2: #faf6f0;
        --cert-bg3: #f5efe4;
        --cert-title: #c41e3a;
        --cert-rank: #c41e3a;
        --cert-gold: #d4a574;
        --cert-accent: #c41e3a;
        --cert-body-text: #3a3a3a;
        --cert-frame-border: #d4a574;
      }
      .certificate {
        background: #fdfcf8;
        padding: 0;
        position: relative;
        overflow: hidden;
      }
      /* 喜庆光晕背景 */
      .cert-festive-glow {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.35;
      }
      .cert-festive-glow::before {
        content: '';
        position: absolute;
        top: -40%;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        height: 100%;
        background: radial-gradient(ellipse at 50% 30%, var(--cert-gold) 0%, transparent 60%);
        opacity: 0.3;
      }
      .cert-festive-glow::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 60%;
        background: radial-gradient(ellipse at 50% 70%, var(--cert-accent) 0%, transparent 55%);
        opacity: 0.15;
      }

      /* 金红主题（默认·前3名）*/
      .theme-ceremony {
        --cert-bg1: #fdfcf8;
        --cert-bg2: #faf6f0;
        --cert-bg3: #f5efe4;
        --cert-title: #c41e3a;
        --cert-rank: #c41e3a;
        --cert-gold: #d4a574;
        --cert-accent: #c41e3a;
        --cert-body-text: #3a3a3a;
        --cert-frame-border: #d4a574;
        --cert-glow-opacity: 0.35;
      }
      /* 紫色主题（备用）*/
      .theme-royal {
        --cert-bg1: #faf8fc;
        --cert-bg2: #f3effa;
        --cert-bg3: #e8e0f4;
        --cert-title: #5b2c8e;
        --cert-rank: #7b2d8e;
        --cert-gold: #c9a84c;
        --cert-accent: #6b3fa0;
        --cert-body-text: #2d2d3a;
        --cert-frame-border: #b8a9d4;
        --cert-glow-opacity: 0.28;
      }

      .certificate {
        background: linear-gradient(135deg, var(--cert-bg1) 0%, var(--cert-bg2) 40%, var(--cert-bg3) 100%);
        padding: 0;
        position: relative;
        overflow: hidden;
      }
      .cert-noise {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.05;
        pointer-events: none;
        z-index: 0;
      }

      /* Outer decorative border frame */
      .cert-frame {
        position: relative;
        margin: 18px;
        border: 3px solid var(--cert-frame-border);
        padding: 8px;
        z-index: 1;
      }
      .cert-inner-border {
        position: absolute;
        top: 11px;
        left: 11px;
        right: 11px;
        bottom: 11px;
        border: 1px solid rgba(212, 165, 116, 0.4);
        pointer-events: none;
        z-index: 0;
      }
      /* Corner ornaments — CSS L-bracket with circles */
      .cert-corner {
        position: absolute;
        width: 42px;
        height: 42px;
        z-index: 3;
        pointer-events: none;
      }
      .cert-corner.tl {
        top: 12px;
        left: 12px;
      }
      .cert-corner.tr {
        top: 12px;
        right: 12px;
      }
      .cert-corner.bl {
        bottom: 12px;
        left: 12px;
      }
      .cert-corner.br {
        bottom: 12px;
        right: 12px;
      }
      /* Outer L-bracket */
      .cert-corner-outer {
        position: absolute;
        width: 37px;
        height: 37px;
        top: 0;
        left: 0;
      }
      .tl .cert-corner-outer,
      .bl .cert-corner-outer {
        border-left: 2.4px solid #d4a574;
        border-top: 2.4px solid #d4a574;
      }
      .tr .cert-corner-outer,
      .br .cert-corner-outer {
        border-right: 2.4px solid #d4a574;
        border-top: 2.4px solid #d4a574;
      }
      .bl .cert-corner-outer,
      .br .cert-corner-outer {
        border-top: none;
        border-bottom: 2.4px solid #d4a574;
      }
      /* Inner L-bracket */
      .cert-corner-inner {
        position: absolute;
        width: 19px;
        height: 19px;
        top: 9px;
        left: 9px;
      }
      .tl .cert-corner-inner,
      .bl .cert-corner-inner {
        border-left: 1.1px solid #d4a574;
        border-top: 1.1px solid #d4a574;
      }
      .tr .cert-corner-inner,
      .br .cert-corner-inner {
        border-right: 1.1px solid #d4a574;
        border-top: 1.1px solid #d4a574;
      }
      .bl .cert-corner-inner,
      .br .cert-corner-inner {
        border-top: none;
        border-bottom: 1.1px solid #d4a574;
      }
      /* Corner circles — ring + dot */
      .cert-corner-c1,
      .cert-corner-c2 {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        border: 1.3px solid #d4a574;
      }
      .cert-corner-c1 {
        top: 5px;
        left: 32px;
      }
      .tl .cert-corner-c1,
      .bl .cert-corner-c1 {
        left: 32px;
      }
      .tr .cert-corner-c1,
      .br .cert-corner-c1 {
        left: auto;
        right: 32px;
      }
      .cert-corner-c2 {
        top: 32px;
        left: 5px;
      }
      .tr .cert-corner-c2,
      .br .cert-corner-c2 {
        left: auto;
        right: 5px;
      }
      .bl .cert-corner-c1,
      .bl .cert-corner-c2,
      .br .cert-corner-c1,
      .br .cert-corner-c2 {
        top: auto;
      }
      .bl .cert-corner-c1,
      .br .cert-corner-c1 {
        bottom: 5px;
      }
      .bl .cert-corner-c2,
      .br .cert-corner-c2 {
        bottom: 32px;
      }
      .cert-corner-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: #d4a574;
        opacity: 0.65;
      }

      /* Inner content area */
      .cert-inner {
        padding: 30px 28px 36px;
        position: relative;
        z-index: 2;
        text-align: center;
      }

      /* Top decorative line */
      .cert-top-deco {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 28px;
      }
      .cert-top-deco-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--cert-gold), transparent);
        max-width: 60px;
      }
      .cert-top-deco-diamond {
        width: 8px;
        height: 8px;
        background: var(--cert-gold);
        transform: rotate(45deg);
        flex-shrink: 0;
      }

      .cert-heading {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 30px;
        font-weight: 700;
        color: var(--cert-title);
        margin: 0 0 36px;
        letter-spacing: 12px;
      }

      .cert-body {
        text-align: center;
      }
      .cert-text {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 14px;
        color: #3a3a3a;
        line-height: 2.4;
        margin: 0;
      }
      .cert-entity {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink-dark);
        margin: 14px 0 20px;
        letter-spacing: 2px;
        padding: 4px 0;
      }
      .cert-context {
        font-size: 14px;
        color: #3a3a3a;
        line-height: 2.2;
        margin: 0 0 18px;
      }
      .cert-award-lead {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 15px;
        color: #444;
        margin: 0 0 4px;
      }
      .cert-highlight {
        color: var(--cert-accent);
        font-weight: 600;
      }
      .cert-rank-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 36px;
        font-weight: 700;
        color: var(--cert-rank);
        margin: 0 0 16px;
        letter-spacing: 6px;
        text-align: center;
      }
      /* Ornamental divider — traditional fleuron replacing trophy emoji */
      .cert-ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 10px 0 14px;
      }
      .cert-ornament-line {
        width: 48px;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--cert-gold), transparent);
      }
      .cert-ornament-diamond {
        width: 7px;
        height: 7px;
        background: var(--cert-gold);
        transform: rotate(45deg);
        flex-shrink: 0;
        opacity: 0.8;
      }
      .cert-rate-block {
        display: inline-block;
        margin: 14px 0;
        padding: 10px 28px;
        background: linear-gradient(135deg, rgba(196,30,58,0.08), rgba(196,30,58,0.04));
        border-radius: 8px;
      }
      .cert-rate-label {
        font-size: 13px;
        color: var(--ink-muted);
        margin-bottom: 4px;
      }
      .cert-rate-val {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--cert-rank);
      }
      .cert-encouragement {
        margin-top: 28px;
        color: #666;
        font-size: 14px;
        letter-spacing: 3px;
      }
      .cert-date-line {
        margin-top: 20px;
        font-size: 13px;
        color: var(--ink-muted);
      }

      /* SVG Seal */
      .cert-seal {
        position: absolute;
        bottom: 48px;
        right: 48px;
        z-index: 3;
        width: 80px;
        height: 80px;
        transform: rotate(-18deg);
        opacity: 0.85;
      }

      /* Decorative line segments — gap from corner circles and center circle */
      .cert-lseg {
        position: absolute;
        background: #d4a574;
        z-index: 1;
      }
      .cert-lseg.h {
        height: 1px;
      }
      .cert-lseg.v {
        width: 1px;
      }
      /* Horizontal: top-left, top-right, bottom-left, bottom-right */
      .cert-lseg.ht-l {
        left: 51px;
        width: calc(50% - 51px - 8px);
        top: 20px;
      }
      .cert-lseg.ht-r {
        right: 51px;
        width: calc(50% - 51px - 8px);
        top: 20px;
      }
      .cert-lseg.hb-l {
        left: 51px;
        width: calc(50% - 51px - 8px);
        bottom: 20px;
      }
      .cert-lseg.hb-r {
        right: 51px;
        width: calc(50% - 51px - 8px);
        bottom: 20px;
      }
      /* Vertical: left-top, left-bottom, right-top, right-bottom */
      .cert-lseg.vl-t {
        top: 51px;
        height: calc(50% - 51px - 8px);
        left: 20px;
      }
      .cert-lseg.vl-b {
        bottom: 51px;
        height: calc(50% - 51px - 8px);
        left: 20px;
      }
      .cert-lseg.vr-t {
        top: 51px;
        height: calc(50% - 51px - 8px);
        right: 20px;
      }
      .cert-lseg.vr-b {
        bottom: 51px;
        height: calc(50% - 51px - 8px);
        right: 20px;
      }
      /* Center circle — matches corner ornament circle style */
      .cert-diamond {
        position: absolute;
        z-index: 2;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 1.3px solid #d4a574;
      }
      .cert-diamond-dot {
        position: absolute;
        top: 50%;
        left: 50%;

    <script>
      var currentUser = null;
      var currentSemester = null;
      var orgsMap = {};
      var orgsList = [];
      var weekOffset = 0;
      var currentTab = 'classBoard';

      var weekSchedules = [];
      var weekRecords = [];
      var assessmentTypes = [];
      var assessmentCategoryMap = {};
      var groupStatsCache = {};

      var certEntityName = '';
      var certRankTitle = '';
      var certAttRate = '';
      var certParentOrg = '';
      var certDataStore = {}; // key → { entityName, rankTitle, rank, attRate, parentOrg }

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;

        // 先加载学期，再按学期加载组织和考核类型
        var semRes = await window.db.from('semesters').select('*').eq('is_current', 1).limit(1).single();
        currentSemester = semRes.data || null;
        var semId = currentSemester ? currentSemester.id : null;

        var results = await Promise.all([
          semId
            ? window.db.from('organizations').select('*').eq('semester_id', semId).order('level', { ascending: true })
            : Promise.resolve({ data: [] }),
          semId
            ? window.db.from('assessment_types').select('*').eq('semester_id', semId).order('id')
            : Promise.resolve({ data: [] })
        ]);
        orgsList = results[0].data || [];
        orgsList.forEach(function (o) {
          orgsMap[o.id] = o;
        });
        assessmentTypes = results[1].data || [];

        assessmentTypes.forEach(function (at) {
          var name = at.type_name || '';
          if (name.indexOf('上线率') !== -1) assessmentCategoryMap[at.id] = 'attendance';
          else if (name.indexOf('作业率') !== -1) assessmentCategoryMap[at.id] = 'homework';
          else assessmentCategoryMap[at.id] = 'other';
        });

        await loadAndRender();
      }

      async function loadAndRender() {
        // 自动跳过试晨读周：如果当前选择落在试晨读范围，跳到第一个正式周
        if (currentSemester && currentSemester.trial_start_date) {
          var formalMonday = getMonday(new Date(currentSemester.start_date + 'T00:00:00'));
          var range0 = getWeekRange(weekOffset);
          if (range0.monday < formalMonday) {
            weekOffset = Math.ceil((formalMonday - range0.monday) / (7 * 86400000));
          }
        }

        var range = getWeekRange(weekOffset);
        var weekStart = formatDate(range.monday);
        var weekEnd = formatDate(range.sunday);

        document.getElementById('dateWeekLabel').textContent = computeWeekLabel(range.monday);
        document.getElementById('dateWeekRange').textContent =
          range.monday.getMonth() +
          1 +
          '/' +
          range.monday.getDate() +
          ' - ' +
          (range.sunday.getMonth() + 1) +
          '/' +
          range.sunday.getDate();

        var schedRes = await window.db
          .from('schedules')
          .select('id,schedule_date,item_ids,org_id')
          .gte('schedule_date', weekStart)
          .lte('schedule_date', weekEnd)
          .eq('is_valid', 1)
          .order('schedule_date');
        weekSchedules = schedRes.data || [];

        if (weekSchedules.length === 0) {
          showEmptyInTab('本周无日程数据');
          return;
        }

        var sIds = weekSchedules.map(function (s) {
          return s.id;
        });
        var recRes = await window.db
          .from('attendance_records')
          .select('organization_id,schedule_id,fill_data,created_at')
          .in('schedule_id', sIds);
        weekRecords = recRes.data || [];

        buildLeaderboardStatsCache();
        renderCurrentTab();
      }

      function buildLeaderboardStatsCache() {
        groupStatsCache = {};
        var today = getToday();

        // Build group→daban map
        var groupDabanMap = {};
        orgsList.forEach(function (o) {
          if (o.level === '小组') {
            var cls = orgsMap[o.parent_id];
            if (cls) {
              var daban = orgsMap[cls.parent_id];
              if (daban && daban.level === '大班') groupDabanMap[o.id] = daban.id;
            }
          }
        });

        // Build daban→schedules map
        var dabanSchedulesMap = {};
        weekSchedules.forEach(function (s) {
          var did = s.org_id;
          if (!dabanSchedulesMap[did]) dabanSchedulesMap[did] = [];
          dabanSchedulesMap[did].push(s);
        });

        var recsByGroup = {};
        weekRecords.forEach(function (r) {
          if (!recsByGroup[r.organization_id]) recsByGroup[r.organization_id] = [];
          recsByGroup[r.organization_id].push(r);
        });

        var allGroups = orgsList.filter(function (o) {
          return o.level === '小组';
        });
        allGroups.forEach(function (g) {
          var recs = recsByGroup[g.id] || [];
          var recMap = {};
          recs.forEach(function (r) {
            recMap[r.schedule_id] = r;
          });

          // Use only this group's daban's schedules
          var dabanId = groupDabanMap[g.id];
          var groupSchedules = dabanId && dabanSchedulesMap[dabanId] ? dabanSchedulesMap[dabanId] : [];

          var totalDays = 0;
          groupSchedules.forEach(function (s) {
            if (s.schedule_date <= today) totalDays++;
          });
          if (totalDays === 0) return;

          var onlineSum = 0,
            onlineN = 0,
            hwSum = 0,
            hwN = 0,
            videoSum = 0,
            videoN = 0,
            attSum = 0,
            attN = 0;
          var filledDays = 0;
          var earliestCreatedAt = null;

          groupSchedules.forEach(function (s) {
            if (s.schedule_date > today) return;
            var formulas = getScheduleFormulas(s);
            var rec = recMap[s.id];
            var fd = rec && rec.fill_data ? rec.fill_data : {};
            var yingdao = parseInt(fd['应到人数']) || 0;
            var shidao = parseInt(fd['实到人数']) || 0;
            var yingzuo = parseInt(fd['应做作业人数']) || 0;
            var zuowan = parseInt(fd['作业完成人数']) || 0;
            var shipin = parseInt(fd['视频人数']) || 0;
            var qingjia = parseInt(fd['请假人数']) || 0;

            var hasData = rec && (yingdao > 0 || shidao > 0 || yingzuo > 0 || zuowan > 0 || shipin > 0);
            if (hasData) {
              filledDays++;
              if (rec.created_at && (!earliestCreatedAt || rec.created_at < earliestCreatedAt)) {
                earliestCreatedAt = rec.created_at;
              }
            }

            var fieldMap = {};
            Object.keys(fd).forEach(function (k) {
              fieldMap[k] = parseInt(fd[k]) || 0;
            });

            var rates = computeRatesFromFormulas(fieldMap, formulas);

            // 未填报的天按 0 计入平均，分母为所有考核日
            var expectOnline = formulas.online !== null;
            var expectVideo = formulas.video !== null;
            var expectHw = formulas.hw !== null;

            if (expectOnline) {
              onlineSum += rates.online !== null ? rates.online : 0;
              onlineN++;
            }
            if (expectVideo) {
              videoSum += rates.video !== null ? rates.video : 0;
              videoN++;
            }
            if (expectHw) {
              hwSum += rates.hw !== null ? rates.hw : 0;
              hwN++;
            }
            if (expectOnline || expectHw) {
              attSum += rates.attendance !== null ? rates.attendance : 0;
              attN++;
            }
          });

          groupStatsCache[g.id] = {
            attendanceAvg: attN > 0 ? attSum / attN : null,
            onlineAvg: onlineN > 0 ? onlineSum / onlineN : null,
            hwAvg: hwN > 0 ? hwSum / hwN : null,
            videoAvg: videoN > 0 ? videoSum / videoN : null,
            filledDays: filledDays,
            totalDays: totalDays,
            earliestCreatedAt: earliestCreatedAt
          };
        });
      }

      function computeClassStats(classId) {
        var groupIds = getAllGroups(classId, orgsList).map(function (g) {
          return g.id;
        });
        var attSum = 0,
          attCnt = 0,
          filledSum = 0,
          groupCnt = 0,
          totalDays = 0;
        var earliestCreatedAt = null;

        groupIds.forEach(function (gid) {
          var gs = groupStatsCache[gid];
          if (!gs || gs.attendanceAvg === null) return;
          attSum += gs.attendanceAvg;
          attCnt++;
          filledSum += gs.filledDays;
          groupCnt++;
          if (gs.totalDays > totalDays) totalDays = gs.totalDays;
          if (gs.earliestCreatedAt && (!earliestCreatedAt || gs.earliestCreatedAt < earliestCreatedAt)) {
            earliestCreatedAt = gs.earliestCreatedAt;
          }
        });

        if (attCnt === 0) return null;
        return {
          attendanceAvg: attSum / attCnt,
          filledDays: Math.round(filledSum / (groupCnt || 1)),
          totalDays: totalDays,
          earliestCreatedAt: earliestCreatedAt,
          groupCount: groupCnt
        };
      }

      function rankSorter(a, b) {
        if (a.attendanceAvg !== b.attendanceAvg) return b.attendanceAvg - a.attendanceAvg;
        var ca = a.earliestCreatedAt || 'z';
        var cb = b.earliestCreatedAt || 'z';
        if (ca !== cb) return ca < cb ? -1 : 1;
        return (a.name || '').localeCompare(b.name || '', 'zh-CN');
      }

      function showEmptyInTab(msg) {
        var html =
          '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">' +
          msg +
          '</div></div>';
        document.getElementById('tabClassBoard').innerHTML = html;
        document.getElementById('tabGroupBoard').innerHTML = html;
      }

      function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabBtnClass').className = 'tab-btn' + (tab === 'classBoard' ? ' active' : '');
        document.getElementById('tabBtnGroup').className = 'tab-btn' + (tab === 'groupBoard' ? ' active' : '');
        document.getElementById('tabClassBoard').style.display = tab === 'classBoard' ? '' : 'none';
        document.getElementById('tabGroupBoard').style.display = tab === 'groupBoard' ? '' : 'none';
        renderCurrentTab();
      }

      function renderCurrentTab() {
        if (currentTab === 'classBoard') {
          renderClassBoard();
        } else {
          renderGroupBoard();
        }
      }

      // ========== TAB 1: 大班·班级榜 ==========

      function renderClassBoard() {
        var bigClasses = orgsList
          .filter(function (o) {
            return o.level === '大班';
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        if (bigClasses.length === 0) {
          document.getElementById('tabClassBoard').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">无大班数据</div></div>';
          return;
        }

        var html = '';
        bigClasses.forEach(function (bc, bcIdx) {
          var classes = orgsList.filter(function (o) {
            return o.parent_id === bc.id && o.level === '班级';
          });
          var rankings = [];
          classes.forEach(function (cls) {
            var stats = computeClassStats(cls.id);
            if (stats) {
              rankings.push({
                id: cls.id,
                name: cls.name,
                attendanceAvg: stats.attendanceAvg,
                filledDays: stats.filledDays,
                totalDays: stats.totalDays,
                earliestCreatedAt: stats.earliestCreatedAt,
                bigClassName: bc.name
              });
            }
          });
          rankings.sort(rankSorter);

          if (rankings.length === 0) return;

          var collapseId = 'bcSection' + bcIdx;
          html += '<div class="bigclass-section">';
          html += '<div class="bigclass-header" onclick="toggleSection(\'' + collapseId + '\')">';
          html +=
            '<div><span class="bigclass-name">' +
            bc.name +
            '</span><span class="bigclass-count">' +
            rankings.length +
            '个班级</span></div>';
          html += '<span class="bigclass-arrow" id="' + collapseId + 'Arrow">▼</span>';
          html += '</div>';
          html += '<div class="rank-list" id="' + collapseId + '">';
          rankings.forEach(function (r, i) {
            html += buildRankCard(r, i, 'class', bc.name);
          });
          html += '</div></div>';
        });

        if (!html) {
          html =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无排名数据</div></div>';
        }
        document.getElementById('tabClassBoard').innerHTML = html;
      }

      // ========== TAB 2: 班级·小组榜 ==========

      function renderGroupBoard(selectedClassId) {
        var bigClasses = orgsList
          .filter(function (o) {
            return o.level === '大班';
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        var html = '<div class="cascade-row">';
        html +=
          '<select class="cascade-select" id="groupBcSelect" onchange="onGroupBcChange()"><option value="">选择大班</option>';
        bigClasses.forEach(function (bc) {
          html += '<option value="' + bc.id + '">' + bc.name + '</option>';
        });
        html += '</select>';
        html +=
          '<select class="cascade-select" id="groupClsSelect" onchange="onGroupClsChange()"><option value="">选择班级</option></select>';
        html += '</div>';
        html +=
          '<div id="groupRankArea"><div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择大班和班级查看排名</div></div></div>';

        document.getElementById('tabGroupBoard').innerHTML = html;

        if (selectedClassId) {
          var cls = orgsMap[selectedClassId];
          if (cls) {
            var bc = orgsMap[cls.parent_id];
            if (bc) {
              document.getElementById('groupBcSelect').value = bc.id;
              onGroupBcChange(selectedClassId);
            }
          }
        }
      }

      function onGroupBcChange(preselectClassId) {
        var bcId = parseInt(document.getElementById('groupBcSelect').value) || null;
        var clsSelect = document.getElementById('groupClsSelect');

        if (!bcId) {
          clsSelect.innerHTML = '<option value="">选择班级</option>';
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择大班和班级查看排名</div></div>';
          return;
        }

        var classes = orgsList
          .filter(function (o) {
            return o.parent_id === bcId && o.level === '班级';
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        clsSelect.innerHTML =
          (classes.length === 1 ? '' : '<option value="">选择班级</option>') +
          classes
            .map(function (c) {
              return '<option value="' + c.id + '">' + c.name + '</option>';
            })
            .join('');

        if (preselectClassId) {
          clsSelect.value = String(preselectClassId);
          onGroupClsChange();
        } else if (classes.length === 1) {
          clsSelect.value = String(classes[0].id);
          onGroupClsChange();
        }
      }

      function onGroupClsChange() {
        var clsId = parseInt(document.getElementById('groupClsSelect').value) || null;
        if (!clsId) {
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择班级查看小组排名</div></div>';
          return;
        }

        var cls = orgsMap[clsId];
        if (!cls) return;
        var bigClassName = (orgsMap[cls.parent_id] || {}).name || '';

        var groups = orgsList.filter(function (o) {
          return o.parent_id === clsId && o.level === '小组';
        });
        var rankings = [];
        groups.forEach(function (g) {
          var gs = groupStatsCache[g.id];
          if (gs && gs.attendanceAvg !== null) {
            rankings.push({
              id: g.id,
              name: g.name,
              attendanceAvg: gs.attendanceAvg,
              filledDays: gs.filledDays,
              totalDays: gs.totalDays,
              earliestCreatedAt: gs.earliestCreatedAt,
              bigClassName: bigClassName,
              className: cls.name
            });
          }
        });
        rankings.sort(rankSorter);

        if (rankings.length === 0) {
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">该班级下暂无小组排名数据</div></div>';
          return;
        }

        var html = '<div class="rank-list">';
        rankings.forEach(function (r, i) {
          html += buildRankCard(r, i, 'group', cls.name);
        });
        html += '</div>';
        document.getElementById('groupRankArea').innerHTML = html;
      }

      // ========== Rank Card Builder ==========

      function buildRankCard(r, index, level, parentName) {
        var rank = index + 1;
        var hasData = r.filledDays > 0 && r.attendanceAvg > 0;

        var rankDisplay, rankClass;
        if (hasData && rank === 1) {
          rankDisplay = '<span class="rank-medal">🥇</span>';
          rankClass = ' top-1';
        } else if (hasData && rank === 2) {
          rankDisplay = '<span class="rank-medal">🥈</span>';
          rankClass = ' top-2';
        } else if (hasData && rank === 3) {
          rankDisplay = '<span class="rank-medal">🥉</span>';
          rankClass = ' top-3';
        } else {
          rankDisplay = '<span class="rank-number">' + rank + '</span>';
          rankClass = '';
        }

        var attVal = r.attendanceAvg;
        var attClass = attVal >= 90 ? 'high' : attVal >= 70 ? 'medium' : 'low';
        var progressPct = r.totalDays > 0 ? Math.round((r.filledDays / r.totalDays) * 100) : 0;
        var progressClass = progressPct >= 80 ? 'high' : progressPct >= 50 ? 'medium' : 'low';

        var metaText;
        if (level === 'class') {
          metaText = '大班·' + r.bigClassName;
        } else {
          metaText = r.bigClassName + ' · ' + r.className;
        }

        var certBtn = '';
        if (hasData && rank <= 3) {
          var weekSunday = formatDate(getWeekRange(weekOffset).sunday);
          var weekComplete = getToday() >= weekSunday;
          if (weekComplete) {
            var rankTitle = rank === 1 ? '冠军' : rank === 2 ? '亚军' : '季军';
            var parentOrg;
            if (level === 'class') {
              parentOrg = r.bigClassName;
            } else {
              parentOrg = r.bigClassName + ' · ' + r.className;
            }
            var certKey = 'cert_' + r.id + '_' + rank;
            certDataStore[certKey] = {
              entityName: r.name,
              rankTitle: rankTitle,
              rank: rank,
              level: level,
              attRate: attVal.toFixed(2) + '%',
              parentOrg: parentOrg
            };
            certBtn =
              '<button class="cert-btn-small" onclick="event.stopPropagation();openCertificate(\'' +
              certKey +
              '\')">🏅 生成证书</button>';
          }
        }

        var html = '<div class="rank-card' + rankClass + '" style="animation-delay:' + index * 0.05 + 's">';
        html += rankDisplay;
        html += '<div class="rank-info">';
        html += '<div class="rank-name" title="' + escapeHtml(r.name) + '">' + r.name + '</div>';
        html += '<div class="rank-meta">' + metaText + '</div>';
        html += '<div class="rank-progress">';
        html +=
          '<div class="progress-bar"><div class="progress-fill ' +
          progressClass +
          '" style="width:' +
          progressPct +
          '%"></div></div>';
        html += '<span class="rank-progress-label">' + r.filledDays + '/' + r.totalDays + '天</span>';
        html += '</div>';
        html += certBtn;
        html += '</div>';
        html +=
          '<div class="rank-rate"><div class="rank-rate-value ' +
          attClass +
          '">' +
          attVal.toFixed(2) +
          '%</div><div class="rank-rate-label">出勤率</div></div>';
        html += '</div>';
        return html;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function toggleSection(collapseId) {
        var list = document.getElementById(collapseId);
        var arrow = document.getElementById(collapseId + 'Arrow');
        if (!list || !arrow) return;
        var isCollapsed = list.classList.contains('collapsed');
        if (isCollapsed) {
          list.classList.remove('collapsed');
          arrow.classList.remove('collapsed');
          arrow.textContent = '▼';
        } else {
          list.classList.add('collapsed');
          arrow.classList.add('collapsed');
          arrow.textContent = '▶';
        }
      }

      // ========== Certificate ==========

      var currentCertData = null;

      function openCertificate(certKey) {
        var d = certDataStore[certKey];
        if (!d) return;
        currentCertData = d;
        certEntityName = d.entityName;
        certRankTitle = d.rankTitle;
        certAttRate = d.attRate;
        certParentOrg = d.parentOrg;

        // 根据排名自动选择主题
        switchCertTheme(d.rank);

        document.getElementById('certEntity').textContent = d.entityName;

        var range = getWeekRange(weekOffset);
        var semName = currentSemester ? currentSemester.semester_name : '';
        var weekLabel = computeWeekLabel(range.monday);

        document.getElementById('certContext').innerHTML =
          '在 <span class="cert-highlight">' +
          semName +
          '</span> <span class="cert-highlight">' +
          weekLabel +
          '</span><br>的 <span class="cert-highlight">' +
          d.parentOrg +
          '</span> 考核评比PK赛中';

        // "获得第一名，荣获"
        var awardLead = '获得' + getCertAwardName(d.rank) + '，荣获';
        document.getElementById('certAwardLead').textContent = awardLead;
        document.getElementById('certRank').textContent = d.rankTitle + getCertLevelLabel(d.level);
        document.getElementById('certRate').textContent = d.attRate;
        document.getElementById('certDateLine').textContent =
          '颁发日期：' +
          range.sunday.getFullYear() +
          '年' +
          (range.sunday.getMonth() + 1) +
          '月' +
          range.sunday.getDate() +
          '日';

        buildSealSvg(d);

        document.getElementById('certOverlay').classList.add('show');
        document.body.style.overflow = 'hidden';
      }

      function buildSealSvg(d) {
        var bcName = d.parentOrg.split(' · ')[0] || d.parentOrg;
        // 使用主题色：金红主题 #C41E3A，紫色主题 #5B2C8E
        var sealColor = (d.rank && d.rank <= 3) ? '#C41E3A' : '#5B2C8E';
        var svg =
          '<svg viewBox="0 0 100 100" width="88" height="88">' +
          '<circle cx="50" cy="50" r="45" fill="none" stroke="' + sealColor + '" stroke-width="3.2" opacity="0.82"/>' +
          '<circle cx="50" cy="50" r="42" fill="none" stroke="' + sealColor + '" stroke-width="0.8" opacity="0.45"/>' +
          '<defs>' +
          '<path id="sealArc" d="M 14,50 A 36,36 0 0,1 86,50"/>' +
          '</defs>' +
          '<text font-family="\'Noto Serif SC\',serif" font-size="9" fill="' + sealColor + '" font-weight="700" letter-spacing="1.2" dy="4">' +
          '<textPath href="#sealArc" startOffset="50%" text-anchor="middle">阳明心学督察管理系统</textPath>' +
          '</text>' +
          '<text x="50" y="57" text-anchor="middle" font-family="\'Noto Serif SC\',serif" font-size="20" fill="' + sealColor + '" font-weight="900">★</text>' +
          '<line x1="32" y1="67" x2="68" y2="67" stroke="' + sealColor + '" stroke-width="1.2" opacity="0.7"/>' +
          '<text x="50" y="80" text-anchor="middle" font-family="\'Noto Serif SC\',serif" font-size="8.5" fill="' + sealColor + '" font-weight="700" letter-spacing="1.5">' +
          bcName +
          '</text>' +
          '</svg>';
        document.getElementById('certSealSvg').innerHTML = svg;
      }

      function closeCertificate() {
        document.getElementById('certOverlay').classList.remove('show');
        document.body.style.overflow = '';
      }

      // ========== SVG Certificate Rendering ==========
      // SVG uses declarative positioning identical to HTML/CSS, eliminating all
      // manual coordinate bugs. The SVG is converted to canvas via Image+drawImage.

      function generateCertSVG() {
        var d = currentCertData;
        if (!d) return null;

        var W = 440;
        var CH = 640;
        var M = 18; // frame margin from cert edge
        var B = 3; // frame border width
        var PAD = M + B; // frame padding edge (=21 from cert edge)
        var CX = W / 2; // center X
        var FONT = "'Noto Serif SC','SimSun','STSong',serif";

        // 主题色
        var isTop3 = d.rank && d.rank <= 3;
        var titleColor = isTop3 ? '#C41E3A' : '#5B2C8E';
        var goldColor = isTop3 ? '#D4A574' : '#C9A84C';
        var accentColor = isTop3 ? '#C41E3A' : '#6B3FA0';
        var bgGradTop = isTop3 ? '#FDFCF8' : '#FAF8FC';
        var bgGradMid = isTop3 ? '#FAF6F0' : '#F3EFFA';
        var bgGradBot = isTop3 ? '#F5EFE4' : '#E8E0F4';
        var bodyText = isTop3 ? '#3A3A3A' : '#2D2D3A';
        var frameBorder = isTop3 ? '#D4A574' : '#B8A9D4';
        var rateBgColor = isTop3 ? '#FFF0F0' : '#F4EEFA';
        var sealColor = isTop3 ? '#C41E3A' : '#5B2C8E';

        var range = getWeekRange(weekOffset);
        var semName = currentSemester ? escXml(currentSemester.semester_name) : '';
        var weekLabel = escXml(computeWeekLabel(range.monday));
        var dateStr =
          range.sunday.getFullYear() + '年' + (range.sunday.getMonth() + 1) + '月' + range.sunday.getDate() + '日';
        var bcName = escXml((d.parentOrg || '').split(' · ')[0] || d.parentOrg || '');
        var entityName = escXml(d.entityName);
        var parentOrg = escXml(d.parentOrg || '');
        var rankTitle = escXml(d.rankTitle);
        var attRate = escXml(d.attRate);

        var svg = [];
        svg.push('<?xml version="1.0" encoding="UTF-8"?>');
        svg.push(
          '<svg xmlns="http://www.w3.org/2000/svg" width="' +
            W * 2 +
            '" height="' +
            CH * 2 +
            '" viewBox="0 0 ' +
            W +
            ' ' +
            CH +
            '">'
        );

        // Background with gradient
        svg.push('<defs>');
        svg.push('<linearGradient id="certBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">');
        svg.push('<stop offset="0%" stop-color="' + bgGradTop + '"/>');
        svg.push('<stop offset="40%" stop-color="' + bgGradMid + '"/>');
        svg.push('<stop offset="100%" stop-color="' + bgGradBot + '"/>');
        svg.push('</linearGradient>');
        svg.push('</defs>');
        svg.push('<rect width="' + W + '" height="' + CH + '" fill="url(#certBgGrad)"/>');

        // Outer gold border — CSS margin:18px, border:3px, padding:8px
        // Frame outer edge at M=18, inner edge at M+B=21
        var PAD_INNER = 8;

        // Outer border rect: stroke centered at M+B/2=19.5, outer edge at 18, inner edge at 21
        svg.push(
          '<rect x="' +
            (M + B / 2) +
            '" y="' +
            (M + B / 2) +
            '" width="' +
            (W - 2 * M - B) +
            '" height="' +
            (CH - 2 * M - B) +
            '" fill="none" stroke="' + frameBorder + '" stroke-width="' +
            B +
            '"/>'
        );

        // Inner border — CSS: top:11px from cert-frame padding edge (18+3+11=32)
        var IB = 32;
        svg.push(
          '<rect x="' +
            (IB + 0.5) +
            '" y="' +
            (IB + 0.5) +
            '" width="' +
            (W - 2 * IB - 1) +
            '" height="' +
            (CH - 2 * IB - 1) +
            '" fill="none" stroke="rgba(212,165,116,0.4)" stroke-width="1"/>'
        );

        // ---- Corner ornaments ----
        // CSS: .cert-corner at 12px from frame padding edge → 18+3+12=33 from cert edge
        // Outer L-bracket: 37x37 with border-left:2.4px & border-top:2.4px
        // Inner L-bracket: 19x19 at (9,9) with border-left:1.1px & border-top:1.1px

        function cornerDefs() {
          var a = [];
          a.push('<line x1="-1" y1="0" x2="-1" y2="37" stroke="#D4A574" stroke-width="2.4"/>');
          a.push('<line x1="0" y1="-1" x2="37" y2="-1" stroke="#D4A574" stroke-width="2.4"/>');
          a.push('<line x1="8.5" y1="9" x2="8.5" y2="28" stroke="#D4A574" stroke-width="1.1"/>');
          a.push('<line x1="9" y1="8.5" x2="28" y2="8.5" stroke="#D4A574" stroke-width="1.1"/>');
          a.push('<circle cx="34.5" cy="7.5" r="2.5" fill="none" stroke="#D4A574" stroke-width="1.3"/>');
          a.push('<circle cx="34.5" cy="7.5" r="1" fill="rgba(212,165,116,0.65)"/>');
          a.push('<circle cx="7.5" cy="34.5" r="2.5" fill="none" stroke="#D4A574" stroke-width="1.3"/>');
          a.push('<circle cx="7.5" cy="34.5" r="1" fill="rgba(212,165,116,0.65)"/>');
          return a.join('');
        }

        // Corner origin at cert CSS position: 18(margin)+3(border)+12(offset)=33
        var CO = 33;
        svg.push('<g transform="translate(' + CO + ',' + CO + ')">' + cornerDefs() + '</g>');
        svg.push('<g transform="translate(' + (W - CO) + ',' + CO + ') scale(-1,1)">' + cornerDefs() + '</g>');
        svg.push('<g transform="translate(' + CO + ',' + (CH - CO) + ') scale(1,-1)">' + cornerDefs() + '</g>');
        svg.push('<g transform="translate(' + (W - CO) + ',' + (CH - CO) + ') scale(-1,-1)">' + cornerDefs() + '</g>');

        // ---- Decorative line segments between corner circles ----
        // CO=33: c1 center (CO+34.5, CO+7.5)=(67.5, 40.5), c2 center (CO+7.5, CO+34.5)=(40.5, 67.5)

        function centerCircleSVG(cx, cy) {
          return (
            '<circle cx="' +
            cx +
            '" cy="' +
            cy +
            '" r="4" fill="none" stroke="#D4A574" stroke-width="1.3"/>' +

            cx +
            '" cy="' +
            cy +

        }

        // Top line segments: y=CO+7.5=40.5, from TL-c1 after gap to TR-c1 before gap
        var topY = CO + 7.5;
        var topL = CO + 34.5 + 5.5; // gap after TL circle (73)
        var topR = W - CO - 34.5 - 5.5; // gap before TR circle (367)
        svg.push(
          '<line x1="' +
            topL +
            '" y1="' +
            topY +
            '" x2="' +
            (CX - 8) +
            '" y2="' +
            topY +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            (CX + 8) +
            '" y1="' +
            topY +
            '" x2="' +
            topR +
            '" y2="' +
            topY +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(centerCircleSVG(CX, topY));

        // Bottom line segments
        var botY = CH - CO - 7.5;
        var botL = CO + 34.5 + 5.5;
        var botR = W - CO - 34.5 - 5.5;
        svg.push(
          '<line x1="' +
            botL +
            '" y1="' +
            botY +
            '" x2="' +
            (CX - 8) +
            '" y2="' +
            botY +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            (CX + 8) +
            '" y1="' +
            botY +
            '" x2="' +
            botR +
            '" y2="' +
            botY +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(centerCircleSVG(CX, botY));

        // Left line segments: x=CO+7.5=40.5, from TL-c2 down to BL-c2
        var leftX = CO + 7.5;
        var leftT = CO + 34.5 + 5.5;
        var leftB = CH - CO - 34.5 - 5.5;
        svg.push(
          '<line x1="' +
            leftX +
            '" y1="' +
            leftT +
            '" x2="' +
            leftX +
            '" y2="' +
            (CH / 2 - 8) +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            leftX +
            '" y1="' +
            (CH / 2 + 8) +
            '" x2="' +
            leftX +
            '" y2="' +
            leftB +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(centerCircleSVG(leftX, CH / 2));

        // Right line segments: x=W-CO-7.5=399.5, from TR-c2 down to BR-c2
        var rightX = W - CO - 7.5;
        var rightT = CO + 34.5 + 5.5;
        var rightB = CH - CO - 34.5 - 5.5;
        svg.push(
          '<line x1="' +
            rightX +
            '" y1="' +
            rightT +
            '" x2="' +
            rightX +
            '" y2="' +
            (CH / 2 - 8) +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            rightX +
            '" y1="' +
            (CH / 2 + 8) +
            '" x2="' +
            rightX +
            '" y2="' +
            rightB +
            '" stroke="#D4A574" stroke-width="1"/>'
        );
        svg.push(centerCircleSVG(rightX, CH / 2));

        // ---- Text content (centered, balanced vertical rhythm) ----
        var contentT = 82;

        // Top decorative — gold lines + diamond
        var decoY = contentT + 4;
        svg.push(
          '<line x1="' +
            (CX - 74) +
            '" y1="' +
            decoY +
            '" x2="' +
            (CX - 14) +
            '" y2="' +
            decoY +
            '" stroke="' + goldColor + '" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            (CX + 14) +
            '" y1="' +
            decoY +
            '" x2="' +
            (CX + 74) +
            '" y2="' +
            decoY +
            '" stroke="' + goldColor + '" stroke-width="1"/>'
        );
        svg.push(

            ' ' +

        contentT += 44;

        // Heading — 30px, more breathing room below deco line
        svg.push(
          '<text x="' +

            contentT +

          '<line x1="' +
            (CX - 52) +
            '" y1="' +
            ornY +
            '" x2="' +
            (CX - 12) +
            '" y2="' +
            ornY +
            '" stroke="' + goldColor + '" stroke-width="1"/>'
        );
        svg.push(
          '<line x1="' +
            (CX + 12) +
            '" y1="' +
            ornY +
            '" x2="' +
            (CX + 52) +
            '" y2="' +
            ornY +

        svg.push(
          '<rect x="' +

            '" y="' +
            (ornY - 3.5) +

        contentT += 26;

        // Rank title
        svg.push(

        contentT += 56;

        // Rate block

        svg.push(

        );
        svg.push(
          '<text x="' +
            CX +
            '" y="' +
            (rbY + 22) +
            '" text-anchor="middle" font-family="' +
            FONT +
            '" font-size="13" fill="#999">周平均出勤率</text>'
        );
        svg.push(
          '<text x="' +
            CX +
            '" y="' +
            (rbY + 52) +
            '" text-anchor="middle" font-family="' +
            FONT +
            '" font-size="26" font-weight="bold" fill="' + titleColor + '">' +
            attRate +
            '</text>'
        );
        contentT += 88;

        // Encouragement
        svg.push(
          '<text x="' +
            CX +
            '" y="' +
            contentT +
            '" text-anchor="middle" font-family="' +
            FONT +
            '" font-size="14" fill="#666" letter-spacing="3">特发此证 · 以资鼓励</text>'
        );
        contentT += 36;
        // Date
        svg.push(
          '<text x="' +
            CX +
            '" y="' +
            contentT +
            '" text-anchor="middle" font-family="' +
            FONT +
            '" font-size="13" fill="#999">颁发日期：' +
            dateStr +
            '</text>'
        );

        // ---- Seal (bottom:48px; right:48px from cert edge, 80x80, rotated -18°) ----
        // Seal center: x = W-48-40 = 352, y = CH-48-40 = 552
        // Note: In CSS the seal is positioned at bottom:48px right:48px with width:80px height:80px
        // The seal SVG inside has viewBox="0 0 100 100" width="88" height="88"
        // Center of 80x80 container: (W-48-40, CH-48-40)
        var sealCX = W - 48 - 40;
        var sealCY = CH - 48 - 40;
        var sealR = 40;

        svg.push('<g transform="translate(' + sealCX + ',' + sealCY + ') rotate(-18)">');
        svg.push(
          '<circle cx="0" cy="0" r="' + sealR + '" fill="none" stroke="' + sealColor + '" stroke-opacity="0.82" stroke-width="2.8"/>'
        );
        svg.push(
          '<circle cx="0" cy="0" r="' + (sealR - 3) + '" fill="none" stroke="' + sealColor + '" stroke-opacity="0.45" stroke-width="0.7"/>'
        );

        // Curved top text — place inside the gap between inner/outer rings
        var arcText = '阳明心学督察管理系统';
        var n = arcText.length;
        var totalArcDeg = 150;
        var stepDeg = totalArcDeg / (n - 1);
        var startDeg = -90 - totalArcDeg / 2;
        var arcR = sealR - 10; // radius 30, well inside inner ring (37)

        for (var i = 0; i < n; i++) {
          var angleDeg = startDeg + i * stepDeg;
          var angleRad = (angleDeg * Math.PI) / 180;
          var tx = arcR * Math.cos(angleRad);
          var ty = arcR * Math.sin(angleRad);
          svg.push(
            '<text x="' +
              tx.toFixed(1) +
              '" y="' +
              ty.toFixed(1) +
              '" text-anchor="middle" dominant-baseline="central" font-family="' +
              FONT +
              '" font-size="10" font-weight="bold" fill="' + sealColor + '" transform="rotate(' +
              (angleDeg + 90).toFixed(1) +
              ' ' +
              tx.toFixed(1) +
              ' ' +
              ty.toFixed(1) +
              ')">' +
              arcText[i] +
              '</text>'
          );
        }

        // Star
        svg.push(
          '<text x="0" y="-1" text-anchor="middle" dominant-baseline="central" font-family="' +
            FONT +
            '" font-size="20" font-weight="bold" fill="' + sealColor + '">★</text>'
        );
        // Line under star
        svg.push('<line x1="-16" y1="8" x2="16" y2="8" stroke="' + sealColor + '" stroke-opacity="0.7" stroke-width="1"/>');
        // Big class name
        svg.push(
          '<text x="0" y="22" text-anchor="middle" font-family="' +
            FONT +
            '" font-size="8" font-weight="bold" fill="' + sealColor + '">' +
            bcName +
            '</text>'
        );
        svg.push('</g>');

        svg.push('</svg>');
        return svg.join('\n');
      }

      function escXml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;');
      }

      function wrapTextSimple(text, maxChars) {
        if (text.length <= maxChars) return [text];
        // Simple midline split for CJK text
        var mid = Math.floor(text.length / 2);
        return [text.substring(0, mid), text.substring(mid)];
      }

      // Convert SVG string to Canvas via Image (returns Promise)
      function svgToCanvas(svgString) {
        return new Promise(function (resolve, reject) {
          // Validate SVG syntax with DOMParser first
          var parser = new DOMParser();
          var doc = parser.parseFromString(svgString, 'image/svg+xml');
          var errEl = doc.querySelector('parsererror');
          if (errEl) {
            console.error('SVG parse error:', errEl.textContent);
            reject(new Error('SVG语法错误: ' + errEl.textContent.substring(0, 200)));
            return;
          }

          var img = new Image();
          // Base64 data URL — encode UTF-8 bytes manually, chunked for large strings
          var bytes = [];
          for (var i = 0; i < svgString.length; i++) {
            var code = svgString.charCodeAt(i);
            if (code < 0x80) {
              bytes.push(code);
            } else if (code < 0x800) {
              bytes.push(0xc0 | (code >> 6), 0x80 | (code & 0x3f));
            } else if (code < 0xd800 || code >= 0xe000) {
              bytes.push(0xe0 | (code >> 12), 0x80 | ((code >> 6) & 0x3f), 0x80 | (code & 0x3f));
            } else {
              // Surrogate pair
              i++;
              var code2 = svgString.charCodeAt(i);
              var cp = 0x10000 + ((code - 0xd800) << 10) + (code2 - 0xdc00);
              bytes.push(0xf0 | (cp >> 18), 0x80 | ((cp >> 12) & 0x3f), 0x80 | ((cp >> 6) & 0x3f), 0x80 | (cp & 0x3f));
            }
          }
          var binary = '';
          var CHUNK = 4096;
          for (var j = 0; j < bytes.length; j += CHUNK) {
            binary += String.fromCharCode.apply(null, bytes.slice(j, j + CHUNK));
          }
          var svgBase64 = 'data:image/svg+xml;base64,' + btoa(binary);

          img.onload = function () {
            var canvas = document.createElement('canvas');
            var vb = doc.documentElement.getAttribute('viewBox');
            var w = 880,
              h = 1280;
            if (vb) {
              var parts = vb.split(/\s+/);
              if (parts.length === 4) {
                w = parseFloat(parts[2]) * 2;
                h = parseFloat(parts[3]) * 2;
              }
            }
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            var isTop3 = currentCertData && currentCertData.rank && currentCertData.rank <= 3;
            ctx.fillStyle = isTop3 ? '#FDFCF8' : '#FAF8FC';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas);
          };
          img.onerror = function (e) {
            console.error('SVG load failed. SVG preview (first 500 chars):', svgString.substring(0, 500));
            reject(new Error('SVG image load failed'));
          };
          img.src = svgBase64;
        });
      }

      async function saveCertificate() {
        try {
          var svg = generateCertSVG();
          if (!svg) {
            showToast('证书数据不完整', 'error');
            return;
          }
          var canvas = await svgToCanvas(svg);
          var dataUrl = canvas.toDataURL('image/png');

          var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

          if (isMobile) {
            // 移动端：全屏展示图片，用户长按即可保存到系统相册
            document.getElementById('imgOverlayImg').src = dataUrl;
            document.getElementById('imgOverlay').classList.add('show');
          } else {
            // 桌面端：直接触发下载
            var a = document.createElement('a');
            a.download = '荣誉证书_' + certEntityName + '.png';
            a.href = dataUrl;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('证书已保存');
          }
        } catch (e) {
          console.error('saveCertificate error:', e);
          showToast('保存失败: ' + (e.message || '未知错误'), 'error');
        }
      }

      function closeImgOverlay() {
        document.getElementById('imgOverlay').classList.remove('show');
        // 延迟清空 src，避免关闭动画时闪烁
        setTimeout(function () {
          document.getElementById('imgOverlayImg').src = '';
        }, 300);
      }

      async function shareCertificate() {
        try {
          var svg = generateCertSVG();
          if (!svg) {
            showToast('证书数据不完整', 'error');
            return;
          }
          var canvas = await svgToCanvas(svg);
          var blob = await new Promise(function (r) {
            canvas.toBlob(r, 'image/png');
          });
          var file = new File([blob], '荣誉证书.png', { type: 'image/png' });

          var shareText = certEntityName + ' - ' + certParentOrg + ' - ' + certRankTitle + ' - 出勤率: ' + certAttRate;

          // 尝试文件分享（Android Chrome 支持，可分享图片到微信）
          try {
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: '荣誉证书', text: shareText });
              return;
            }
          } catch (_) {
            /* 文件分享不可用，继续尝试其他方式 */
          }

          // 尝试 URL 分享（部分浏览器支持分享 Blob URL）
          try {
            if (navigator.share) {
              var shareUrl = URL.createObjectURL(blob);
              await navigator.share({ title: '荣誉证书', text: shareText, url: shareUrl });
              setTimeout(function () {
                URL.revokeObjectURL(shareUrl);
              }, 60000);
              return;
            }
          } catch (_) {
            /* 分享失败，降级为保存 */
          }

          // 最终降级：保存图片
          await saveCertificate();
        } catch (e) {
          console.error('shareCertificate error:', e);
          if (e.name !== 'AbortError') await saveCertificate();
        }
      }

      // ========== Weekly Helpers ==========

      function getWeekRange(offset) {
        var now = new Date();
        var day = now.getDay();
        var monday = new Date(now);
        monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
        monday.setHours(0, 0, 0, 0);
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23, 59, 59, 999);
        return { monday: monday, sunday: sunday };
      }

      function formatDate(d) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var dt = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + dt;
      }

      function getMonday(date) {
        var d = new Date(date);
        var day = d.getDay();
        var diff = (day + 6) % 7;
        d.setDate(d.getDate() - diff);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function computeWeekLabel(weekMonday) {
        if (!currentSemester) return '本周';
        var trialStart = currentSemester.trial_start_date
          ? new Date(currentSemester.trial_start_date + 'T00:00:00')
          : null;
        var formalStart = new Date(currentSemester.start_date + 'T00:00:00');
        var formalMonday = getMonday(formalStart);
        var wm = new Date(weekMonday);
        wm.setHours(0, 0, 0, 0);
        var isTrial = trialStart && wm < formalMonday;
        if (isTrial) {
          var trialMonday = getMonday(trialStart);
          var weeks = Math.floor((wm - trialMonday) / (7 * 86400000)) + 1;
          return '试晨读第' + weeks + '周';
        } else {
          var weeks = Math.floor((wm - formalMonday) / (7 * 86400000)) + 1;
          return '第' + weeks + '周';
        }
      }

      function getScheduleCategories(s) {
        if (!s || !s.item_ids) return { hasAttendance: true, hasHomework: true };
        var ids = s.item_ids.split(',').map(Number).filter(Boolean);
        if (ids.length === 0) return { hasAttendance: true, hasHomework: true };
        var hasAtt = ids.some(function (id) {
          return assessmentCategoryMap[id] === 'attendance';
        });
        var hasHw = ids.some(function (id) {
          return assessmentCategoryMap[id] === 'homework';
        });
        if (!hasAtt && !hasHw) return { hasAttendance: true, hasHomework: true };
        return { hasAttendance: hasAtt, hasHomework: hasHw };
      }

      // 证书主题切换
      function switchCertTheme(rank) {
        var certEl = document.getElementById('certificate');
        certEl.classList.remove('theme-ceremony', 'theme-royal');
        // 排名1-3使用金红主题，其余默认金红
        if (rank && rank <= 3) {
          certEl.classList.add('theme-ceremony');
        } else {
          certEl.classList.add('theme-royal');
        }
      }

      // 奖项名称映射（纯数字排名）
      function getCertAwardName(rank) {
        var suffixes = { 1: '第一名', 2: '第二名', 3: '第三名', 4: '第四名', 5: '第五名', 6: '第六名', 7: '第七名', 8: '第八名', 9: '第九名', 10: '第十名' };
        return suffixes[rank] || '第' + rank + '名';
      }

      // 层级标签
      function getCertLevelLabel(level) {
        if (level === 'class') return '班级';
        if (level === 'group') return '小组';
        return '';
      }

      // Get formulas from assessment types for a given schedule (matched by type_name)
      function getScheduleFormulas(s) {
        var result = { online: null, video: null, hw: null };
        if (!s || !s.item_ids) return result;
        var ids = s.item_ids.split(',').map(Number).filter(Boolean);
        ids.forEach(function (id) {
          var at = null;
          assessmentTypes.forEach(function (t) {
            if (t.id === id) at = t;
          });
          if (!at || !at.formula) return;
          var name = at.type_name || '';
          if (name.indexOf('上线率') !== -1) result.online = at.formula;
          else if (name.indexOf('视频率') !== -1) result.video = at.formula;
          else if (name.indexOf('作业率') !== -1) result.hw = at.formula;
        });
        return result;
      }

      function hasMult100(f) {
        return f && (f.indexOf('*100') !== -1 || f.indexOf('×100') !== -1);
      }

      function computeRatesFromFormulas(fieldMap, formulas) {
        var online = null,
          video = null,
          hw = null;

        if (formulas.online) {
          var r = calcFormula(formulas.online, fieldMap);
          if (r != null) online = r * (hasMult100(formulas.online) ? 1 : 100);
        }
        if (formulas.video) {
          var r = calcFormula(formulas.video, fieldMap);
          if (r != null) video = r * (hasMult100(formulas.video) ? 1 : 100);
        }
        if (formulas.hw) {
          var r = calcFormula(formulas.hw, fieldMap);
          if (r != null) hw = r * (hasMult100(formulas.hw) ? 1 : 100);
        }

        var attendance = null;
        if (online !== null || hw !== null) {
          attendance = ((online || 0) + (hw || 0)) / (online !== null && hw !== null ? 2 : 1);
        }

        return { online: online, video: video, hw: hw, attendance: attendance };
      }

      function changeWeek(delta) {
        if (!currentSemester) {
          weekOffset += delta;
          loadAndRender();
          return;
        }
        var newOffset = weekOffset + delta;
        var range = getWeekRange(newOffset);
        // 下限以正式学期为准，不纳入试晨读周
        var formalStart = new Date(currentSemester.start_date + 'T00:00:00');
        var semEnd = new Date(currentSemester.end_date + 'T23:59:59');
        if (range.sunday < formalStart || range.monday > semEnd) return;
        weekOffset = newOffset;
        loadAndRender();
      }

      function goToCurrentWeek() {
        weekOffset = 0;
        loadAndRender();
      }

      init();
    </script>
