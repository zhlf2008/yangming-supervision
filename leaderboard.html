<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>榜单 - 阳明心学督察管理系统</title>
    <!-- 快速session检查：新设备无session则直接跳转登录，避免闪现页面 -->
    <script>
      (function(){
        var supabaseKey = "sb-whvjfurrkusdwujjodwc-auth-token";
        var raw = localStorage.getItem(supabaseKey);
        if (!raw) { window.location.replace("login.html"); return; }
        try {
          var session = JSON.parse(raw);
          if (!session || !session.access_token) { window.location.replace("login.html"); }
        } catch(e) {
          window.location.replace("login.html");
        }
      })();
    </script>
    <link rel="preconnect" href="https://whvjfurrkusdwujjodwc.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/common.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&display=swap');
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 120px;
        min-height: calc(100vh - 64px);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0 20px;
      }
      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--ink-dark);
      }
      .back-btn:active {
        background: var(--border);
      }
      .header-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--ink-dark);
      }

      /* Week Selector */
      .date-selector {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 14px 20px;
        margin-bottom: 14px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .date-nav {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .date-nav-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--bg-primary);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .date-nav-btn:active {
        background: var(--border);
      }
      .date-current {
        text-align: center;
        min-width: 140px;
      }
      .date-week-label {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .date-week-range {
        font-size: 11px;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .date-today {
        font-size: 12px;
        color: var(--vermillion);
        padding: 6px 12px;
        background: var(--vermillion-light);
        border-radius: 6px;
        cursor: pointer;
        border: none;
      }

      /* Tab Selector */
      .tab-selector {
        display: flex;
        gap: 0;
        margin-bottom: 16px;
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
      }
      .tab-btn {
        flex: 1;
        padding: 14px 8px;
        border: none;
        background: transparent;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .tab-btn.active {
        color: var(--vermillion);
        font-weight: 600;
        background: var(--vermillion-light);
      }
      .tab-icon {
        margin-right: 4px;
      }

      /* Ranking Section */
      .bigclass-section {
        margin-bottom: 16px;
      }
      .bigclass-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: var(--bg-card);
        border-radius: var(--radius);
        cursor: pointer;
        box-shadow: 0 2px 8px var(--shadow);
        border: 1px solid var(--border);
      }
      .bigclass-header:active {
        background: var(--bg-primary);
      }
      .bigclass-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .bigclass-count {
        font-size: 12px;
        color: var(--ink-muted);
        margin-left: 8px;
      }
      .bigclass-arrow {
        font-size: 12px;
        color: var(--ink-muted);
        transition: transform 0.2s;
      }
      .bigclass-arrow.collapsed {
        transform: rotate(-90deg);
      }

      .rank-list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rank-list.collapsed {
        display: none;
      }

      /* Rank Card */
      .rank-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 14px 16px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }
      .rank-card.top-1 {
        border-left: 4px solid #ffd700;
      }
      .rank-card.top-2 {
        border-left: 4px solid #c0c0c0;
      }
      .rank-card.top-3 {
        border-left: 4px solid #cd7f32;
      }
      .rank-medal {
        font-size: 30px;
        width: 42px;
        text-align: center;
        flex-shrink: 0;
        line-height: 1;
      }
      .rank-number {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--ink-muted);
        width: 36px;
        text-align: center;
        flex-shrink: 0;
      }
      .rank-info {
        flex: 1;
        min-width: 0;
      }
      .rank-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .rank-meta {
        font-size: 11px;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .rank-progress {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 6px;
      }
      .rank-progress .progress-bar {
        flex: 1;
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .rank-progress .progress-fill {
        height: 100%;
        border-radius: 3px;
      }
      .progress-fill.high {
        background: #2e7d32;
      }
      .progress-fill.medium {
        background: var(--gold);
      }
      .progress-fill.low {
        background: var(--vermillion);
      }
      .rank-progress-label {
        font-size: 10px;
        color: var(--ink-muted);
        white-space: nowrap;
      }
      .rank-rate {
        text-align: right;
        flex-shrink: 0;
        min-width: 64px;
      }
      .rank-rate-value {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }
      .rank-rate-value.high {
        color: #2e7d32;
      }
      .rank-rate-value.medium {
        color: var(--ink-dark);
      }
      .rank-rate-value.low {
        color: var(--vermillion);
      }
      .rank-rate-label {
        font-size: 10px;
        color: var(--ink-muted);
      }
      .cert-btn-small {
        display: inline-block;
        margin-top: 8px;
        padding: 5px 14px;
        font-size: 12px;
        color: var(--vermillion);
        background: var(--vermillion-light);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .cert-btn-small:active {
        opacity: 0.7;
      }

      /* Cascading Selector for Group Board */
      .cascade-row {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .cascade-select {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-card);
        font-size: 14px;
        color: var(--ink-dark);
        appearance: auto;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--ink-muted);
      }
      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .empty-state-text {
        font-size: 14px;
      }

      /* Certificate Overlay */
      .cert-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center; justify-content: center;
        opacity: 0; visibility: hidden;
        transition: opacity 0.25s, visibility 0.25s;
        background: radial-gradient(ellipse at center, #2d0a0a 0%, #1a0505 100%);
      }
      .cert-overlay.show { opacity: 1; visibility: visible; }
      .cert-backdrop { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
      .cert-wrapper {
        position: relative;
        max-width: 680px;
        width: calc(100vw - 16px);
        max-height: 92vh;
        overflow-y: auto;
        z-index: 1;
        display: flex; flex-direction: column; align-items: center;
        padding: 16px;
      }

      /* ---- 竖版荣誉证书 ---- */
      .cert-frame {
        width: 100%;
        border: 1px solid #d4a017;
        outline: 5px solid #c41e3a;
        outline-offset: 1px;
        box-shadow: 0 0 0 7px #d4a017, 0 20px 60px rgba(0,0,0,.6), 0 0 80px rgba(220,40,40,.15);
      }
      .certificate {
        width: 100%; min-height: 920px; box-sizing: border-box;
        background: linear-gradient(180deg, #fff5ec 0%, #ffe8d6 20%, #fff2e8 40%, #ffe4cc 60%, #fff0e6 80%, #ffdbc0 100%);
        position: relative; overflow: hidden;
        padding: 56px 60px 50px; z-index: 1;
      }
      /* 内嵌 saffron+金色边框 — 纯 border 零 box-shadow，html2canvas 可靠 */
      .cert-inner-saffron {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border: 12px solid #ffe8d6;         /* saffron 色带 */
        pointer-events: none; z-index: 2;
      }
      .cert-inner-gold {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border: 1px solid #d4a017;          /* 金线，叠加在 saffron 外侧 */
        pointer-events: none;
      }
      .certificate::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background:
          radial-gradient(circle at 30% 25%, rgba(196,30,58,.04) 0%, transparent 45%),
          radial-gradient(circle at 70% 55%, rgba(212,160,23,.06) 0%, transparent 45%),
          radial-gradient(circle at 40% 85%, rgba(196,30,58,.03) 0%, transparent 50%);
        pointer-events: none;
      }

      .cert-watermark {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; opacity: .025;
        font-size: 340px; font-weight: 900;
        color: #c41e3a; letter-spacing: .4em;
        transform: rotate(-25deg) translateX(150px); user-select: none; z-index: 0;
      }

      .cert-corner { position: absolute; width: 64px; height: 64px; opacity: .55; pointer-events: none; z-index: 1; }
      .cert-corner.tl { top: 24px; left: 24px; }
      .cert-corner.tr { top: 24px; right: 24px; }
      .cert-corner.bl { bottom: 24px; left: 24px; }
      .cert-corner.br { bottom: 24px; right: 24px; }
      .cert-corner svg { width: 100%; height: 100%; }

      .cert-content {
        position: relative; display: flex; flex-direction: column;
        align-items: center; z-index: 3; text-align: center;
      }

      .cert-top-ornament { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 16px; }
      .cert-orn-line { width: 140px; height: 1px; background: linear-gradient(90deg,transparent,rgba(212,160,23,.5),transparent); }
      .cert-orn-star { font-size: 18px; color: #c41e3a; opacity: .5; line-height: 1; }

      .cert-org-name { font-size: 21px; font-weight: 700; letter-spacing: .4em; color: #6b1010; margin-bottom: 10px; }

      .cert-title-area { display: flex; flex-direction: column; align-items: center; margin: 10px 0 22px; }
      .cert-title {
        font-family: 'Ma Shan Zheng', 'Liu Jian Mao Cao', cursive;
        font-size: 72px; color: #c41e3a; letter-spacing: .3em; line-height: 1.2;
        text-shadow: 2px 2px 0 rgba(212,160,23,.25);
      }
      .cert-title-deco {
        width: 380px; height: 1px;
        background: linear-gradient(90deg,transparent,rgba(212,160,23,.4),rgba(196,30,58,.3),rgba(212,160,23,.4),transparent);
        margin: 8px 0 0;
      }

      .cert-body-text { text-align: center; font-size: 19px; color: #4a1515; line-height: 2.4; max-width: 480px; }
      .cert-recipient { font-size: 40px; font-weight: 900; color: #c41e3a; letter-spacing: .25em; display: inline-block; position: relative; text-shadow: 1px 1px 0 rgba(212,160,23,.3); }
      .cert-recipient::after {
        content: ''; position: absolute; bottom: 0; left: 8%; right: 8%; height: 1px;
        background: linear-gradient(90deg,transparent,rgba(212,160,23,.4),rgba(196,30,58,.3),rgba(212,160,23,.4),transparent);
      }
      .cert-achievement { display: inline-block; font-size: 40px; font-weight: 900; color: #c41e3a; letter-spacing: .2em; margin: 0 8px; padding: 4px 14px; text-shadow: 1px 1px 0 rgba(212,160,23,.3); }

      .cert-divider { display: flex; align-items: center; gap: 14px; margin: 20px 0; }
      .cert-div-line { width: 140px; height: 1px; background: linear-gradient(90deg,transparent,rgba(212,160,23,.5),transparent); }
      .cert-div-dot { width: 6px; height: 6px; border-radius: 50%; background: #c41e3a; opacity: .5; }

      .cert-footer { margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; position: relative; }
      .cert-seal { width: 110px; height: 110px; transform: rotate(-15deg); position: absolute; right: 0; bottom: 0; opacity: .85; }
      .cert-seal svg { width: 100%; height: 100%; }
      .cert-signature-col { text-align: center; }
      .cert-issuer { font-size: 18px; color: #8b1a1a; margin-bottom: 4px; font-weight: 700; letter-spacing: .1em; }
      .cert-signature-name {
        font-family: 'Ma Shan Zheng', 'Liu Jian Mao Cao', cursive;
        font-size: 28px; color: #5c1a1a; margin-bottom: 4px; min-width: 120px;
        border-bottom: 1px solid rgba(196,30,58,.3); padding-bottom: 4px; display: inline-block;
      }
      .cert-issue-info { text-align: center; font-size: 14px; color: #8b1a1a; line-height: 2.2; }

      .cert-actions { display: flex; gap: 10px; margin-top: 12px; padding: 0 4px; }
      .cert-action-btn {
        flex: 1; padding: 12px 8px; border-radius: 10px; border: none;
        font-size: 13px; font-weight: 500; cursor: pointer; text-align: center;
        transition: transform 0.15s;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      }
      .cert-action-btn:active { transform: scale(0.96); }
      .cert-action-btn.primary { background: var(--vermillion); color: white; }
      .cert-action-btn:not(.primary) { background: var(--bg-card); color: var(--ink-dark); border: 1px solid var(--border); }

      .export-mode .cert-overlay { position: relative; opacity: 1; visibility: visible; background: transparent; }

      @media (max-width: 700px) {
        .certificate {
          min-height: auto;
          padding: 8.6% 9.2% 7.7%;
          /* 外层边框（移动端 box-shadow 实现），内嵌线由 cert-inner-saffron/gold div 处理 */
          box-shadow: 0 0 0 1px #d4a017, 0 0 0 4px #c41e3a, 0 0 0 6px #d4a017, 0 15px 40px rgba(0,0,0,.6), 0 0 60px rgba(220,40,40,.15);
        }
        .cert-inner-saffron { border-width: 4px; }
        .cert-corner { width: 42px; height: 42px; }
        .cert-corner.tl { top: 16px; left: 16px; } .cert-corner.tr { top: 16px; right: 16px; }
        .cert-corner.bl { bottom: 16px; left: 16px; } .cert-corner.br { bottom: 16px; right: 16px; }
        .cert-top-ornament { gap: 10px; margin-bottom: 12px; }
        .cert-orn-line { width: 100px; } .cert-orn-star { font-size: 15px; }
        .cert-org-name { font-size: 16px; letter-spacing: .3em; margin-bottom: 8px; }
        .cert-title { font-size: 48px; } .cert-title-deco { width: 260px; }
        .cert-body-text { font-size: 15px; max-width: 100%; line-height: 2.2; }
        .cert-recipient { font-size: 28px; } .cert-achievement { font-size: 28px; padding: 2px 10px; }
        .cert-divider { gap: 10px; margin: 16px 0; } .cert-div-line { width: 100px; }
        .cert-seal { width: 80px; height: 80px; }
        .cert-issuer { font-size: 15px; } .cert-issue-info { font-size: 12px; }
        .cert-watermark { font-size: 220px; transform: rotate(-25deg) translateX(100px); }
      }
      @media (max-width: 400px) {
        .cert-corner { width: 32px; height: 32px; }
        .cert-corner.tl { top: 10px; left: 10px; } .cert-corner.tr { top: 10px; right: 10px; }
        .cert-corner.bl { bottom: 10px; left: 10px; } .cert-corner.br { bottom: 10px; right: 10px; }
        .cert-top-ornament { gap: 6px; margin-bottom: 8px; }
        .cert-orn-line { width: 60px; } .cert-orn-star { font-size: 12px; }
        .cert-org-name { font-size: 13px; letter-spacing: .2em; }
        .cert-title { font-size: 36px; } .cert-title-deco { width: 200px; }
        .cert-title-area { margin: 6px 0 14px; }
        .cert-body-text { font-size: 13px; line-height: 2; }
        .cert-recipient { font-size: 22px; } .cert-achievement { font-size: 22px; }
        .cert-divider { gap: 6px; margin: 12px 0; } .cert-div-line { width: 60px; }
        .cert-seal { width: 60px; height: 60px; }
        .cert-issuer { font-size: 13px; } .cert-issue-info { font-size: 11px; }
        .cert-watermark { font-size: 160px; transform: rotate(-25deg) translateX(70px); }
      }

      /* Animations */
      .header {
        animation: fadeInDown 0.4s ease-out;
      }
      .date-selector {
        animation: fadeInUp 0.4s ease-out 0.05s backwards;
      }
      .tab-selector {
        animation: fadeInUp 0.4s ease-out 0.08s backwards;
      }
      .bigclass-section,
      .cascade-row {
        animation: fadeInUp 0.4s ease-out 0.1s backwards;
      }
      .rank-card {
        animation: fadeInUp 0.3s ease-out backwards;
      }

      /* 图片保存层（全屏，用于长按保存到相册） */
      .img-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(0, 0, 0, 0.92);
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .img-overlay.show {
        display: flex;
      }
      .img-overlay-tip {
        color: #fff;
        font-size: 14px;
        margin-bottom: 12px;
        padding: 8px 20px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 20px;
      }
      .img-overlay-img {
        max-width: 92vw;
        max-height: 70vh;
        border-radius: 4px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        -webkit-touch-callout: default;
      }
      .img-overlay-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 18px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a
          href="index.html"
          class="back-btn"
          aria-label="返回"
          onclick="
            event.preventDefault();
            window.history.back();
          "
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <h1 class="header-title">榜单</h1>
      </header>

      <div class="date-selector">
        <div class="date-nav">
          <button class="date-nav-btn" onclick="changeWeek(-1)">◀</button>
          <span class="date-current"
            ><div class="date-week-label" id="dateWeekLabel">本周</div>
            <div class="date-week-range" id="dateWeekRange">--</div></span
          >
          <button class="date-nav-btn" onclick="changeWeek(1)">▶</button>
        </div>
        <button class="date-today" onclick="goToCurrentWeek()">本周</button>
      </div>

      <div class="tab-selector">

    <script>
      var currentUser = null;
      var currentSemester = null;
      var orgsMap = {};
      var orgsList = [];
      var weekOffset = 0;
      var currentTab = 'classBoard';

      var weekSchedules = [];
      var weekRecords = [];
      var assessmentTypes = [];
      var assessmentCategoryMap = {};
      var groupStatsCache = {};
      var visibleDabanIds = new Set();

      var certEntityName = '';
      var certRankTitle = '';
      var certAttRate = '';
      var certParentOrg = '';
      var certDataStore = {}; // key → { entityName, rankTitle, rank, attRate, parentOrg }

      // 沿 parent_id 追溯，找到用户所属大班的 ID
      function findUserDabanId(userOrg, orgs) {
        if (!userOrg) return null;
        if (userOrg.level === '大班') return userOrg.id;
        var current = userOrg;
        while (current && current.parent_id) {
          current = orgs.find(function (o) { return o.id === current.parent_id; });
          if (current && current.level === '大班') return current.id;
        }
        return null;
      }

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;

        // 先加载学期，再按学期加载组织和考核类型
        var semRes = await window.db.from('semesters').select('*').eq('is_current', 1).limit(1).single();
        currentSemester = semRes.data || null;
        var semId = currentSemester ? currentSemester.id : null;

        var results = await Promise.all([
          semId
            ? window.db.from('organizations').select('*').eq('semester_id', semId).order('level', { ascending: true })
            : Promise.resolve({ data: [] }),
          semId
            ? window.db.from('assessment_types').select('*').eq('semester_id', semId).order('id')
            : Promise.resolve({ data: [] })
        ]);
        orgsList = results[0].data || [];
        orgsList.forEach(function (o) {
          orgsMap[o.id] = o;
        });
        assessmentTypes = results[1].data || [];

        assessmentTypes.forEach(function (at) {
          var name = at.type_name || '';
          if (name.indexOf('上线率') !== -1) assessmentCategoryMap[at.id] = 'attendance';
          else if (name.indexOf('作业率') !== -1) assessmentCategoryMap[at.id] = 'homework';
          else assessmentCategoryMap[at.id] = 'other';
        });

        // 计算当前用户可见的大班 ID 集合
        var role = currentUser.role;
        var userOrg = currentUser.organizations;
        var allDabanIds = new Set(
          orgsList.filter(function(o) { return o.level === '大班'; }).map(function(o) { return o.id; })
        );
        if (role === '超级管理员' || role === '管理员') {
          visibleDabanIds = allDabanIds;
        } else {
          var dabanId = findUserDabanId(userOrg, orgsList);
          visibleDabanIds = dabanId ? new Set([dabanId]) : new Set();
        }

        await loadAndRender();
      }

      async function loadAndRender() {
        // 自动跳过试晨读周：如果当前选择落在试晨读范围，跳到第一个正式周
        if (currentSemester && currentSemester.trial_start_date) {
          var formalMonday = getMonday(new Date(currentSemester.start_date + 'T00:00:00'));
          var range0 = getWeekRange(weekOffset);
          if (range0.monday < formalMonday) {
            weekOffset = Math.ceil((formalMonday - range0.monday) / (7 * 86400000));
          }
        }

        var range = getWeekRange(weekOffset);
        var weekStart = formatDate(range.monday);
        var weekEnd = formatDate(range.sunday);

        document.getElementById('dateWeekLabel').textContent = computeWeekLabel(range.monday);
        document.getElementById('dateWeekRange').textContent =
          range.monday.getMonth() +
          1 +
          '/' +
          range.monday.getDate() +
          ' - ' +
          (range.sunday.getMonth() + 1) +
          '/' +
          range.sunday.getDate();

        var schedRes = await window.db
          .from('schedules')
          .select('id,schedule_date,item_ids,org_id')
          .gte('schedule_date', weekStart)
          .lte('schedule_date', weekEnd)
          .eq('is_valid', 1)
          .order('schedule_date');
        weekSchedules = schedRes.data || [];

        if (weekSchedules.length === 0) {
          showEmptyInTab('本周无日程数据');
          return;
        }

        var sIds = weekSchedules.map(function (s) {
          return s.id;
        });
        var recRes = await window.db
          .from('attendance_records')
          .select('organization_id,schedule_id,fill_data,created_at')
          .in('schedule_id', sIds);
        weekRecords = recRes.data || [];

        buildLeaderboardStatsCache();
        renderCurrentTab();
      }

      function buildLeaderboardStatsCache() {
        groupStatsCache = {};
        var today = getToday();

        // Build group→daban map
        var groupDabanMap = {};
        orgsList.forEach(function (o) {
          if (o.level === '小组') {
            var cls = orgsMap[o.parent_id];
            if (cls) {
              var daban = orgsMap[cls.parent_id];
              if (daban && daban.level === '大班') groupDabanMap[o.id] = daban.id;
            }
          }
        });

        // Build daban→schedules map
        var dabanSchedulesMap = {};
        weekSchedules.forEach(function (s) {
          var did = s.org_id;
          if (!dabanSchedulesMap[did]) dabanSchedulesMap[did] = [];
          dabanSchedulesMap[did].push(s);
        });

        var recsByGroup = {};
        weekRecords.forEach(function (r) {
          if (!recsByGroup[r.organization_id]) recsByGroup[r.organization_id] = [];
          recsByGroup[r.organization_id].push(r);
        });

        var allGroups = orgsList.filter(function (o) {
          return o.level === '小组';
        });
        allGroups.forEach(function (g) {
          var recs = recsByGroup[g.id] || [];
          var recMap = {};
          recs.forEach(function (r) {
            recMap[r.schedule_id] = r;
          });

          // Use only this group's daban's schedules
          var dabanId = groupDabanMap[g.id];
          var groupSchedules = dabanId && dabanSchedulesMap[dabanId] ? dabanSchedulesMap[dabanId] : [];

          var totalDays = 0;
          groupSchedules.forEach(function (s) {
            if (s.schedule_date <= today) totalDays++;
          });
          if (totalDays === 0) return;

          var onlineSum = 0,
            onlineN = 0,
            hwSum = 0,
            hwN = 0,
            videoSum = 0,
            videoN = 0,
            attSum = 0,
            attN = 0;
          var filledDays = 0;
          var earliestCreatedAt = null;

          groupSchedules.forEach(function (s) {
            if (s.schedule_date > today) return;
            var formulas = getScheduleFormulas(s);
            var rec = recMap[s.id];
            var fd = rec && rec.fill_data ? rec.fill_data : {};
            var yingdao = parseInt(fd['应到人数']) || 0;
            var shidao = parseInt(fd['实到人数']) || 0;
            var yingzuo = parseInt(fd['应做作业人数']) || 0;
            var zuowan = parseInt(fd['作业完成人数']) || 0;
            var shipin = parseInt(fd['视频人数']) || 0;
            var qingjia = parseInt(fd['请假人数']) || 0;

            var hasData = rec && (yingdao > 0 || shidao > 0 || yingzuo > 0 || zuowan > 0 || shipin > 0);
            if (hasData) {
              filledDays++;
              if (rec.created_at && (!earliestCreatedAt || rec.created_at < earliestCreatedAt)) {
                earliestCreatedAt = rec.created_at;
              }
            }

            var fieldMap = {};
            Object.keys(fd).forEach(function (k) {
              fieldMap[k] = parseInt(fd[k]) || 0;
            });

            var rates = computeRatesFromFormulas(fieldMap, formulas);

            // 未填报的天按 0 计入平均，分母为所有考核日
            var expectOnline = formulas.online !== null;
            var expectVideo = formulas.video !== null;
            var expectHw = formulas.hw !== null;

            if (expectOnline) {
              onlineSum += rates.online !== null ? rates.online : 0;
              onlineN++;
            }
            if (expectVideo) {
              videoSum += rates.video !== null ? rates.video : 0;
              videoN++;
            }
            if (expectHw) {
              hwSum += rates.hw !== null ? rates.hw : 0;
              hwN++;
            }
            if (expectOnline || expectHw) {
              attSum += rates.attendance !== null ? rates.attendance : 0;
              attN++;
            }
          });

          groupStatsCache[g.id] = {
            attendanceAvg: attN > 0 ? attSum / attN : null,
            onlineAvg: onlineN > 0 ? onlineSum / onlineN : null,
            hwAvg: hwN > 0 ? hwSum / hwN : null,
            videoAvg: videoN > 0 ? videoSum / videoN : null,
            filledDays: filledDays,
            totalDays: totalDays,
            earliestCreatedAt: earliestCreatedAt
          };
        });
      }

      function computeClassStats(classId) {
        var groupIds = getAllGroups(classId, orgsList).map(function (g) {
          return g.id;
        });
        var attSum = 0,
          attCnt = 0,
          filledSum = 0,
          groupCnt = 0,
          totalDays = 0;
        var earliestCreatedAt = null;

        groupIds.forEach(function (gid) {
          var gs = groupStatsCache[gid];
          if (!gs || gs.attendanceAvg === null) return;
          attSum += gs.attendanceAvg;
          attCnt++;
          filledSum += gs.filledDays;
          groupCnt++;
          if (gs.totalDays > totalDays) totalDays = gs.totalDays;
          if (gs.earliestCreatedAt && (!earliestCreatedAt || gs.earliestCreatedAt < earliestCreatedAt)) {
            earliestCreatedAt = gs.earliestCreatedAt;
          }
        });

        if (attCnt === 0) return null;
        return {
          attendanceAvg: attSum / attCnt,
          filledDays: Math.round(filledSum / (groupCnt || 1)),
          totalDays: totalDays,
          earliestCreatedAt: earliestCreatedAt,
          groupCount: groupCnt
        };
      }

      function rankSorter(a, b) {
        if (a.attendanceAvg !== b.attendanceAvg) return b.attendanceAvg - a.attendanceAvg;
        var ca = a.earliestCreatedAt || 'z';
        var cb = b.earliestCreatedAt || 'z';
        if (ca !== cb) return ca < cb ? -1 : 1;
        return (a.name || '').localeCompare(b.name || '', 'zh-CN');
      }

      function showEmptyInTab(msg) {
        var html =
          '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">' +
          msg +
          '</div></div>';
        document.getElementById('tabClassBoard').innerHTML = html;
        document.getElementById('tabGroupBoard').innerHTML = html;
      }

      function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tabBtnClass').className = 'tab-btn' + (tab === 'classBoard' ? ' active' : '');
        document.getElementById('tabBtnGroup').className = 'tab-btn' + (tab === 'groupBoard' ? ' active' : '');
        document.getElementById('tabClassBoard').style.display = tab === 'classBoard' ? '' : 'none';
        document.getElementById('tabGroupBoard').style.display = tab === 'groupBoard' ? '' : 'none';
        renderCurrentTab();
      }

      function renderCurrentTab() {
        if (currentTab === 'classBoard') {
          renderClassBoard();
        } else {
          renderGroupBoard();
        }
      }

      // ========== TAB 1: 大班·班级榜 ==========

      function renderClassBoard() {
        var bigClasses = orgsList
          .filter(function (o) {
            return o.level === '大班' && visibleDabanIds.has(o.id);
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        if (bigClasses.length === 0) {
          document.getElementById('tabClassBoard').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">无大班数据</div></div>';
          return;
        }

        var html = '';
        bigClasses.forEach(function (bc, bcIdx) {
          var classes = orgsList.filter(function (o) {
            return o.parent_id === bc.id && o.level === '班级';
          });
          var rankings = [];
          classes.forEach(function (cls) {
            var stats = computeClassStats(cls.id);
            if (stats) {
              rankings.push({
                id: cls.id,
                name: cls.name,
                attendanceAvg: stats.attendanceAvg,
                filledDays: stats.filledDays,
                totalDays: stats.totalDays,
                earliestCreatedAt: stats.earliestCreatedAt,
                bigClassName: bc.name
              });
            }
          });
          rankings.sort(rankSorter);

          if (rankings.length === 0) return;

          var collapseId = 'bcSection' + bcIdx;
          html += '<div class="bigclass-section">';
          html += '<div class="bigclass-header" onclick="toggleSection(\'' + collapseId + '\')">';
          html +=
            '<div><span class="bigclass-name">' +
            bc.name +
            '</span><span class="bigclass-count">' +
            rankings.length +
            '个班级</span></div>';
          html += '<span class="bigclass-arrow" id="' + collapseId + 'Arrow">▼</span>';
          html += '</div>';
          html += '<div class="rank-list" id="' + collapseId + '">';
          rankings.forEach(function (r, i) {
            html += buildRankCard(r, i, 'class', bc.name);
          });
          html += '</div></div>';
        });

        if (!html) {
          html =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无排名数据</div></div>';
        }
        document.getElementById('tabClassBoard').innerHTML = html;
      }

      // ========== TAB 2: 班级·小组榜 ==========

      function renderGroupBoard(selectedClassId) {
        var bigClasses = orgsList
          .filter(function (o) {
            return o.level === '大班' && visibleDabanIds.has(o.id);
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        var html = '<div class="cascade-row">';
        html +=
          '<select class="cascade-select" id="groupBcSelect" onchange="onGroupBcChange()"><option value="">选择大班</option>';
        bigClasses.forEach(function (bc) {
          html += '<option value="' + bc.id + '">' + bc.name + '</option>';
        });
        html += '</select>';
        html +=
          '<select class="cascade-select" id="groupClsSelect" onchange="onGroupClsChange()"><option value="">选择班级</option></select>';
        html += '</div>';
        html +=
          '<div id="groupRankArea"><div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择大班和班级查看排名</div></div></div>';

        document.getElementById('tabGroupBoard').innerHTML = html;

        if (selectedClassId) {
          var cls = orgsMap[selectedClassId];
          if (cls) {
            var bc = orgsMap[cls.parent_id];
            if (bc) {
              document.getElementById('groupBcSelect').value = bc.id;
              onGroupBcChange(selectedClassId);
            }
          }
        }
      }

      function onGroupBcChange(preselectClassId) {
        var bcId = parseInt(document.getElementById('groupBcSelect').value) || null;
        var clsSelect = document.getElementById('groupClsSelect');

        if (!bcId) {
          clsSelect.innerHTML = '<option value="">选择班级</option>';
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择大班和班级查看排名</div></div>';
          return;
        }

        var classes = orgsList
          .filter(function (o) {
            return o.parent_id === bcId && o.level === '班级';
          })
          .sort(function (a, b) {
            return a.name.localeCompare(b.name, 'zh-CN');
          });

        clsSelect.innerHTML =
          (classes.length === 1 ? '' : '<option value="">选择班级</option>') +
          classes
            .map(function (c) {
              return '<option value="' + c.id + '">' + c.name + '</option>';
            })
            .join('');

        if (preselectClassId) {
          clsSelect.value = String(preselectClassId);
          onGroupClsChange();
        } else if (classes.length === 1) {
          clsSelect.value = String(classes[0].id);
          onGroupClsChange();
        }
      }

      function onGroupClsChange() {
        var clsId = parseInt(document.getElementById('groupClsSelect').value) || null;
        if (!clsId) {
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">👆</div><div class="empty-state-text">请选择班级查看小组排名</div></div>';
          return;
        }

        var cls = orgsMap[clsId];
        if (!cls) return;
        var bigClassName = (orgsMap[cls.parent_id] || {}).name || '';

        var groups = orgsList.filter(function (o) {
          return o.parent_id === clsId && o.level === '小组';
        });
        var rankings = [];
        groups.forEach(function (g) {
          var gs = groupStatsCache[g.id];
          if (gs && gs.attendanceAvg !== null) {
            rankings.push({
              id: g.id,
              name: g.name,
              attendanceAvg: gs.attendanceAvg,
              filledDays: gs.filledDays,
              totalDays: gs.totalDays,
              earliestCreatedAt: gs.earliestCreatedAt,
              bigClassName: bigClassName,
              className: cls.name
            });
          }
        });
        rankings.sort(rankSorter);

        if (rankings.length === 0) {
          document.getElementById('groupRankArea').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">该班级下暂无小组排名数据</div></div>';
          return;
        }

        var html = '<div class="rank-list">';
        rankings.forEach(function (r, i) {
          html += buildRankCard(r, i, 'group', cls.name);
        });
        html += '</div>';
        document.getElementById('groupRankArea').innerHTML = html;
      }

      // ========== Rank Card Builder ==========

      function buildRankCard(r, index, level, parentName) {
        var rank = index + 1;
        var hasData = r.filledDays > 0 && r.attendanceAvg > 0;

        var rankDisplay, rankClass;
        if (hasData && rank === 1) {
          rankDisplay = '<span class="rank-medal">🥇</span>';
          rankClass = ' top-1';
        } else if (hasData && rank === 2) {
          rankDisplay = '<span class="rank-medal">🥈</span>';
          rankClass = ' top-2';
        } else if (hasData && rank === 3) {
          rankDisplay = '<span class="rank-medal">🥉</span>';
          rankClass = ' top-3';
        } else {
          rankDisplay = '<span class="rank-number">' + rank + '</span>';
          rankClass = '';
        }

        var attVal = r.attendanceAvg;
        var attClass = attVal >= 90 ? 'high' : attVal >= 70 ? 'medium' : 'low';
        var progressPct = r.totalDays > 0 ? Math.round((r.filledDays / r.totalDays) * 100) : 0;
        var progressClass = progressPct >= 80 ? 'high' : progressPct >= 50 ? 'medium' : 'low';

        var metaText;
        if (level === 'class') {
          metaText = '大班·' + r.bigClassName;
        } else {
          metaText = r.bigClassName + ' · ' + r.className;
        }

        var certBtn = '';
        if (hasData && rank <= 3) {
          var weekSunday = formatDate(getWeekRange(weekOffset).sunday);
          var weekComplete = getToday() >= weekSunday;
          if (weekComplete) {
            var rankTitle = rank === 1 ? '冠军' : rank === 2 ? '亚军' : '季军';
            var parentOrg;
            if (level === 'class') {
              parentOrg = r.bigClassName;
            } else {
              parentOrg = r.bigClassName + ' · ' + r.className;
            }
            var certKey = 'cert_' + r.id + '_' + rank;
            certDataStore[certKey] = {
              entityName: r.name,
              rankTitle: rankTitle,
              rank: rank,
              level: level,
              attRate: attVal.toFixed(2) + '%',
              parentOrg: parentOrg
            };
            certBtn =
              '<button class="cert-btn-small" onclick="event.stopPropagation();openCertificate(\'' +
              certKey +
              '\')">🏅 生成证书</button>';
          }
        }

        var html = '<div class="rank-card' + rankClass + '" style="animation-delay:' + index * 0.05 + 's">';
        html += rankDisplay;
        html += '<div class="rank-info">';
        html += '<div class="rank-name" title="' + escapeHtml(r.name) + '">' + r.name + '</div>';
        html += '<div class="rank-meta">' + metaText + '</div>';
        html += '<div class="rank-progress">';
        html +=
          '<div class="progress-bar"><div class="progress-fill ' +
          progressClass +
          '" style="width:' +
          progressPct +
          '%"></div></div>';
        html += '<span class="rank-progress-label">' + r.filledDays + '/' + r.totalDays + '天</span>';
        html += '</div>';
        html += certBtn;
        html += '</div>';
        html +=
          '<div class="rank-rate"><div class="rank-rate-value ' +
          attClass +
          '">' +
          attVal.toFixed(2) +
          '%</div><div class="rank-rate-label">出勤率</div></div>';
        html += '</div>';
        return html;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function toggleSection(collapseId) {
        var list = document.getElementById(collapseId);
        var arrow = document.getElementById(collapseId + 'Arrow');
        if (!list || !arrow) return;
        var isCollapsed = list.classList.contains('collapsed');
        if (isCollapsed) {
          list.classList.remove('collapsed');
          arrow.classList.remove('collapsed');
          arrow.textContent = '▼';
        } else {
          list.classList.add('collapsed');
          arrow.classList.add('collapsed');
          arrow.textContent = '▶';
        }
      }

      // ========== Certificate ==========

      var currentCertData = null;

      function openCertificate(certKey) {
        var d = certDataStore[certKey];
        if (!d) return;
        currentCertData = d;
        certEntityName = d.entityName;
        certRankTitle = d.rankTitle;
        certAttRate = d.attRate;
        certParentOrg = d.parentOrg;


        document.getElementById('certRecipient').textContent = d.entityName;

        var range = getWeekRange(weekOffset);
        var semName = currentSemester ? currentSemester.semester_name : '';
        var weekLabel = computeWeekLabel(range.monday);

        document.getElementById('certContextStrong').innerHTML =
          semName + ' ' + weekLabel + ' 的 ' + d.parentOrg;

        document.getElementById('certAwardName').textContent = getCertAwardName(d.rank);
        document.getElementById('certRank').textContent = d.rankTitle + getCertLevelLabel(d.level);
        document.getElementById('certDateLine').textContent =
          '颁发日期：' +
          range.sunday.getFullYear() +
          '年' +
          (range.sunday.getMonth() + 1) +
          '月' +
          range.sunday.getDate() +
          '日';
        document.getElementById('certSerialNo').textContent =
          '证书编号：YMXX-' +
          (currentSemester ? currentSemester.semester_name.replace(/[^0-9]/g, '') : '') +
          '-' + weekLabel.replace(/[^0-9]/g, '') +
          '-' + toOrgAbbr(((d.parentOrg || '').split(' · ')[d.level === 'group' ? 1 : 0] || '')) +
          '-' + (d.rank < 10 ? '0' + d.rank : d.rank);

        buildSealSvg(d);
        document.getElementById('certOverlay').classList.add('show');
        document.body.style.overflow = 'hidden';
      }

      function buildSealSvg(d) {
        var bcName = d.parentOrg.split(' · ')[0] || d.parentOrg;
        // 使用主题色：金红主题 #C41E3A，紫色主题 #5B2C8E
        var sealColor = (d.rank && d.rank <= 3) ? '#C41E3A' : '#5B2C8E';
        var svg =
          '<svg viewBox="0 0 100 100" width="88" height="88">' +
          '<circle cx="50" cy="50" r="45" fill="none" stroke="' + sealColor + '" stroke-width="3.2" opacity="0.82"/>' +
          '<circle cx="50" cy="50" r="42" fill="none" stroke="' + sealColor + '" stroke-width="0.8" opacity="0.45"/>' +
          '<defs>' +
          '<path id="sealArc" d="M 14,50 A 36,36 0 0,1 86,50"/>' +
          '</defs>' +
          '<text font-family="\'Noto Serif SC\',serif" font-size="9" fill="' + sealColor + '" font-weight="700" letter-spacing="1.2" dy="4">' +
          '<textPath href="#sealArc" startOffset="50%" text-anchor="middle">阳明心学督察管理系统</textPath>' +
          '</text>' +
          '<text x="50" y="57" text-anchor="middle" font-family="\'Noto Serif SC\',serif" font-size="20" fill="' + sealColor + '" font-weight="900">★</text>' +
          '<line x1="32" y1="67" x2="68" y2="67" stroke="' + sealColor + '" stroke-width="1.2" opacity="0.7"/>' +
          '<text x="50" y="80" text-anchor="middle" font-family="\'Noto Serif SC\',serif" font-size="8.5" fill="' + sealColor + '" font-weight="700" letter-spacing="1.5">' +
          bcName +
          '</text>' +
          '</svg>';
        document.getElementById('certSealSvg').innerHTML = svg;
      }

      function closeCertificate() {
        document.getElementById('certOverlay').classList.remove('show');
        document.body.style.overflow = '';
      }

      // ========== SVG Certificate Generation (移动端导出) ==========

      // ========== Certificate Export ==========

      async function saveCertificate() {
        try {
          var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
          var certEl = document.getElementById('certificate');
          if (!certEl) { showToast('证书元素不存在', 'error'); return; }
          var rawCanvas;
          if (isMobile) {
            rawCanvas = await htmlToImage.toCanvas(certEl, { pixelRatio: 2, backgroundColor: null });
          } else {
            rawCanvas = await html2canvas(certEl, { scale: 2, backgroundColor: null, allowTaint: false, useCORS: true });
          }
          if (!rawCanvas) { showToast('截图失败', 'error'); return; }
          var M = 14, W = rawCanvas.width + M*2, H = rawCanvas.height + M*2;
          var canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = H;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = '#D4A574'; ctx.lineWidth = 2; ctx.strokeRect(1, 1, W-2, H-2);
          ctx.strokeStyle = '#C41E3A'; ctx.lineWidth = 10; ctx.strokeRect(7, 7, W-14, H-14);
          ctx.strokeStyle = '#D4A574'; ctx.lineWidth = 2; ctx.strokeRect(13, 13, W-26, H-26);
          ctx.drawImage(rawCanvas, M, M);
          if (isMobile) {
            document.getElementById('imgOverlayImg').src = canvas.toDataURL('image/png');
            document.getElementById('imgOverlay').classList.add('show');
          } else {
            var a = document.createElement('a');
            a.download = '荣誉证书_' + certEntityName + '.png';
            a.href = canvas.toDataURL('image/png');
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            showToast('证书已保存');
          }
        } catch (e) {
          console.error('saveCertificate error:', e);
          showToast('保存失败: ' + (e.message || '未知错误'), 'error');
        }
      }
      function closeImgOverlay() {
        document.getElementById('imgOverlay').classList.remove('show');
        // 延迟清空 src，避免关闭动画时闪烁
        setTimeout(function () {
          document.getElementById('imgOverlayImg').src = '';
        }, 300);
      }

      // ========== Weekly Helpers ==========

      function getWeekRange(offset) {
        var now = new Date();
        var day = now.getDay();
        var monday = new Date(now);
        monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
        monday.setHours(0, 0, 0, 0);
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23, 59, 59, 999);
        return { monday: monday, sunday: sunday };
      }

      function formatDate(d) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var dt = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + dt;
      }

      function getMonday(date) {
        var d = new Date(date);
        var day = d.getDay();
        var diff = (day + 6) % 7;
        d.setDate(d.getDate() - diff);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function computeWeekLabel(weekMonday) {
        if (!currentSemester) return '本周';
        var trialStart = currentSemester.trial_start_date
          ? new Date(currentSemester.trial_start_date + 'T00:00:00')
          : null;
        var formalStart = new Date(currentSemester.start_date + 'T00:00:00');
        var formalMonday = getMonday(formalStart);
        var wm = new Date(weekMonday);
        wm.setHours(0, 0, 0, 0);
        var isTrial = trialStart && wm < formalMonday;
        if (isTrial) {
          var trialMonday = getMonday(trialStart);
          var weeks = Math.floor((wm - trialMonday) / (7 * 86400000)) + 1;
          return '试晨读第' + weeks + '周';
        } else {
          var weeks = Math.floor((wm - formalMonday) / (7 * 86400000)) + 1;
          return '第' + weeks + '周';
        }
      }

      function getScheduleCategories(s) {
        if (!s || !s.item_ids) return { hasAttendance: true, hasHomework: true };
        var ids = s.item_ids.split(',').map(Number).filter(Boolean);
        if (ids.length === 0) return { hasAttendance: true, hasHomework: true };
        var hasAtt = ids.some(function (id) {
          return assessmentCategoryMap[id] === 'attendance';
        });
        var hasHw = ids.some(function (id) {
          return assessmentCategoryMap[id] === 'homework';
        });
        if (!hasAtt && !hasHw) return { hasAttendance: true, hasHomework: true };
        return { hasAttendance: hasAtt, hasHomework: hasHw };
      }

      // 证书主题切换
      // 奖项名称映射（纯数字排名）
      function getCertAwardName(rank) {
        var suffixes = { 1: '第一名', 2: '第二名', 3: '第三名', 4: '第四名', 5: '第五名', 6: '第六名', 7: '第七名', 8: '第八名', 9: '第九名', 10: '第十名' };
        return suffixes[rank] || '第' + rank + '名';
      }

      // 层级标签
      function getCertLevelLabel(level) {
        if (level === 'class') return '班级';
        if (level === 'group') return '小组';
        return '';
      }

      // 汉字→拼音首字母（pinyin-pro 库，完整覆盖所有汉字）
      function toOrgAbbr(name) {
        if (!name) return '';
        // CDN 加载失败时降级：只保留 ASCII 字母数字
        if (typeof pinyinPro === 'undefined') return name.replace(/[^A-Za-z0-9]/g, '').toUpperCase().substring(0, 8);
        // pattern:'first' 取拼音首字母，toneType:'none' 去声调
        return pinyinPro.pinyin(name, { pattern: 'first', toneType: 'none' })
          .replace(/\s+/g, '').toUpperCase().substring(0, 8);
      }

      // Get formulas from assessment types for a given schedule (matched by type_name)
      function getScheduleFormulas(s) {
        var result = { online: null, video: null, hw: null };
        if (!s || !s.item_ids) return result;
        var ids = s.item_ids.split(',').map(Number).filter(Boolean);
        ids.forEach(function (id) {
          var at = null;
          assessmentTypes.forEach(function (t) {
            if (t.id === id) at = t;
          });
          if (!at || !at.formula) return;
          var name = at.type_name || '';
          if (name.indexOf('上线率') !== -1) result.online = at.formula;
          else if (name.indexOf('视频率') !== -1) result.video = at.formula;
          else if (name.indexOf('作业率') !== -1) result.hw = at.formula;
        });
        return result;
      }

      function hasMult100(f) {
        return f && (f.indexOf('*100') !== -1 || f.indexOf('×100') !== -1);
      }

      function computeRatesFromFormulas(fieldMap, formulas) {
        var online = null,
          video = null,
          hw = null;

        if (formulas.online) {
          var r = calcFormula(formulas.online, fieldMap);
          if (r != null) online = r * (hasMult100(formulas.online) ? 1 : 100);
        }
        if (formulas.video) {
          var r = calcFormula(formulas.video, fieldMap);
          if (r != null) video = r * (hasMult100(formulas.video) ? 1 : 100);
        }
        if (formulas.hw) {
          var r = calcFormula(formulas.hw, fieldMap);
          if (r != null) hw = r * (hasMult100(formulas.hw) ? 1 : 100);
        }

        var attendance = null;
        if (online !== null || hw !== null) {
          attendance = ((online || 0) + (hw || 0)) / (online !== null && hw !== null ? 2 : 1);
        }

        return { online: online, video: video, hw: hw, attendance: attendance };
      }

      function changeWeek(delta) {
        if (!currentSemester) {
          weekOffset += delta;
          loadAndRender();
          return;
        }
        var newOffset = weekOffset + delta;
        var range = getWeekRange(newOffset);
        // 下限以正式学期为准，不纳入试晨读周
        var formalStart = new Date(currentSemester.start_date + 'T00:00:00');
        var semEnd = new Date(currentSemester.end_date + 'T23:59:59');
        if (range.sunday < formalStart || range.monday > semEnd) return;
        weekOffset = newOffset;
        loadAndRender();
      }

      function goToCurrentWeek() {
        weekOffset = 0;
        loadAndRender();
      }

      init();
    </script>
