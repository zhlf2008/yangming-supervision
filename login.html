<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>登录 - 阳明心学督察管理系统</title>
    <link rel="preconnect" href="https://whvjfurrkusdwujjodwc.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/common.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        width: 100%;
        max-width: 400px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, var(--vermillion-light) 0%, var(--gold-light) 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
      }

      .login-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 24px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 8px;
      }

      .login-subtitle {
        font-size: 14px;
        color: var(--ink-muted);
      }

      .login-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 32px 24px;
        box-shadow: 0 4px 20px var(--shadow);
        border: 1px solid var(--border);
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-label {
        display: block;
        font-size: 13px;
        color: var(--ink-light);
        margin-bottom: 8px;
        font-weight: 500;
      }

      .input-field {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-primary);
        color: var(--ink-dark);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--vermillion);
        background: var(--bg-card);
        box-shadow: 0 0 0 3px var(--vermillion-light);
      }

      .input-field::placeholder {
        color: var(--ink-muted);
      }

      .login-btn {
        width: 100%;
        padding: 16px 24px;
        font-size: 16px;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, var(--vermillion) 0%, #c62828 100%);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(230, 57, 70, 0.35);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 8px;
      }

      .login-btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 8px rgba(230, 57, 70, 0.3);
      }

      .login-btn:disabled {
        background: #ccc;
        box-shadow: none;
        cursor: not-allowed;
      }

      .error-msg {
        color: var(--vermillion);
        font-size: 13px;
        margin-top: 12px;
        text-align: center;
        display: none;
      }

      .error-msg.show {
        display: block;
      }

      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid white;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .version {
        text-align: center;
        margin-top: 24px;
        font-size: 12px;
        color: var(--ink-muted);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">📋</div>
        <h1 class="login-title">阳明心学督察管理系统</h1>
        <p class="login-subtitle">考勤数据管理系统</p>
      </div>

      <div class="login-card">
        <div class="input-group">
          <label class="input-label">手机号</label>
          <input type="tel" class="input-field" id="phone" placeholder="请输入手机号" maxlength="11" />
        </div>
        <div class="input-group">
          <label class="input-label">密码</label>
          <input type="password" class="input-field" id="password" placeholder="请输入密码" />
        </div>
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
        <p class="error-msg" id="errorMsg"></p>
      </div>

      <p class="version">v1.0.0</p>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js?v=3"></script>
    <script>
      const { createClient } = supabase;
      const db = createClient(supabaseConfig.url, supabaseConfig.anonKey);

      const phoneInput = document.getElementById('phone');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      // 回车登录
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });

      async function handleLogin() {
        const phone = phoneInput.value.trim();
        const password = passwordInput.value;

        if (!phone || phone.length !== 11) {
          showError('请输入正确的手机号');
          return;
        }
        if (!password) {
          showError('请输入密码');
          return;
        }

        setLoading(true);
        hideError();

        try {
          // 1. 使用邮箱登录
          const email = `p${phone}@supabase.io`;
          const { data: authData, error: authError } = await db.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (authError) throw authError;

          // 2. 获取用户 profile
          const { data: profile, error: profileError } = await db
            .from('profiles')
            .select('*, organizations(*)')
            .eq('id', authData.user.id)
            .single();

          if (profileError) throw profileError;

          // 3. 保存用户信息（session 由 SDK 自动持久化到标准 key）
          localStorage.setItem('supabase_user', JSON.stringify(profile));
          localStorage.setItem('currentUser', profile.name);

          // 4. 跳转到首页
          window.location.href = 'index.html';
        } catch (error) {
          console.error('Login error:', error);
          if (error.message.includes('Invalid login credentials')) {
            showError('手机号或密码错误');
          } else if (error.message.includes('not found')) {
            showError('该手机号未注册');
          } else {
            showError('登录失败，请重试');
          }
        } finally {
          setLoading(false);
        }
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
      }

      function hideError() {
        errorMsg.classList.remove('show');
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.innerHTML = loading ? '<span class="loading"></span>登录中...' : '登 录';
      }

      // 检查是否已登录（用 SDK 原生 getSession）
      async function checkLogin() {
        try {
          var result = await db.auth.getSession();
          if (result.data && result.data.session) {
            window.location.href = 'index.html';
          }
        } catch (e) {
          /* ignore */
        }
      }
      checkLogin();
    </script>
  </body>
</html>
