<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>个人中心 - 阳明心学督察管理系统</title>
    <!-- 快速session检查：新设备无session则直接跳转登录，避免闪现页面 -->
    <script>
      (function(){
        var supabaseKey = "sb-whvjfurrkusdwujjodwc-auth-token";
        var raw = localStorage.getItem(supabaseKey);
        if (!raw) { window.location.replace("login.html"); return; }
        try {
          var session = JSON.parse(raw);
          if (!session || !session.access_token) { window.location.replace("login.html"); }
        } catch(e) {
          window.location.replace("login.html");
        }
      })();
    </script>
    <link rel="preconnect" href="https://whvjfurrkusdwujjodwc.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      body::before {
        display: none;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 100px;
      }

      /* Header */
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
        color: var(--ink-dark);
        flex-shrink: 0;
      }

      .back-btn:active {
        background: var(--border);
      }

      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--ink-dark);
      }

      /* User Profile Card */
      .profile-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 28px 24px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .profile-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 80px;
        background: rgba(250, 250, 248, 0.92);
        opacity: 1;
      }

      .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--vermillion) 0%, #c62828 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 32px;
        color: white;
        margin: 0 auto 16px;
        position: relative;
        z-index: 1;
        box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
      }

      .profile-name {
        font-size: 20px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 4px;
        position: relative;
        z-index: 1;
      }

      .profile-role {
        font-size: 13px;
        color: var(--ink-muted);
        position: relative;
        z-index: 1;
      }

      .profile-stats {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        position: relative;
        z-index: 1;
      }

      .profile-stat {
        text-align: center;
      }

      .profile-stat-value {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink-dark);
      }

      .profile-stat-label {
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 4px;
      }

      /* Menu Section */
      .menu-section {
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        overflow: hidden;
        margin-bottom: 16px;
      }

      .menu-section-title {
        font-size: 12px;
        color: var(--ink-muted);
        padding: 14px 20px 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .menu-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        cursor: pointer;
        transition: background 0.2s;
        border-bottom: 1px solid var(--border);
      }

      .menu-item:last-child {
        border-bottom: none;
      }

      .menu-item:active {
        background: var(--bg-primary);
      }

      .menu-item-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        margin-right: 14px;
      }

      .menu-item-icon.person {
        background: var(--vermillion-light);
      }
      .menu-item-icon.org {
        background: rgba(250, 250, 248, 0.9);
      }
      .menu-item-icon.stats {
        background: var(--gold-light);
      }
      .menu-item-icon.notify {
        background: rgba(245, 237, 228, 0.72);
      }
      .menu-item-icon.admin {
        background: rgba(250, 250, 248, 0.9);
      }
      .menu-item-icon.help {
        background: var(--green-light);
      }
      .menu-item-icon.about {
        background: var(--gold-light);
      }
      .menu-item-icon.logout {
        background: var(--vermillion-light);
      }

      .menu-item-content {
        flex: 1;
      }

      .menu-item-title {
        font-size: 15px;
        color: var(--ink-dark);
        font-weight: 500;
      }

      .menu-item-desc {
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 2px;
      }

      .menu-item-arrow {
        width: 20px;
        height: 20px;
        color: var(--ink-muted);
      }

      /* Version Info */
      .version-info {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: var(--ink-muted);
      }

      .version-info span {
        display: block;
        margin-top: 4px;
      }

      /* Animations */
      .page-header {
        animation: fadeInDown 0.4s ease-out;
      }
      .profile-card {
        animation: fadeInUp 0.4s ease-out 0.05s backwards;
      }
      .menu-section {
        animation: fadeInUp 0.4s ease-out 0.1s backwards;
      }
      .menu-section:nth-child(3) {
        animation-delay: 0.15s;
      }
      .menu-section:nth-child(4) {
        animation-delay: 0.2s;
      }

      /* Edit Profile Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        background: var(--bg-card);
        border-radius: var(--radius);
        width: 100%;
        max-width: 400px;
        max-height: 90vh;
        overflow: auto;
        animation: modalSlideUp 0.3s ease-out;
      }

      @keyframes modalSlideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .modal-title {
        font-size: 18px;
        font-weight: 600;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
      }

      .modal-close {
        width: 32px;
        height: 32px;
        border: none;
        background: var(--bg-primary);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-muted);
        font-size: 20px;
      }

      .modal-close:hover {
        background: var(--border);
      }

      .modal-body {
        padding: 20px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 13px;
        color: var(--ink-muted);
        margin-bottom: 6px;
      }

      .form-input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-family: inherit;
        background: var(--bg-primary);
        color: var(--ink-dark);
        transition: border-color 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--vermillion);
      }

      .form-input:disabled {
        background: var(--border);
        color: var(--ink-muted);
      }

      .form-hint {
        font-size: 11px;
        color: var(--ink-muted);
        margin-top: 4px;
      }

      .form-error {
        font-size: 11px;
        color: var(--vermillion);
        margin-top: 4px;
        display: none;
      }

      .form-error.show {
        display: block;
      }

      .modal-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .modal-tab {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        background: var(--bg-primary);
        border-radius: var(--radius-sm);
        font-size: 14px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }

      .modal-tab.active {
        background: var(--vermillion);
        border-color: var(--vermillion);
        color: white;
      }

      .modal-tab-content {
        display: none;
      }

      .modal-tab-content.active {
        display: block;
      }

      .modal-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
      }

      .btn {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--vermillion);
        color: white;
      }

      .btn-primary:hover {
        background: var(--vermillion);
      }

      .btn-primary:disabled {
        background: var(--border);
        color: var(--ink-muted);
        cursor: not-allowed;
      }

      .btn-secondary {
        background: var(--bg-primary);
        color: var(--ink-dark);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: var(--border);
      }

      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink-dark);
        color: white;
        padding: 12px 24px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        z-index: 2000;
        animation: toastFade 2s ease-out forwards;
      }

      .toast.success {
        background: var(--green);
      }

      .toast.error {
        background: var(--vermillion);
      }

      @keyframes toastFade {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(-10px);
        }
        15% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        85% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-10px);
        }
      }

      /* 反馈系统 */
      .feedback-list {
        max-height: 50vh;
        overflow-y: auto;
        margin-bottom: 16px;
      }
      .feedback-item {
        padding: 12px;
        border-radius: var(--radius-sm);
        background: var(--bg-primary);
        margin-bottom: 8px;
      }
      .feedback-item-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .feedback-item-time {
        font-size: 11px;
        color: var(--ink-muted);
      }
      .feedback-item-status {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .feedback-item-status.unread {
        background: var(--gold-light);
        color: var(--ink-light);
      }
      .feedback-item-status.read {
        background: var(--green-light);
        color: var(--green);
      }
      .feedback-item-status.replied {
        background: rgba(250, 250, 248, 0.9);
        color: var(--ink-dark);
      }
      .feedback-item-content {
        font-size: 14px;
        color: var(--ink-dark);
        line-height: 1.5;
      }
      .feedback-item-reply {
        margin-top: 8px;
        padding: 8px 12px;
        background: rgba(250, 250, 248, 0.9);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--border);
      }
      .feedback-item-reply-label {
        font-size: 11px;
        color: var(--ink-dark);
        font-weight: 600;
        margin-bottom: 4px;
      }
      .feedback-item-reply-text {
        font-size: 13px;
        color: var(--ink-dark);
      }
      .feedback-empty {
        text-align: center;
        padding: 32px 20px;
        color: var(--ink-muted);
        font-size: 14px;
      }
      .feedback-textarea {
        width: 100%;
        min-height: 100px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        background: var(--bg-primary);
      }
      .feedback-textarea:focus {
        outline: none;
        border-color: var(--vermillion);
      }
      .feedback-count {
        font-size: 12px;
        color: var(--ink-muted);
        text-align: right;
        margin-top: 4px;
      }
      .feedback-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .feedback-tab {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        background: var(--bg-primary);
        border-radius: var(--radius-sm);
        font-size: 14px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }
      .feedback-tab.active {
        background: var(--vermillion);
        border-color: var(--vermillion);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Page Header -->
      <header class="page-header">
        <a
          href="index.html"
          class="back-btn"
          aria-label="返回"
          onclick="
            event.preventDefault();
            window.history.back();
          "
        >&lt;</a>
        <h1 class="page-title">我的</h1>
      </header>

      <!-- Profile Card -->
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-name" id="profileName">加载中...</div>
        <div class="profile-role" id="profileRole">-</div>
        <div class="profile-phone" id="profilePhone" style="font-size: 12px; color: #8a8a8a; margin-top: 4px">-</div>
        <div class="profile-stats" id="profileStats">
          <div class="profile-stat">
            <div class="profile-stat-value" id="statValue1">--</div>
            <div class="profile-stat-label" id="statLabel1">加载中...</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value" id="statValue2">--</div>
            <div class="profile-stat-label" id="statLabel2">加载中...</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value" id="statValue3">--</div>
            <div class="profile-stat-label" id="statLabel3">加载中...</div>
          </div>
        </div>
      </div>

      <!-- Account Section -->
      <div class="menu-section">
        <div class="menu-section-title">账户</div>
        <div class="menu-item" onclick="editProfile()">
          <div class="menu-item-icon person">👤</div>
          <div class="menu-item-content">
            <div class="menu-item-title">编辑资料</div>
            <div class="menu-item-desc">修改姓名、头像等信息</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
        <div class="menu-item" onclick="viewStats()">
          <div class="menu-item-icon stats">📊</div>
          <div class="menu-item-content">
            <div class="menu-item-title">我的填报记录</div>
            <div class="menu-item-desc">查看历史填报数据</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>

      <!-- Settings Section -->
      <div class="menu-section">
        <div class="menu-section-title">设置</div>
        <div id="adminMenuItem" class="menu-item" onclick="goToSettings()" style="display: none">
          <div class="menu-item-icon admin">⚙️</div>
          <div class="menu-item-content">
            <div class="menu-item-title">设置</div>
            <div class="menu-item-desc">学期、日程、考核、组织等</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
        <div class="menu-item" onclick="showHelp()">
          <div class="menu-item-icon help">❓</div>
          <div class="menu-item-content">
            <div class="menu-item-title">帮助与反馈</div>
            <div class="menu-item-desc">遇到问题？联系我们</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
        <div class="menu-item" onclick="showAbout()">
          <div class="menu-item-icon about">ℹ️</div>
          <div class="menu-item-content">
            <div class="menu-item-title">关于系统</div>
            <div class="menu-item-desc">版本信息与相关说明</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>

      <!-- Logout -->
      <div class="menu-section">
        <div class="menu-item" onclick="logout()">
          <div class="menu-item-icon logout">🚪</div>
          <div class="menu-item-content">
            <div class="menu-item-title" style="color: var(--vermillion)">退出登录</div>
            <div class="menu-item-desc">切换其他账号</div>
          </div>
          <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>

      <!-- Version Info -->
      <div class="version-info">阳明心学督察管理系统 v1.0.0</div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editProfileModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">编辑资料</h2>
          <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-tabs">
            <button class="modal-tab active" onclick="switchEditTab('info')" id="tabInfo">基本信息</button>
            <button class="modal-tab" onclick="switchEditTab('password')" id="tabPassword">修改密码</button>
          </div>

          <!-- 基本信息 Tab -->
          <div class="modal-tab-content active" id="contentInfo">
            <div class="form-group">
              <label class="form-label">姓名</label>
              <input type="text" class="form-input" id="editName" placeholder="请输入姓名" maxlength="20" />
              <div class="form-error" id="nameError"></div>
            </div>
            <div class="form-group">
              <label class="form-label">手机号</label>
              <input type="tel" class="form-input" id="editPhone" placeholder="请输入手机号" maxlength="11" />
              <div class="form-error" id="phoneError"></div>
            </div>
          </div>

          <!-- 修改密码 Tab -->
          <div class="modal-tab-content" id="contentPassword">
            <div class="form-group">
              <label class="form-label">当前密码</label>
              <input type="password" class="form-input" id="currentPassword" placeholder="请输入当前密码" />
              <div class="form-error" id="currentPwdError"></div>
            </div>
            <div class="form-group">
              <label class="form-label">新密码</label>
              <input
                type="password"
                class="form-input"
                id="newPassword"
                placeholder="请输入新密码（至少6位）"
                minlength="6"
              />
              <div class="form-hint">密码长度至少6位</div>
              <div class="form-error" id="newPwdError"></div>
            </div>
            <div class="form-group">
              <label class="form-label">确认新密码</label>
              <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入新密码" />
              <div class="form-error" id="confirmPwdError"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
          <button class="btn btn-primary" onclick="saveProfile()" id="saveBtn">保存</button>
        </div>
      </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal-overlay" id="feedbackModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">帮助与反馈</h2>
          <button class="modal-close" onclick="closeFeedbackModal()">&times;</button>
        </div>
        <div class="modal-body">
          <!-- 普通用户：留言表单 -->
          <div id="feedbackFormSection">
            <textarea
              class="feedback-textarea"
              id="feedbackContent"
              placeholder="请描述你遇到的问题或建议..."
              maxlength="500"
            ></textarea>
            <div class="feedback-count"><span id="feedbackCharCount">0</span>/500</div>
            <button class="btn btn-primary" onclick="submitFeedback()" style="width: 100%; margin-top: 12px">
              提交反馈
            </button>
          </div>
          <!-- 历史反馈 -->

      if (activeSystem === 'secretariat' || activeSystem === 'study') {
        renderModuleBottomNav(activeSystem, 'profile');

    <script>
      async function init() {
        await waitForDb();
        await refreshCurrentUser();

        var profile = checkLogin();
        if (!profile) return;
        const userName = profile.name || '未知';
        const userRole = profile.role || '';
        var currentSemesterId = await getCurrentSemesterId();
        var currentUserOrgId = await resolveCurrentUserOrgId(profile, currentSemesterId);

        // Update profile display
        document.getElementById('profileName').textContent = userName;
        document.getElementById('profileAvatar').textContent = userName.charAt(0);

        // Update role display
        document.querySelector('.profile-role').textContent = userRole;

        // Update phone if exists
        if (profile.phone) {
          document.querySelector('.profile-phone').textContent = profile.phone;
        }

        // 检查是否是系统管理员，显示设置入口
        if (profile.role === '超级管理员' || profile.role === '管理员') {
          document.getElementById('adminMenuItem').style.display = 'flex';
        }

        // Load profile stats
        await loadProfileStats(profile, currentSemesterId, currentUserOrgId);
      }

      async function resolveCurrentUserOrgId(profile, semesterId) {
        var legacyOrgId = profile && profile.organization_id ? Number(profile.organization_id) : null;
        if (!semesterId || !profile || !profile.phone) return legacyOrgId;

        var { data: person } = await window.db
          .from('people')
          .select('id')
          .eq('phone', profile.phone)
          .maybeSingle();
        if (!person) return legacyOrgId;

        var { data: assignment } = await window.db
          .from('person_org_assignments')
          .select('org_id')
          .eq('semester_id', semesterId)
          .eq('person_id', person.id)
          .eq('status', 'active')
          .maybeSingle();
        return assignment && assignment.org_id ? Number(assignment.org_id) : legacyOrgId;
      }

      async function loadProfileStats(profile, currentSemesterId, currentUserOrgId) {
        var role = profile.role;
        var userOrgId = currentUserOrgId;
        var today = getToday();

        // 计算本周一（用于本周统计）
        var now = new Date();
        var day = now.getDay();
        var monday = new Date(now);
        monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
        var mondayStr =
          monday.getFullYear() +
          '-' +
          String(monday.getMonth() + 1).padStart(2, '0') +
          '-' +
          String(monday.getDate()).padStart(2, '0');
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        var sundayStr =
          sunday.getFullYear() +
          '-' +
          String(sunday.getMonth() + 1).padStart(2, '0') +
          '-' +
          String(sunday.getDate()).padStart(2, '0');

        // 加载所有组织（用于 group→daban 追溯）
        var semId = currentSemesterId || await getCurrentSemesterId();
        var { data: allOrgs } = semId
          ? await window.db.from('organizations').select('*').eq('semester_id', semId).eq('is_active', true)
          : { data: [] };
        allOrgs = allOrgs || [];
        var orgMap = {};
        allOrgs.forEach(function (o) {
          orgMap[o.id] = o;
        });

        // 辅助：从小组追溯到大班 ID
        function getDabanId(groupId) {
          var grp = orgMap[groupId];
          if (!grp) return null;
          var cls = orgMap[grp.parent_id];
          if (!cls) return null;
          var daban = orgMap[cls.parent_id];
          return daban && daban.level === '大班' ? daban.id : null;
        }

        if (role === '小组督察' || role === '小组副督察') {
          // ===== 小组督察：个人填报统计 =====
          document.getElementById('statLabel1').textContent = '本周本组已填报';
          document.getElementById('statLabel2').textContent = '本周本组漏填报';
          document.getElementById('statLabel3').textContent = '本组今日是否已填报';

          if (!userOrgId || !semId) {
            document.getElementById('statValue1').textContent = '0';
            document.getElementById('statValue2').textContent = '--';
            document.getElementById('statValue3').textContent = '未归属';
            document.getElementById('statValue3').style.color = 'var(--ink-muted)';
            return;
          }

          var dabanId = getDabanId(userOrgId);

          // 先取本周全部日程（统计所有日程天数）
          var weekQuery = window.db
            .from('schedules')
            .select('id,schedule_date')
            .eq('semester_id', semId)
            .gte('schedule_date', mondayStr)
            .lte('schedule_date', sundayStr)
            .eq('is_valid', 1);
          if (dabanId) weekQuery = weekQuery.eq('org_id', dabanId);
          var { data: weekSchedules } = await weekQuery;
          var allSchedules = weekSchedules || [];
          var totalWeekSchedules = allSchedules.length;

          // 只统计截止到今天（含）的日程，未来日期的日程不纳入漏填计算
          var pastSchedules = allSchedules.filter(function (s) {
            return s.schedule_date <= today;
          });
          var pastScheduleIds = pastSchedules.map(function (s) { return s.id; });
          var pastCount = pastScheduleIds.length;

          if (pastCount > 0) {
            var { count: filledThisWeek } = await window.db
              .from('attendance_records')
              .select('*', { count: 'exact', head: true })
              .eq('organization_id', userOrgId)
              .in('schedule_id', pastScheduleIds);
            var filled = filledThisWeek || 0;
            var missed = pastCount - filled;
            document.getElementById('statValue1').textContent = filled + '/' + totalWeekSchedules;
            document.getElementById('statValue2').textContent = missed > 0 ? missed : '--';
            document.getElementById('statValue2').style.color = missed > 0 ? 'var(--vermillion)' : 'var(--green)';
          } else {
            document.getElementById('statValue1').textContent = totalWeekSchedules > 0 ? '0/' + totalWeekSchedules : '0';
            document.getElementById('statValue2').textContent = '--';
            document.getElementById('statValue2').style.color = 'var(--ink-dark)';
          }

          // 3. 今日是否已填报
          var todayQuery = window.db
            .from('schedules')
            .select('id')
            .eq('semester_id', semId)
            .eq('schedule_date', today)
            .eq('is_valid', 1);
          if (dabanId) todayQuery = todayQuery.eq('org_id', dabanId);
          var { data: todayScheds } = await todayQuery;
          if (!todayScheds || todayScheds.length === 0) {
            document.getElementById('statValue3').textContent = '无考核';
            document.getElementById('statValue3').style.color = 'var(--ink-muted)';
          } else {
            var todayIds = todayScheds.map(function (s) {
              return s.id;
            });
            var { count: todayFilled } = await window.db
              .from('attendance_records')
              .select('*', { count: 'exact', head: true })
              .eq('organization_id', userOrgId)
              .in('schedule_id', todayIds);
            if (todayFilled > 0) {
              document.getElementById('statValue3').textContent = '是';
              document.getElementById('statValue3').style.color = 'var(--green)';
            } else {
              document.getElementById('statValue3').textContent = '否';
              document.getElementById('statValue3').style.color = 'var(--vermillion)';
            }
          }
        } else {
          // ===== 上级角色：管辖范围 + 今日填报进度 =====
          document.getElementById('statLabel1').textContent = '管辖小组';
          document.getElementById('statLabel2').textContent = '今日已填报';
          document.getElementById('statLabel3').textContent = '今日未填报';

          // 1. 管辖小组数量
          var groupIds = getAccessibleGroupIds(role, userOrgId, allOrgs);
          var totalGroups = groupIds.size;
          document.getElementById('statValue1').textContent = totalGroups;

          // 2 & 3. 今日填报进度 — 需要考虑 per-daban 日程
          var { data: todayScheds } = await window.db
            .from('schedules')
            .select('id,org_id')
            .eq('semester_id', semId)
            .eq('schedule_date', today)
            .eq('is_valid', 1);

          if (!todayScheds || todayScheds.length === 0) {
            document.getElementById('statValue2').textContent = '无考核';
            document.getElementById('statValue2').style.color = 'var(--ink-muted)';
            document.getElementById('statValue3').textContent = '无考核';
            document.getElementById('statValue3').style.color = 'var(--ink-muted)';
          } else {
            // 构建 daban→schedule_id 映射（每个大班今天最多一个日程）
            var dabanTodaySet = new Set();
            todayScheds.forEach(function (s) {
              if (s.org_id) dabanTodaySet.add(s.org_id);
            });

            // 只统计所属大班今日有日程的小组
            var eligibleGroups = [];
            groupIds.forEach(function (gid) {
              var did = getDabanId(gid);
              if (did && dabanTodaySet.has(did)) eligibleGroups.push(gid);
            });

            var scheduleIds = todayScheds.map(function (s) {
              return s.id;
            });
            var groupIdArray = eligibleGroups;
            var { data: records } = await window.db
              .from('attendance_records')
              .select('organization_id')
              .in('schedule_id', scheduleIds)
              .in('organization_id', groupIdArray.length > 0 ? groupIdArray : [-1]);

            var filledSet = new Set();
            (records || []).forEach(function (r) {
              filledSet.add(r.organization_id);
            });
            var filledCount = 0;
            eligibleGroups.forEach(function (id) {
              if (filledSet.has(id)) filledCount++;
            });
            var unfilledCount = eligibleGroups.length - filledCount;

            document.getElementById('statValue2').textContent = filledCount;
            document.getElementById('statValue2').style.color = 'var(--green)';
            document.getElementById('statValue3').textContent = unfilledCount;
            document.getElementById('statValue3').style.color = unfilledCount > 0 ? 'var(--vermillion)' : 'var(--green)';
          }
        }
      }

      function goToSettings() {
        window.location.href = 'semester-settings.html';
      }

      function editProfile() {
        const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');

        // 填充当前信息
        document.getElementById('editName').value = profile.name || '';
        document.getElementById('editPhone').value = profile.phone || '';

        // 重置表单状态
        clearEditErrors();
        switchEditTab('info');

        // 显示模态框
        document.getElementById('editProfileModal').classList.add('active');
      }

      function closeEditModal() {
        document.getElementById('editProfileModal').classList.remove('active');
      }

      function switchEditTab(tab) {
        // 更新 Tab 样式
        document.getElementById('tabInfo').classList.toggle('active', tab === 'info');
        document.getElementById('tabPassword').classList.toggle('active', tab === 'password');

        // 更新内容显示
        document.getElementById('contentInfo').classList.toggle('active', tab === 'info');
        document.getElementById('contentPassword').classList.toggle('active', tab === 'password');

        clearEditErrors();
      }

      function clearEditErrors() {
        document.querySelectorAll('.form-error').forEach((el) => {
          el.classList.remove('show');
          el.textContent = '';
        });
      }

      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }

      async function saveProfile() {
        const activeTab = document.querySelector('.modal-tab.active').id;

        if (activeTab === 'tabInfo') {
          await saveProfileInfo();
        } else {
          await savePassword();
        }
      }

      async function saveProfileInfo() {
        const name = document.getElementById('editName').value.trim();
        const phone = document.getElementById('editPhone').value.trim();

        // 验证
        clearEditErrors();
        let hasError = false;

        if (!name) {
          document.getElementById('nameError').textContent = '请输入姓名';
          document.getElementById('nameError').classList.add('show');
          hasError = true;
        }

        if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
          document.getElementById('phoneError').textContent = '请输入正确的手机号';
          document.getElementById('phoneError').classList.add('show');
          hasError = true;
        }

        if (hasError) return;

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        try {
          const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
          const userId = profile.id;

          // 比较原始值（profile.phone 可能是 null vs 空字符串）
          const originalPhone = profile.phone || '';
          const phoneChanged = phone !== originalPhone;

          // 如果没有变化，直接关闭
          if (name === profile.name && !phoneChanged) {
            showToast('没有修改');
            closeEditModal();
            saveBtn.disabled = false;
            saveBtn.textContent = '保存';
            return;
          }

          // 如果手机号变化，先更新 auth.users（登录凭证）
          if (phoneChanged || name !== profile.name) {
            const newEmail = `p${phone}@supabase.io`;
            const result = await adminApi.updateUser(userId, { email: newEmail, name: name, phone: phone });
            if (result.error) {
              showToast('更新登录信息失败：' + result.error, 'error');
              saveBtn.disabled = false;
              saveBtn.textContent = '保存';
              return;
            }
          }

          // 构建 profiles 更新数据
          const updateData = {};
          if (name !== profile.name) {
            updateData.name = name;
          }
          if (phoneChanged) {
            updateData.phone = phone || null;
          }

          // 更新 profiles 表
          const { error } = await window.db.from('profiles').update(updateData).eq('id', userId);
          if (error) throw error;

          // 更新本地存储
          profile.name = name;
          profile.phone = phone || null;
          localStorage.setItem('supabase_user', JSON.stringify(profile));

          // 更新页面显示
          document.getElementById('profileName').textContent = name;
          document.getElementById('profileAvatar').textContent = name.charAt(0);
          document.querySelector('.profile-phone').textContent = phone || '-';

          showToast('资料更新成功');
          closeEditModal();
        } catch (err) {
          console.error('Update profile error:', err);
          showToast('更新失败：' + (err.message || '请重试'), 'error');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
        }
      }

      async function savePassword() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // 验证
        clearEditErrors();
        let hasError = false;

        if (!currentPassword) {
          document.getElementById('currentPwdError').textContent = '请输入当前密码';
          document.getElementById('currentPwdError').classList.add('show');
          hasError = true;
        }

        if (!newPassword) {
          document.getElementById('newPwdError').textContent = '请输入新密码';
          document.getElementById('newPwdError').classList.add('show');
          hasError = true;
        } else if (newPassword.length < 6) {
          document.getElementById('newPwdError').textContent = '密码长度至少6位';
          document.getElementById('newPwdError').classList.add('show');
          hasError = true;
        }

        if (newPassword !== confirmPassword) {
          document.getElementById('confirmPwdError').textContent = '两次输入的密码不一致';
          document.getElementById('confirmPwdError').classList.add('show');
          hasError = true;
        }

        if (hasError) return;

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        try {
          // 验证当前密码 - 通过重新登录验证
          const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
          // 邮箱格式为 p{phone}@supabase.io
          const phone = profile.phone;
          if (!phone) {
            throw new Error('无法获取用户手机号信息');
          }
          const email = `p${phone}@supabase.io`;

          // 尝试用当前密码登录验证
          const { error: signInError } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: currentPassword
          });

          if (signInError) {
            document.getElementById('currentPwdError').textContent = '当前密码错误';
            document.getElementById('currentPwdError').classList.add('show');
            throw signInError;
          }

          // 密码验证通过，更新密码
          const { error: updateError } = await window.supabaseClient.auth.updateUser({
            password: newPassword
          });

          if (updateError) throw updateError;

          // 清空密码表单
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';

          showToast('密码修改成功');
          closeEditModal();
        } catch (err) {
          console.error('Update password error:', err);
          if (!err.message.includes('当前密码')) {
            showToast('修改失败：' + (err.message || '请重试'), 'error');
          }
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
        }
      }

      function viewStats() {
        var system = typeof getActiveSystem === 'function' ? getActiveSystem() : 'supervision';
        window.location.href = 'my-records.html?system=' + encodeURIComponent(system);
      }

      function showAbout() {
        alert('阳明心学督察管理系统\n版本：v1.0.0\n\n基于阳明心学教育理念\n打造智能化督察管理体系');

      // ========== 帮助与反馈 ==========

      function escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }

      var feedbackRole = '';

      function showHelp() {
        var profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
        feedbackRole = profile.role || '';
        var isAdmin = feedbackRole === '超级管理员' || feedbackRole === '管理员';

        document.getElementById('feedbackContent').value = '';
        document.getElementById('feedbackCharCount').textContent = '0';
        document.getElementById('feedbackModal').classList.add('active');

        // 管理员隐藏提交表单，普通用户显示
        document.getElementById('feedbackFormSection').style.display = isAdmin ? 'none' : '';

        loadFeedbackList();

        var textarea = document.getElementById('feedbackContent');
        textarea.oninput = function () {
          document.getElementById('feedbackCharCount').textContent = textarea.value.length;
        };
      }

      function closeFeedbackModal() {
        document.getElementById('feedbackModal').classList.remove('active');
      }

      async function submitFeedback() {
        var content = document.getElementById('feedbackContent').value.trim();
        if (!content) {
          showToast('请输入反馈内容');
          return;
        }
        if (content.length < 4) {
          showToast('反馈内容至少4个字');
          return;
        }

        var profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
        try {
          var { error } = await window.db.from('feedback').insert({
            user_id: profile.id,
            user_name: profile.name || '未知',
            content: content
          });
          if (error) throw error;
          showToast('反馈已提交，感谢你的留言！');
          document.getElementById('feedbackContent').value = '';
          document.getElementById('feedbackCharCount').textContent = '0';
          loadFeedbackList();
        } catch (e) {
          console.error('submitFeedback error:', e);
          if (e.message && e.message.indexOf('relation') !== -1) {
            showToast('反馈功能暂未开通，请联系管理员建表', 'error');
          } else {
            showToast('提交失败: ' + (e.message || '未知错误'), 'error');
          }
        }
      }

      async function loadFeedbackList() {
        var container = document.getElementById('feedbackList');
        container.innerHTML = '<div class="feedback-empty">加载中...</div>';

        var profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
        var isAdmin = profile.role === '超级管理员' || profile.role === '管理员';

        try {
          var query = window.db.from('feedback').select('*').order('created_at', { ascending: false });
          if (!isAdmin) {
            query = query.eq('user_id', profile.id);
          }
          var { data, error } = await query;
          if (error) throw error;

          if (!data || data.length === 0) {
            container.innerHTML = '<div class="feedback-empty">暂无反馈记录</div>';
            document.getElementById('feedbackHistoryTitle').textContent = isAdmin ? '所有反馈' : '我的反馈记录';
            return;
          }

          document.getElementById('feedbackHistoryTitle').textContent = isAdmin
            ? '所有反馈（' + data.length + '条）'
            : '我的反馈记录（' + data.length + '条）';

          var statusMap = { unread: '待处理', read: '已读', replied: '已回复' };
          var html = '';
          data.forEach(function (fb) {
            var time = fb.created_at ? fb.created_at.substring(0, 10) + ' ' + fb.created_at.substring(11, 16) : '';
            var statusLabel = statusMap[fb.status] || '待处理';
            html += '<div class="feedback-item" id="fbItem' + fb.id + '">';
            html += '<div class="feedback-item-meta">';
            html += '<span class="feedback-item-time">' + (isAdmin ? fb.user_name + ' · ' : '') + time + '</span>';
            html += '<span class="feedback-item-status ' + (fb.status || 'unread') + '">' + statusLabel + '</span>';
            html += '</div>';
            html += '<div class="feedback-item-content">' + escapeHtml(fb.content) + '</div>';
            if (fb.admin_reply) {
              html += '<div class="feedback-item-reply">';
              html += '<div class="feedback-item-reply-label">管理员回复</div>';
              html += '<div class="feedback-item-reply-text">' + escapeHtml(fb.admin_reply) + '</div>';
              html += '</div>';
            }
            // 管理员回复入口
            if (isAdmin) {
              html += '<div id="fbReplyForm' + fb.id + '" style="display:none;margin-top:8px;">';
              html +=
                '<textarea class="feedback-textarea" id="fbReplyText' +
                fb.id +
                '" placeholder="输入回复..." style="min-height:60px;"></textarea>';
              html += '<div style="display:flex;gap:8px;margin-top:6px;">';
              html +=
                '<button class="btn btn-primary" onclick="replyToFeedback(' +
                fb.id +
                ')" style="flex:1;">发送回复</button>';
              html +=
                '<button class="btn btn-secondary" onclick="cancelReply(' + fb.id + ')" style="flex:1;">取消</button>';
              html += '</div></div>';
              html +=
                '<button class="btn btn-secondary" id="fbReplyBtn' +
                fb.id +
                '" onclick="showReplyForm(' +
                fb.id +
                ')" style="margin-top:8px;width:100%;">回复</button>';
            }
            html += '</div>';
          });
          container.innerHTML = html;
        } catch (e) {
          console.error('loadFeedbackList error:', e);
          container.innerHTML = '<div class="feedback-empty">加载失败，请重试</div>';
        }
      }

      function showReplyForm(fbId) {
        document.getElementById('fbReplyForm' + fbId).style.display = 'block';
        document.getElementById('fbReplyBtn' + fbId).style.display = 'none';
      }

      function cancelReply(fbId) {
        document.getElementById('fbReplyForm' + fbId).style.display = 'none';
        document.getElementById('fbReplyBtn' + fbId).style.display = '';
        document.getElementById('fbReplyText' + fbId).value = '';
      }

      async function replyToFeedback(fbId) {
        var reply = document.getElementById('fbReplyText' + fbId).value.trim();
        if (!reply) {
          showToast('请输入回复内容');
          return;
        }
        try {
          var { error } = await window.db
            .from('feedback')
            .update({ admin_reply: reply, status: 'replied' })
            .eq('id', fbId);
          if (error) throw error;
          showToast('回复已发送');
          loadFeedbackList();
        } catch (e) {
          console.error('replyToFeedback error:', e);
          showToast('回复失败: ' + (e.message || '未知错误'), 'error');
        }
      }

      init();
    </script>
  </body>
</html>
