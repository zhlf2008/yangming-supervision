<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>个人中心 - 阳明心学督察管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #FAFAF8;
      --bg-card: #FFFFFF;
      --ink-dark: #2D2D2D;
      --ink-light: #5C5C5C;
      --ink-muted: #8A8A8A;
      --vermillion: #E63946;
      --vermillion-light: #FEE2E4;
      --gold: #D4A574;
      --gold-light: #F5EDE4;
      --border: #E8E4DF;
      --shadow: rgba(45, 45, 45, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--ink-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 100px;
    }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: var(--ink-dark);
      flex-shrink: 0;
    }

    .back-btn:active {
      background: var(--border);
    }

    .page-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink-dark);
    }

    /* User Profile Card */
    .profile-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(135deg, var(--vermillion-light) 0%, var(--gold-light) 100%);
      opacity: 0.5;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--vermillion) 0%, #C62828 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      color: white;
      margin: 0 auto 16px;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--ink-dark);
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .profile-role {
      font-size: 13px;
      color: var(--ink-muted);
      position: relative;
      z-index: 1;
    }

    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .profile-stat {
      text-align: center;
    }

    .profile-stat-value {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink-dark);
    }

    .profile-stat-label {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    /* Menu Section */
    .menu-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .menu-section-title {
      font-size: 12px;
      color: var(--ink-muted);
      padding: 14px 20px 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: var(--bg-primary);
    }

    .menu-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 14px;
    }

    .menu-item-icon.person { background: var(--vermillion-light); }
    .menu-item-icon.org { background: #E3F2FD; }
    .menu-item-icon.stats { background: #FFF3E0; }
    .menu-item-icon.notify { background: #F3E5F5; }
    .menu-item-icon.admin { background: #E3F2FD; }
    .menu-item-icon.help { background: #E8F5E9; }
    .menu-item-icon.about { background: #FFF8E1; }
    .menu-item-icon.logout { background: #FFEBEE; }

    .menu-item-content {
      flex: 1;
    }

    .menu-item-title {
      font-size: 15px;
      color: var(--ink-dark);
      font-weight: 500;
    }

    .menu-item-desc {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .menu-item-arrow {
      width: 20px;
      height: 20px;
      color: var(--ink-muted);
    }

    /* Version Info */
    .version-info {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .version-info span {
      display: block;
      margin-top: 4px;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--ink-muted);
      transition: color 0.2s, background-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .nav-item.active {
      color: var(--vermillion);
    }

    .nav-item:active {
      background-color: rgba(0, 0, 0, 0.05);
      opacity: 0.7;
    }

    .nav-item:hover {
      text-decoration: none;
    }

    .nav-icon {
      font-size: 20px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* Animations */
    .page-header { animation: fadeInDown 0.4s ease-out; }
    .profile-card { animation: fadeInUp 0.4s ease-out 0.05s backwards; }
    .menu-section { animation: fadeInUp 0.4s ease-out 0.1s backwards; }
    .menu-section:nth-child(3) { animation-delay: 0.15s; }
    .menu-section:nth-child(4) { animation-delay: 0.2s; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Edit Profile Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow: auto;
      animation: modalSlideUp 0.3s ease-out;
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-primary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      font-size: 20px;
    }

    .modal-close:hover {
      background: var(--border);
    }

    .modal-body {
      padding: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      background: var(--bg-primary);
      color: var(--ink-dark);
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--vermillion);
    }

    .form-input:disabled {
      background: var(--border);
      color: var(--ink-muted);
    }

    .form-hint {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    .form-error {
      font-size: 11px;
      color: var(--vermillion);
      margin-top: 4px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .modal-tab {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .modal-tab.active {
      background: var(--vermillion);
      border-color: var(--vermillion);
      color: white;
    }

    .modal-tab-content {
      display: none;
    }

    .modal-tab-content.active {
      display: block;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--vermillion);
      color: white;
    }

    .btn-primary:hover {
      background: #C62828;
    }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--ink-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-primary);
      color: var(--ink-dark);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink-dark);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      z-index: 2000;
      animation: toastFade 2s ease-out forwards;
    }

    .toast.success {
      background: #2E7D32;
    }

    .toast.error {
      background: var(--vermillion);
    }

    @keyframes toastFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Page Header -->
    <header class="page-header">
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <h1 class="page-title">个人中心</h1>
    </header>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-name" id="profileName">加载中...</div>
      <div class="profile-role" id="profileRole">-</div>

      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-value" id="profileFillCount">--</div>
          <div class="profile-stat-label">填报次数</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-value" id="profileOnlineRate">--</div>
          <div class="profile-stat-label">平均上线率</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-value" id="profileOrgCount">--</div>
          <div class="profile-stat-label">负责班级</div>
        </div>
      </div>
    </div>

    <!-- Account Section -->
    <div class="menu-section">
      <div class="menu-section-title">账户</div>

        <div class="menu-item-content">
          <div class="menu-item-title">编辑资料</div>

        <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <!-- Settings Section -->

      <div class="menu-section-title">设置</div>
      <div id="adminMenuItem" class="menu-item" onclick="goToSettings()" style="display:none;">

          <div class="menu-item-title">设置</div>
          <div class="menu-item-desc">学期、日程、考核、组织等</div>
        </div>
        <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" onclick="showHelp()">
        <div class="menu-item-icon help">❓</div>
        <div class="menu-item-content">
          <div class="menu-item-title">帮助与反馈</div>
          <div class="menu-item-desc">遇到问题？联系我们</div>
        </div>
        <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" onclick="showAbout()">
        <div class="menu-item-icon about">ℹ️</div>
        <div class="menu-item-content">
          <div class="menu-item-title">关于系统</div>
          <div class="menu-item-desc">版本信息与相关说明</div>

        <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <!-- Logout -->

        <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <!-- Version Info -->

      阳明心学督察管理系统 v1.0.0

  <!-- Edit Profile Modal -->

      </div>
      <div class="modal-body">

          <button class="modal-tab active" onclick="switchEditTab('info')" id="tabInfo">基本信息</button>

        <!-- 基本信息 Tab -->
        <div class="modal-tab-content active" id="contentInfo">

            <label class="form-label">姓名</label>

          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="editPhone" placeholder="请输入手机号" maxlength="11">

          </div>

            <label class="form-label">确认新密码</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入新密码">
            <div class="form-error" id="confirmPwdError"></div>
          </div>

      <div class="modal-footer">

    </a>
  </nav>

<script src="js/utils.js"></script>
<script>
    async function init() {
      await waitForDb();

      // Check if logged in via supabase_user
      const userData = localStorage.getItem('supabase_user');
      if (!userData) {
        window.location.href = 'login.html';
        return;
      }

      const profile = JSON.parse(userData);
      const userName = profile.name || '未知';
      const userRole = profile.role || '';

      // Update profile display
      document.getElementById('profileName').textContent = userName;
      document.getElementById('profileAvatar').textContent = userName.charAt(0);

      // Update role display
      document.querySelector('.profile-role').textContent = userRole;

      // Update phone if exists
      if (profile.phone) {
        document.querySelector('.profile-phone').textContent = profile.phone;
      }

      // 检查是否是管理员，显示设置入口
      if (profile.role.includes('管理员') {
        document.getElementById('adminMenuItem').style.display = 'flex';
      }

      // Load profile stats
      await loadProfileStats(profile);
    }

    async function loadProfileStats(profile) {
      // Get user's attendance records count
      let query = window.db.from('attendance_records').select('*', { count: 'exact', head: true });

      if (profile.role.includes('小组督察' || profile.role.includes('小组副督察') {
        query = query.eq('organization_id', profile.organization_id);
      } else if (profile.role.includes('班级总督察' || profile.role.includes('班级副总督察') {
        const { data: childOrgs } = await window.db.from('organizations').select('id').or(`id.eq.${profile.organization_id},parent_id.eq.${profile.organization_id}`);
        const orgIds = childOrgs?.map(o => o.id) || [];
        if (orgIds.length > 0) {
          query = query.in('organization_id', orgIds);
        }
      } else if (profile.role.includes('大班总督' || profile.role.includes('大班副督') {
        const { data: childOrgs } = await window.db.from('organizations').select('id').or(`parent_id.eq.${profile.organization_id},id.eq.${profile.organization_id}`);
        const orgIds = childOrgs?.map(o => o.id) || [];
        if (orgIds.length > 0) {
          query = query.in('organization_id', orgIds);
        }
      }

      const { count, error } = await query;
      document.getElementById('profileFillCount').textContent = count || 0;

      // Get all records for rate calculation
      const { data: records } = await window.db.from('attendance_records').select('fill_data');
      if (records && records.length > 0) {
        let total = records.length;
        let onlineCount = 0;
        records.forEach(r => {
          const fillData = r.fill_data || {};
          if (fillData.online_status === '是' || fillData.online_status === true) onlineCount++;
        });
        const onlineRate = total > 0 ? ((onlineCount / total) * 100).toFixed(0) : '0';
        document.getElementById('profileOnlineRate').textContent = onlineRate + '%';
      } else {
        document.getElementById('profileOnlineRate').textContent = '--';
      }

      // Count organizations user is responsible for
      if (profile.role.includes('小组督察' || profile.role.includes('小组副督察') {
        document.getElementById('profileOrgCount').textContent = '1';
      } else if (profile.role.includes('班级总督察' || profile.role.includes('班级副总督察') {
        const { data: childGroups } = await window.db.from('organizations').select('id', { count: 'exact' }).eq('parent_id', profile.organization_id);
        document.getElementById('profileOrgCount').textContent = (childGroups?.length || 0) + 1;
      } else if (profile.role.includes('大班总督' || profile.role.includes('大班副督') {
        const { data: childOrgs } = await window.db.from('organizations').select('id', { count: 'exact' }).or(`parent_id.eq.${profile.organization_id},id.eq.${profile.organization_id}`);
        document.getElementById('profileOrgCount').textContent = childOrgs?.length || 0;
      } else {
        document.getElementById('profileOrgCount').textContent = '--';
      }
    }

    function goToSettings() {
      window.location.href = 'semester-settings.html';
    }

    function editProfile() {
      const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');

      // 填充当前信息
      document.getElementById('editName').value = profile.name || '';
      document.getElementById('editPhone').value = profile.phone || '';

      // 重置表单状态
      clearEditErrors();
      switchEditTab('info');

      // 显示模态框
      document.getElementById('editProfileModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editProfileModal').classList.remove('active');
    }

    function switchEditTab(tab) {
      // 更新 Tab 样式
      document.getElementById('tabInfo').classList.toggle('active', tab === 'info');
      document.getElementById('tabPassword').classList.toggle('active', tab === 'password');

      // 更新内容显示
      document.getElementById('contentInfo').classList.toggle('active', tab === 'info');
      document.getElementById('contentPassword').classList.toggle('active', tab === 'password');

      clearEditErrors();
    }

    function clearEditErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    async function saveProfile() {
      const activeTab = document.querySelector('.modal-tab.active').id;

      if (activeTab === 'tabInfo') {
        await saveProfileInfo();
      } else {
        await savePassword();
      }
    }

    async function saveProfileInfo() {
      const name = document.getElementById('editName').value.trim();
      const phone = document.getElementById('editPhone').value.trim();

      // 验证
      clearEditErrors();
      let hasError = false;

      if (!name) {
        document.getElementById('nameError').textContent = '请输入姓名';
        document.getElementById('nameError').classList.add('show');
        hasError = true;
      }

      if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
        document.getElementById('phoneError').textContent = '请输入正确的手机号';
        document.getElementById('phoneError').classList.add('show');
        hasError = true;
      }

      if (hasError) return;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
        const userId = profile.id;

        console.log('[saveProfileInfo] profile:', profile);
        console.log('[saveProfileInfo] userId:', userId);

        // 比较原始值（profile.phone 可能是 null vs 空字符串）
        const originalPhone = profile.phone || '';
        const phoneChanged = phone !== originalPhone;

        // 如果没有变化，直接关闭
        if (name === profile.name && !phoneChanged) {
          showToast('没有修改');
          closeEditModal();
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
          return;
        }

        // 如果手机号变化，先更新 auth.users（登录凭证）
        if (phoneChanged || name !== profile.name) {
          console.log('[saveProfileInfo] updating auth.users');
          const newEmail = `p${phone}@supabase.io`;
          console.log('[saveProfileInfo] newEmail:', newEmail);
          const result = await adminApi.updateUser(userId, { email: newEmail, name: name, phone: phone });
          console.log('[saveProfileInfo] adminApi updateUser result:', result);
          if (result.error) {
            showToast('更新登录信息失败：' + result.error, 'error');
            saveBtn.disabled = false;
            saveBtn.textContent = '保存';
            return;
          }
        }

        // 构建 profiles 更新数据
        const updateData = {};
        if (name !== profile.name) {
          updateData.name = name;
        }
        if (phoneChanged) {
          updateData.phone = phone || null;
        }

        // 更新 profiles 表
        console.log('[saveProfileInfo] updating profiles with:', updateData);
        const { error } = await window.db
          .from('profiles')
          .update(updateData)
          .eq('id', userId);

        console.log('[saveProfileInfo] profiles error:', error);
        if (error) throw error;

        // 更新本地存储
        profile.name = name;
        profile.phone = phone || null;
        localStorage.setItem('supabase_user', JSON.stringify(profile));

        // 更新页面显示
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileAvatar').textContent = name.charAt(0);
        document.querySelector('.profile-phone').textContent = phone || '-';

        showToast('资料更新成功');
        closeEditModal();

      } catch (err) {
        console.error('Update profile error:', err);
        showToast('更新失败：' + (err.message || '请重试'), 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
      }
    }

    async function savePassword() {
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // 验证
      clearEditErrors();
      let hasError = false;

      if (!currentPassword) {
        document.getElementById('currentPwdError').textContent = '请输入当前密码';
        document.getElementById('currentPwdError').classList.add('show');
        hasError = true;
      }

      if (!newPassword) {
        document.getElementById('newPwdError').textContent = '请输入新密码';
        document.getElementById('newPwdError').classList.add('show');
        hasError = true;
      } else if (newPassword.length < 6) {
        document.getElementById('newPwdError').textContent = '密码长度至少6位';
        document.getElementById('newPwdError').classList.add('show');
        hasError = true;
      }

      if (newPassword !== confirmPassword) {
        document.getElementById('confirmPwdError').textContent = '两次输入的密码不一致';
        document.getElementById('confirmPwdError').classList.add('show');
        hasError = true;
      }

      if (hasError) return;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        // 验证当前密码 - 通过重新登录验证
        const profile = JSON.parse(localStorage.getItem('supabase_user') || '{}');
        // 邮箱格式为 p{phone}@supabase.io
        const phone = profile.phone;
        if (!phone) {
          throw new Error('无法获取用户手机号信息');
        }
        const email = `p${phone}@supabase.io`;

        // 尝试用当前密码登录验证
        const { error: signInError } = await window.supabaseClient.auth.signInWithPassword({
          email: email,
          password: currentPassword
        });

        if (signInError) {
          document.getElementById('currentPwdError').textContent = '当前密码错误';
          document.getElementById('currentPwdError').classList.add('show');
          throw signInError;
        }

        // 密码验证通过，更新密码
        const { error: updateError } = await window.supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (updateError) throw updateError;

        // 清空密码表单
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';

        showToast('密码修改成功');
        closeEditModal();

      } catch (err) {
        console.error('Update password error:', err);
        if (!err.message.includes('当前密码')) {
          showToast('修改失败：' + (err.message || '请重试'), 'error');
        }
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
      }
    }
