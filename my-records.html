<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>我的填报记录 - 阳明心学督察管理系统</title>
    <!-- 快速session检查：新设备无session则直接跳转登录，避免闪现页面 -->
    <script>
      (function(){
        var supabaseKey = "sb-whvjfurrkusdwujjodwc-auth-token";
        var raw = localStorage.getItem(supabaseKey);
        if (!raw) { window.location.replace("login.html"); return; }
        try {
          var session = JSON.parse(raw);
          if (!session || !session.access_token) { window.location.replace("login.html"); }
        } catch(e) {
          window.location.replace("login.html");
        }
      })();
    </script>
    <link rel="preconnect" href="https://whvjfurrkusdwujjodwc.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 100px;
      }
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--ink-dark);
      }
      .back-btn:active {
        background: var(--border);
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 18px;
        font-weight: 600;
      }
      .record-item {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }
      .record-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .record-date {
        font-size: 14px;
        font-weight: 500;
      }
      .record-time {
        font-size: 11px;
        color: var(--ink-muted);
      }
      .record-org {
        font-size: 12px;
        color: var(--ink-muted);
        margin-bottom: 8px;
      }
      .record-stats {
        display: flex;
        gap: 16px;
        font-size: 13px;
      }
      .record-stat span {
        font-weight: 600;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
      }
      .record-stat .up {
        color: #2e7d32;
      }
      .record-stat .mid {
        color: var(--ink-dark);
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--ink-muted);
        font-size: 14px;
      }
      .info-bar {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
      }
      .info-bar span {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <a
          href="profile.html?system=supervision"
          class="back-btn"
          aria-label="返回"
          onclick="
            event.preventDefault();
            window.history.back();
          "
          >&lt;</a
        >
        <h1 class="page-title">我的填报记录</h1>
      </div>
      <div class="info-bar">
        <span id="infoName">加载中...</span>
        <span id="infoCount" style="color: var(--ink-muted)"></span>
      </div>
      <div id="recordList">
        <div class="empty-state">加载中...</div>
      </div>
    </div>
    <div id="bottomNavContainer"></div>
    <script src="js/supabase-config.js?v=7"></script>
    <script src="js/utils.js?v=7"></script>
    <script src="js/components.js?v=7"></script>
    <script>
      var activeSystem = typeof getActiveSystem === 'function' ? getActiveSystem() : 'supervision';
      // utils.js 的 auto-init 已根据 ?from= 设置了返回按钮，
      // 若无 from 参数则默认回到 profile
      var backLink = document.querySelector('.back-btn');
      if (backLink && !getFromParam()) backLink.href = 'profile.html?system=' + encodeURIComponent(activeSystem);
      if (activeSystem === 'secretariat' || activeSystem === 'study') {
        renderModuleBottomNav(activeSystem, 'profile');
      } else if (activeSystem === 'portal') {
        renderPortalBottomNav('profile');
      } else {
        renderBottomNav('profile');
      }
    </script>
    <script>
      var currentUser = null;
      var currentSemesterId = null;

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;
        var ok = await guardSupervisionAccess();
        if (!ok) return;
        currentSemesterId = await getCurrentSemesterId();
        document.getElementById('infoName').textContent = currentUser.name || '';
        await loadRecords();
      }

      async function loadRecords() {
        // 先查记录
        var { data: records, error } = await window.db
          .from('attendance_records')
          .select('*')
          .eq('fill_user_id', currentUser.id)
          .order('created_at', { ascending: false })
          .limit(200);

        if (error || !records || records.length === 0) {
          document.getElementById('recordList').innerHTML = '<div class="empty-state">暂无填报记录</div>';
          document.getElementById('infoCount').textContent = '0条';
          return;
        }

        // 查当前学期日程日期和 item_ids（用于公式匹配）
        var scheduleIds = [
          ...new Set(
            records.map(function (r) {
              return r.schedule_id;
            })
          )
        ];
        var { data: schedules } = await window.db
          .from('schedules')
          .select('id,schedule_date,item_ids')
          .in('id', scheduleIds)
          .eq('semester_id', currentSemesterId);
        var currentScheduleIds = new Set((schedules || []).map(function(s) { return s.id; }));
        records = records.filter(function(r) { return currentScheduleIds.has(r.schedule_id); });
        if (!records.length) {
          document.getElementById('recordList').innerHTML = '<div class="empty-state">当前学期暂无填报记录</div>';
          document.getElementById('infoCount').textContent = '0条';
          return;
        }
        var dateMap = {};
        var schedMap = {};
        (schedules || []).forEach(function (s) {
          dateMap[s.id] = s.schedule_date;
          schedMap[s.id] = s;
        });

        // 加载当前学期考核类型公式
        var { data: assessmentTypes } = currentSemesterId
          ? await window.db.from('assessment_types').select('*').eq('semester_id', currentSemesterId)
          : { data: [] };
        assessmentTypes = assessmentTypes || [];

        // 建立日程→公式映射
        function getScheduleFormulas(s) {
          var result = { online: null, video: null, hw: null };
          if (!s || !s.item_ids) return result;
          var ids = s.item_ids.split(',').map(Number).filter(Boolean);
          ids.forEach(function (id) {
            var at = null;
            assessmentTypes.forEach(function (t) {
              if (t.id === id) at = t;
            });
            if (!at || !at.formula) return;
            var name = at.type_name || '';
            if (name.indexOf('上线率') !== -1) result.online = at.formula;
            else if (name.indexOf('视频率') !== -1) result.video = at.formula;
            else if (name.indexOf('作业率') !== -1) result.hw = at.formula;
          });
          return result;
        }

        function hasMult100(f) {
          return f && (f.indexOf('*100') !== -1 || f.indexOf('×100') !== -1);
        }

        // 加载组织信息
        var orgIds = [
          ...new Set(
            records.map(function (r) {
              return r.organization_id;
            })
          )
        ];
        var { data: orgs } = await window.db.from('organizations').select('id,name').in('id', orgIds);
        var orgMap = {};
        (orgs || []).forEach(function (o) {
          orgMap[o.id] = o.name;
        });

        // 加载填报人信息
        var userIds = [
          ...new Set(
            records
              .map(function (r) {
                return r.fill_user_id;
              })
              .filter(Boolean)
          )
        ];
        var userMap = {};
        if (userIds.length > 0) {
          var { data: profiles } = await window.db.from('profiles').select('id,name').in('id', userIds);
          (profiles || []).forEach(function (p) {
            userMap[p.id] = p.name;
          });
        }

        document.getElementById('infoCount').textContent = records.length + '条记录';

        var html = '';
        records.forEach(function (r) {
          var fd = r.fill_data || {};
          var fieldMap = {};
          Object.keys(fd).forEach(function (k) {
            fieldMap[k] = parseInt(fd[k]) || 0;
          });

          var formulas = getScheduleFormulas(schedMap[r.schedule_id]);

          var calcOnline = null,
            calcVideo = null,
            calcHw = null;
          if (formulas.online) {
            var ro = calcFormula(formulas.online, fieldMap);
            if (ro != null) calcOnline = ro * (hasMult100(formulas.online) ? 1 : 100);
          }
          if (formulas.video) {
            var rv = calcFormula(formulas.video, fieldMap);
            if (rv != null) calcVideo = rv * (hasMult100(formulas.video) ? 1 : 100);
          }
          if (formulas.hw) {
            var rh = calcFormula(formulas.hw, fieldMap);
            if (rh != null) calcHw = rh * (hasMult100(formulas.hw) ? 1 : 100);
          }

          var dateStr = dateMap[r.schedule_id] || (r.created_at || '').slice(0, 10);
          var timeStr = r.created_at
            ? new Date(r.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            : '';
          var orgName = orgMap[r.organization_id] || '';

          var statsHtml = '';
          if (calcOnline != null) {
            statsHtml += '<div class="record-stat">上线率<span class="up"> ' + calcOnline.toFixed(1) + '%</span></div>';
          }
          if (calcHw != null) {
            statsHtml += '<div class="record-stat">作业率<span class="mid"> ' + calcHw.toFixed(1) + '%</span></div>';
          }
          if (calcVideo != null) {
            statsHtml += '<div class="record-stat">视频率<span class="up"> ' + calcVideo.toFixed(1) + '%</span></div>';
          }

          html +=
            '<div class="record-item">' +
            '<div class="record-header">' +
            '<span class="record-date">' +
            dateStr +
            '</span>' +
            '<span class="record-time">' +
            timeStr +
            '</span>' +
            '</div>' +
            '<div class="record-org">' +
            escapeHtml(userMap[r.fill_user_id] || '') +
            ' · ' +
            escapeHtml(orgName) +
            '</div>' +
            (statsHtml
              ? '<div class="record-stats">' + statsHtml + '</div>'
              : '<div class="record-stats" style="font-size:13px;color:var(--ink-muted)">无需考核</div>') +
            '</div>';
        });
        document.getElementById('recordList').innerHTML = html;
      }

      init();
    </script>
  </body>
</html>
