<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学期课程表</title>
    <link rel="stylesheet" href="css/common.css?v=10" />
    <style>
      .page-copy { color: var(--ink-muted); font-size: 13px; line-height: 1.7; margin-top: 6px; }
      .semester-summary { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
      .semester-title { font-size: 18px; font-weight: 700; color: var(--ink-dark); }
      .semester-range { color: var(--ink-light); font-size: 13px; margin-top: 4px; }
      .schedule-day { border: 1px solid var(--border); border-radius: 12px; background: var(--bg-card); margin-bottom: 12px; overflow: hidden; }
      .schedule-day-head { padding: 11px 14px; background: var(--bg-primary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .schedule-date { font-size: 14px; font-weight: 700; color: var(--ink-dark); }
      .schedule-count { font-size: 12px; color: var(--ink-muted); }
      .schedule-item { padding: 13px 14px; border-bottom: 1px solid var(--border-light); }
      .schedule-item:last-child { border-bottom: 0; }
      .schedule-item-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
      .schedule-item-title { font-weight: 650; color: var(--ink-dark); line-height: 1.5; }
      .schedule-item-source { margin-top: 3px; font-size: 12px; color: var(--gold-dark); }
      .schedule-item-content { margin-top: 8px; color: var(--ink-light); font-size: 13px; line-height: 1.65; white-space: pre-wrap; }
      .schedule-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .schedule-day-empty { padding: 14px; color: var(--ink-muted); font-size: 13px; }
      .week-switcher { display: grid; grid-template-columns: auto minmax(150px, 1fr) auto auto; gap: 8px; align-items: center; margin-bottom: 12px; }
      .week-current { min-width: 0; text-align: center; }
      .week-label { color: var(--ink-dark); font-size: 15px; font-weight: 700; }
      .week-range { margin-top: 2px; color: var(--ink-muted); font-size: 12px; }
      .inherit-note { margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: var(--gold-light); color: var(--ink-light); font-size: 12px; line-height: 1.65; }
      .empty-state { text-align: center; padding: 38px 10px; color: var(--ink-muted); }
      .modal-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,.42); align-items: center; justify-content: center; padding: 18px; }
      .modal-overlay.show { display: flex; }
      .modal { width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; border-radius: 14px; background: var(--bg-card); box-shadow: 0 14px 40px rgba(0,0,0,.18); }
      .modal-head { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); }
      .modal-title { font-size: 18px; font-weight: 700; color: var(--ink-dark); }
      .modal-body { padding: 16px 20px; }
      .modal-foot { padding: 0 20px 20px; display: flex; gap: 10px; }
      .modal-foot .btn { flex: 1; }
      .form-item { margin-bottom: 14px; }
      .form-label { display: block; font-size: 13px; color: var(--ink-light); margin-bottom: 6px; font-weight: 600; }
      .form-input { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--bg-card); color: var(--ink-dark); font: inherit; }
      textarea.form-input { min-height: 92px; resize: vertical; line-height: 1.6; }
      .form-input:focus { outline: none; border-color: var(--vermillion); box-shadow: 0 0 0 3px var(--vermillion-light); }
      .form-hint { font-size: 12px; color: var(--ink-muted); margin-top: 5px; line-height: 1.55; }
      @media (max-width: 520px) {
        .schedule-item-head { display: block; }
        .schedule-item-actions { margin-top: 10px; }
        .week-switcher { grid-template-columns: 1fr 1fr 1fr; }
        .week-current { grid-column: 1 / -1; grid-row: 1; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-semesters.html" aria-label="返回学期管理"></a>
        <h1 class="page-title">学期课程表</h1>
      </header>

      <section class="section">
        <div class="semester-summary">
          <div>
            <div class="semester-title" id="semesterTitle">正在加载...</div>
            <div class="semester-range" id="semesterRange"></div>
            <div class="page-copy">系统根据试晨读开始日（如有）或学期开始日，自动生成至学期结束日的全部日期。所有大班、班级和小组的“课程”页都会继承已设置的课程内容；组织自行设置内容后，以组织内容为准。</div>
          </div>
        </div>
        <div class="inherit-note">日期由学期自动生成，无需新增日程。同一天可安排多门课程；引用课程库后会自动使用章节标题、原文和思考题。</div>
      </section>

      <section class="section">
        <div id="semesterScheduleWeekSwitcher"></div>
        <div class="section-header">
          <div class="section-title">课程日程</div>
          <div class="schedule-count" id="scheduleTotal">0 项</div>
        </div>
        <div id="scheduleList" class="empty-state">正在加载...</div>
      </section>
    </div>

    <div class="modal-overlay" id="scheduleModal">
      <div class="modal">
        <div class="modal-head"><div class="modal-title" id="scheduleModalTitle">新增课程日程</div></div>
        <div class="modal-body">
          <input type="hidden" id="scheduleId" />
          <div class="form-item">
            <label class="form-label" for="scheduleDate">日程日期</label>
            <input class="form-input" type="date" id="scheduleDate" disabled />
            <div class="form-hint">日期由学期范围自动生成，不可手动修改。</div>
          </div>
          <div class="form-item">
            <label class="form-label" for="courseInput">引用课程库</label>
            <select class="form-input" id="courseInput" onchange="onCourseChange()"></select>
            <div class="form-hint">可直接选课程库章节；不选择时需填写自定义标题、内容或思考题。</div>
          </div>
          <div class="form-item">
            <label class="form-label" for="customTitle">自定义标题</label>
            <input class="form-input" id="customTitle" placeholder="留空则使用课程库标题" />
          </div>
          <div class="form-item">
            <label class="form-label" for="customContent">自定义课程内容</label>
            <textarea class="form-input" id="customContent" placeholder="留空则使用课程库原文"></textarea>
          </div>
          <div class="form-item">
            <label class="form-label" for="customQuestion">自定义思考题</label>
            <textarea class="form-input" id="customQuestion" placeholder="留空则使用课程库思考题"></textarea>
          </div>
          <div class="form-item">
            <label class="form-label" for="scheduleNote">备注</label>
            <input class="form-input" id="scheduleNote" placeholder="仅用于课程表管理" />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-cancel" onclick="closeScheduleModal()">取消</button>
          <button class="btn btn-primary" id="saveScheduleBtn" onclick="saveSchedule()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>
    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=18"></script>
    <script>
      mountWeekSwitcher('semesterScheduleWeekSwitcher', {
        previousId: 'prevWeekBtn',
        nextId: 'nextWeekBtn',
        labelId: 'weekLabel',
        rangeId: 'weekRange',
        onPrevious: 'changeScheduleWeek(-1)',
        onNext: 'changeScheduleWeek(1)',
        onCurrent: 'goCurrentScheduleWeek()'
      });
      renderPortalBottomNav('home');
    </script>
    <script>
      var params = new URLSearchParams(location.search);
      var semesterId = Number(params.get('semester_id')) || null;
      var semester = null;
      var courseGroups = [];
      var courses = [];
      var coursesById = {};
      var scheduleRows = [];
      var scheduleWeekMonday = null;

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var profile = checkLogin();
        if (!profile) return;
        if (profile.role !== '超级管理员' && profile.role !== '管理员') {
          showToast('仅平台管理员可维护学期课程表', 'error');
          setTimeout(function() { location.href = 'secretariat-semesters.html'; }, 1200);
          return;
        }
        if (!semesterId) {
          showToast('缺少学期参数', 'error');
          return;
        }
        await Promise.all([loadSemester(), loadCourseLibrary()]);
        await loadScheduleRows();
      }

      async function loadSemester() {
        var result = await window.db.from('semesters').select('*').eq('id', semesterId).maybeSingle();
        if (result.error || !result.data) throw result.error || new Error('学期不存在');
        semester = result.data;
        document.getElementById('semesterTitle').textContent = semester.semester_name;
        document.getElementById('semesterRange').textContent = semester.start_date + ' 至 ' + semester.end_date;
        document.getElementById('scheduleDate').min = semester.trial_start_date || semester.start_date;
        document.getElementById('scheduleDate').max = semester.end_date;
        initializeScheduleWeek();
        document.title = semester.semester_name + ' - 课程表';
      }

      async function loadCourseLibrary() {
        var results = await Promise.all([
          window.db.from('study_courses').select('id,title,sort_order').eq('is_active', true).order('sort_order').order('id'),
          window.db.from('study_course_library').select('*').eq('is_active', true).order('sort_order').order('id')
        ]);
        if (results[0].error) throw results[0].error;
        if (results[1].error) throw results[1].error;
        courseGroups = results[0].data || [];
        courses = results[1].data || [];
        coursesById = {};
        courses.forEach(function(course) { coursesById[Number(course.id)] = course; });
        renderCourseOptions();
      }

      function renderCourseOptions() {
        var html = '<option value="">不引用课程库</option>';
        courseGroups.forEach(function(group) {
          var children = courses.filter(function(course) { return Number(course.course_id) === Number(group.id); });
          if (!children.length) return;
          html += '<optgroup label="' + escapeHtml(group.title) + '">';
          children.forEach(function(course) {
            var title = course.chapter_title || course.theme || course.title || '未命名课程';
            html += '<option value="' + course.id + '">' + escapeHtml(title) + '</option>';
          });
          html += '</optgroup>';
        });
        document.getElementById('courseInput').innerHTML = html;
      }

      async function loadScheduleRows() {
        var result = await window.db
          .from('study_semester_course_schedule')
          .select('*')
          .eq('semester_id', semesterId)
          .order('schedule_date')
          .order('sort_order')
          .order('id');
        if (result.error) {
          showToast('加载课程表失败：' + (result.error.message || '未知错误'), 'error');
          return;
        }
        scheduleRows = result.data || [];
        renderScheduleRows();
      }

      function resolveRow(row) {
        var course = row.course_id ? coursesById[Number(row.course_id)] : null;
        var group = course ? courseGroups.find(function(item) { return Number(item.id) === Number(course.course_id); }) : null;
        return {
          title: row.custom_title || (course ? (course.chapter_title || course.theme || course.title) : '未命名课程'),
          source: group ? group.title : (course ? '课程库' : '自定义课程'),
          content: row.custom_content || (course ? course.study_content : ''),
          question: row.custom_question || (course ? course.thinking_questions : '')
        };
      }

      function formatDate(dateText) {
        var date = new Date(dateText + 'T00:00:00');
        var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
        return String(date.getMonth() + 1).padStart(2, '0') + '月' + String(date.getDate()).padStart(2, '0') + '日 ' + weekdays[date.getDay()];
      }

      function getSemesterDates() {
        if (!semester) return [];
        var dates = [];
        var cursor = new Date((semester.trial_start_date || semester.start_date) + 'T00:00:00');
        var end = new Date(semester.end_date + 'T00:00:00');
        while (cursor <= end) {
          dates.push(
            cursor.getFullYear() + '-' +
            String(cursor.getMonth() + 1).padStart(2, '0') + '-' +
            String(cursor.getDate()).padStart(2, '0')
          );
          cursor.setDate(cursor.getDate() + 1);
        }
        return dates;
      }

      function getMonday(date) {
        var result = new Date(date);
        var day = result.getDay();
        result.setDate(result.getDate() - (day === 0 ? 6 : day - 1));
        result.setHours(0, 0, 0, 0);
        return result;
      }

      function initializeScheduleWeek() {
        if (!semester) return;
        var today = new Date();
        var semesterStart = new Date((semester.trial_start_date || semester.start_date) + 'T00:00:00');
        var semesterEnd = new Date(semester.end_date + 'T00:00:00');
        if (today < semesterStart) today = semesterStart;
        if (today > semesterEnd) today = semesterEnd;
        scheduleWeekMonday = getMonday(today);
      }

      function dateToString(date) {
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
      }

      function getSelectedWeekRange() {
        if (!scheduleWeekMonday) initializeScheduleWeek();
        var monday = new Date(scheduleWeekMonday);
        var sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        return { monday: monday, sunday: sunday, start: dateToString(monday), end: dateToString(sunday) };
      }

      function computeWeekLabel(monday) {
        var formalMonday = getMonday(new Date(semester.start_date + 'T00:00:00'));
        if (semester.trial_start_date && monday < formalMonday) {
          var trialMonday = getMonday(new Date(semester.trial_start_date + 'T00:00:00'));
          return '试晨读第' + (Math.floor((monday - trialMonday) / (7 * 86400000)) + 1) + '周';
        }
        return '第' + (Math.floor((monday - formalMonday) / (7 * 86400000)) + 1) + '周';
      }

      function updateWeekSwitcher(range) {
        document.getElementById('weekLabel').textContent = computeWeekLabel(range.monday);
        document.getElementById('weekRange').textContent =
          (range.monday.getMonth() + 1) + '/' + range.monday.getDate() + ' - ' +
          (range.sunday.getMonth() + 1) + '/' + range.sunday.getDate();
        var firstMonday = getMonday(new Date((semester.trial_start_date || semester.start_date) + 'T00:00:00'));
        var lastMonday = getMonday(new Date(semester.end_date + 'T00:00:00'));
        document.getElementById('prevWeekBtn').disabled = range.monday <= firstMonday;
        document.getElementById('nextWeekBtn').disabled = range.monday >= lastMonday;
      }

      function changeScheduleWeek(delta) {
        var next = new Date(scheduleWeekMonday);
        next.setDate(next.getDate() + Number(delta) * 7);
        scheduleWeekMonday = next;
        renderScheduleRows();
      }

      function goCurrentScheduleWeek() {
        initializeScheduleWeek();
        renderScheduleRows();
      }

      function renderScheduleRows() {
        var range = getSelectedWeekRange();
        updateWeekSwitcher(range);
        var semesterDates = getSemesterDates().filter(function(date) { return date >= range.start && date <= range.end; });
        var weeklyRows = scheduleRows.filter(function(row) { return row.schedule_date >= range.start && row.schedule_date <= range.end; });
        document.getElementById('scheduleTotal').textContent = '本周已设置 ' + weeklyRows.length + ' 门 · ' + semesterDates.length + ' 天';
        var container = document.getElementById('scheduleList');
        if (!semesterDates.length) {
          container.innerHTML = '<div class="empty-state">学期缺少有效的起止日期。</div>';
          return;
        }
        var grouped = {};
        scheduleRows.forEach(function(row) {
          if (!grouped[row.schedule_date]) grouped[row.schedule_date] = [];
          grouped[row.schedule_date].push(row);
        });
        container.innerHTML = semesterDates.map(function(date) {
          var rows = grouped[date] || [];
          return '<div class="schedule-day"><div class="schedule-day-head"><div><div class="schedule-date">' + formatDate(date) + '</div><div class="schedule-count">' + (rows.length ? rows.length + ' 门课程' : '未设置课程') + '</div></div>' +
            '<button class="btn btn-primary btn-sm" onclick="showScheduleModal(\'' + date + '\')">' + (rows.length ? '添加课程' : '设置课程') + '</button></div>' +
            (rows.length ? rows.map(function(row) {
              var resolved = resolveRow(row);
              var detail = resolved.content || resolved.question;
              var preview = detail && detail.length > 220 ? detail.slice(0, 220) + '…' : detail;
              return '<div class="schedule-item"><div class="schedule-item-head"><div><div class="schedule-item-title">' + escapeHtml(resolved.title) + '</div><div class="schedule-item-source">' + escapeHtml(resolved.source) + '</div></div>' +
                '<div class="schedule-item-actions"><button class="btn btn-secondary btn-sm" onclick="editSchedule(' + row.id + ')">编辑</button><button class="btn btn-danger btn-sm" onclick="deleteSchedule(' + row.id + ')">删除</button></div></div>' +
                (preview ? '<div class="schedule-item-content">' + escapeHtml(preview) + '</div>' : '') +
                (row.note ? '<div class="schedule-item-source">备注：' + escapeHtml(row.note) + '</div>' : '') + '</div>';
            }).join('') : '<div class="schedule-day-empty">该日期尚未安排课程。</div>') + '</div>';
        }).join('');
      }

      function showScheduleModal(target) {
        var row = target && typeof target === 'object' ? target : null;
        var date = typeof target === 'string' ? target : (row ? row.schedule_date : '');
        document.getElementById('scheduleId').value = row ? row.id : '';
        document.getElementById('scheduleDate').value = date;
        document.getElementById('courseInput').value = row && row.course_id ? String(row.course_id) : '';
        document.getElementById('customTitle').value = row ? (row.custom_title || '') : '';
        document.getElementById('customContent').value = row ? (row.custom_content || '') : '';
        document.getElementById('customQuestion').value = row ? (row.custom_question || '') : '';
        document.getElementById('scheduleNote').value = row ? (row.note || '') : '';
        document.getElementById('scheduleModalTitle').textContent = row ? '编辑课程' : formatDate(date) + ' · 设置课程';
        document.getElementById('scheduleModal').classList.add('show');
      }

      function closeScheduleModal() {
        document.getElementById('scheduleModal').classList.remove('show');
      }

      function onCourseChange() {
        var course = coursesById[Number(document.getElementById('courseInput').value)];
        if (!course) return;
        if (!document.getElementById('customTitle').value.trim()) document.getElementById('customTitle').value = course.chapter_title || course.theme || course.title || '';
      }

      function editSchedule(id) {
        var row = scheduleRows.find(function(item) { return Number(item.id) === Number(id); });
        if (row) showScheduleModal(row);
      }

      async function saveSchedule() {
        var id = Number(document.getElementById('scheduleId').value) || null;
        var date = document.getElementById('scheduleDate').value;
        var courseId = Number(document.getElementById('courseInput').value) || null;
        var title = document.getElementById('customTitle').value.trim();
        var content = document.getElementById('customContent').value.trim();
        var question = document.getElementById('customQuestion').value.trim();
        if (!date) { showToast('请选择日程日期', 'error'); return; }
        if (semester && (date < (semester.trial_start_date || semester.start_date) || date > semester.end_date)) {
          showToast('日程日期必须在学期范围内', 'error'); return;
        }
        if (!courseId && !title && !content && !question) {
          showToast('请选择课程或填写自定义内容', 'error'); return;
        }
        var button = document.getElementById('saveScheduleBtn');
        button.disabled = true;
        try {
          var sameDay = scheduleRows.filter(function(row) { return row.schedule_date === date && Number(row.id) !== Number(id); });
          var user = getCurrentUser();
          var payload = {
            semester_id: semesterId,
            schedule_date: date,
            course_id: courseId,
            custom_title: title || null,
            custom_content: content || null,
            custom_question: question || null,
            note: document.getElementById('scheduleNote').value.trim() || null,
            sort_order: id ? ((scheduleRows.find(function(row) { return Number(row.id) === id; }) || {}).sort_order || 0) : (sameDay.length + 1) * 10
          };
          if (user && user.id) payload.created_by = user.id;
          var result = id
            ? await window.db.from('study_semester_course_schedule').update(payload).eq('id', id)
            : await window.db.from('study_semester_course_schedule').insert(payload);
          if (result.error) throw result.error;
          logAction(id ? '编辑学期课程日程' : '新增学期课程日程', 'study_semester_course_schedule', date, 'admin');
          showToast('课程日程已保存', 'success');
          closeScheduleModal();
          await loadScheduleRows();
        } catch (error) {
          showToast('保存失败：' + (error.message || '未知错误'), 'error');
        } finally {
          button.disabled = false;
        }
      }

      async function deleteSchedule(id) {
        var row = scheduleRows.find(function(item) { return Number(item.id) === Number(id); });
        if (!row) return;
        var confirmed = await showConfirm('确定删除 ' + formatDate(row.schedule_date) + ' 的这门课程吗？');
        if (!confirmed) return;
        var result = await window.db.from('study_semester_course_schedule').delete().eq('id', id);
        if (result.error) { showToast('删除失败', 'error'); return; }
        showToast('已删除', 'success');
        await loadScheduleRows();
      }

      init().catch(function(error) {
        console.error(error);
        showToast('页面加载失败：' + (error.message || '未知错误'), 'error');
      });
    </script>
  </body>
</html>
