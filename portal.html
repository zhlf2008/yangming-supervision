<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阳明心学班级管理平台</title>
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      body {
        background: var(--bg-primary);
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 100px;
      }

      .header {
        position: relative;
        padding: 32px 20px 22px;
        text-align: center;
      }

      .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        width: 60px;
        height: 4px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: linear-gradient(90deg, var(--vermillion) 0%, var(--gold) 100%);
      }

      .header-title {
        margin-bottom: 5px;
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 25px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .header-subtitle {
        color: var(--ink-muted);
        font-size: 13px;
      }

      .user-card,
      .semester-card,
      .admin-section,
      .noaccess-banner {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 2px 12px var(--shadow);
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px;
        margin-bottom: 22px;
      }

      .user-avatar {
        width: 54px;
        height: 54px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--vermillion) 0%, #c62828 100%);
        color: white;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        font-weight: 700;
        box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
      }

      .user-info {
        min-width: 0;
        flex: 1;
      }

      .user-name {
        margin-bottom: 4px;
        color: var(--ink-dark);
        font-size: 17px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .user-role {
        color: var(--ink-muted);
        font-size: 13px;
      }

      .user-arrow {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: var(--ink-muted);
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 14px;
        padding-left: 4px;
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        font-weight: 600;
      }

      .section-title::before {
        content: '';
        width: 3px;
        height: 16px;
        flex-shrink: 0;
        border-radius: 2px;
        background: linear-gradient(180deg, var(--vermillion) 0%, var(--gold) 100%);
      }

      .admin-section {
        display: none;
        padding: 16px;
        margin-bottom: 22px;
      }

      .semester-card {
        padding: 16px;
      }

      .semester-banner {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        margin-bottom: 16px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(232, 228, 223, 0.72);
        background:
          radial-gradient(circle at top left, rgba(230, 57, 70, 0.04), transparent 45%),
          rgba(250, 250, 248, 0.86);
      }

      .semester-icon {
        width: 42px;
        height: 42px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        font-size: 22px;
      }

      .semester-meta {
        min-width: 0;
        flex: 1;
      }

      .semester-banner .label {
        color: var(--ink-muted);
        font-size: 12px;
      }

      .semester-banner .name {
        margin-top: 3px;
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 19px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .action-card {
        display: block;
        min-height: 132px;
        padding: 18px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
        color: inherit;
        text-align: center;
        text-decoration: none;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .action-card:active {
        transform: scale(0.96);
      }

      .action-card:hover {
        text-decoration: none;
      }

      .action-card .icon {
        width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 13px;
        border-radius: 14px;
        font-size: 25px;
      }

      .action-card.supervision .icon,
      .action-card.semester .icon {
        background: linear-gradient(135deg, var(--vermillion-light) 0%, #ffeced 100%);
      }

      .action-card.secretariat .icon,
      .action-card.audit .icon {
        background: linear-gradient(135deg, var(--green-light) 0%, #f3faf4 100%);
      }

      .action-card.study .icon,
      .action-card.library .icon {
        background: linear-gradient(135deg, var(--gold-light) 0%, rgba(255, 255, 255, 0.9) 100%);
      }

      .action-card .title {
        margin-bottom: 6px;
        color: var(--ink-dark);
        font-size: 15px;
        font-weight: 600;
      }

      .action-card .desc {
        color: var(--ink-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .noaccess-banner {
        display: none;
        padding: 34px 20px;
        margin-top: 22px;
        text-align: center;
      }

      .noaccess-banner .icon {
        display: block;
        margin-bottom: 12px;
        font-size: 38px;
      }

      .noaccess-banner .title {
        margin-bottom: 8px;
        color: var(--ink-dark);
        font-size: 16px;
        font-weight: 600;
      }

      .noaccess-banner .desc {
        color: var(--ink-light);
        font-size: 13px;
        line-height: 1.7;
      }

      .header {
        animation: fadeInDown 0.5s ease-out;
      }

      .user-card {
        animation: fadeInUp 0.5s ease-out 0.1s backwards;
      }

      .admin-section {
        animation: fadeInUp 0.5s ease-out 0.15s backwards;
      }

      .semester-card,
      .noaccess-banner {
        animation: fadeInUp 0.5s ease-out 0.2s backwards;
      }

      @media (max-width: 360px) {
        .container {
          padding-inline: 12px;
        }

        .action-grid {
          gap: 12px;
        }

        .action-card {
          min-height: 124px;
          padding: 16px 8px;
        }

        .action-card .icon {
          width: 46px;
          height: 46px;
          font-size: 22px;
        }

        .action-card .title {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header-title">阳明心学班级管理平台</h1>
        <p class="header-subtitle">请选择要进入的工作模块</p>
      </header>

      <div class="user-card">
        <a
          href="profile.html?system=portal"
          style="display: flex; align-items: center; gap: 16px; width: 100%; text-decoration: none; color: inherit"
        >
          <div class="user-avatar" id="profileAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="profileName">加载中...</div>
            <div class="user-role" id="profileRole">加载中...</div>
          </div>
          <svg
            class="user-arrow"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </div>

      <section class="admin-section" id="adminSection">
        <h2 class="section-title">平台管理</h2>
        <div class="action-grid">
          <a class="action-card semester" href="secretariat-semesters.html?from=portal">
            <div class="icon">📅</div>
            <div class="title">学期管理</div>
            <div class="desc">新增、编辑、切换当前学期</div>
          </a>
          <a class="action-card library" href="study-course-library.html?from=portal">
            <div class="icon">📚</div>
            <div class="title">课程内容库</div>
            <div class="desc">维护跨学期复用的课程资产</div>
          </a>
          <a class="action-card audit" href="audit-log.html">
            <div class="icon">🧾</div>
            <div class="title">操作日志</div>
            <div class="desc">查看全平台关键审计记录</div>
          </a>
        </div>
      </section>

      <section class="semester-card" id="semesterSection">
        <h2 class="section-title">模块入口</h2>
        <div class="semester-banner" id="semesterBanner">
          <div class="semester-icon">📆</div>
          <div class="semester-meta">
            <div class="label">当前学期</div>
            <div class="name" id="currentSemesterName">加载中...</div>
          </div>
        </div>
        <div class="action-grid" id="moduleGrid">
          <a class="action-card supervision" href="index.html" id="cardSupervision" onclick="setActiveSystem('supervision')">
            <div class="icon">📋</div>
            <div class="title">督察管理</div>
            <div class="desc">考勤、汇总、榜单与日常督察</div>
          </a>
          <a class="action-card secretariat" href="secretariat-dashboard.html" id="cardSecretariat" onclick="setActiveSystem('secretariat')">
            <div class="icon">🏛️</div>
            <div class="title">秘书处</div>
            <div class="desc">人员、组织、职务与权限维护</div>
          </a>
          <a class="action-card study" href="study-dashboard.html" id="cardStudy" onclick="setActiveSystem('study')">
            <div class="icon">📖</div>
            <div class="title">学委管理</div>
            <div class="desc">课程、排班、周课与学习通知</div>
          </a>
        </div>
      </section>

      <div class="noaccess-banner" id="noaccessBanner">
        <div class="icon">🔒</div>
        <div class="title">当前学期暂无权限</div>
        <div class="desc">您在当前学期没有任何可进入的模块。<br>请联系管理员或秘书处为您分配模块权限。</div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=6"></script>
    <script src="js/utils.js?v=6"></script>
    <script src="js/components.js?v=6"></script>
    <script>
      renderPortalBottomNav('home');
    </script>
    <script>
      async function init() {
        await waitForDb();
        await refreshCurrentUser();

        var profile = checkLogin();
        if (!profile) return;

        var userName = profile.name || '未知';
        document.getElementById('profileName').textContent = userName;
        document.getElementById('profileAvatar').textContent = userName.charAt(0);

        var roleText = profile.role || '';
        document.getElementById('profileRole').textContent = roleText || '普通成员';

        // Load current semester
        var currentSemesterId = null;
        try {
          currentSemesterId = await getCurrentSemesterId();
          var semResult = currentSemesterId
            ? await window.db.from('semesters').select('semester_name').eq('id', currentSemesterId).single()
            : { data: null };
          if (semResult.data) {
            document.getElementById('currentSemesterName').textContent = semResult.data.semester_name;
          } else {
            document.getElementById('currentSemesterName').textContent = '未设置';
          }
        } catch (e) {
          document.getElementById('currentSemesterName').textContent = '加载失败';
        }

        var userRole = profile.role || '';
        var cards = {
          supervision: { el: document.getElementById('cardSupervision'), key: 'supervision' },
          secretariat: { el: document.getElementById('cardSecretariat'), key: 'secretariat' },
          study: { el: document.getElementById('cardStudy'), key: 'study' }
        };
        var hasAnyCard = false;

        var urlParams = new URLSearchParams(window.location.search);
        var noaccess = urlParams.get('noaccess') === '1';

        if (userRole === '超级管理员' || userRole === '管理员') {
          hasAnyCard = true;
          document.getElementById('adminSection').style.display = 'block';
        } else {
          try {
            if (currentSemesterId) {
              var permRes = await window.db.from('module_memberships')
                .select('module_key')
                .eq('user_id', profile.id)
                .eq('semester_id', currentSemesterId)
                .eq('enabled', true);
              var allowedModules = new Set((permRes.data || []).map(function(m) { return m.module_key; }));
              Object.keys(cards).forEach(function(k) {
                if (allowedModules.has(cards[k].key)) {
                  cards[k].el.style.display = '';
                  hasAnyCard = true;
                } else {
                  cards[k].el.style.display = 'none';
                }
              });
            }
          } catch (e) {
            console.warn('portal permission check error:', e);
          }
          if (!hasAnyCard || noaccess) {
            hasAnyCard = false;
          }
        }

        if (!hasAnyCard) {
          document.getElementById('noaccessBanner').style.display = 'block';
          document.getElementById('semesterSection').style.display = 'none';
        }
      }

      init();
    </script>
  </body>
</html>
