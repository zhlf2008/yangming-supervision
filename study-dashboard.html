<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学委管理</title>
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      .page-header {
        display: block;
        padding: 32px 20px 22px;
        text-align: center;
        position: relative;
      }
      .page-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        width: 60px;
        height: 4px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: linear-gradient(90deg, var(--vermillion) 0%, var(--gold) 100%);
      }
      .header {
        display: block;
        padding: 32px 20px 22px;
        text-align: center;
        position: relative;
      }
      .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        width: 60px;
        height: 4px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: linear-gradient(90deg, var(--vermillion) 0%, var(--gold) 100%);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-bottom: 14px;
        padding: 7px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink-light);
        text-decoration: none;
        font-size: 12px;
      }
      .module-switch {
        margin-top: 12px;
        margin-left: -20px;
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 25px;
        font-weight: 600;
        color: var(--ink-dark);
        letter-spacing: 1px;
      }
      .page-subtitle {
        margin-top: 6px;
        color: var(--ink-muted);
        font-size: 13px;
      }
      .header-title {
        margin-bottom: 5px;
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 25px;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .header-subtitle {
        color: var(--ink-muted);
        font-size: 13px;
      }
      .user-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px;
        margin-bottom: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .user-card a {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        color: inherit;
        text-decoration: none;
      }
      .user-avatar {
        width: 54px;
        height: 54px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--vermillion) 0%, #c62828 100%);
        color: white;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        font-weight: 700;
        box-shadow: 0 4px 16px rgba(230, 57, 70, 0.3);
      }
      .user-info {
        min-width: 0;
        flex: 1;
      }
      .user-name {
        margin-bottom: 4px;
        color: var(--ink-dark);
        font-size: 17px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .user-role {
        color: var(--ink-muted);
        font-size: 13px;
      }
      .user-arrow {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: var(--ink-muted);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 14px;
        padding-left: 4px;
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        font-weight: 600;
      }
      .section-title::before {
        content: '';
        width: 3px;
        height: 16px;
        flex-shrink: 0;
        border-radius: 2px;
        background: linear-gradient(180deg, var(--vermillion) 0%, var(--gold) 100%);
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 4px;
      }
      .action-card {
        display: block;
        min-height: 132px;
        padding: 18px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 12px var(--shadow);
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s;
        text-align: center;
      }
      .action-card:active {
        transform: scale(0.96);
      }
      .action-card .icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 13px;
        font-size: 25px;
        background: linear-gradient(135deg, var(--gold-light) 0%, rgba(255, 255, 255, 0.9) 100%);
      }
      .action-card:nth-child(2) .icon {
        background: linear-gradient(135deg, var(--gold-light) 0%, #fbf7f2 100%);
      }
      .action-card:nth-child(3) .icon {
        background: linear-gradient(135deg, var(--green-light) 0%, #f3faf4 100%);
      }
      .action-card:nth-child(4) .icon {
        background: linear-gradient(135deg, var(--vermillion-light) 0%, #ffeced 100%);
      }
      .action-card .title {
        margin-bottom: 6px;
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .action-card .desc {
        font-size: 12px;
        color: var(--ink-muted);
        line-height: 1.45;
      }
      .action-card.disabled {
        opacity: 0.58;
      }
      .admin-hint {
        display: block;
        margin-top: 2px;
        color: var(--vermillion);
        font-size: 11px;
        font-weight: 400;
      }
      @media (max-width: 360px) {
        .container { padding-inline: 12px; }
        .action-grid { gap: 12px; }
        .action-card { min-height: 124px; padding: 16px 8px; }
        .action-card .icon { width: 46px; height: 46px; font-size: 22px; }
        .action-card .title { font-size: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header-title">阳明心学学委管理系统</h1>
        <p class="header-subtitle" id="semesterSubtitle">加载中...</p>
        <a class="back-btn module-switch" href="portal.html?from=study-dashboard" aria-label="切换模块"></a>
      </header>

      <div class="user-card">
        <a href="profile.html?system=study&from=study-dashboard">
          <div class="user-avatar" id="profileAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="profileName">加载中...</div>
            <div class="user-role" id="profileRole">加载中...</div>
          </div>
          <svg class="user-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </div>

      <h2 class="section-title">学委工作台</h2>
      <div class="action-grid">

        <a class="action-card" href="study-committee-management.html?from=study-dashboard">
          <div class="icon">学</div>
          <div class="title">学委管理</div>
          <div class="desc">大班·班级·小组逐级管理</div>
        </a>

        <a class="action-card" href="study-schedule-rules.html?from=study-dashboard">
          <div class="icon">🗓️</div>
          <div class="title">日程规则</div>
          <div class="desc">共读层级·学期日程·选课</div>
        </a>

        <a class="action-card" href="study-org-schedule.html?from=study-dashboard">
          <div class="icon">👥</div>
          <div class="title">组织日程</div>
          <div class="desc">内容继承·岗位摊派·人员落位</div>
        </a>

        <div class="action-card disabled">
          <div class="icon">📢</div>
          <div class="title">通知与推送</div>
          <div class="desc">企业微信通知（后续阶段开放）</div>
        </div>
      </div>

    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=9"></script>
    <script src="js/utils.js?v=9"></script>
    <script src="js/components.js?v=9"></script>
    <script>
      renderModuleBottomNav('study', 'home');

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var profile = checkLogin();
        if (!profile) return;
        var ok = await guardModuleAccess('study');
        if (!ok) return;
        var userName = profile.name || '未知';
        document.getElementById('profileName').textContent = userName;
        document.getElementById('profileAvatar').textContent = userName.charAt(0);
        document.getElementById('profileRole').textContent = profile.role || '普通成员';
        await loadCurrentSemester();
      }

      async function loadCurrentSemester() {
        const today = getToday();
        const { data } = await window.db
          .from('semesters')
          .select('semester_name')
          .lte('start_date', today)
          .gte('end_date', today)
          .single();
        setCurrentSemester('semesterSubtitle', data ? data.semester_name : '当前学期');
      }
      init();
    </script>
  </body>
</html>
