<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学委管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { padding: 28px 4px 18px; }
      .back-link { display: inline-flex; margin-bottom: 14px; color: var(--ink-muted); text-decoration: none; font-size: 13px; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 28px; color: var(--ink-dark); }
      .page-subtitle { margin-top: 8px; color: var(--ink-muted); font-size: 13px; line-height: 1.7; }

      .module-grid { display: grid; gap: 14px; margin-top: 18px; }
      .feature-card { display: block; padding: 18px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); box-shadow: 0 2px 12px var(--shadow); color: inherit; text-decoration: none; }
      .feature-card.disabled { opacity: 0.62; }
      .feature-head { display: flex; align-items: center; gap: 12px; }
      .feature-icon { width: 42px; height: 42px; border-radius: 14px; background: var(--gold-light); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
      .feature-title { font-size: 17px; font-weight: 700; color: var(--ink-dark); }
      .feature-desc { margin-top: 8px; color: var(--ink-light); font-size: 13px; line-height: 1.7; }
      .status-card { margin-top: 12px; padding: 14px 16px; border-radius: var(--radius-sm); background: var(--gold-light); color: var(--ink-light); font-size: 13px; line-height: 1.7; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-link" href="portal.html">← 返回模块入口</a>
        <h1 class="page-title">学委管理</h1>
        <p class="page-subtitle">课程内容库、学期日程规则与每日共读安排管理。</p>
      </header>

      <div class="status-card" id="userStatus">正在加载...</div>

      <section class="module-grid">
        <a class="feature-card" href="study-course-library.html">
          <div class="feature-head">
            <div class="feature-icon">📖</div>
            <div class="feature-title">课程内容库</div>
          </div>
          <div class="feature-desc">维护章节、主题、学习内容、思考题、纸质书页码和电子书链接。</div>
        </a>

        <a class="feature-card" href="study-schedule-rules.html">
          <div class="feature-head">
            <div class="feature-icon">🗓️</div>
            <div class="feature-title">日程规则</div>
          </div>
          <div class="feature-desc">设置周几是什么共读层级，生成学期日程，选择每日课程内容。</div>
        </a>

        <a class="feature-card" href="study-weekly-assignment.html">
          <div class="feature-head">
            <div class="feature-icon">👥</div>
            <div class="feature-title">每周安排</div>
          </div>
          <div class="feature-desc">按周设置岗位摊派与人员落位，生成小组一周排班表。</div>
        </a>

        <div class="feature-card disabled">
          <div class="feature-head">
            <div class="feature-icon">📢</div>
            <div class="feature-title">通知与推送</div>
          </div>
          <div class="feature-desc">企业微信群通知文案生成与推送（后续阶段开放）。</div>
        </div>
      </section>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var profile = checkLogin();
        if (!profile) return;
        document.getElementById('userStatus').textContent = (profile.name || '') + ' · 学委模块（课程库与日程规则已就绪）';
      }
      init();
    </script>
  </body>
</html>
