<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共读影像提交 - 学委管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <link rel="stylesheet" href="css/reading-media.css?v=1" />
    <style>
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
      }
      .header-card {
        padding: 16px 18px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .header-body {
        display: flex;
        gap: 16px;
      }
      .header-col {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 8px;
      }
      .header-col + .header-col {
        padding-left: 16px;
        border-left: 1px solid var(--border);
      }
      .header-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .header-label {
        width: 42px;
        flex-shrink: 0;
        color: var(--ink-muted);
        font-size: 12px;
      }
      .header-value {
        overflow: hidden;
        color: var(--ink-dark);
        font-size: 13px;
        font-weight: 500;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .header-value.date {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
      }
      .section {
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 600;
      }
      .section-icon {
        display: flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--gold-light);
      }
      .task-card {
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .task-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 16px;
      }
      .task-heading {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 9px;
      }
      .task-icon {
        display: flex;
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--gold-light);
        color: var(--vermillion);
      }
      .task-name {
        font-size: 15px;
        font-weight: 700;
      }
      .task-path {
        margin-top: 3px;
        color: var(--ink-muted);
        font-size: 11px;
      }
      .status-tag {
        flex-shrink: 0;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--gold-light);
        color: #8a5d2e;
        font-size: 11px;
        font-weight: 600;
      }
      .status-tag.complete {
        background: var(--green-light);
        color: var(--green);
      }
      .reading-type-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 13px 14px;
        margin-bottom: 4px;
        border-radius: 10px;
        background: #f8f4ed;
      }
      .reading-type-label {
        color: var(--ink-muted);
        font-size: 12px;
      }
      .reading-type-value {
        color: #28685d;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 17px;
        font-weight: 700;
      }
      .media-slot-list {
        margin-top: 14px;
        border-top: 1px solid #f1eeea;
      }
      .media-slot {
        padding: 15px 0;
        border-bottom: 1px solid #f1eeea;
      }
      .media-slot-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .slot-role {
        color: var(--ink-muted);
        font-size: 12px;
        font-weight: 600;
      }
      .slot-person {
        color: var(--ink-dark);
        font-size: 14px;
        font-weight: 700;
      }
      .slot-count {
        color: var(--ink-muted);
        font-size: 11px;
      }
      .slot-upload {
        position: relative;
        display: flex;
        min-height: 82px;
        align-items: center;
        justify-content: center;
        gap: 9px;
        padding: 14px;
        overflow: hidden;
        border: 1px dashed #cfbda5;
        border-radius: 10px;
        background: #fcfaf6;
        color: #765432;
        cursor: pointer;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
      }
      .slot-upload input {
        position: absolute;
        inset: 0;
        cursor: pointer;
        opacity: 0;
      }
      .slot-upload-note {
        display: block;
        margin-top: 4px;
        color: var(--ink-muted);
        font-size: 10px;
        font-weight: 400;
      }
      .slot-assets {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 9px;
      }
      .slot-asset {
        position: relative;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        border-radius: 8px;
        background: #eeeae4;
      }
      .slot-asset img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .slot-asset button {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 24px;
        height: 24px;
        border: 0;
        border-radius: 50%;
        background: rgba(28, 31, 30, 0.76);
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
      }
      .attendee-slot {
        padding: 16px;
        margin-top: 18px;
        border-radius: 12px;
        background: #eef5f2;
      }
      .cover-slot,
      .moment-slot {
        padding: 16px;
        margin-top: 18px;
        border-radius: 12px;
      }
      .cover-slot { background: #f7f0e3; }
      .moment-slot { background: #f4eff7; }
      .attendee-slot .slot-upload {
        border-color: #9dbbb3;
        background: #f7fbf9;
        color: #28685d;
      }
      .cover-slot .slot-upload { border-color: #d8ba8d; background: #fffdf8; color: #8a5b20; }
      .moment-slot .slot-upload { border-color: #c5add0; background: #fcf9fd; color: #704c80; }
      .manual-slot {
        padding: 16px;
        margin-top: 14px;
        border: 1px solid #eadcc7;
        border-radius: 12px;
        background: #fffaf2;
      }
      .manual-row-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 12px;
      }
      .manual-row {
        padding: 12px;
        border: 1px solid #efe1cd;
        border-radius: 10px;
        background: #fffdf8;
      }
      .manual-row-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(150px, 1.2fr) auto;
        align-items: end;
        gap: 10px;
      }
      .manual-field {
        min-width: 0;
      }
      .manual-label {
        display: block;
        margin-bottom: 5px;
        color: var(--ink-muted);
        font-size: 11px;
        font-weight: 600;
      }
      .manual-input {
        width: 100%;
        height: 40px;
        padding: 0 11px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--ink-dark);
        font: inherit;
        font-size: 13px;
      }
      .manual-input:focus {
        border-color: var(--gold);
        outline: 2px solid rgba(212, 165, 116, 0.16);
      }
      .manual-help {
        margin-top: 8px;
        color: var(--ink-muted);
        font-size: 11px;
        line-height: 1.55;
      }
      .manual-slot .slot-upload {
        min-height: 40px;
        padding: 9px 10px;
        border-color: #d8ba8d;
        background: #fffdf8;
      }
      .manual-slot .slot-upload-note {
        display: none;
      }
      .manual-remove-btn,
      .manual-add-btn {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--ink-muted);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .manual-remove-btn {
        width: 42px;
        color: var(--vermillion);
      }
      .manual-add-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        margin-top: 12px;
        color: #765432;
        border-style: dashed;
        background: #fffdf8;
      }
      .empty-panel {
        padding: 42px 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--ink-muted);
        text-align: center;
        font-size: 13px;
        line-height: 1.7;
      }
      @media (max-width: 390px) {
        .container {
          padding-inline: 12px;
        }
        .slot-assets {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .manual-row-form {
          grid-template-columns: 1fr;
        }
        .manual-remove-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="app-loading">
    <main class="container">
      <header class="page-header">
        <a class="back-btn" href="study-dashboard.html" aria-label="返回学委管理首页"></a>
        <h1 class="page-title">共读影像提交</h1>
      </header>

      <div class="header-card">
        <div class="semester-wrap" id="semesterName"></div>
        <div class="header-body">
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">日期</span><span class="header-value date" id="currentDate">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">星期</span><span class="header-value" id="currentWeekday">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">提交人</span><span class="header-value" id="reporterName">--</span>
            </div>
          </div>
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">大班</span><span class="header-value" id="bigClassName">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">班级</span><span class="header-value" id="className">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">小组</span><span class="header-value" id="groupName">--</span>
            </div>
          </div>
        </div>
      </div>

      <section class="section" id="orgSelectorSection">
        <div class="section-title">
          <span class="section-icon" data-icon="BuildingIcon"></span>
          选择提交小组
        </div>
        <div class="org-cascade">
          <div class="org-group">
            <label class="org-label" for="bigClassSelect">大班</label>
            <select class="org-select" id="bigClassSelect" onchange="onBigClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group">
            <label class="org-label" for="classSelect">班级</label>
            <select class="org-select" id="classSelect" onchange="onClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group">
            <label class="org-label" for="groupSelect">小组</label>
            <select class="org-select" id="groupSelect" onchange="onGroupChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
        </div>
      </section>

      <section id="taskContainer"></section>
      <div class="empty-panel" id="emptyPanel">正在加载今日共读安排...</div>
    </main>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=17"></script>
    <script src="js/reading-media.js?v=3"></script>
    <script>
      var readingPageParams = new URLSearchParams(location.search);
      var readingAccessModule = readingPageParams.get('module') === 'publicity' ? 'publicity' : 'study';
      renderModuleBottomNav(readingAccessModule, 'media');

      var readingContext = null;
      var currentUser = null;
      var accessibleGroups = [];
      var dailySchedules = [];
      var currentGroup = null;
      var currentSchedule = null;
      var currentBundle = null;
      var isUploading = false;
      var manualRows = [{ id: 1, roleName: '', personName: '' }];
      var manualRowSeq = 1;
      var weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;
        if (!(await guardModuleAccess(readingAccessModule))) return;

        if (readingAccessModule === 'publicity') {
          document.title = '共读影像提交 - 宣委管理';
          document.querySelector('.back-btn').href = 'publicity-dashboard.html';
          document.querySelector('.back-btn').setAttribute('aria-label', '返回宣委管理首页');
        }

        try {
          readingContext = await ReadingMedia.loadContext(readingAccessModule);
          var semesterResult = await window.db
            .from('semesters')
            .select('semester_name')
            .eq('id', readingContext.semesterId)
            .single();
          setCurrentSemester(
            'semesterName',
            semesterResult.data ? semesterResult.data.semester_name : '当前学期',
            'tag-lg'
          );
          renderTodayInfo();
          accessibleGroups = getAccessibleGroups();
          if (!accessibleGroups.length) {
            renderOrganizationSelector(null);
            showEmpty('当前账号在本学期没有可提交影像的下属小组');
            return;
          }
          dailySchedules = await ReadingMedia.loadSchedules(readingContext, getToday());
          var detectedGroup = await resolveCurrentUserGroup();
          currentGroup =
            accessibleGroups.find(function (group) {
              return detectedGroup && Number(group.id) === Number(detectedGroup.id);
            }) || accessibleGroups[0];
          renderOrganizationSelector(currentGroup);
          await loadCurrentGroup();
        } catch (error) {
          showEmpty('加载失败：' + (error.message || error));
        }
      }

      function renderTodayInfo() {
        document.getElementById('currentDate').textContent = getToday();
        document.getElementById('currentWeekday').textContent = weekDays[new Date().getDay()];
        document.getElementById('reporterName').textContent = currentUser.name || '未知';
      }

      function getAccessibleGroups() {
        return (readingContext.orgs || [])
          .filter(function (org) {
            return org.level === '小组' && ReadingMedia.canAccessOrg(readingContext, org.id);
          })
          .sort(function (a, b) {
            return (
              (a.sort_order || 0) - (b.sort_order || 0) ||
              String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN')
            );
          });
      }

      async function resolveCurrentUserGroup() {
        if (currentUser.phone) {
          var personResult = await window.db.from('people').select('id').eq('phone', currentUser.phone).maybeSingle();
          if (personResult.error) throw personResult.error;
          if (personResult.data) {
            var assignmentResult = await window.db
              .from('person_org_assignments')
              .select('org_id,sort_order')
              .eq('semester_id', readingContext.semesterId)
              .eq('person_id', personResult.data.id)
              .eq('org_level', '小组')
              .eq('status', 'active')
              .order('sort_order')
              .limit(1);
            if (assignmentResult.error) throw assignmentResult.error;
            var assignment = (assignmentResult.data || [])[0];
            var assignedGroup = assignment ? readingContext.orgMap[Number(assignment.org_id)] : null;
            if (assignedGroup && assignedGroup.level === '小组') return assignedGroup;
          }
        }
        return (
          (readingContext.memberships || [])
            .map(function (membership) {
              return readingContext.orgMap[Number(membership.org_id)];
            })
            .find(function (org) {
              return org && org.level === '小组';
            }) || null
        );
      }

      function uniqueOrgs(orgs) {
        var seen = {};
        return orgs.filter(function (org) {
          if (!org || seen[org.id]) return false;
          seen[org.id] = true;
          return true;
        });
      }

      function getClassesForBigClass(bigClassId) {
        return uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = readingContext.orgMap[Number(group.parent_id)];
            return classOrg && Number(classOrg.parent_id) === Number(bigClassId) ? classOrg : null;
          })
        );
      }

      function getGroupsForClass(classId) {
        return accessibleGroups.filter(function (group) {
          return Number(group.parent_id) === Number(classId);
        });
      }

      function renderOptions(select, orgs, placeholder) {
        select.innerHTML =
          (orgs.length === 1 ? '' : '<option value="">' + placeholder + '</option>') +
          orgs
            .map(function (org) {
              return '<option value="' + org.id + '">' + escapeHtml(org.name) + '</option>';
            })
            .join('');
      }

      function renderOrganizationSelector(defaultGroup) {
        var bigClassSelect = document.getElementById('bigClassSelect');
        var classSelect = document.getElementById('classSelect');
        var groupSelect = document.getElementById('groupSelect');
        var bigClasses = uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = readingContext.orgMap[Number(group.parent_id)];
            return classOrg ? readingContext.orgMap[Number(classOrg.parent_id)] : null;
          })
        );
        renderOptions(bigClassSelect, bigClasses, '请选择');
        if (!defaultGroup) {
          classSelect.innerHTML = '<option value="">--</option>';
          groupSelect.innerHTML = '<option value="">--</option>';
          renderCurrentPath(null);
          return;
        }
        var classOrg = readingContext.orgMap[Number(defaultGroup.parent_id)];
        var bigClass = classOrg ? readingContext.orgMap[Number(classOrg.parent_id)] : null;
        if (!classOrg || !bigClass) return;
        bigClassSelect.value = String(bigClass.id);
        var classes = getClassesForBigClass(bigClass.id);
        renderOptions(classSelect, classes, '请选择');
        classSelect.value = String(classOrg.id);
        var groups = getGroupsForClass(classOrg.id);
        renderOptions(groupSelect, groups, '请选择');
        groupSelect.value = String(defaultGroup.id);
        renderCurrentPath(defaultGroup);
      }

      async function onBigClassChange(bigClassId) {
        currentGroup = null;
        currentSchedule = null;
        currentBundle = null;
        renderCurrentPath(null);
        document.getElementById('taskContainer').innerHTML = '';
        var classes = bigClassId ? getClassesForBigClass(bigClassId) : [];
        var classSelect = document.getElementById('classSelect');
        var groupSelect = document.getElementById('groupSelect');
        renderOptions(classSelect, classes, '请选择');
        groupSelect.innerHTML = '<option value="">请选择</option>';
        if (classes.length === 1) {
          classSelect.value = String(classes[0].id);
          await onClassChange(classes[0].id);
        } else {
          showEmpty('请选择班级和小组');
        }
      }

      async function onClassChange(classId) {
        currentGroup = null;
        currentSchedule = null;
        currentBundle = null;
        renderCurrentPath(null);
        document.getElementById('taskContainer').innerHTML = '';
        var groups = classId ? getGroupsForClass(classId) : [];
        var groupSelect = document.getElementById('groupSelect');
        renderOptions(groupSelect, groups, '请选择');
        if (groups.length === 1) {
          groupSelect.value = String(groups[0].id);
          await onGroupChange(groups[0].id);
        } else {
          showEmpty('请选择小组后提交今日共读影像');
        }
      }

      async function onGroupChange(groupId) {
        currentGroup =
          accessibleGroups.find(function (group) {
            return Number(group.id) === Number(groupId);
          }) || null;
        renderCurrentPath(currentGroup);
        if (!currentGroup) {
          showEmpty('请选择小组后提交今日共读影像');
          return;
        }
        showEmpty('正在加载该小组今日共读安排...');
        try {
          await loadCurrentGroup();
        } catch (error) {
          showEmpty('共读影像加载失败：' + (error.message || error));
        }
      }

      function renderCurrentPath(group) {
        var classOrg = group ? readingContext.orgMap[Number(group.parent_id)] : null;
        var bigClass = classOrg ? readingContext.orgMap[Number(classOrg.parent_id)] : null;
        document.getElementById('bigClassName').textContent = bigClass ? bigClass.name : '--';
        document.getElementById('className').textContent = classOrg ? classOrg.name : '--';
        document.getElementById('groupName').textContent = group ? group.name : '--';
      }

      async function loadCurrentGroup() {
        currentSchedule = ReadingMedia.findScheduleForSourceOrg(dailySchedules, currentGroup, readingContext.orgMap);
        if (!currentSchedule) {
          document.getElementById('taskContainer').innerHTML = '';
          showEmpty('该小组今天没有共读日程，无需提交影像');
          return;
        }
        currentBundle = await ReadingMedia.loadScheduleBundle(currentSchedule, currentGroup.id);
        renderTaskCard();
      }

      function showEmpty(message) {
        document.getElementById('taskContainer').innerHTML = '';
        var panel = document.getElementById('emptyPanel');
        panel.textContent = message;
        panel.hidden = false;
      }

      function hideEmpty() {
        document.getElementById('emptyPanel').hidden = true;
      }

      function getAssignmentAssets(assignmentId) {
        return (currentBundle.assets || []).filter(function (asset) {
          return Number(asset.assignment_person_id) === Number(assignmentId);
        });
      }

      function getAttendeeAssets() {
        return (currentBundle.assets || []).filter(function (asset) {
          return asset.asset_kind === 'overview' && !asset.assignment_person_id;
        });
      }

      function getCoverAssets() {
        return (currentBundle.assets || []).filter(function (asset) {
          return asset.asset_kind === 'moment' && asset.caption === '封面图';
        });
      }

      function getMomentAssets() {
        return (currentBundle.assets || []).filter(function (asset) {
          return asset.asset_kind === 'moment' && asset.caption !== '封面图';
        });
      }

      function getManualPersonAssets() {
        return (currentBundle.assets || []).filter(function (asset) {
          return asset.asset_kind === 'role' && !asset.assignment_person_id;
        });
      }

      function normalizeManualRowKey(roleName, personName) {
        return String(roleName || '').trim() + '|' + String(personName || '').trim();
      }

      function syncManualRowsFromDom() {
        manualRows = manualRows.map(function (row) {
          var roleInput = document.getElementById('manualRoleName-' + row.id);
          var personInput = document.getElementById('manualPersonName-' + row.id);
          return {
            id: row.id,
            roleName: roleInput ? roleInput.value.trim() : row.roleName || '',
            personName: personInput ? personInput.value.trim() : row.personName || ''
          };
        });
      }

      function buildManualRows(assets) {
        syncManualRowsFromDom();
        var rows = [];
        var usedIds = {};
        var groups = {};
        (assets || []).forEach(function (asset) {
          var roleName = asset.role_name_snapshot || '岗位';
          var personName = asset.person_name_snapshot || '未命名人员';
          var key = normalizeManualRowKey(roleName, personName);
          if (!groups[key]) groups[key] = { roleName: roleName, personName: personName, assets: [] };
          groups[key].assets.push(asset);
        });
        Object.keys(groups).forEach(function (key) {
          var group = groups[key];
          var matched = manualRows.find(function (row) {
            return normalizeManualRowKey(row.roleName, row.personName) === key;
          });
          var id = matched ? matched.id : ++manualRowSeq;
          usedIds[id] = true;
          rows.push({
            id: id,
            roleName: group.roleName,
            personName: group.personName,
            assets: group.assets
          });
        });
        manualRows.forEach(function (row) {
          if (usedIds[row.id]) return;
          rows.push({
            id: row.id,
            roleName: row.roleName || '',
            personName: row.personName || '',
            assets: []
          });
        });
        if (!rows.length || !rows.some(function (row) { return !row.roleName && !row.personName && !row.assets.length; })) {
          rows.push({ id: ++manualRowSeq, roleName: '', personName: '', assets: [] });
        }
        manualRows = rows.map(function (row) {
          return { id: row.id, roleName: row.roleName, personName: row.personName };
        });
        return rows;
      }

      function renderTaskCard() {
        hideEmpty();
        var assignments = currentBundle.assignments || [];
        var attendeeAssets = getAttendeeAssets();
        var coverAssets = getCoverAssets();
        var momentAssets = getMomentAssets();
        var manualAssets = getManualPersonAssets();
        var filledAssignments = assignments.filter(function (assignment) {
          return getAssignmentAssets(assignment.assignment_person_id).length > 0;
        }).length;
        var hasPersonMedia = filledAssignments > 0 || manualAssets.length > 0;
        var complete = assignments.length
          ? filledAssignments === assignments.length && attendeeAssets.length > 0
          : hasPersonMedia || attendeeAssets.length > 0;
        var completedSlots = filledAssignments + (attendeeAssets.length ? 1 : 0) + (manualAssets.length ? 1 : 0);
        var readingTypeName =
          (currentBundle.readingType && currentBundle.readingType.type_name) ||
          ReadingMedia.getScopeLabel(currentSchedule.scope_level);
        var rows = assignments.length
          ? assignments
              .map(function (assignment) {
                return renderAssignmentSlot(assignment);
              })
              .join('')
          : '<div class="reading-empty" style="margin-top:14px">今日岗位尚未完成人员落位，可先上传参会人员画面。</div>';

        document.getElementById('taskContainer').innerHTML =
          '<article class="task-card"><div class="task-card-head"><div class="task-heading">' +
          '<span class="task-icon" data-icon="ImagesIcon"></span><div><div class="task-name">今日共读影像</div>' +
          '<div class="task-path">' +
          escapeHtml(ReadingMedia.getOrgPath(currentGroup.id, readingContext.orgMap)) +
          '</div></div></div><span class="status-tag' +
          (complete ? ' complete' : '') +
          '">' +
          (complete ? '已完成' : '已上传 ' + completedSlots + ' 项') +
          '</span></div><div class="reading-type-card"><span class="reading-type-label">当日共读类型</span>' +
          '<strong class="reading-type-value">' +
          escapeHtml(readingTypeName) +
          '</strong></div><div class="media-slot-list">' +
          rows +
          '</div>' +
          renderManualPersonSlot(manualAssets) +
          renderCoverSlot(coverAssets) +
          renderAttendeeSlot(attendeeAssets) +
          renderMomentSlot(momentAssets) +
          '</article>';
      }

      function renderAssignmentSlot(assignment) {
        var assets = getAssignmentAssets(assignment.assignment_person_id);
        var key = 'assignment-' + assignment.assignment_person_id;
        return (
          '<section class="media-slot"><div class="media-slot-head"><div><span class="slot-role">' +
          escapeHtml(assignment.role_name) +
          '</span><span class="slot-person"> · ' +
          escapeHtml(assignment.person_name) +
          '</span></div><span class="slot-count">' +
          assets.length +
          ' 张</span></div>' +
          renderUploadBox(key, '上传' + assignment.role_name + '照片') +
          renderSlotAssets(assets) +
          '</section>'
        );
      }

      function renderAttendeeSlot(assets) {
        return (
          '<section class="attendee-slot"><div class="media-slot-head"><div><span class="slot-role">参会人员</span>' +
          '<span class="slot-person"> · 全员画面</span></div><span class="slot-count">' +
          assets.length +
          ' 张</span></div>' +
          renderUploadBox('attendees', '上传参会人员照片') +
          renderSlotAssets(assets) +
          '</section>'
        );
      }

      function renderCoverSlot(assets) {
        return (
          '<section class="cover-slot"><div class="media-slot-head"><div><span class="slot-role">封面图</span>' +
          '<span class="slot-person"> · 供宣委作为长图封面主图</span></div><span class="slot-count">' +
          assets.length +
          ' 张</span></div>' +
          renderUploadBox('cover', '上传封面图') +
          renderSlotAssets(assets) +
          '</section>'
        );
      }

      function renderMomentSlot(assets) {
        return (
          '<section class="moment-slot"><div class="media-slot-head"><div><span class="slot-role">花絮图</span>' +
          '<span class="slot-person"> · 补充共读现场瞬间</span></div><span class="slot-count">' +
          assets.length +
          ' 张</span></div>' +
          renderUploadBox('moments', '上传花絮图') +
          renderSlotAssets(assets) +
          '</section>'
        );
      }

      function renderManualPersonSlot(assets) {
        var rows = buildManualRows(assets);
        return (
          '<section class="manual-slot"><div class="media-slot-head"><div><span class="slot-role">单人画面</span>' +
          '<span class="slot-person"> · 手动录入岗位和姓名</span></div><span class="slot-count">' +
          assets.length +
          ' 张</span></div>' +
          '<div class="manual-row-list">' +
          rows.map(renderManualPersonRow).join('') +
          '</div>' +
          '<button class="manual-add-btn" type="button" onclick="addManualPersonRow()">＋ 添加单人画面</button>' +
          '<div class="manual-help">适用于今日岗位/人员还没落位的情况；每行填写岗位和姓名后上传，宣委素材会显示为“岗位 · 姓名”。</div>' +
          '</section>'
        );
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function renderManualPersonRow(row) {
        var key = 'manual-person-' + row.id;
        var canRemove = manualRows.length > 1 && !(row.assets && row.assets.length);
        return (
          '<div class="manual-row" id="manualRow-' + row.id + '">' +
          '<div class="manual-row-form">' +
          '<div class="manual-field"><label class="manual-label" for="manualRoleName-' + row.id + '">岗位</label>' +
          '<input class="manual-input" id="manualRoleName-' + row.id + '" maxlength="40" value="' +
          escapeAttr(row.roleName || '') +
          '" placeholder="如：主持人、分享人" oninput="syncManualRowsFromDom()" /></div>' +
          '<div class="manual-field"><label class="manual-label" for="manualPersonName-' + row.id + '">姓名</label>' +
          '<input class="manual-input" id="manualPersonName-' + row.id + '" maxlength="40" value="' +
          escapeAttr(row.personName || '') +
          '" placeholder="请输入姓名" oninput="syncManualRowsFromDom()" /></div>' +
          '<div class="manual-field">' +
          renderUploadBox(key, '上传画面') +
          '</div>' +
          '<button class="manual-remove-btn" type="button" ' +
          (canRemove ? 'onclick="removeManualPersonRow(' + row.id + ')"' : 'disabled') +
          ' aria-label="删除该行">×</button>' +
          '</div>' +
          renderSlotAssets(row.assets || []) +
          '</div>'
        );
      }

      function renderUploadBox(key, label) {
        return (
          '<label class="slot-upload"><span data-icon="ImagesIcon"></span><span id="upload-label-' +
          key +
          '">' +
          escapeHtml(label) +
          '<small class="slot-upload-note">支持多张原图，上传时自动优化尺寸与体积</small></span>' +
          '<input type="file" accept="image/jpeg,image/png,image/webp" multiple onchange="uploadSlotFiles(this.files,\'' +
          key +
          '\')"></label>'
        );
      }

      function addManualPersonRow() {
        syncManualRowsFromDom();
        manualRows.push({ id: ++manualRowSeq, roleName: '', personName: '' });
        renderTaskCard();
      }

      function removeManualPersonRow(rowId) {
        syncManualRowsFromDom();
        manualRows = manualRows.filter(function (row) {
          return Number(row.id) !== Number(rowId);
        });
        if (!manualRows.length) manualRows.push({ id: ++manualRowSeq, roleName: '', personName: '' });
        renderTaskCard();
      }

      function renderSlotAssets(assets) {
        if (!assets.length) return '';
        return (
          '<div class="slot-assets">' +
          assets
            .map(function (asset) {
              return (
                '<div class="slot-asset"><img alt="' +
                escapeHtml(asset.file_name || '共读影像') +
                '" src="' +
                escapeHtml(asset.signed_url) +
                '"><button type="button" aria-label="删除照片" onclick="removeAsset(' +
                asset.id +
                ')">×</button></div>'
              );
            })
            .join('') +
          '</div>'
        );
      }

      function resolveSlotTarget(key) {
        if (key === 'attendees') return { kind: 'overview', source_org_id: currentGroup.id };
        if (key === 'cover') return { kind: 'moment', caption: '封面图', source_org_id: currentGroup.id };
        if (key === 'moments') return { kind: 'moment', source_org_id: currentGroup.id };
        if (key.indexOf('manual-person-') === 0) {
          var rowId = Number(key.replace('manual-person-', ''));
          var roleName = document.getElementById('manualRoleName-' + rowId)
            ? document.getElementById('manualRoleName-' + rowId).value.trim()
            : '';
          var personName = document.getElementById('manualPersonName-' + rowId)
            ? document.getElementById('manualPersonName-' + rowId).value.trim()
            : '';
          if (!roleName || !personName) {
            showToast('请先填写岗位和姓名，再上传画面', 'error');
            return null;
          }
          syncManualRowsFromDom();
          return {
            kind: 'role',
            role_name: roleName,
            person_name: personName,
            source_org_id: currentGroup.id
          };
        }
        if (key.indexOf('assignment-') === 0) {
          var assignmentId = Number(key.replace('assignment-', ''));
          var assignment = (currentBundle.assignments || []).find(function (item) {
            return Number(item.assignment_person_id) === assignmentId;
          });
          if (assignment) {
            return {
              kind: 'role',
              demand_id: assignment.demand_id,
              assignment_person_id: assignment.assignment_person_id,
              role_name: assignment.role_name,
              person_name: assignment.person_name,
              source_org_id: currentGroup.id
            };
          }
        }
        return null;
      }

      async function uploadSlotFiles(fileList, key) {
        var files = Array.from(fileList || []);
        var target = resolveSlotTarget(key);
        if (!files.length || !target || !currentSchedule || isUploading) return;
        isUploading = true;
        var label = document.getElementById('upload-label-' + key);
        var originalBytes = 0;
        var uploadedBytes = 0;
        try {
          for (var i = 0; i < files.length; i += 1) {
            label.firstChild.textContent = '正在压缩并上传 ' + (i + 1) + '/' + files.length;
            var uploadedAsset = await ReadingMedia.uploadAsset(
              readingContext,
              currentSchedule,
              files[i],
              target,
              target.caption || '',
              currentBundle.assets.length + i
            );
            if (uploadedAsset.upload_info) {
              originalBytes += uploadedAsset.upload_info.original_size || 0;
              uploadedBytes += uploadedAsset.upload_info.uploaded_size || 0;
            }
          }
          currentBundle = await ReadingMedia.loadScheduleBundle(currentSchedule, currentGroup.id);
          renderTaskCard();
          var savedBytes = Math.max(0, originalBytes - uploadedBytes);
          var savedText = savedBytes >= 1024 * 1024 ? '，节省 ' + (savedBytes / 1024 / 1024).toFixed(1) + 'MB' : '';
          showToast('照片已压缩上传并自动保存' + savedText, 'success');
        } catch (error) {
          showToast('上传失败：' + (error.message || error), 'error');
          renderTaskCard();
        } finally {
          isUploading = false;
        }
      }

      async function removeAsset(assetId) {
        var asset = (currentBundle.assets || []).find(function (item) {
          return Number(item.id) === Number(assetId);
        });
        if (!asset) return;
        if (!(await showConfirm('确定删除这张原始照片吗？宣委端也将不再显示。'))) return;
        try {
          await ReadingMedia.deleteAsset(asset);
          currentBundle = await ReadingMedia.loadScheduleBundle(currentSchedule, currentGroup.id);
          renderTaskCard();
          showToast('照片已删除', 'success');
        } catch (error) {
          showToast('删除失败：' + (error.message || error), 'error');
        }
      }

      init().finally(function () {
        document.body.classList.remove('app-loading');
      });
    </script>
  </body>
</html>
