<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共读影像提交 - 学委管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <link rel="stylesheet" href="css/reading-media.css?v=1" />
  </head>
  <body class="app-loading">
    <main class="container reading-page">
      <header class="page-header reading-header">
        <a class="back-btn" href="study-dashboard.html" aria-label="返回学委管理首页"></a>
        <div class="reading-header-copy">
          <h1 class="page-title">共读影像提交</h1>
          <p>上传原始照片和会议截图，岗位、姓名与共读类型直接读取当天排班。</p>
        </div>
      </header>

      <section class="reading-toolbar" aria-label="选择日期">
        <div class="reading-field">
          <label for="readingDate">共读日期</label>
          <input class="reading-input" id="readingDate" type="date" onchange="loadDailyTasks()" />
        </div>
        <button class="reading-btn" type="button" onclick="goToday()">回到今天</button>
      </section>

      <section>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title">当天共读任务</h2>
            <p class="reading-section-note">选择对应组织后提交素材；系统始终保存原图。</p>
          </div>
        </div>
        <div class="reading-task-list" id="taskList">
          <div class="reading-empty">正在读取当天共读安排...</div>
        </div>
      </section>

      <section class="reading-panel" id="uploadPanel" hidden>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title" id="uploadTitle">提交晨读影像</h2>
            <p class="reading-section-note" id="uploadMeta"></p>
          </div>
          <span class="task-scope" id="uploadScope">共读</span>
        </div>

        <div class="assignment-strip" id="assignmentStrip"></div>

        <div class="upload-grid">
          <div class="reading-field">
            <label for="assetTarget">照片内容</label>
            <select class="reading-select" id="assetTarget"></select>
          </div>
          <div class="reading-field">
            <label for="assetCaption">补充说明（选填）</label>
            <input class="reading-input" id="assetCaption" maxlength="80" placeholder="例如：共读开场、全班合影" />
          </div>
        </div>

        <div class="upload-help">
          请直接上传原图，不必提前裁切。宣委制作长图时会按小组、班级或大班版式重新取景，原图不会被覆盖。
        </div>

        <div style="display: flex; gap: 10px; margin-top: 14px">
          <label class="reading-btn primary upload-file" style="flex: 1">
            <span data-icon="ImagesIcon"></span>
            <span id="uploadButtonLabel">选择并上传照片</span>
            <input
              id="assetFiles"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              multiple
              onchange="uploadSelectedFiles(this.files)"
            />
          </label>
        </div>
      </section>

      <section class="reading-panel" id="assetPanel" hidden>
        <div class="reading-section-head">
          <div>
            <h2 class="reading-section-title">已提交素材</h2>
            <p class="reading-section-note" id="assetSummary">共 0 张</p>
          </div>
        </div>
        <div class="asset-grid" id="assetGrid"></div>
      </section>
    </main>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=16"></script>
    <script src="js/reading-media.js?v=1"></script>
    <script>
      renderModuleBottomNav('study', 'media');

      var readingContext = null;
      var dailySchedules = [];
      var dailyAssetCounts = {};
      var selectedSchedule = null;
      var selectedBundle = null;
      var isUploading = false;

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        if (!(await guardModuleAccess('study'))) return;

        try {
          readingContext = await ReadingMedia.loadContext('study');
          document.getElementById('readingDate').value = getToday();
          await loadDailyTasks();
        } catch (error) {
          showToast('共读影像加载失败：' + (error.message || error), 'error');
          renderTaskEmpty('暂时无法读取共读安排');
        }
      }

      function goToday() {
        document.getElementById('readingDate').value = getToday();
        loadDailyTasks();
      }

      async function loadDailyTasks() {
        var date = document.getElementById('readingDate').value || getToday();
        selectedSchedule = null;
        selectedBundle = null;
        document.getElementById('uploadPanel').hidden = true;
        document.getElementById('assetPanel').hidden = true;
        document.getElementById('taskList').innerHTML = '<div class="reading-empty">正在读取当天共读安排...</div>';

        try {
          dailySchedules = await ReadingMedia.loadSchedules(readingContext, date);
          dailyAssetCounts = {};
          var ids = dailySchedules.map(function (schedule) {
            return Number(schedule.id);
          });
          if (ids.length) {
            var assetResult = await window.db
              .from('study_reading_media_assets')
              .select('id,schedule_instance_id')
              .in('schedule_instance_id', ids);
            if (assetResult.error) throw assetResult.error;
            (assetResult.data || []).forEach(function (asset) {
              var key = Number(asset.schedule_instance_id);
              dailyAssetCounts[key] = (dailyAssetCounts[key] || 0) + 1;
            });
          }
          renderTaskList();
          if (dailySchedules.length === 1) await selectSchedule(dailySchedules[0].id);
        } catch (error) {
          renderTaskEmpty('共读安排加载失败：' + (error.message || error));
        }
      }

      function renderTaskEmpty(message) {
        document.getElementById('taskList').innerHTML = '<div class="reading-empty">' + escapeHtml(message) + '</div>';
      }

      function renderTaskList() {
        if (!dailySchedules.length) {
          renderTaskEmpty('当天没有可提交的共读日程');
          return;
        }
        document.getElementById('taskList').innerHTML = dailySchedules
          .map(function (schedule) {
            var org = readingContext.orgMap[Number(schedule.org_id)];
            var count = dailyAssetCounts[Number(schedule.id)] || 0;
            return (
              '<article class="reading-task-card" id="task-' +
              schedule.id +
              '" onclick="selectSchedule(' +
              schedule.id +
              ')">' +
              '<div class="task-card-head"><span class="task-scope">' +
              escapeHtml(ReadingMedia.getScopeLabel(schedule.scope_level)) +
              '</span><span class="task-count">' +
              count +
              ' 张素材</span></div>' +
              '<h3 class="task-org">' +
              escapeHtml((org && org.name) || '未命名组织') +
              '</h3>' +
              '<div class="task-path">' +
              escapeHtml(ReadingMedia.getOrgPath(schedule.org_id, readingContext.orgMap)) +
              '</div>' +
              '<div class="task-meta">' +
              escapeHtml(ReadingMedia.formatDisplayDate(schedule.schedule_date)) +
              ' · ' +
              escapeHtml(ReadingMedia.getWeekday(schedule.schedule_date)) +
              '</div></article>'
            );
          })
          .join('');
      }

      async function selectSchedule(scheduleId) {
        selectedSchedule =
          dailySchedules.find(function (schedule) {
            return Number(schedule.id) === Number(scheduleId);
          }) || null;
        if (!selectedSchedule) return;

        document.querySelectorAll('.reading-task-card').forEach(function (card) {
          card.classList.toggle('active', card.id === 'task-' + selectedSchedule.id);
        });
        document.getElementById('uploadPanel').hidden = false;
        document.getElementById('assetPanel').hidden = false;
        document.getElementById('assignmentStrip').innerHTML = '<span class="assignment-chip">正在读取岗位...</span>';
        document.getElementById('assetGrid').innerHTML =
          '<div class="reading-empty" style="grid-column: 1 / -1">正在读取素材...</div>';

        try {
          selectedBundle = await ReadingMedia.loadScheduleBundle(selectedSchedule);
          renderUploadPanel();
          renderAssets();
          document.getElementById('uploadPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch (error) {
          showToast('任务加载失败：' + (error.message || error), 'error');
        }
      }

      function renderUploadPanel() {
        var org = readingContext.orgMap[Number(selectedSchedule.org_id)];
        var readingTypeName =
          (selectedBundle.readingType && selectedBundle.readingType.type_name) ||
          ReadingMedia.getScopeLabel(selectedSchedule.scope_level);
        document.getElementById('uploadTitle').textContent = ((org && org.name) || '当前组织') + ' · 晨读影像';
        document.getElementById('uploadMeta').textContent =
          ReadingMedia.formatDisplayDate(selectedSchedule.schedule_date) +
          ' · ' +
          ReadingMedia.getWeekday(selectedSchedule.schedule_date);
        document.getElementById('uploadScope').textContent = readingTypeName;

        var assignments = selectedBundle.assignments || [];
        document.getElementById('assignmentStrip').innerHTML = assignments.length
          ? assignments
              .map(function (assignment) {
                return (
                  '<span class="assignment-chip">' +
                  escapeHtml(assignment.role_name) +
                  ' · <strong>' +
                  escapeHtml(assignment.person_name) +
                  '</strong></span>'
                );
              })
              .join('')
          : '<span class="assignment-chip">当天尚未完成人员落位，可先上传全员画面或花絮</span>';

        var targetOptions = [
          '<option value="overview">全员画面</option>',
          '<option value="moment">现场花絮</option>',
          '<option value="other">其他素材</option>'
        ];
        assignments.forEach(function (assignment) {
          targetOptions.push(
            '<option value="assignment:' +
              assignment.assignment_person_id +
              '">' +
              escapeHtml(assignment.role_name + ' · ' + assignment.person_name) +
              '</option>'
          );
        });
        document.getElementById('assetTarget').innerHTML = targetOptions.join('');
      }

      function resolveUploadTarget() {
        var value = document.getElementById('assetTarget').value;
        if (value.indexOf('assignment:') === 0) {
          var assignmentId = Number(value.split(':')[1]);
          var assignment = (selectedBundle.assignments || []).find(function (item) {
            return Number(item.assignment_person_id) === assignmentId;
          });
          if (assignment) {
            return {
              kind: 'role',
              demand_id: assignment.demand_id,
              assignment_person_id: assignment.assignment_person_id,
              role_name: assignment.role_name,
              person_name: assignment.person_name
            };
          }
        }
        return { kind: value || 'other' };
      }

      async function uploadSelectedFiles(fileList) {
        var files = Array.from(fileList || []);
        if (!files.length || !selectedSchedule || isUploading) return;
        isUploading = true;
        var label = document.getElementById('uploadButtonLabel');
        var target = resolveUploadTarget();
        var caption = document.getElementById('assetCaption').value.trim();
        var uploaded = 0;
        try {
          for (var i = 0; i < files.length; i += 1) {
            label.textContent = '正在上传 ' + (i + 1) + '/' + files.length;
            await ReadingMedia.uploadAsset(
              readingContext,
              selectedSchedule,
              files[i],
              target,
              caption,
              selectedBundle.assets.length + i
            );
            uploaded += 1;
          }
          selectedBundle = await ReadingMedia.loadScheduleBundle(selectedSchedule);
          dailyAssetCounts[Number(selectedSchedule.id)] = selectedBundle.assets.length;
          renderTaskList();
          document.getElementById('task-' + selectedSchedule.id).classList.add('active');
          renderAssets();
          document.getElementById('assetCaption').value = '';
          showToast('已上传 ' + uploaded + ' 张原图', 'success');
        } catch (error) {
          showToast('上传失败：' + (error.message || error), 'error');
        } finally {
          isUploading = false;
          label.textContent = '选择并上传照片';
          document.getElementById('assetFiles').value = '';
        }
      }

      function getAssetKindLabel(asset) {
        if (asset.asset_kind === 'role') return asset.role_name_snapshot || '岗位人物';
        if (asset.asset_kind === 'overview') return '全员画面';
        if (asset.asset_kind === 'moment') return '现场花絮';
        return '其他素材';
      }

      function renderAssets() {
        var assets = (selectedBundle && selectedBundle.assets) || [];
        document.getElementById('assetSummary').textContent = '共 ' + assets.length + ' 张，宣委端会直接调用这些原图';
        if (!assets.length) {
          document.getElementById('assetGrid').innerHTML =
            '<div class="reading-empty" style="grid-column: 1 / -1">还没有素材，请上传当天的原始照片或会议截图。</div>';
          return;
        }
        document.getElementById('assetGrid').innerHTML = assets
          .map(function (asset) {
            var title =
              asset.asset_kind === 'role'
                ? (asset.role_name_snapshot || '岗位') + ' · ' + (asset.person_name_snapshot || '未命名人员')
                : getAssetKindLabel(asset);
            return (
              '<article class="asset-card">' +
              '<div class="asset-thumb"><img alt="' +
              escapeHtml(title) +
              '" src="' +
              escapeHtml(asset.signed_url) +
              '"><span class="asset-kind">' +
              escapeHtml(getAssetKindLabel(asset)) +
              '</span></div>' +
              '<div class="asset-card-body"><div class="asset-card-title">' +
              escapeHtml(title) +
              '</div><div class="asset-card-subtitle">' +
              escapeHtml(asset.caption || asset.file_name || '原始图片') +
              '</div><div class="asset-card-actions">' +
              '<button class="asset-delete" type="button" onclick="removeAsset(' +
              asset.id +
              ')">删除</button></div></div></article>'
            );
          })
          .join('');
      }

      async function removeAsset(assetId) {
        var asset = (selectedBundle.assets || []).find(function (item) {
          return Number(item.id) === Number(assetId);
        });
        if (!asset) return;
        if (!(await showConfirm('确定删除这张原始照片吗？宣委端也将不再显示。'))) return;
        try {
          await ReadingMedia.deleteAsset(asset);
          selectedBundle = await ReadingMedia.loadScheduleBundle(selectedSchedule);
          dailyAssetCounts[Number(selectedSchedule.id)] = selectedBundle.assets.length;
          renderTaskList();
          document.getElementById('task-' + selectedSchedule.id).classList.add('active');
          renderAssets();
          showToast('照片已删除', 'success');
        } catch (error) {
          showToast('删除失败：' + (error.message || error), 'error');
        }
      }

      init().finally(function () {
        document.body.classList.remove('app-loading');
      });
    </script>
  </body>
</html>
