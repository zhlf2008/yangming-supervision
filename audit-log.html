<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>操作日志 - 阳明心学督察管理系统</title>
    <link rel="preconnect" href="https://whvjfurrkusdwujjodwc.supabase.co" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="css/common.css" />
    <style>
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--ink-dark);
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
      }
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .filter-btn {
        padding: 6px 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-card);
        font-size: 12px;
        cursor: pointer;
        color: var(--ink-muted);
      }
      .filter-btn.active {
        background: var(--vermillion);
        color: #fff;
        border-color: var(--vermillion);
      }
      .log-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .log-item {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
      }
      .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .log-action {
        font-size: 13px;
        font-weight: 500;
      }
      .log-time {
        font-size: 11px;
        color: var(--ink-muted);
      }
      .log-user {
        font-size: 12px;
        color: var(--ink-light);
      }
      .log-detail {
        font-size: 12px;
        color: var(--ink-muted);
        margin-top: 4px;
      }
      .log-action.考勤提交 {
        color: #2e7d32;
      }
      .log-action.添加人员 {
        color: #1565c0;
      }
      .log-action.编辑人员 {
        color: #1565c0;
      }
      .log-action.删除人员 {
        color: var(--vermillion);
      }
      .log-action.组织修改 {
        color: #ef6c00;
      }
      .log-action.删除组织 {
        color: var(--vermillion);
      }
      .log-action.推送提醒 {
        color: #6a1b9a;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--ink-muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <a
          href="index.html"
          class="back-btn"
          aria-label="返回"
          onclick="
            event.preventDefault();
            window.history.back();
          "
          >←</a
        >
        <h1 class="page-title">操作日志</h1>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterLogs('all', this)">全部</button>
        <button class="filter-btn" onclick="filterLogs('考勤提交', this)">考勤</button>
        <button class="filter-btn" onclick="filterLogs('添加人员', this)">人员</button>
        <button class="filter-btn" onclick="filterLogs('组织修改', this)">组织</button>
        <button class="filter-btn" onclick="filterLogs('推送提醒', this)">推送</button>
      </div>
      <div id="logList" class="log-list">
        <div class="empty-state">加载中...</div>
      </div>
    </div>
    <div id="bottomNavContainer"></div>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script>
      renderBottomNav('');
    </script>
    <script>
      // 备份定义，防止 utils.js 缓存问题
      if (typeof escapeHtml === 'undefined') {
        function escapeHtml(text) {
          if (!text) return '';
          var d = document.createElement('div');
          d.textContent = String(text);
          return d.innerHTML;
        }
      }
      var currentFilter = 'all';
      var allLogs = [];

      var debugInfo = [];

      async function init() {
        debugInfo.push('1-init开始');
        updateDebug();
        var user = checkLogin();
        if (!user) {
          debugInfo.push('2-未登录');
          updateDebug();
          return;
        }
        debugInfo.push('2-已登录:' + user.role);
        updateDebug();
        if (user.role !== '超级管理员' && user.role !== '管理员') {
          debugInfo.push('3-无权限');
          updateDebug();
          return;
        }
        debugInfo.push('3-权限OK');
        updateDebug();
        try {
          debugInfo.push('4-等待SDK...');
          updateDebug();
          await waitForDb();
          debugInfo.push('5-SDK就绪');
          updateDebug();
        } catch (e) {
          debugInfo.push('5-SDK失败:' + e.message);
          updateDebug();
          return;
        }
        try {
          debugInfo.push('6-刷新用户...');
          updateDebug();
          await refreshCurrentUser();
          debugInfo.push('7-用户已刷新');
          updateDebug();
        } catch (e) {
          debugInfo.push('7-刷新失败:' + e.message);
          updateDebug();
        }
        debugInfo.push('8-开始加载日志...');
        updateDebug();
        await loadLogs();
        debugInfo.push('9-完成');
        updateDebug();
      }

      function updateDebug() {
        document.getElementById('logList').innerHTML = debugInfo.map(function(s) {
          return '<div style="padding:4px 12px;font-size:13px;color:#555;font-family:monospace">' + s + '</div>';
        }).join('');
      }

      async function loadLogs() {
        debugInfo.push('8a-查询日志(直连)...');
        updateDebug();
        try {
          var logsResult = await window.supabaseClient
            .from('audit_logs')
            .select('action,user_name,target,detail,created_at')
            .order('created_at', { ascending: false })
            .limit(200);

          debugInfo.push('8b-日志查询完成,data=' + (logsResult.data ? logsResult.data.length : 'null') + ',error=' + (logsResult.error ? logsResult.error.message : 'null'));
          updateDebug();

          if (logsResult.error) {
            var errMsg = logsResult.error ? (logsResult.error.message || '未知错误') : '未知错误';
            document.getElementById('logList').textContent = '加载失败: ' + errMsg;
            return;
          }
          allLogs = logsResult.data || [];

          try {
            debugInfo.push('8c-查询学期...');
            updateDebug();
            var currentSemesterId = await getCurrentSemesterId();
            if (currentSemesterId) {
              var semResult = await window.supabaseClient.from('semesters').select('start_date').eq('id', currentSemesterId).single();
              debugInfo.push('8d-学期查询完成');
              updateDebug();
              if (semResult.data && semResult.data.start_date) {
                var semesterStart = semResult.data.start_date;
                allLogs = allLogs.filter(function (l) {
                  return l.created_at >= semesterStart;
                });
              }
            }
          } catch (e) {
            debugInfo.push('8d-学期失败:' + e.message);
            updateDebug();
          }

          renderLogs();
        } catch (e) {
          var errMsg = 'unknown';
          try { errMsg = e ? (e.message || JSON.stringify(e)) : 'null'; } catch (_) {}
          debugInfo.push('8x-异常:' + errMsg);
          updateDebug();
        }
      }

      function filterLogs(type, el) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(function (b) {
          b.classList.remove('active');
        });
        el.classList.add('active');
        renderLogs();
      }

      function renderLogs() {
        var filtered =
          currentFilter === 'all'
            ? allLogs
            : allLogs.filter(function (l) {
                return l.action === currentFilter || l.action.includes(currentFilter);
              });
        var container = document.getElementById('logList');
        if (filtered.length === 0) {
          container.innerHTML = '<div class="empty-state">暂无日志</div>';
          return;
        }
        container.innerHTML = filtered
          .map(function (l) {
            var time = new Date(l.created_at).toLocaleString('zh-CN', {
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit'
            });
            var detail = l.detail || '';
            if (l.target) detail = l.target + (detail ? ' - ' + detail : '');
            return (
              '<div class="log-item">' +
              '<div class="log-header">' +
              '<span class="log-action ' +
              l.action +
              '">' +
              escapeHtml(l.action) +
              '</span>' +
              '<span class="log-time">' +
              time +
              '</span>' +
              '</div>' +
              '<div class="log-user">' +
              escapeHtml(l.user_name || '系统') +
              '</div>' +
              (detail ? '<div class="log-detail">' + escapeHtml(detail) + '</div>' : '') +
              '</div>'
            );
          })
          .join('');
      }

      init();
    </script>
  </body>
</html>
