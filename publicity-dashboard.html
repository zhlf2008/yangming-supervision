<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宣委管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <style>
      .header {
        position: relative;
        margin-bottom: 22px;
        padding: 30px 20px 20px;
        text-align: center;
      }
      .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        width: 60px;
        height: 4px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: linear-gradient(90deg, #28685d, var(--gold));
      }
      .header-title {
        color: var(--ink-dark);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 25px;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .header-subtitle {
        margin-top: 7px;
        color: var(--ink-muted);
        font-size: 13px;
      }
      .module-switch {
        margin-top: 12px;
        margin-left: -20px;
      }
      .user-card {
        padding: 18px;
        margin-bottom: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .user-card a {
        display: flex;
        align-items: center;
        gap: 16px;
        color: inherit;
        text-decoration: none;
      }
      .user-avatar {
        display: flex;
        width: 54px;
        height: 54px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, #28685d, #4f8b80);
        color: #fff;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        font-weight: 700;
        box-shadow: 0 4px 16px rgba(40, 104, 93, 0.25);
      }
      .user-info {
        min-width: 0;
        flex: 1;
      }
      .user-name {
        overflow: hidden;
        margin-bottom: 4px;
        font-size: 17px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .user-role {
        color: var(--ink-muted);
        font-size: 13px;
      }
      .user-arrow {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: var(--ink-muted);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 14px;
        padding-left: 4px;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        font-weight: 600;
      }
      .section-title::before {
        content: '';
        width: 3px;
        height: 16px;
        flex-shrink: 0;
        border-radius: 2px;
        background: linear-gradient(180deg, #28685d, var(--gold));
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .action-card {
        display: block;
        min-height: 142px;
        padding: 18px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 12px var(--shadow);
        color: inherit;
        text-align: center;
        text-decoration: none;
        transition: transform 0.2s;
      }
      .action-card:active {
        transform: scale(0.96);
      }
      .action-card .icon {
        display: flex;
        width: 52px;
        height: 52px;
        align-items: center;
        justify-content: center;
        margin: 0 auto 13px;
        border-radius: 14px;
        background: linear-gradient(135deg, #e5f2ed, #f6fbf8);
        color: #28685d;
        font-size: 25px;
      }
      .action-card:nth-child(2) .icon {
        background: linear-gradient(135deg, var(--gold-light), #fbf7f2);
        color: #8a5d2e;
      }
      .action-card:nth-child(3) .icon {
        background: linear-gradient(135deg, var(--vermillion-light), #ffeced);
        color: var(--vermillion);
      }
      .action-card .title {
        margin-bottom: 6px;
        font-size: 15px;
        font-weight: 600;
      }
      .action-card .desc {
        color: var(--ink-muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .action-card.disabled {
        cursor: default;
        opacity: 0.58;
      }
      .action-card.disabled:active {
        transform: none;
      }
      .coming-soon {
        display: inline-block;
        margin-top: 5px;
        color: #28685d;
        font-size: 10px;
        font-weight: 600;
      }
      @media (max-width: 360px) {
        .container {
          padding-inline: 12px;
        }
        .action-grid {
          gap: 12px;
        }
        .action-card {
          min-height: 134px;
          padding: 16px 8px;
        }
      }
    </style>
  </head>
  <body class="app-loading">
    <main class="container">
      <header class="header">
        <h1 class="header-title">阳明心学宣委管理系统</h1>
        <p class="header-subtitle" id="semesterSubtitle">加载中...</p>
        <a class="back-btn module-switch" href="portal.html?from=publicity-dashboard" aria-label="切换模块"></a>
      </header>

      <div class="user-card">
        <a href="profile.html?system=publicity&from=publicity-dashboard">
          <div class="user-avatar" id="profileAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="profileName">加载中...</div>
            <div class="user-role" id="profileRole">加载中...</div>
          </div>
          <span class="user-arrow" data-icon="ChevronRightIcon"></span>
        </a>
      </div>

      <h2 class="section-title">宣委工作台</h2>
      <div class="action-grid">
        <a class="action-card" href="publicity-homework-card.html?from=publicity-dashboard">
          <div class="icon" data-icon="FileEditIcon"></div>
          <div class="title">优秀作业卡片制作</div>
          <div class="desc">查看各小组优秀作业，排版并导出转发图片</div>
        </a>

        <a class="action-card" href="publicity-reading-media.html?from=publicity-dashboard">
          <div class="icon" data-icon="ImagesIcon"></div>
          <div class="title">每日共读影像</div>
          <div class="desc">调用学委素材，自动排版、裁切并导出长图</div>
        </a>

        <div class="action-card disabled" aria-disabled="true">
          <div class="icon" data-icon="ClipboardCheckIcon"></div>
          <div class="title">发布记录</div>
          <div class="desc">查看已完成卡片和历史发布状态</div>
          <span class="coming-soon">后续开放</span>
        </div>
      </div>
    </main>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=16"></script>
    <script>
      renderModuleBottomNav('publicity', 'home');

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var profile = checkLogin();
        if (!profile) return;
        if (!(await guardModuleAccess('publicity'))) return;

        var userName = profile.name || '未知';
        document.getElementById('profileName').textContent = userName;
        document.getElementById('profileAvatar').textContent = userName.charAt(0);
        document.getElementById('profileRole').textContent = profile.role || '宣委成员';

        var semesterId = await getCurrentSemesterId();
        if (!semesterId) {
          setCurrentSemester('semesterSubtitle', '暂无当前学期');
          return;
        }
        var result = await window.db.from('semesters').select('semester_name').eq('id', semesterId).single();
        setCurrentSemester(
          'semesterSubtitle',
          result.data ? result.data.semester_name : '当前学期'
        );
      }

      init().finally(function () {
        document.body.classList.remove('app-loading');
      });
    </script>
  </body>
</html>
