<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 组织架构</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; font-size: 18px; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .tree-container { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
      .tree-node { border-bottom: 1px solid var(--border); }
      .tree-node:last-child { border-bottom: none; }
      .tree-node-content { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .tree-node-content:hover { background: var(--gold-light); }
      .tree-node-content.level-0 { font-weight: 600; }
      .tree-node-content.level-1 { padding-left: 32px; }
      .tree-node-content.level-2 { padding-left: 52px; }
      .tree-node-content.archived { opacity: 0.6; }
      .tree-expand-btn { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .tree-expand-btn.expanded { transform: rotate(90deg); }
      .tree-node-name { flex: 1; color: var(--ink-dark); font-size: 14px; }
      .tree-node-count { color: var(--ink-muted); font-size: 12px; }
      .sort-btn { background: none; border: none; color: var(--ink-muted); cursor: pointer; padding: 2px 4px; font-size: 11px; line-height: 1; }
      .sort-btn:hover { color: var(--ink-dark); }
      .sort-btn:disabled { opacity: 0.2; cursor: default; }
      .tree-child-wrap { }
      .tree-child-wrap.collapsed { display: none; }
      .archived-badge { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #fce4ec; color: var(--vermillion); }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
      .toolbar .toggle-label { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
      .toolbar input[type="checkbox"] { width: 16px; height: 16px; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">组织架构</h1>
      </header>

      <section class="section">
        <div class="form-item">
          <label class="form-label">学期</label>
          <select class="form-select" id="semesterSelect" onchange="onSemesterChange()"></select>
        </div>
        <div class="toolbar">
          <label class="toggle-label"><input type="checkbox" id="archiveToggle" onchange="renderOrgTree()" /> 显示已归档</label>
          <span style="flex:1;"></span>
          <button class="btn btn-primary btn-sm" id="addBigClassBtn" onclick="showAddOrgModal('bigclass', null)">+ 大班</button>
        </div>
        <div class="tree-container" id="orgTree"><div class="empty-state">请先选择学期</div></div>
      </section>
    </div>

    <!-- Org Modal -->
    <div class="modal-overlay" id="orgModal">
      <div class="modal">
        <div class="modal-title" id="orgModalTitle">新增组织</div>
        <input type="hidden" id="orgId" />
        <input type="hidden" id="orgLevel" />
        <input type="hidden" id="parentOrgId" />
        <div class="form-item">
          <label class="form-label">名称</label>
          <input class="form-input" id="orgName" placeholder="请输入名称" />
        </div>
        <div class="form-item" id="parentOrgDisplay" style="display:none;">
          <label class="form-label">上级组织</label>
          <div id="parentOrgName" style="padding:10px 12px; background:var(--bg-primary); border-radius:8px; font-size:14px;"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeOrgModal()">取消</button>
          <button class="btn btn-primary" id="orgSaveBtn" onclick="saveOrg()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var semesters = [];
      var currentSemesterId = null;
      var organizations = [];
      var expandedNodes = new Set();

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadSemesters();
      }

      async function loadSemesters() {
        var { data, error } = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        if (error) { showToast('加载学期失败', 'error'); return; }
        semesters = data || [];
        var select = document.getElementById('semesterSelect');
        select.innerHTML = semesters.length
          ? semesters.map(function (s) {
              var selected = s.is_current === 1 ? ' selected' : '';
              return '<option value="' + s.id + '"' + selected + '>' + escapeHtml(s.semester_name) + '</option>';
            }).join('')
          : '<option value="">暂无学期</option>';
        if (semesters.length) await onSemesterChange();
      }

      async function onSemesterChange() {
        currentSemesterId = Number(document.getElementById('semesterSelect').value);
        expandedNodes.clear();
        await loadOrganizations();
      }

      async function loadOrganizations() {
        if (!currentSemesterId) { document.getElementById('orgTree').innerHTML = '<div class="empty-state">请先选择学期</div>'; return; }
        var { data, error } = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
        if (error) { showToast('加载组织失败', 'error'); return; }
        organizations = data || [];
        renderOrgTree();
      }

      function getChildren(parentId) {
        return organizations.filter(function (o) { return Number(o.parent_id) === Number(parentId); });
      }

      function getTotalPeople(orgId) {
        var count = 0;
        var children = getChildren(orgId);
        children.forEach(function (c) { count += getTotalPeople(c.id); });
        // Count actual people assigned to this org in person_org_assignments
        // We'll just show org structure here without live counts for simplicity
        return '';
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        var showArchived = document.getElementById('archiveToggle').checked;

        var bigClasses = organizations.filter(function (o) { return o.level === '大班'; });
        if (!bigClasses.length) { container.innerHTML = '<div class="empty-state">该学期暂无组织</div>'; return; }

        container.innerHTML = bigClasses.map(function (bc) {
          return renderNode(bc, 0, showArchived);
        }).join('');
      }

      function renderNode(org, depth, showArchived) {
        var children = getChildren(org.id);
        if (org.is_active === false && !showArchived) return '';

        var nodeId = 'node-' + org.id;
        var isExpanded = expandedNodes.has(nodeId);
        var levelClass = depth === 0 ? 'level-0' : depth === 1 ? 'level-1' : 'level-2';

        var userCount = organizations.filter(function (o) { return Number(o.parent_id) === Number(org.id); }).length;

        var childrenHtml = '';
        if (children.length) {
          childrenHtml = '<div class="tree-child-wrap' + (isExpanded ? '' : ' collapsed') + '">' +
            children.map(function (c) { return renderNode(c, depth + 1, showArchived); }).join('') +
            '</div>';
        }

        var siblings = organizations.filter(function(o) { return Number(o.parent_id) === Number(org.parent_id) && o.level === org.level && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order || 0) - (b.sort_order || 0); });
        var sibIdx = siblings.indexOf(org);
        var isFirst = sibIdx <= 0, isLast = sibIdx >= siblings.length - 1;

        var actionsHtml = '<button class="sort-btn" onclick="event.stopPropagation();moveOrg(' + org.id + ',-1)"' + (isFirst ? ' disabled' : '') + '>▲</button>' +
          '<button class="sort-btn" onclick="event.stopPropagation();moveOrg(' + org.id + ',1)"' + (isLast ? ' disabled' : '') + '>▼</button>';
        if (depth === 0) {
          actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); showAddOrgModal(\'class\', ' + org.id + ')">+班级</button>';
        } else if (depth === 1) {
          actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); showAddOrgModal(\'group\', ' + org.id + ')">+小组</button>';
        }
        actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); showEditOrgModal(' + org.id + ')">编辑</button>';
        actionsHtml += '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteOrg(' + org.id + ')">' + (org.is_active === false ? '恢复' : '归档') + '</button>';

        var hasChildren = children.length > 0;

        return (
          '<div class="tree-node">' +
          '<div class="tree-node-content ' + levelClass + (org.is_active === false ? ' archived' : '') + '" onclick="toggleNode(\'' + nodeId + '\')">' +
          '<span class="tree-expand-btn' + (isExpanded ? ' expanded' : '') + '">' + (hasChildren ? '▶' : '') + '</span>' +
          (org.is_active === false ? '<span class="archived-badge">已归档</span>' : '') +
          '<span class="tree-node-name">' + escapeHtml(org.name) + (org.level ? ' <span style="font-size:11px;color:var(--ink-muted);font-weight:400;">(' + org.level + ')</span>' : '') + '</span>' +
          '<span class="tree-node-count"></span>' +
          '<div class="tree-node-actions" style="display:flex;gap:4px;flex-shrink:0;">' + actionsHtml + '</div>' +
          '</div>' +
          childrenHtml +
          '</div>'
        );
      }

      function toggleNode(nodeId) {
        if (expandedNodes.has(nodeId)) expandedNodes.delete(nodeId);
        else expandedNodes.add(nodeId);
        renderOrgTree();
      }

      // ---- Org CRUD ----
      function showAddOrgModal(level, parentId) {
        document.getElementById('orgModalTitle').textContent =
          level === 'bigclass' ? '新增大班' : level === 'class' ? '新增班级' : '新增小组';
        document.getElementById('orgId').value = '';
        document.getElementById('orgLevel').value = level === 'bigclass' ? '大班' : level === 'class' ? '班级' : '小组';
        document.getElementById('parentOrgId').value = parentId || '';
        document.getElementById('orgName').value = '';

        if (parentId) {
          var parent = organizations.find(function (o) { return Number(o.id) === Number(parentId); });
          document.getElementById('parentOrgDisplay').style.display = 'block';
          document.getElementById('parentOrgName').textContent = parent ? parent.name : '';
        } else {
          document.getElementById('parentOrgDisplay').style.display = 'none';
        }
        document.getElementById('orgModal').classList.add('show');
      }

      function showEditOrgModal(id) {
        var org = organizations.find(function (o) { return Number(o.id) === Number(id); });
        if (!org) return;
        document.getElementById('orgModalTitle').textContent = '编辑组织';
        document.getElementById('orgId').value = org.id;
        document.getElementById('orgLevel').value = org.level;
        document.getElementById('parentOrgId').value = org.parent_id || '';
        document.getElementById('orgName').value = org.name || '';

        if (org.parent_id) {
          var parent = organizations.find(function (o) { return Number(o.id) === Number(org.parent_id); });
          document.getElementById('parentOrgDisplay').style.display = 'block';
          document.getElementById('parentOrgName').textContent = parent ? parent.name : '';
        } else {
          document.getElementById('parentOrgDisplay').style.display = 'none';
        }
        document.getElementById('orgModal').classList.add('show');
      }

      function closeOrgModal() { document.getElementById('orgModal').classList.remove('show'); }

      async function saveOrg() {
        var id = document.getElementById('orgId').value;
        var name = document.getElementById('orgName').value.trim();
        var level = document.getElementById('orgLevel').value;
        var parentId = document.getElementById('parentOrgId').value;

        if (!name) { showToast('请填写名称', 'error'); return; }

        document.getElementById('orgSaveBtn').disabled = true;
        try {
          var payload = {
            name: name,
            level: level,
            parent_id: parentId ? Number(parentId) : null,
            semester_id: currentSemesterId,
            sort_order: 0
          };
          var result = id
            ? await window.db.from('organizations').update(payload).eq('id', id)
            : await window.db.from('organizations').insert(payload);
          if (result.error) throw result.error;
          logAction(id ? '编辑组织' : '新增组织', 'organizations', name);
          showToast('保存成功', 'success');
          closeOrgModal();
          await loadOrganizations();
        } catch (error) { showToast('保存失败', 'error'); }
        finally { document.getElementById('orgSaveBtn').disabled = false; }
      }

      async function deleteOrg(id) {
        var org = organizations.find(function (o) { return Number(o.id) === Number(id); });
        if (!org) return;
        var action = org.is_active === false ? '恢复' : '归档';
        var confirmed = await showConfirm('确定' + action + '「' + org.name + '」吗？' +
          (action === '归档' ? '\n归档后将在默认视图中隐藏。' : ''));
        if (!confirmed) return;
        try {
          if (org.is_active === false) {
            await window.db.from('organizations').update({ is_active: true }).eq('id', id);
          } else {
            await window.db.from('organizations').update({ is_active: false }).eq('id', id);
          }
          showToast(action + '成功', 'success');
          await loadOrganizations();
        } catch (error) { showToast('操作失败', 'error'); }
      }

      async function moveOrg(id, direction) {
        var siblings = organizations.filter(function(o) { return Number(o.parent_id) === Number(organizations.find(function(x) { return Number(x.id) === Number(id); }).parent_id) && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order || 0) - (b.sort_order || 0); });
        var idx = siblings.findIndex(function(s) { return Number(s.id) === Number(id); });
        if (idx === -1) return;
        var swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= siblings.length) return;
        var currentSort = siblings[idx].sort_order || 0;
        var swapSort = siblings[swapIdx].sort_order || 0;
        if (currentSort === swapSort) { currentSort = swapSort; swapSort = swapSort + 1; }
        try {
          await window.db.from('organizations').update({ sort_order: swapSort }).eq('id', id);
          await window.db.from('organizations').update({ sort_order: currentSort }).eq('id', siblings[swapIdx].id);
          showToast('排序已更新', 'success');
          await loadOrganizations();
        } catch(e) { showToast('排序失败', 'error'); }
      }

      init();
    </script>
  </body>
</html>
