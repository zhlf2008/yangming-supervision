<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 组织架构</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-breadcrumb { display:flex; align-items:center; gap:4px; margin-bottom:14px; flex-wrap:wrap; font-size:13px; }
      .org-breadcrumb-item { color:var(--ink-muted); cursor:pointer; padding:4px 8px; border-radius:4px; white-space:nowrap; }
      .org-breadcrumb-item:hover { color:var(--vermillion); background:var(--gold-light); }
      .org-breadcrumb-item.current { color:var(--ink-dark); font-weight:700; cursor:default; background:transparent; }
      .org-breadcrumb-sep { color:var(--border); }
      .org-card-list { display:flex; flex-direction:column; gap:10px; }
      .org-level-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
      .org-level-card:active { transform:scale(0.98); }
      .org-level-card:hover { border-color:rgba(179,45,55,0.28); }
      .org-level-card.archived { opacity:0.64; }
      .org-level-card.terminal { cursor:default; }
      .org-level-card.terminal:active { transform:none; }
      .org-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
      .org-card-title { font-size:15px; font-weight:700; color:var(--ink-dark); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .org-card-subtitle { margin-top:4px; font-size:12px; color:var(--ink-muted); }
      .org-card-action { flex-shrink:0; font-size:12px; color:var(--vermillion); font-weight:700; padding-top:2px; }
      .org-card-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:12px; }
      .org-card-stats.three { grid-template-columns:repeat(3,1fr); }
      .org-card-stat { background:var(--bg-primary); border-radius:8px; padding:8px 10px; text-align:center; min-width:0; }
      .org-card-value { font-size:18px; font-weight:700; color:var(--ink-dark); line-height:1.2; }
      .org-card-label { margin-top:2px; font-size:10px; color:var(--ink-muted); }
      .org-card-actions { display:flex; gap:6px; flex-wrap:wrap; }
      .archived-badge { font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #fce4ec; color: var(--vermillion); }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
      .toolbar .toggle-label { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
      .toolbar input[type="checkbox"] { width: 16px; height: 16px; }
      .manager-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
      .manager-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--bg-primary); }
      .manager-person { min-width:0; }
      .manager-name { color:var(--ink-dark); font-size:14px; font-weight:700; }
      .manager-phone { margin-top:2px; color:var(--ink-muted); font-size:11px; }
      .manager-empty { padding:16px 12px; border:1px dashed var(--border); border-radius:10px; color:var(--ink-muted); text-align:center; font-size:12px; }
      .manager-help { margin-top:7px; color:var(--ink-muted); font-size:11px; line-height:1.55; }
      .webhook-help { margin-top:7px; color:var(--ink-muted); font-size:11px; line-height:1.55; }
      .webhook-enabled { display:flex; align-items:center; gap:7px; color:var(--ink-light); font-size:13px; cursor:pointer; }
      .webhook-enabled input { width:16px; height:16px; }
      .webhook-status { display:inline-flex; margin-top:6px; padding:2px 7px; border-radius:999px; background:var(--bg-primary); color:var(--ink-muted); font-size:10px; }
      .webhook-status.active { background:#edf7ef; color:#28713a; }
      .webhook-test { width:100%; margin-top:10px; }
      .push-settings-section { margin-bottom:12px; padding:14px; border:1px solid var(--border); border-radius:12px; background:var(--bg-primary); }
      .push-settings-title { margin-bottom:10px; color:var(--ink-dark); font-size:14px; font-weight:700; }
      .push-settings-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:10px; }
      .push-settings-grid .form-item { margin-bottom:0; }
      .push-settings-note { margin-top:8px; color:var(--ink-muted); font-size:11px; line-height:1.55; }
      .push-setting-toggle { display:flex; align-items:flex-start; gap:8px; color:var(--ink-light); font-size:13px; line-height:1.45; cursor:pointer; }
      .push-setting-toggle + .push-setting-toggle { margin-top:9px; }
      .push-setting-toggle input { flex:0 0 auto; width:16px; height:16px; margin-top:1px; }
      .push-settings-textarea { min-height:72px; resize:vertical; line-height:1.55; }
      @media (max-width:360px) {
        .org-card-stats.three { gap:6px; }
        .org-card-stat { padding-inline:6px; }
        .push-settings-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html" aria-label="返回秘书处首页"></a>
        <h1 class="page-title">组织架构</h1>
      </header>

      <section class="section">
        <div class="semester-wrap" id="semesterDisplay"></div>
        <div class="toolbar">
          <label class="toggle-label"><input type="checkbox" id="archiveToggle" onchange="renderOrgTree()" /> 显示已归档</label>
          <span style="flex:1;"></span>
          <button class="btn btn-primary btn-sm" id="addOrgBtn" onclick="showCurrentLevelAddModal()">添加大班</button>
        </div>
        <div class="org-breadcrumb" id="orgBreadcrumb"></div>
        <div id="orgTree"><div class="empty-state">请先选择学期</div></div>
      </section>
    </div>

    <!-- Org Modal -->
    <div class="modal-overlay" id="orgModal">
      <div class="modal">
        <div class="modal-title" id="orgModalTitle">新增组织</div>
        <input type="hidden" id="orgId" />
        <input type="hidden" id="orgLevel" />
        <input type="hidden" id="parentOrgId" />
        <div class="form-item">
          <label class="form-label">名称</label>
          <input class="form-input" id="orgName" placeholder="请输入名称" />
        </div>
        <div class="form-item" id="parentOrgDisplay" style="display:none;">
          <label class="form-label">上级组织</label>
          <div id="parentOrgName" style="padding:10px 12px; background:var(--bg-primary); border-radius:8px; font-size:14px;"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeOrgModal()">取消</button>
          <button class="btn btn-primary" id="orgSaveBtn" onclick="saveOrg()">保存</button>
        </div>
      </div>
    </div>

    <!-- Class Push Settings Modal -->
    <div class="modal-overlay" id="classPushModal">
      <div class="modal">
        <div class="modal-title" id="classPushModalTitle">班级推送设置</div>
        <input type="hidden" id="classPushOrgId" />

        <div class="push-settings-section">
          <div class="push-settings-title">班级群机器人</div>
          <div class="form-item">
            <label class="form-label" for="classPushWebhookUrl">企业微信群机器人 Webhook</label>
            <input class="form-input" id="classPushWebhookUrl" type="url" autocomplete="off" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=..." />
            <div class="webhook-help">仅用于当前班级，其他班级需要分别设置。</div>
          </div>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classPushEnabled" onchange="syncClassPushSettingState()" />
            <span>启用该班级群推送</span>
          </label>
          <button class="btn btn-secondary webhook-test" id="classPushTestBtn" type="button" onclick="queueClassWebhookTest()">发送测试通知</button>
        </div>

        <div class="push-settings-section">
          <div class="push-settings-title">填报提醒</div>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classReminderEnabled" onchange="syncClassPushSettingState()" />
            <span>启用本班级填报提醒，只统计本班级下属小组</span>
          </label>
          <div class="push-settings-grid">
            <div class="form-item">
              <label class="form-label" for="classReminderStartTime">开始时间</label>
              <input class="form-input" id="classReminderStartTime" type="time" value="12:00" />
            </div>
            <div class="form-item">
              <label class="form-label" for="classReminderEndTime">结束时间</label>
              <input class="form-input" id="classReminderEndTime" type="time" value="20:00" />
            </div>
            <div class="form-item">
              <label class="form-label" for="classReminderInterval">提醒间隔（分钟）</label>
              <input class="form-input" id="classReminderInterval" type="number" min="15" max="1440" step="15" value="60" />
            </div>
          </div>
        </div>

        <div class="push-settings-section">
          <div class="push-settings-title">获奖推送</div>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classAwardEnabled" onchange="syncClassPushSettingState()" />
            <span>启用本班级获奖推送，包含所属大班的班级榜</span>
          </label>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classIncludeGroupAwards" />
            <span>同时推送本班级下属小组获奖榜和证书</span>
          </label>
          <div class="push-settings-note">获奖任务统一在每周日 08:00 执行。</div>
        </div>

        <div class="push-settings-section">
          <div class="push-settings-title">晨读通知</div>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classStudyDailyEnabled" onchange="syncClassPushSettingState()" />
            <span>自动生成次日小组、班级或大班共读通知</span>
          </label>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classStudyWeeklyCourseEnabled" onchange="syncClassPushSettingState()" />
            <span>自动生成并推送下周课程安排</span>
          </label>
          <label class="push-setting-toggle">
            <input type="checkbox" id="classStudyWeeklyAssignmentEnabled" onchange="syncClassPushSettingState()" />
            <span>按小组分别生成并推送下周人员排班</span>
          </label>
          <div class="push-settings-note">通知时间、会议地址和模板内容请在学委晨读安排的各级组织“通知”面板中设置。这里仅控制是否推送。</div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-cancel" type="button" onclick="closeClassPushModal()">取消</button>
          <button class="btn btn-primary" id="classPushSaveBtn" type="button" onclick="saveClassPushSettings()">保存设置</button>
        </div>
      </div>
    </div>

    <!-- Big Class Manager Modal -->
    <div class="modal-overlay" id="managerModal">
      <div class="modal">
        <div class="modal-title" id="managerModalTitle">大班管理员</div>
        <div class="manager-list" id="managerList"></div>
        <div id="managerCreateSection">
          <div class="form-item">
            <label class="form-label" for="managerName">姓名</label>
            <input class="form-input" id="managerName" maxlength="40" placeholder="请输入管理员姓名" />
          </div>
          <div class="form-item">
            <label class="form-label" for="managerPhone">手机号</label>
            <input class="form-input" id="managerPhone" inputmode="numeric" maxlength="20" placeholder="用于登录和账号匹配" />
          </div>
          <div class="form-item">
            <label class="form-label" for="managerPassword">初始密码（新账号必填）</label>
            <input class="form-input" id="managerPassword" type="password" minlength="6" placeholder="已有账号可留空" />
          </div>
          <div class="manager-help">手机号已有账号时直接授予大班管理员权限；没有账号时创建新账号。管理员后续填写进班表单，会自动关联同一账号并可归入班级、小组。</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeManagerModal()">关闭</button>
          <button class="btn btn-primary" id="managerSaveBtn" onclick="addBigClassManager()">创建并授权</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=13"></script>
    <script src="js/components.js?v=17"></script>
    <script>
      renderModuleBottomNav('secretariat', 'org');

      var currentSemesterId = null;
      var organizations = [];
      var orgDrillLevel = 'bigClass';
      var orgDrillParentId = null;
      var orgBreadcrumbs = [];
      var currentUserIsPlatformAdmin = false;
      var secretariatScopeOrgIds = [];
      var hasGlobalSecretariatScope = false;
      var bigClassManagers = {};
      var managerProfiles = {};
      var managingBigClass = null;
      var classWebhookConfigs = {};

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var currentUser = checkLogin();
        if (!currentUser) return;
        var ok = await guardModuleAccess('secretariat');
        if (!ok) return;
        currentUserIsPlatformAdmin =
          currentUser.role === '超级管理员' || currentUser.role === '管理员';
        await loadSemesters();
      }

      async function loadSemesters() {
        currentSemesterId = await getCurrentSemesterId();
        if (!currentSemesterId) {
          document.getElementById('orgTree').innerHTML = '<div class="empty-state">请先由平台管理员设置当前学期</div>';
          setCurrentSemester('semesterDisplay', '未设置', 'tag-lg');
          return;
        }

        var { data, error } = await window.db.from('semesters').select('semester_name').eq('id', currentSemesterId).maybeSingle();
        if (error) { showToast('加载学期失败', 'error'); return; }
        setCurrentSemester('semesterDisplay', data ? data.semester_name : '未设置', 'tag-lg');
        if (currentSemesterId) {
          await loadSecretariatScope();
          await loadOrganizations();
        }
      }

      async function loadSecretariatScope() {
        secretariatScopeOrgIds = [];
        hasGlobalSecretariatScope = currentUserIsPlatformAdmin;
        if (currentUserIsPlatformAdmin) return;
        var currentUser = getCurrentUser();
        if (!currentUser || !currentUser.id) return;
        var result = await window.db
          .from('module_memberships')
          .select('org_id,role')
          .eq('user_id', currentUser.id)
          .eq('semester_id', currentSemesterId)
          .eq('module_key', 'secretariat')
          .eq('enabled', true);
        if (result.error) throw result.error;
        (result.data || []).forEach(function(membership) {
          if (!membership.org_id) {
            hasGlobalSecretariatScope = true;
          } else {
            secretariatScopeOrgIds.push(Number(membership.org_id));
          }
        });
      }

      async function loadOrganizations() {
        if (!currentSemesterId) { document.getElementById('orgTree').innerHTML = '<div class="empty-state">请先选择学期</div>'; return; }
        var { data, error } = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('name');
        if (error) { showToast('加载组织失败', 'error'); return; }
        organizations = filterOrganizationsToSecretariatScope(data || []);
        sortOrgs();
        await loadClassWebhookConfigs();
        await loadBigClassManagers();
        renderOrgTree();
      }

      async function loadClassWebhookConfigs() {
        classWebhookConfigs = {};
        var classIds = organizations.filter(function(org) {
          return org.level === '班级';
        }).map(function(org) {
          return Number(org.id);
        });
        if (!classIds.length) return;
        var result = await window.db
          .from('organization_webhook_configs')
          .select('id,semester_id,org_id,webhook_url,enabled,reminder_enabled,reminder_start_time,reminder_end_time,reminder_interval_minutes,award_enabled,include_group_awards,study_daily_enabled,study_weekly_course_enabled,study_weekly_assignment_enabled,study_notice_settings')
          .eq('semester_id', currentSemesterId)
          .in('org_id', classIds);
        if (result.error) throw result.error;
        (result.data || []).forEach(function(config) {
          classWebhookConfigs[Number(config.org_id)] = config;
        });
      }

      function filterOrganizationsToSecretariatScope(allOrganizations) {
        if (hasGlobalSecretariatScope) return allOrganizations;
        var orgMap = {};
        allOrganizations.forEach(function(org) {
          orgMap[Number(org.id)] = org;
        });
        return allOrganizations.filter(function(org) {
          var current = org;
          while (current) {
            if (secretariatScopeOrgIds.indexOf(Number(current.id)) >= 0) return true;
            current = current.parent_id ? orgMap[Number(current.parent_id)] : null;
          }
          return false;
        });
      }

      async function loadBigClassManagers() {
        bigClassManagers = {};
        managerProfiles = {};
        var bigClassIds = organizations.filter(function(org) {
          return org.level === '大班';
        }).map(function(org) {
          return Number(org.id);
        });
        if (!bigClassIds.length) return;
        var membershipResult = await window.db
          .from('module_memberships')
          .select('id,user_id,org_id,role,enabled')
          .eq('semester_id', currentSemesterId)
          .eq('module_key', 'secretariat')
          .eq('role', '大班管理员')
          .eq('enabled', true)
          .in('org_id', bigClassIds);
        if (membershipResult.error) throw membershipResult.error;
        var memberships = membershipResult.data || [];
        var userIds = Array.from(new Set(memberships.map(function(item) {
          return item.user_id;
        }).filter(Boolean)));
        if (userIds.length) {
          var profileResult = await window.db
            .from('profiles')
            .select('id,name,phone,role')
            .in('id', userIds);
          if (profileResult.error) throw profileResult.error;
          (profileResult.data || []).forEach(function(profile) {
            managerProfiles[profile.id] = profile;
          });
        }
        memberships.forEach(function(membership) {
          var orgId = Number(membership.org_id);
          if (!bigClassManagers[orgId]) bigClassManagers[orgId] = [];
          bigClassManagers[orgId].push(membership);
        });
      }

      function sortOrgs() {
        organizations.sort(function (a, b) {
          var levelOrder = { 大班: 0, 班级: 1, 小组: 2 };
          var la = levelOrder[a.level] || 0;
          var lb = levelOrder[b.level] || 0;
          if (la !== lb) return la - lb;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
      }

      function getChildren(parentId) {
        return organizations.filter(function (o) { return Number(o.parent_id) === Number(parentId); });
      }

      function getTotalPeople(orgId) {
        var count = 0;
        var children = getChildren(orgId);
        children.forEach(function (c) { count += getTotalPeople(c.id); });
        // Count actual people assigned to this org in person_org_assignments
        // We'll just show org structure here without live counts for simplicity
        return '';
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        var showArchived = document.getElementById('archiveToggle').checked;
        renderOrgBreadcrumbs();
        updateAddOrgButton();

        if (!organizations.length) {
          container.innerHTML = '<div class="empty-state">该学期暂无组织</div>';
          return;
        }

        var currentParent = orgDrillParentId
          ? organizations.find(function (o) { return Number(o.id) === Number(orgDrillParentId); })
          : null;
        if (orgDrillParentId && (!currentParent || (currentParent.is_active === false && !showArchived))) {
          orgDrillLevel = 'bigClass';
          orgDrillParentId = null;
          orgBreadcrumbs = [];
          renderOrgBreadcrumbs();
          updateAddOrgButton();
        }

        var cards = [];
        var emptyText = '暂无组织';
        if (orgDrillLevel === 'bigClass') {
          cards = getTopLevelOrgs(showArchived);
          emptyText = showArchived ? '该学期暂无组织' : '该学期暂无启用组织';
        } else if (orgDrillLevel === 'class') {
          cards = getVisibleChildren(orgDrillParentId, '班级', showArchived);
          emptyText = '该大班下暂无班级';
        } else {
          cards = getVisibleChildren(orgDrillParentId, '小组', showArchived);
          emptyText = '该班级下暂无小组';
        }
        renderOrgCards(cards, emptyText);
      }

      function getTopLevelOrgs(showArchived) {
        var bigClasses = organizations.filter(function (o) { return o.level === '大班'; });
        return filterVisibleOrgs(bigClasses, showArchived);
      }

      function getVisibleChildren(parentId, level, showArchived) {
        return filterVisibleOrgs(organizations.filter(function (o) {
          return Number(o.parent_id) === Number(parentId) && (!level || o.level === level);
        }), showArchived);
      }

      function filterVisibleOrgs(list, showArchived) {
        return (list || []).filter(function (o) { return showArchived || o.is_active !== false; });
      }

      function buildOrgBreadcrumbs(orgId) {
        var parts = [];
        var current = organizations.find(function (o) { return Number(o.id) === Number(orgId); });
        while (current) {
          parts.unshift({ id: current.id, name: current.name, level: current.level });
          current = organizations.find(function (o) { return Number(o.id) === Number(current.parent_id); });
        }
        return parts;
      }

      function renderOrgBreadcrumbs() {
        var el = document.getElementById('orgBreadcrumb');
        if (!el) return;
        var html = '';
        if (orgDrillLevel !== 'bigClass' || orgBreadcrumbs.length) {
          html += '<span class="org-breadcrumb-item" onclick="goOrgBreadcrumb(-1)">全部</span>';
        } else {
          html += '<span class="org-breadcrumb-item current">全部</span>';
        }
        orgBreadcrumbs.forEach(function (item, index) {
          var isCurrent = index === orgBreadcrumbs.length - 1;
          html += '<span class="org-breadcrumb-sep">/</span>';
          html += '<span class="org-breadcrumb-item' + (isCurrent ? ' current' : '') + '"' + (isCurrent ? '' : ' onclick="goOrgBreadcrumb(' + index + ')"') + '>' + escapeHtml(item.name) + '</span>';
        });
        el.innerHTML = html;
      }

      function updateAddOrgButton() {
        var btn = document.getElementById('addOrgBtn');
        if (!btn) return;
        if (orgDrillLevel === 'class') {
          btn.textContent = '添加班级';
        } else if (orgDrillLevel === 'group') {
          btn.textContent = '添加小组';
        } else {
          btn.textContent = '添加大班';
        }
      }

      function showCurrentLevelAddModal() {
        if (orgDrillLevel === 'class') {
          showAddOrgModal('class', orgDrillParentId);
        } else if (orgDrillLevel === 'group') {
          showAddOrgModal('group', orgDrillParentId);
        } else {
          showAddOrgModal('bigclass', null);
        }
      }

      function goOrgBreadcrumb(index) {
        if (index < 0) {
          orgDrillLevel = 'bigClass';
          orgDrillParentId = null;
          orgBreadcrumbs = [];
          renderOrgTree();
          return;
        }
        var item = orgBreadcrumbs[index];
        if (!item) return;
        orgBreadcrumbs = orgBreadcrumbs.slice(0, index + 1);
        orgDrillParentId = item.id;
        orgDrillLevel = item.level === '大班' ? 'class' : 'group';
        renderOrgTree();
      }

      function drillOrgInto(orgId) {
        var org = organizations.find(function (o) { return Number(o.id) === Number(orgId); });
        if (!org || org.level === '小组') return;
        orgBreadcrumbs = buildOrgBreadcrumbs(org.id);
        orgDrillParentId = org.id;
        orgDrillLevel = org.level === '大班' ? 'class' : 'group';
        renderOrgTree();
      }

      function renderOrgCards(cards, emptyText) {
        var container = document.getElementById('orgTree');
        if (!cards.length) {
          container.innerHTML = '<div class="empty-state">' + escapeHtml(emptyText) + '</div>';
          return;
        }
        container.innerHTML = '<div class="org-card-list">' + cards.map(function (org) {
          return renderOrgCard(org);
        }).join('') + '</div>';
      }

      function renderOrgCard(org) {
        var childLevel = org.level === '大班' ? '班级' : org.level === '班级' ? '小组' : '';
        var childCount = childLevel ? getChildren(org.id).filter(function (o) { return o.level === childLevel && o.is_active !== false; }).length : 0;
        var archivedCount = childLevel ? getChildren(org.id).filter(function (o) { return o.level === childLevel && o.is_active === false; }).length : 0;
        var isTerminal = org.level === '小组';
        var cardClick = isTerminal ? '' : ' onclick="drillOrgInto(' + org.id + ')"';
        var nextLabel = org.level === '大班' ? '查看班级' : org.level === '班级' ? '查看小组' : '末级组织';
        var actionsHtml = '';
        if (org.level === '大班') {
          actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); openManagerModal(' + org.id + ')">管理员</button>';
        }
        if (org.level === '班级') {
          actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); openClassPushSettings(' + org.id + ')">推送设置</button>';
        }
        actionsHtml += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); showEditOrgModal(' + org.id + ')">编辑</button>';
        actionsHtml += '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteOrg(' + org.id + ')">' + (org.is_active === false ? '恢复' : '归档') + '</button>';
        var managerCount = (bigClassManagers[Number(org.id)] || []).length;
        var managerStat = org.level === '大班'
          ? '<div class="org-card-stat"><div class="org-card-value">' + managerCount + '</div><div class="org-card-label">管理员</div></div>'
          : '';
        var webhookConfig = org.level === '班级' ? classWebhookConfigs[Number(org.id)] : null;
        var enabledPushNames = [];
        if (webhookConfig && webhookConfig.reminder_enabled) enabledPushNames.push('填报提醒');
        if (webhookConfig && webhookConfig.award_enabled) enabledPushNames.push('获奖推送');
        if (
          webhookConfig &&
          (
            webhookConfig.study_daily_enabled ||
            webhookConfig.study_weekly_course_enabled ||
            webhookConfig.study_weekly_assignment_enabled
          )
        ) enabledPushNames.push('晨读通知');
        var webhookStatus = org.level === '班级'
          ? '<div class="webhook-status' + (webhookConfig && webhookConfig.enabled ? ' active' : '') + '">' +
            (webhookConfig && webhookConfig.enabled
              ? '班级推送已启用' + (enabledPushNames.length ? ' · ' + enabledPushNames.join('、') : ' · 未开启业务推送')
              : webhookConfig ? '班级推送已停用' : '未配置班级推送') +
            '</div>'
          : '';

        return (
          '<div class="org-level-card' + (org.is_active === false ? ' archived' : '') + (isTerminal ? ' terminal' : '') + '"' + cardClick + '>' +
            '<div class="org-card-header">' +
              '<div style="min-width:0;">' +
                '<div class="org-card-title">' + escapeHtml(org.name) + (org.is_active === false ? ' <span class="archived-badge">已归档</span>' : '') + '</div>' +
                '<div class="org-card-subtitle">' + escapeHtml(org.level || '组织') + '</div>' +
                webhookStatus +
              '</div>' +
              '<div class="org-card-action">' + nextLabel + '</div>' +
            '</div>' +
            '<div class="org-card-stats' + (org.level === '大班' ? ' three' : '') + '">' +
              '<div class="org-card-stat"><div class="org-card-value">' + childCount + '</div><div class="org-card-label">' + (childLevel || '下级组织') + '</div></div>' +
              '<div class="org-card-stat"><div class="org-card-value">' + archivedCount + '</div><div class="org-card-label">已归档下级</div></div>' +
              managerStat +
            '</div>' +
            '<div class="org-card-actions">' + actionsHtml + '</div>' +
          '</div>'
        );
      }

      function renderManagerList() {
        var container = document.getElementById('managerList');
        if (!managingBigClass) {
          container.innerHTML = '';
          return;
        }
        var managers = bigClassManagers[Number(managingBigClass.id)] || [];
        if (!managers.length) {
          container.innerHTML = '<div class="manager-empty">当前尚未设置大班管理员</div>';
          return;
        }
        container.innerHTML = managers.map(function(membership) {
          var profile = managerProfiles[membership.user_id] || {};
          return (
            '<div class="manager-row"><div class="manager-person"><div class="manager-name">' +
            escapeHtml(profile.name || '未命名账号') +
            '</div><div class="manager-phone">' +
            escapeHtml(profile.phone || '未登记手机号') +
            '</div></div>' +
            (currentUserIsPlatformAdmin
              ? '<button class="btn btn-sm btn-danger" onclick="removeBigClassManager(' +
                membership.id +
                ')">移除</button>'
              : '') +
            '</div>'
          );
        }).join('');
      }

      function openManagerModal(orgId) {
        managingBigClass = organizations.find(function(org) {
          return Number(org.id) === Number(orgId) && org.level === '大班';
        }) || null;
        if (!managingBigClass) return;
        document.getElementById('managerModalTitle').textContent =
          managingBigClass.name + ' · 大班管理员';
        document.getElementById('managerName').value = '';
        document.getElementById('managerPhone').value = '';
        document.getElementById('managerPassword').value = '';
        document.getElementById('managerCreateSection').style.display =
          currentUserIsPlatformAdmin ? '' : 'none';
        document.getElementById('managerSaveBtn').style.display =
          currentUserIsPlatformAdmin ? '' : 'none';
        document.getElementById('managerModal').classList.add('show');
        renderManagerList();
      }

      function closeManagerModal() {
        document.getElementById('managerModal').classList.remove('show');
        managingBigClass = null;
      }

      async function addBigClassManager() {
        if (!managingBigClass) return;
        if (!currentUserIsPlatformAdmin) {
          showToast('只有平台管理员可以创建大班管理员', 'error');
          return;
        }
        var name = document.getElementById('managerName').value.trim();
        var phone = document.getElementById('managerPhone').value.replace(/\D/g, '');
        var password = document.getElementById('managerPassword').value;
        if (!name) { showToast('请输入管理员姓名', 'error'); return; }
        if (!phone) { showToast('请输入管理员手机号', 'error'); return; }
        var button = document.getElementById('managerSaveBtn');
        button.disabled = true;
        try {
          var existingResult = await window.db
            .from('profiles')
            .select('id,name,phone')
            .eq('phone', phone)
            .maybeSingle();
          if (existingResult.error) throw existingResult.error;
          var result;
          if (existingResult.data) {
            result = await adminApi.grantModuleMembership({
              userId: existingResult.data.id,
              semesterId: currentSemesterId,
              moduleKey: 'secretariat',
              role: '大班管理员',
              orgId: Number(managingBigClass.id)
            });
          } else {
            if (password.length < 6) {
              showToast('新账号初始密码至少 6 位', 'error');
              return;
            }
            result = await adminApi.createProfileAccount({
              name: name,
              phone: phone,
              password: password,
              profileRole: '普通成员',
              organizationId: null,
              moduleMembership: {
                semesterId: currentSemesterId,
                moduleKey: 'secretariat',
                role: '大班管理员',
                orgId: Number(managingBigClass.id)
              }
            });
          }
          if (result.error) throw new Error(result.error);
          logAction('添加大班管理员', 'module_memberships', managingBigClass.name, 'secretariat');
          showToast(existingResult.data ? '已有账号已授权为大班管理员' : '大班管理员账号已创建', 'success');
          document.getElementById('managerName').value = '';
          document.getElementById('managerPhone').value = '';
          document.getElementById('managerPassword').value = '';
          await loadBigClassManagers();
          renderOrgTree();
          renderManagerList();
        } catch (error) {
          showToast('添加失败：' + (error.message || error), 'error');
        } finally {
          button.disabled = false;
        }
      }

      async function removeBigClassManager(membershipId) {
        if (!managingBigClass) return;
        var confirmed = await showConfirm('确定移除这位大班管理员吗？');
        if (!confirmed) return;
        try {
          var result = await adminApi.disableModuleMembership(membershipId);
          if (result.error) throw new Error(result.error);
          logAction('移除大班管理员', 'module_memberships', managingBigClass.name, 'secretariat');
          showToast('大班管理员已移除', 'success');
          await loadBigClassManagers();
          renderOrgTree();
          renderManagerList();
        } catch (error) {
          showToast('移除失败：' + (error.message || error), 'error');
        }
      }

      // ---- Org CRUD ----
      function showAddOrgModal(level, parentId) {
        document.getElementById('orgModalTitle').textContent =
          level === 'bigclass' ? '新增大班' : level === 'class' ? '新增班级' : '新增小组';
        document.getElementById('orgId').value = '';
        document.getElementById('orgLevel').value = level === 'bigclass' ? '大班' : level === 'class' ? '班级' : '小组';
        document.getElementById('parentOrgId').value = parentId || '';
        document.getElementById('orgName').value = '';

        if (parentId) {
          var parent = organizations.find(function (o) { return Number(o.id) === Number(parentId); });
          document.getElementById('parentOrgDisplay').style.display = 'block';
          document.getElementById('parentOrgName').textContent = parent ? parent.name : '';
        } else {
          document.getElementById('parentOrgDisplay').style.display = 'none';
        }
        document.getElementById('orgModal').classList.add('show');
      }

      function showEditOrgModal(id) {
        var org = organizations.find(function (o) { return Number(o.id) === Number(id); });
        if (!org) return;
        document.getElementById('orgModalTitle').textContent = '编辑组织';
        document.getElementById('orgId').value = org.id;
        document.getElementById('orgLevel').value = org.level;
        document.getElementById('parentOrgId').value = org.parent_id || '';
        document.getElementById('orgName').value = org.name || '';

        if (org.parent_id) {
          var parent = organizations.find(function (o) { return Number(o.id) === Number(org.parent_id); });
          document.getElementById('parentOrgDisplay').style.display = 'block';
          document.getElementById('parentOrgName').textContent = parent ? parent.name : '';
        } else {
          document.getElementById('parentOrgDisplay').style.display = 'none';
        }
        document.getElementById('orgModal').classList.add('show');
      }

      function closeOrgModal() { document.getElementById('orgModal').classList.remove('show'); }

      function isValidClassWebhook(webhookUrl) {
        return /^https:\/\/qyapi\.weixin\.qq\.com\/cgi-bin\/webhook\/send\?key=[A-Za-z0-9_-]+$/.test(webhookUrl);
      }

      function normalizeTimeValue(value, fallback) {
        var normalized = String(value || '').slice(0, 5);
        return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(normalized) ? normalized : fallback;
      }

      function openClassPushSettings(orgId) {
        var org = organizations.find(function(item) {
          return Number(item.id) === Number(orgId) && item.level === '班级';
        });
        if (!org) return;
        var config = classWebhookConfigs[Number(orgId)] || null;
        document.getElementById('classPushOrgId').value = org.id;
        document.getElementById('classPushModalTitle').textContent = org.name + ' · 推送设置';
        document.getElementById('classPushWebhookUrl').value = config ? config.webhook_url || '' : '';
        document.getElementById('classPushEnabled').checked = config ? config.enabled !== false : false;
        document.getElementById('classReminderEnabled').checked = config ? config.reminder_enabled === true : false;
        document.getElementById('classReminderStartTime').value = normalizeTimeValue(config && config.reminder_start_time, '12:00');
        document.getElementById('classReminderEndTime').value = normalizeTimeValue(config && config.reminder_end_time, '20:00');
        document.getElementById('classReminderInterval').value = String(config ? config.reminder_interval_minutes || 60 : 60);
        document.getElementById('classAwardEnabled').checked = config ? config.award_enabled === true : false;
        document.getElementById('classIncludeGroupAwards').checked = config ? config.include_group_awards !== false : true;
        document.getElementById('classStudyDailyEnabled').checked = config ? config.study_daily_enabled === true : false;
        document.getElementById('classStudyWeeklyCourseEnabled').checked = config ? config.study_weekly_course_enabled === true : false;
        document.getElementById('classStudyWeeklyAssignmentEnabled').checked = config ? config.study_weekly_assignment_enabled === true : false;
        document.getElementById('classPushTestBtn').style.display = config && config.webhook_url ? '' : 'none';
        syncClassPushSettingState();
        document.getElementById('classPushModal').classList.add('show');
      }

      function closeClassPushModal() {
        document.getElementById('classPushModal').classList.remove('show');
      }

      function syncClassPushSettingState() {
        var pushEnabled = document.getElementById('classPushEnabled').checked;
        var reminderEnabled = document.getElementById('classReminderEnabled').checked;
        var awardEnabled = document.getElementById('classAwardEnabled').checked;
        document.getElementById('classReminderEnabled').disabled = !pushEnabled;
        document.getElementById('classReminderStartTime').disabled = !pushEnabled || !reminderEnabled;
        document.getElementById('classReminderEndTime').disabled = !pushEnabled || !reminderEnabled;
        document.getElementById('classReminderInterval').disabled = !pushEnabled || !reminderEnabled;
        document.getElementById('classAwardEnabled').disabled = !pushEnabled;
        document.getElementById('classIncludeGroupAwards').disabled = !pushEnabled || !awardEnabled;
        document.getElementById('classStudyDailyEnabled').disabled = !pushEnabled;
        document.getElementById('classStudyWeeklyCourseEnabled').disabled = !pushEnabled;
        document.getElementById('classStudyWeeklyAssignmentEnabled').disabled = !pushEnabled;
      }

      async function saveClassPushSettings() {
        var orgId = Number(document.getElementById('classPushOrgId').value || 0);
        var org = organizations.find(function(item) { return Number(item.id) === orgId; });
        if (!org || org.level !== '班级') return;
        var webhookUrl = document.getElementById('classPushWebhookUrl').value.trim();
        var enabled = document.getElementById('classPushEnabled').checked;
        var reminderEnabled = document.getElementById('classReminderEnabled').checked;
        var reminderStartTime = document.getElementById('classReminderStartTime').value;
        var reminderEndTime = document.getElementById('classReminderEndTime').value;
        var reminderInterval = Number(document.getElementById('classReminderInterval').value || 60);
        var awardEnabled = document.getElementById('classAwardEnabled').checked;
        var includeGroupAwards = document.getElementById('classIncludeGroupAwards').checked;
        var studyDailyEnabled = document.getElementById('classStudyDailyEnabled').checked;
        var studyWeeklyCourseEnabled = document.getElementById('classStudyWeeklyCourseEnabled').checked;
        var studyWeeklyAssignmentEnabled = document.getElementById('classStudyWeeklyAssignmentEnabled').checked;
        var existing = classWebhookConfigs[orgId];

        if (webhookUrl && !isValidClassWebhook(webhookUrl)) {
          showToast('请输入有效的企业微信群机器人 Webhook 地址', 'error');
          return;
        }
        if (enabled && !webhookUrl) {
          showToast('启用班级推送前请填写 Webhook 地址', 'error');
          return;
        }
        if (reminderEnabled && reminderStartTime >= reminderEndTime) {
          showToast('填报提醒结束时间必须晚于开始时间', 'error');
          return;
        }
        if (!Number.isInteger(reminderInterval) || reminderInterval < 15 || reminderInterval > 1440) {
          showToast('提醒间隔必须是 15 至 1440 分钟之间的整数', 'error');
          return;
        }
        var button = document.getElementById('classPushSaveBtn');
        button.disabled = true;
        try {
          if (!webhookUrl) {
            if (existing) {
              var deleteResult = await window.db.from('organization_webhook_configs').delete().eq('id', existing.id);
              if (deleteResult.error) throw deleteResult.error;
            }
          } else {
            var result = await window.db.from('organization_webhook_configs').upsert({
              semester_id: currentSemesterId,
              org_id: orgId,
              webhook_url: webhookUrl,
              enabled: enabled,
              reminder_enabled: reminderEnabled,
              reminder_start_time: reminderStartTime,
              reminder_end_time: reminderEndTime,
              reminder_interval_minutes: reminderInterval,
              award_enabled: awardEnabled,
              include_group_awards: includeGroupAwards,
              study_daily_enabled: studyDailyEnabled,
              study_weekly_course_enabled: studyWeeklyCourseEnabled,
              study_weekly_assignment_enabled: studyWeeklyAssignmentEnabled,
              study_notice_settings: existing && existing.study_notice_settings ? existing.study_notice_settings : {},
              updated_at: new Date().toISOString()
            }, { onConflict: 'semester_id,org_id' });
            if (result.error) throw result.error;
          }
          logAction('设置班级推送', 'organization_webhook_configs', org.name, 'secretariat');
          showToast('班级推送设置已保存', 'success');
          closeClassPushModal();
          await loadClassWebhookConfigs();
          renderOrgTree();
        } catch (error) {
          showToast('保存推送设置失败：' + (error.message || error), 'error');
        } finally {
          button.disabled = false;
        }
      }

      async function queueClassWebhookTest() {
        var orgId = Number(document.getElementById('classPushOrgId').value || 0);
        var org = organizations.find(function(item) { return Number(item.id) === orgId; });
        var config = classWebhookConfigs[orgId];
        if (!org || org.level !== '班级' || !config || !config.enabled) {
          showToast('请先保存并启用班级群通知', 'error');
          return;
        }
        var button = document.getElementById('classPushTestBtn');
        button.disabled = true;
        try {
          var result = await queueOrganizationNotification({
            semesterId: currentSemesterId,
            orgId: orgId,
            moduleKey: 'secretariat',
            eventKey: 'webhook_test',
            title: org.name + '群通知测试',
            content: '班级企业微信群机器人配置成功。后续该班级的通知将自动发送到本群。'
          });
          if (result.error) throw result.error;
          showToast('测试通知已加入队列，预计 1 分钟内发送', 'success');
        } catch (error) {
          showToast('测试通知创建失败：' + (error.message || error), 'error');
        } finally {
          button.disabled = false;
        }
      }

      async function saveOrg() {
        var id = document.getElementById('orgId').value;
        var name = document.getElementById('orgName').value.trim();
        var level = document.getElementById('orgLevel').value;
        var parentId = document.getElementById('parentOrgId').value;

        if (!name) { showToast('请填写名称', 'error'); return; }

        document.getElementById('orgSaveBtn').disabled = true;
        try {
          var payload = {
            name: name,
            level: level,
            parent_id: parentId ? Number(parentId) : null,
            semester_id: currentSemesterId,
            sort_order: 0
          };
          var result = id
            ? await window.db.from('organizations').update(payload).eq('id', id).select('id').single()
            : await window.db.from('organizations').insert(payload).select('id').single();
          if (result.error) throw result.error;
          logAction(id ? '编辑组织' : '新增组织', 'organizations', name, 'secretariat');
          showToast('保存成功', 'success');
          closeOrgModal();
          await loadOrganizations();
        } catch (error) { showToast('保存失败', 'error'); }
        finally { document.getElementById('orgSaveBtn').disabled = false; }
      }

      async function deleteOrg(id) {
        var org = organizations.find(function (o) { return Number(o.id) === Number(id); });
        if (!org) return;
        var action = org.is_active === false ? '恢复' : '归档';
        var confirmed = await showConfirm('确定' + action + '「' + org.name + '」吗？' +
          (action === '归档' ? '\n归档后将在默认视图中隐藏。' : ''));
        if (!confirmed) return;
        try {
          if (org.is_active === false) {
            await window.db.from('organizations').update({ is_active: true }).eq('id', id);
          } else {
            await window.db.from('organizations').update({ is_active: false }).eq('id', id);
          }
          showToast(action + '成功', 'success');
          await loadOrganizations();
        } catch (error) { showToast('操作失败', 'error'); }
      }


      init();
    </script>
  </body>
</html>
