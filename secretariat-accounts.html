<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 账号与权限</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .person-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
      .person-name { font-weight: 700; color: var(--ink-dark); }
      .person-meta { margin-top: 4px; color: var(--ink-muted); font-size: 12px; }
      .person-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }

      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
      .badge.active { background: var(--green-light); color: var(--green); }
      .badge.inactive { background: var(--vermillion-light); color: var(--vermillion); }
      .badge.pending { background: #fff3e0; color: #e65100; }

      .perm-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); font-size: 12px; margin: 3px; }
      .perm-tag .remove { cursor: pointer; color: var(--vermillion); }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">账号与权限</h1>
      </header>

      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="loadData()" />
      </div>

      <section class="section">
        <div class="section-header">
          <div class="section-title">人员账号</div>
          <span id="totalCount" style="font-size:13px;color:var(--ink-muted);">--</span>
        </div>
        <div id="personList" class="empty-state">正在加载...</div>
      </section>
    </div>

    <!-- 分配权限 Modal -->
    <div class="modal-overlay" id="permModal">
      <div class="modal">
        <div class="modal-title" id="permModalTitle">分配模块权限</div>
        <input type="hidden" id="permUserId" />
        <div class="form-item">
          <label class="form-label">模块</label>
          <select class="form-select" id="permModule">
            <option value="supervision">督察管理</option>
            <option value="study">学委管理</option>
            <option value="secretariat">秘书处</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">角色</label>
          <select class="form-select" id="permRole">
            <option value="管理员">管理员</option>
            <option value="大班总督">大班总督</option>
            <option value="大班副督">大班副督</option>
            <option value="班级总督察">班级总督察</option>
            <option value="班级副总督察">班级副总督察</option>
            <option value="小组督察">小组督察</option>
            <option value="小组副督察">小组副督察</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">所属组织 ID（可选，输入组织 id）</label>
          <input class="form-input" id="permOrgId" type="number" placeholder="留空则不限定组织" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePermModal()">取消</button>
          <button class="btn btn-primary" id="savePermBtn" onclick="savePermission()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var allPeople = [];
      var allProfiles = {};
      var membershipsByUser = {};

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadData();
      }

      async function loadData() {
        var search = document.getElementById('searchInput').value.trim();

        // 加载 profiles（有账号的人）
        var { data: profiles } = await window.db.from('profiles').select('id,name,phone,role');
        var profileMap = {};
        (profiles || []).forEach(function (p) {
          if (p.phone) profileMap[p.phone] = p;
          // also store by name
          profileMap['name:' + p.name] = p;
        });
        allProfiles = profileMap;

        // 加载 module_memberships
        var { data: memberships } = await window.db.from('module_memberships').select('*').eq('enabled', true);
        membershipsByUser = {};
        (memberships || []).forEach(function (m) {
          if (!membershipsByUser[m.user_id]) membershipsByUser[m.user_id] = [];
          membershipsByUser[m.user_id].push(m);
        });

        // 加载 people
        var query = window.db.from('people').select('*').order('name');
        if (search) query = query.or('name.ilike.%' + search + '%,phone.ilike.%' + search + '%');
        var { data, error } = await query;
        if (error) { showToast('加载失败', 'error'); return; }
        allPeople = data || [];
        renderPeople();
      }

      function findProfile(person) {
        if (person.phone && allProfiles[person.phone]) return allProfiles[person.phone];
        var key = 'name:' + person.name;
        if (allProfiles[key]) return allProfiles[key];
        return null;
      }

      function renderPeople() {
        var container = document.getElementById('personList');
        document.getElementById('totalCount').textContent = '共 ' + allPeople.length + ' 人';

        if (!allPeople.length) { container.innerHTML = '<div class="empty-state">暂无人员</div>'; return; }

        container.innerHTML = allPeople.map(function (p) {
          var profile = findProfile(p);
          var accountBadge = profile
            ? '<span class="badge active">已开通</span>'
            : '<span class="badge pending">未开通</span>';

          var permsHtml = '';
          if (profile) {
            var userMems = membershipsByUser[profile.id] || [];
            permsHtml = userMems.length
              ? userMems.map(function (m) {
                  var moduleLabel = { supervision: '督察', study: '学委', secretariat: '秘书处' }[m.module_key] || m.module_key;
                  var orgName = m.org_id ? ' #' + m.org_id : '';
                  return (
                    '<span class="perm-tag">' +
                    moduleLabel + ' · ' + m.role + orgName +
                    '<span class="remove" onclick="removeMembership(' + m.id + ')">×</span>' +
                    '</span>'
                  );
                }).join('')
              : '<span style="color:var(--ink-muted);font-size:12px;">暂无模块权限</span>';
          }

          return (
            '<div class="person-card">' +
            '<div style="display:flex;align-items:center;gap:10px;">' +
            '<div class="person-name">' + escapeHtml(p.name) + '</div>' +
            accountBadge +
            (p.status === 'left' ? '<span class="badge inactive">已离班</span>' : '') +
            '</div>' +
            '<div class="person-meta">' +
            (p.phone ? '📞 ' + escapeHtml(p.phone) : '未填手机号') +
            '</div>' +
            (profile
              ? '<div class="person-meta" style="margin-top:4px;">权限：' + permsHtml + '</div>'
              : ''
            ) +
            '<div class="person-actions">' +
            (profile
              ? '<button class="btn btn-secondary btn-sm" onclick="showPermModal(\'' + profile.id + '\',\'' + escapeHtml(p.name) + '\')">+ 分配权限</button>'
              : ''
            ) +
            '</div>' +
            '</div>'
          );
        }).join('');
      }

      var currentPermUserId = null;

      function showPermModal(userId, userName) {
        currentPermUserId = userId;
        document.getElementById('permModalTitle').textContent = '分配权限 · ' + userName;
        document.getElementById('permUserId').value = userId;
        document.getElementById('permModule').value = 'supervision';
        document.getElementById('permRole').value = '小组督察';
        document.getElementById('permOrgId').value = '';
        document.getElementById('permModal').classList.add('show');
      }

      function closePermModal() {
        document.getElementById('permModal').classList.remove('show');
      }

      async function savePermission() {
        var userId = document.getElementById('permUserId').value;
        var moduleKey = document.getElementById('permModule').value;
        var role = document.getElementById('permRole').value;
        var orgId = document.getElementById('permOrgId').value.trim();

        if (!userId) return;

        document.getElementById('savePermBtn').disabled = true;
        try {
          var payload = {
            user_id: userId,
            module_key: moduleKey,
            role: role,
            enabled: true
          };
          if (orgId) payload.org_id = Number(orgId);

          var result = await window.db.from('module_memberships').insert(payload);
          if (result.error) throw result.error;
          logAction('分配权限', 'module_memberships', moduleKey + ' · ' + role);
          showToast('权限已分配', 'success');
          closePermModal();
          await loadData();
        } catch (error) {
          showToast('分配失败，可能该权限已存在', 'error');
        } finally {
          document.getElementById('savePermBtn').disabled = false;
        }
      }

      async function removeMembership(id) {
        var confirmed = await showConfirm('确定移除该模块权限吗？');
        if (!confirmed) return;
        try {
          var result = await window.db.from('module_memberships').delete().eq('id', id);
          if (result.error) throw result.error;
          showToast('已移除', 'success');
          await loadData();
        } catch (error) {
          showToast('操作失败', 'error');
        }
      }

      init();
    </script>
  </body>
</html>
