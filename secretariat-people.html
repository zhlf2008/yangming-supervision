<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.level-0 { font-weight: 600; }
      .org-node-header.level-1 { padding-left: 32px; }
      .org-node-header.level-2 { padding-left: 52px; }
      .org-toggle { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .org-toggle.expanded { transform: rotate(90deg); }
      .org-name { flex: 1; color: var(--ink-dark); font-size: 14px; }

      .person-list { display: flex; flex-wrap: wrap; gap: 0; }
      .person-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px 7px 20px; border-bottom: 1px solid #f0ece7; width: 100%; }
      .person-item:last-child { border-bottom: none; }
      .person-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--vermillion) 0%, #c62828 100%); display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; flex-shrink: 0; box-shadow: 0 2px 8px rgba(230, 57, 70, 0.24); }
      .person-info { flex: 1; min-width: 0; }
      .person-name { font-size: 13px; font-weight: 500; color: var(--ink-dark); }
      .person-meta { font-size: 11px; color: var(--ink-muted); }
      .person-actions { display: flex; gap: 3px; flex-shrink: 0; }
      .sort-btn { background: none; border: none; color: var(--ink-muted); cursor: pointer; padding: 2px 4px; font-size: 11px; line-height: 1; }
      .sort-btn:hover { color: var(--ink-dark); }
      .sort-btn:disabled { opacity: 0.2; cursor: default; }
      .status-badge { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 10px; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: var(--gold-light); color: var(--ink-light); }

      .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); font-size: 11px; margin: 2px; }
      .tag .remove { cursor: pointer; color: var(--vermillion); font-size: 14px; line-height: 1; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; font-size: 13px; }
      .toolbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .person-empty { color: var(--ink-muted); font-size: 12px; padding: 12px 14px; }
      .health-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
      .health-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
      .health-value { font-size: 18px; font-weight: 700; color: var(--ink-dark); line-height: 1.2; }
      .health-label { margin-top: 3px; font-size: 11px; color: var(--ink-muted); }
      .health-card.warn .health-value { color: var(--vermillion); }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; align-items: flex-end; justify-content: center; padding: 0; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 30px; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .modal-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
      .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .modal-section-title { font-size: 14px; font-weight: 700; color: var(--ink-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 12px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }
      .inline-add { display: flex; gap: 6px; margin-top: 8px; }
      .inline-add select, .inline-add input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); font-size: 12px; font-family: inherit; }
      .inline-add .btn { flex: 0 0 auto; padding: 8px 12px; font-size: 12px; }
      .account-status { margin-bottom: 8px; font-size: 12px; color: var(--ink-muted); }
      .check-row { display: flex; align-items: center; gap: 8px; color: var(--ink-dark); font-size: 13px; margin: 8px 0; }
      .check-row input { width: 16px; height: 16px; accent-color: var(--vermillion); }
      .account-fields { display: none; margin-top: 10px; }
      .account-fields.show { display: block; }

      .search-results { margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">&lt;</a>
        <h1 class="page-title">人员管理</h1>
      </header>
      <section class="section">
<div class="form-item">
  <label class="form-label">当前学期</label>
  <div class="form-input" id="currentSemesterDisplay" style="background:var(--bg-card);line-height:44px;padding-left:14px;color:var(--ink-dark);font-weight:600;"></div>
</div>
        <div class="health-grid" id="peopleHealthStats">
          <div class="health-card"><div class="health-value">--</div><div class="health-label">已归属</div></div>
          <div class="health-card"><div class="health-value">--</div><div class="health-label">未归属</div></div>
          <div class="health-card"><div class="health-value">--</div><div class="health-label">旧兜底</div></div>
        </div>
      </section>
      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ 新增人员</button>
        </div>
        <div class="toolbar">
          <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="onSearchInput()" />
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <select class="form-input" id="bigClassSelect" onchange="onBigClassChange()" style="flex:1;"><option value="">选择大班</option></select>
          <select class="form-input" id="classSelect" onchange="onClassChange()" style="flex:1;"><option value="">选择班级</option></select>
          <select class="form-input" id="groupSelect" onchange="onGroupChange()" style="flex:1;"><option value="">选择小组</option></select>
        </div>
        <div id="memberDisplay"><div class="empty-state">选择组织后查看成员</div></div>
        <div id="searchResults" class="search-results" style="display:none;"></div>
      </section>
    </div>

    <!-- Person Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">新增人员</div>

        <!-- 基本信息 -->
        <div class="modal-section">
          <div class="modal-section-title">基本信息</div>
          <input type="hidden" id="personId" />
          <div class="form-item">
            <label class="form-label">姓名 *</label>
            <input class="form-input" id="personName" placeholder="请输入姓名" />
          </div>
          <div class="form-row">
            <div class="form-item">
              <label class="form-label">手机号</label>
              <input class="form-input" id="personPhone" placeholder="手机号" maxlength="11" />
            </div>
            <div class="form-item">
              <label class="form-label">性别</label>
              <select class="form-select" id="personGender"><option value="">选择</option><option>男</option><option>女</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-item">
              <label class="form-label">状态</label>
              <select class="form-select" id="personStatus"><option value="active">在读</option><option value="left">已离班</option><option value="suspended">暂停</option></select>
            </div>
            <div class="form-item">
              <label class="form-label">备注</label>
              <input class="form-input" id="personNote" placeholder="备注" />
            </div>
          </div>
        </div>

        <!-- 组织归属 -->
        <div class="modal-section">
          <div class="modal-section-title">组织归属</div>
          <div class="form-item">
            <label class="form-label">归属组织</label>
            <select class="form-select" id="personOrgSelect"><option value="">不归属</option></select>
          </div>
        </div>

        <!-- 登录账号 -->
        <div class="modal-section">
          <div class="modal-section-title">登录账号</div>
          <div class="account-status" id="accountStatus">未关联登录账号</div>
          <label class="check-row" id="createAccountRow">
            <input type="checkbox" id="personCreateAccount" onchange="toggleAccountFields()" />
            <span>创建登录账号</span>
          </label>
          <div class="account-fields" id="accountCreateFields">
            <div class="form-item">
              <label class="form-label">初始密码 *</label>
              <input class="form-input" id="personPassword" type="password" autocomplete="new-password" placeholder="至少 6 位" />
            </div>
            <label class="check-row">
              <input type="checkbox" id="personGrantInitialPermission" checked />
              <span>同时分配当前模块权限</span>
            </label>
          </div>
        </div>

        <!-- 职务 -->
        <div class="modal-section">
          <div class="modal-section-title">职务</div>
          <div id="positionTags" style="margin-bottom:6px;"></div>
          <div class="inline-add">
            <select id="posNameSelect">
              <option value="学委">学委</option>
              <option value="督察">督察</option>
              <option value="班长">班长</option>
              <option value="组长">组长</option>
              <option value="秘书处">秘书处</option>
              <option value="副学委">副学委</option>
              <option value="副督察">副督察</option>
            </select>
            <select id="posScopeSelect">
              <option value="大班">大班</option>
              <option value="班级">班级</option>
              <option value="小组">小组</option>
            </select>
            <button class="btn btn-sm btn-secondary" onclick="addPosition()">添加</button>
          </div>
        </div>

        <!-- 模块权限 -->
        <div class="modal-section">
          <div class="modal-section-title">模块权限</div>
          <div id="permTags" style="margin-bottom:6px;"></div>
          <div class="inline-add">
            <select id="permModuleSelect" onchange="updatePermissionRoleOptions()">
              <option value="supervision">督察</option>
              <option value="study">学委</option>
              <option value="secretariat">秘书处</option>
            </select>
            <select id="permRoleSelect"></select>
            <button class="btn btn-sm btn-secondary" onclick="addPermission()">添加</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" onclick="savePerson()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=7"></script>
    <script src="js/utils.js?v=7"></script>
    <script src="js/components.js?v=7"></script>
    <script>renderModuleBottomNav('secretariat', 'people');</script>
    <script>
      var currentSemesterId = null, organizations = [], selectedOrgId = null;
      var orgMembersMap = {}, people = [], searchTimer = null;
      var POSITION_NAMES = ['学委', '督察', '班长', '组长', '秘书处', '副学委', '副督察'];
      var MODULE_LABELS = { supervision: '督察', study: '学委', secretariat: '秘书处' };
      var MODULE_ROLE_OPTIONS = {
        supervision: ['大班总督', '大班副督', '班级总督察', '班级副总督察', '小组督察', '小组副督察', '管理员'],
        study: ['学委', '副学委', '管理员'],
        secretariat: ['秘书处', '管理员']
      };

      var editingPersonId = null;
      var editingProfileId = null;
      var editingPositions = [];
      var editingPermissions = [];

      async function init() { await waitForDb(); await refreshCurrentUser(); if (!checkLogin()) return; var ok = await guardModuleAccess('secretariat'); if (!ok) return; updatePermissionRoleOptions(); await loadCurrentSemester(); await initPeopleCache(); await loadPeopleHealthStats(); await loadPeopleOverview(); }
      function initPeopleCache() { window.db.from('people').select('*').order('name').then(function(r) { people = r.data || []; }); }

      function updatePermissionRoleOptions() {
        var moduleKey = document.getElementById('permModuleSelect').value || 'supervision';
        var roleSelect = document.getElementById('permRoleSelect');
        var roles = (MODULE_ROLE_OPTIONS[moduleKey] || MODULE_ROLE_OPTIONS.supervision).slice();
        var currentUser = getCurrentUser();
        var isAdmin = currentUser && (currentUser.role === '超级管理员' || currentUser.role === '管理员');
        if (!isAdmin) {
          roles = roles.filter(function(role) { return role !== '管理员'; });
        }
        var oldValue = roleSelect.value;
        roleSelect.innerHTML = roles.map(function(role) {
          return '<option value="' + escapeHtml(role) + '">' + escapeHtml(role) + '</option>';
        }).join('');
        if (oldValue && roles.indexOf(oldValue) >= 0) roleSelect.value = oldValue;
      }

      function renderAccountState() {
        var status = document.getElementById('accountStatus');
        var row = document.getElementById('createAccountRow');
        var checkbox = document.getElementById('personCreateAccount');
        var password = document.getElementById('personPassword');
        if (editingProfileId) {
          status.textContent = '已关联登录账号';
          row.style.display = 'none';
          checkbox.checked = false;
          password.value = '';
        } else {
          status.textContent = '未关联登录账号';
          row.style.display = 'flex';
        }
        toggleAccountFields();
      }

      function toggleAccountFields() {
        var fields = document.getElementById('accountCreateFields');
        var checkbox = document.getElementById('personCreateAccount');
        if (!fields || !checkbox) return;
        fields.classList.toggle('show', !editingProfileId && checkbox.checked);
      }

      async function loadCurrentSemester() {
        currentSemesterId = await getCurrentSemesterId();
        if (!currentSemesterId) { document.getElementById('currentSemesterDisplay').textContent = '未设置当前学期'; return; }
        var r = await window.db.from('semesters').select('semester_name').eq('id', currentSemesterId).single();
        if (r.data) {
          document.getElementById('currentSemesterDisplay').textContent = r.data.semester_name;
        } else {
          document.getElementById('currentSemesterDisplay').textContent = '未知学期';
        }
        selectedOrgId = null; orgMembersMap = {};
        var ro = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
        if (ro.error) {
          showToast('加载组织失败', 'error');
          organizations = [];
          initCascadeSelector();
          return;
        }
        organizations = ro.data || [];
        if (!organizations.length) {
          var legacyOrgs = await window.db.from('organizations').select('*').is('semester_id', null).order('sort_order');
          organizations = legacyOrgs.data || [];
        }
        organizations.sort(function(a, b) {
          var sa = a.sort_order || 0, sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
        initCascadeSelector();
      }

      async function loadPeopleHealthStats() {
        var el = document.getElementById('peopleHealthStats');
        if (!el || !currentSemesterId) return;
        try {
          var peopleResult = await window.db.from('people').select('id,name,phone,status').eq('status', 'active');
          var assignResult = await window.db
            .from('person_org_assignments')
            .select('person_id')
            .eq('semester_id', currentSemesterId)
            .eq('status', 'active');
          var activePeople = peopleResult.data || [];
          var assignments = assignResult.data || [];
          var assignedIds = new Set(assignments.map(function(a) { return Number(a.person_id); }));
          var unassigned = activePeople.filter(function(p) { return !assignedIds.has(Number(p.id)); });
          var fallbackCount = 0;
          var phones = unassigned.map(function(p) { return p.phone; }).filter(Boolean);
          if (phones.length) {
            var profileResult = await window.db.from('profiles').select('phone,organization_id').in('phone', phones);
            fallbackCount = (profileResult.data || []).filter(function(p) { return !!p.organization_id; }).length;
          }
          el.innerHTML =
            '<div class="health-card"><div class="health-value">' + assignedIds.size + '</div><div class="health-label">已归属</div></div>' +
            '<div class="health-card' + (unassigned.length ? ' warn' : '') + '"><div class="health-value">' + unassigned.length + '</div><div class="health-label">未归属</div></div>' +
            '<div class="health-card' + (fallbackCount ? ' warn' : '') + '"><div class="health-value">' + fallbackCount + '</div><div class="health-label">旧兜底</div></div>';
        } catch (e) {
          el.innerHTML =
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">已归属</div></div>' +
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">未归属</div></div>' +
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">旧兜底</div></div>';
        }
      }

      function getChildren(pid) { return organizations.filter(function(o) { return Number(o.parent_id) === Number(pid); }); }
function getOrgPath(id) { var parts = []; var o = organizations.find(function(x) { return Number(x.id) === Number(id); }); while (o) { parts.unshift(o.name); o = organizations.find(function(x) { return Number(x.id) === Number(o.parent_id); }); } return parts.join(' / '); }

// ====== 三级下拉选择 ======
function initCascadeSelector() {
  var bcSel = document.getElementById('bigClassSelect');
  var bcs = organizations.filter(function(o) { return o.level === '大班' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
  if (!bcs.length) {
    bcs = organizations.filter(function(o) { return !o.parent_id && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
  }
  bcSel.innerHTML = '<option value="">' + (bcs.length ? '选择组织' : '暂无组织') + '</option>' + bcs.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
  // 自动匹配
  try {
    var profile = JSON.parse(localStorage.getItem('supabase_user'));
    if (profile && profile.organization_id) {
      var userOrg = organizations.find(function(o) { return Number(o.id) === Number(profile.organization_id); });
      if (userOrg) {
        if (userOrg.level === '大班') { bcSel.value = String(userOrg.id); onBigClassChange(); return; }
        else if (userOrg.level === '班级') {
          var pbc = organizations.find(function(o) { return Number(o.id) === Number(userOrg.parent_id); });
          if (pbc) { bcSel.value = String(pbc.id); onBigClassChange(true); document.getElementById('classSelect').value = String(userOrg.id); onClassChange(true); return; }
        }
        else if (userOrg.level === '小组') {
          var pcls = organizations.find(function(o) { return Number(o.id) === Number(userOrg.parent_id); });
          if (pcls) {
            var pbc2 = organizations.find(function(o) { return Number(o.id) === Number(pcls.parent_id); });
            if (pbc2) { bcSel.value = String(pbc2.id); onBigClassChange(true); document.getElementById('classSelect').value = String(pcls.id); onClassChange(true); document.getElementById('groupSelect').value = String(userOrg.id); onGroupChange(); return; }
          }
        }
      }
    }
  } catch(e) {}
  if (bcs.length === 1) { bcSel.value = String(bcs[0].id); onBigClassChange(); }
}

function onBigClassChange(skipAuto) {
  var bcId = document.getElementById('bigClassSelect').value;
  var clsSel = document.getElementById('classSelect');
  var grpSel = document.getElementById('groupSelect');
  clsSel.innerHTML = '<option value="">选择班级</option>';
  grpSel.innerHTML = '<option value="">选择小组</option>';
  document.getElementById('memberDisplay').innerHTML = '<div class="person-empty">选择组织后查看成员</div>';
  if (!bcId) return;
  var classes = organizations.filter(function(o) { return Number(o.parent_id) === Number(bcId) && o.level === '班级' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
  clsSel.innerHTML = '<option value="">选择班级</option>' + classes.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
  if (!skipAuto && classes.length === 1) { clsSel.value = String(classes[0].id); onClassChange(); }
  else { loadOrgMembers(bcId); }
}

function onClassChange(skipAuto) {
  var clsId = document.getElementById('classSelect').value;
  var grpSel = document.getElementById('groupSelect');
  grpSel.innerHTML = '<option value="">选择小组</option>';
  document.getElementById('memberDisplay').innerHTML = '<div class="person-empty">选择组织后查看成员</div>';
  if (!clsId) return;
  var groups = organizations.filter(function(o) { return Number(o.parent_id) === Number(clsId) && o.level === '小组' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
  grpSel.innerHTML = '<option value="">选择小组</option>' + groups.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
  if (!skipAuto && groups.length === 1) { grpSel.value = String(groups[0].id); onGroupChange(); }
  else { loadOrgMembers(clsId); }
}

function onGroupChange() {
  var gId = document.getElementById('groupSelect').value;
  if (gId) loadOrgMembers(gId);
}

async function loadPeopleOverview() {
  var container = document.getElementById('memberDisplay');
  container.style.display = 'block';
  document.getElementById('searchResults').style.display = 'none';
  container.innerHTML = '<div class="person-empty">加载中...</div>';

  var peopleResult = await window.db.from('people').select('*').order('name');
  if (peopleResult.error) {
    container.innerHTML = '<div class="person-empty">加载人员失败</div>';
    showToast('加载人员失败', 'error');
    return;
  }

  var allPeople = peopleResult.data || [];
  people = allPeople;
  if (!allPeople.length) {
    var profileResult = await window.db.from('profiles').select('id,name,phone,role').order('name');
    var profiles = profileResult.data || [];
    if (!profiles.length) {
      container.innerHTML = '<div class="person-empty">暂无人员，请点击右上角新增人员</div>';
      return;
    }
    container.innerHTML =
      '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">人员档案为空，以下为旧账号资料 · 共 ' +
      profiles.length +
      ' 人</div>' +
      profiles.map(function(p) {
        return '<div class="person-item"><div class="person-avatar">' + (p.name ? p.name.charAt(0) : '?') + '</div>' +
          '<div class="person-info"><div class="person-name">' + escapeHtml(p.name || '') + '</div>' +
          '<div class="person-meta">' + (p.phone ? '📞 ' + escapeHtml(p.phone) + ' · ' : '') + escapeHtml(p.role || '账号') + '</div></div>' +
          '<div class="person-actions"><span style="font-size:12px;color:var(--ink-muted);">需导入档案</span></div></div>';
      }).join('');
    return;
  }

  var orgAssigns = [];
  if (currentSemesterId) {
    var personIds = allPeople.map(function(p) { return p.id; });
    var assignResult = personIds.length
      ? await window.db
          .from('person_org_assignments')
          .select('person_id,org_id,status,organizations(name,level)')
          .eq('semester_id', currentSemesterId)
          .in('person_id', personIds)
          .eq('status', 'active')
      : { data: [] };
    orgAssigns = assignResult.data || [];
  }

  var profileByPhone = {};
  var phones = allPeople.map(function(p) { return p.phone; }).filter(Boolean);
  if (phones.length) {
    var profileResult = await window.db.from('profiles').select('name,phone,organization_id,organizations(name,level)').in('phone', phones);
    (profileResult.data || []).forEach(function(profile) {
      if (profile.phone) profileByPhone[profile.phone] = profile;
    });
  }

  container.innerHTML =
    '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">全部人员 · 共 ' +
    allPeople.length +
    ' 人</div>' +
    allPeople.map(function(p) {
      var assign = orgAssigns.find(function(a) { return Number(a.person_id) === Number(p.id); });
      var legacyProfile = p.phone ? profileByPhone[p.phone] : null;
      var orgName = assign && assign.organizations
        ? assign.organizations.name
        : (legacyProfile && legacyProfile.organizations ? legacyProfile.organizations.name : '未归属');
      var stLbl = p.status === 'active' ? '在读' : p.status === 'left' ? '已离班' : '暂停';
      return '<div class="person-item"><div class="person-avatar">' + (p.name ? p.name.charAt(0) : '?') + '</div>' +
        '<div class="person-info"><div class="person-name">' + escapeHtml(p.name || '') + ' <span class="status-badge ' + (p.status || 'active') + '">' + stLbl + '</span></div>' +
        '<div class="person-meta">' + (p.phone ? '📞 ' + escapeHtml(p.phone) + ' · ' : '') + escapeHtml(orgName) + '</div></div>' +
        '<div class="person-actions"><button class="btn btn-sm btn-secondary" onclick="showEditPersonModal(' + p.id + ')">编辑</button></div></div>';
    }).join('');
}

function getOrgAndDescendantIds(orgId) {
  var ids = [Number(orgId)];
  organizations
    .filter(function(o) { return Number(o.parent_id) === Number(orgId); })
    .forEach(function(child) {
      ids = ids.concat(getOrgAndDescendantIds(child.id));
    });
  return ids;
}

async function loadOrgMembers(orgId) {
  var container = document.getElementById('memberDisplay');
  container.innerHTML = '<div class="person-empty">加载中...</div>';
  var members = await getOrgMembers(orgId);
  renderMembers(orgId, members, container);
}

async function getOrgMembers(orgId) {
        if (!orgId || !currentSemesterId) return [];
        var cacheKey = String(orgId);
        if (orgMembersMap[cacheKey]) return orgMembersMap[cacheKey];

        var orgIds = getOrgAndDescendantIds(orgId);
        var result = await window.db
          .from('person_org_assignments')
          .select('id,person_id,org_id,sort_order,people(id,name,phone,status)')
          .eq('semester_id', currentSemesterId)
          .eq('status', 'active')
          .in('org_id', orgIds)
          .order('sort_order', { ascending: true });
        if (result.error) {
          showToast('加载成员失败', 'error');
          return [];
        }
        var members = result.data || [];
        var knownPersonIds = new Set(members.map(function(m) { return Number(m.person_id); }));
        var legacyProfiles = await window.db
          .from('profiles')
          .select('name,phone,organization_id')
          .in('organization_id', orgIds);
        var legacyPhones = (legacyProfiles.data || []).map(function(profile) { return profile.phone; }).filter(Boolean);
        var legacyPeopleByPhone = {};
        if (legacyPhones.length) {
          var legacyPeople = await window.db.from('people').select('id,name,phone,status').in('phone', legacyPhones);
          (legacyPeople.data || []).forEach(function(person) {
            if (person.phone) legacyPeopleByPhone[person.phone] = person;
          });
        }
        (legacyProfiles.data || []).forEach(function(profile, idx) {
          var person = profile.phone ? legacyPeopleByPhone[profile.phone] : null;
          if (!person || knownPersonIds.has(Number(person.id))) return;
          members.push({
            id: 'legacy-' + person.id,
            person_id: person.id,
            org_id: profile.organization_id,
            sort_order: 100000 + idx,
            people: person
          });
          knownPersonIds.add(Number(person.id));
        });
        members.sort(function(a, b) {
          var oa = orgIds.indexOf(Number(a.org_id));
          var ob = orgIds.indexOf(Number(b.org_id));
          if (oa !== ob) return oa - ob;
          var sa = a.sort_order || 0;
          var sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          var an = a.people ? a.people.name || '' : '';
          var bn = b.people ? b.people.name || '' : '';
          return an.localeCompare(bn, 'zh-CN');
        });
        orgMembersMap[cacheKey] = members;
        return members;
      }

      function renderMembers(orgId, members, container) {
        // 三级下拉模式：container 由调用方传入
        if (!container) { container = document.getElementById('members-' + orgId); }
        if (!container) return;
        if (!members.length) { container.innerHTML = '<div class="person-empty">暂无成员</div>'; return; }
        container.innerHTML = members.map(function(item, idx) {
          var p = item.people; var assignId = item.id;
          var isFirst = idx === 0, isLast = idx === members.length - 1;
          return '<div class="person-item">' +
            '<div class="person-avatar">' + (p.name ? p.name.charAt(0) : '?') + '</div>' +
            '<div class="person-info"><div class="person-name">' + escapeHtml(p.name) + '</div></div>' +
            '<div style="display:flex;gap:1px;flex-shrink:0;">' +
            '<button class="sort-btn" ' + (isFirst ? 'disabled' : '') + ' onclick="event.stopPropagation();movePerson(' + assignId + ',-1)">▲</button>' +
            '<button class="sort-btn" ' + (isLast ? 'disabled' : '') + ' onclick="event.stopPropagation();movePerson(' + assignId + ',1)">▼</button>' +
            '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();showEditPersonModal(' + p.id + ')">编辑</button>' +
            '</div></div>';
        }).join('');
      }

      async function movePerson(assignId, direction) {
        var members = [];
        for (var key in orgMembersMap) {
          orgMembersMap[key].forEach(function(m) { members.push(m); });
        }
        var idx = members.findIndex(function(m) { return m.id === assignId; });
        if (idx === -1) return;
        var swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= members.length) return;
        var currentSort = members[idx].sort_order || 0;
        var swapSort = members[swapIdx].sort_order || 0;
        try {
          await window.db.from('person_org_assignments').update({ sort_order: swapSort }).eq('id', assignId);
          await window.db.from('person_org_assignments').update({ sort_order: currentSort }).eq('id', members[swapIdx].id);
          orgMembersMap = {};
          for (var key2 in orgMembersMap) { delete orgMembersMap[key2]; }
        } catch(e) { showToast('操作失败', 'error'); }
      }

      function onSearchInput() {
        clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 300);
      }

      async function doSearch() {
        var q = document.getElementById('searchInput').value.trim();
        if (!q) {
          document.getElementById('searchResults').style.display = 'none';
          await loadPeopleOverview();
          return;
        }
        var r = await window.db.from('people').select('*').or('name.ilike.%' + q + '%,phone.ilike.%' + q + '%').order('name');
        var allP = r.data || [];
        var personIds = allP.map(function(p) { return p.id; });
        var orgAssigns = [];
        if (personIds.length && currentSemesterId) {
          var ra = await window.db.from('person_org_assignments').select('*, organizations(name,level)').eq('semester_id', currentSemesterId).in('person_id', personIds).eq('status', 'active');
          orgAssigns = ra.data || [];
        }
        document.getElementById('memberDisplay').style.display = 'none'; var container = document.getElementById('searchResults'); container.style.display = 'block';
        if (!allP.length) { container.innerHTML = '<div class="empty-state">未找到匹配的人员</div>'; return; }
        container.innerHTML = '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">搜索到 ' + allP.length + ' 人</div>' +
          allP.map(function(p) {
            var a = orgAssigns.find(function(x) { return Number(x.person_id) === Number(p.id); });
            var orgLbl = a && a.organizations ? a.organizations.name : '';
            var stLbl = p.status === 'active' ? '在读' : p.status === 'left' ? '已离班' : '暂停';
            return '<div class="person-item"><div class="person-avatar">' + p.name.charAt(0) + '</div>' +
              '<div class="person-info"><div class="person-name">' + escapeHtml(p.name) + ' <span class="status-badge ' + p.status + '">' + stLbl + '</span></div>' +
              '<div class="person-meta">' + (p.phone ? '📞 ' + escapeHtml(p.phone) : '') + (orgLbl ? ' · ' + escapeHtml(orgLbl) : '') + '</div></div>' +
              '<div class="person-actions"><button class="btn btn-sm btn-secondary" onclick="showEditPersonModal(' + p.id + ')">编辑</button></div></div>';
          }).join('');
      }

      // ---- Modal ----
      function showAddModal() {
        editingPersonId = null; editingProfileId = null; editingPositions = []; editingPermissions = [];
        document.getElementById('modalTitle').textContent = '新增人员';
        document.getElementById('personId').value = '';
        document.getElementById('personName').value = '';
        document.getElementById('personPhone').value = '';
        document.getElementById('personGender').value = '';
        document.getElementById('personStatus').value = 'active';
        document.getElementById('personNote').value = '';
        document.getElementById('personOrgSelect').value = '';
        document.getElementById('personCreateAccount').checked = false;
        document.getElementById('personPassword').value = '';
        document.getElementById('personGrantInitialPermission').checked = true;
        document.getElementById('permModuleSelect').value = 'secretariat';
        updatePermissionRoleOptions();
        renderPositionTags();
        renderPermTags();
        renderAccountState();
        populateOrgSelect();
        document.getElementById('personModal').classList.add('show');
      }

      function closeModal() { document.getElementById('personModal').classList.remove('show'); }

      function populateOrgSelect() {
        var sel = document.getElementById('personOrgSelect');
        var opts = organizations.filter(function(o) { return o.level === '小组'; });
        if (!opts.length) opts = organizations.filter(function(o) { return o.level === '班级'; });
        if (!opts.length) opts = organizations;
        sel.innerHTML = '<option value="">不归属</option>' + opts.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(getOrgPath(o.id)) + '</option>';
        }).join('');
      }

      async function showEditPersonModal(personId) {
        var r = await window.db.from('people').select('*').eq('id', personId).single();
        var p = r.data; if (!p) return;
        editingPersonId = personId;
        editingProfileId = await findProfileIdForPerson(p);
        document.getElementById('modalTitle').textContent = '编辑人员';
        document.getElementById('personId').value = p.id;
        document.getElementById('personName').value = p.name || '';
        document.getElementById('personPhone').value = p.phone || '';
        document.getElementById('personGender').value = p.gender || '';
        document.getElementById('personStatus').value = p.status || 'active';
        document.getElementById('personNote').value = p.note || '';
        document.getElementById('personCreateAccount').checked = false;
        document.getElementById('personPassword').value = '';
        document.getElementById('personGrantInitialPermission').checked = true;
        populateOrgSelect();

        // Load org assignment
        if (currentSemesterId) {
          var ra = await window.db.from('person_org_assignments').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('status', 'active').maybeSingle();
          if (ra.data) document.getElementById('personOrgSelect').value = ra.data.org_id || '';
        }

        // Load positions
        if (currentSemesterId) {
          var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('is_active', true);
          editingPositions = rp.data || [];
        } else { editingPositions = []; }
        renderPositionTags();

        // Load permissions for linked login account, not people.id
        if (editingProfileId) {
          var rperm = currentSemesterId
            ? await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('semester_id', currentSemesterId).eq('enabled', true)
            : await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('enabled', true);
          editingPermissions = rperm.data || [];
        } else {
          editingPermissions = [];
        }
        document.getElementById('permModuleSelect').value = 'secretariat';
        updatePermissionRoleOptions();
        renderPermTags();
        renderAccountState();

        document.getElementById('personModal').classList.add('show');
      }

      // ---- Positions ----
      function renderPositionTags() {
        var container = document.getElementById('positionTags');
        if (!editingPositions.length) { container.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">暂未设置职务</span>'; return; }
        container.innerHTML = editingPositions.map(function(pos, i) {
          return '<span class="tag">' + escapeHtml(pos.position_name) + ' · ' + pos.position_scope +
            ' <span class="remove" onclick="removePosition(' + i + ')">×</span></span>';
        }).join('');
      }

      async function addPosition() {
        if (!editingPersonId || !currentSemesterId) { showToast('请先保存人员基本信息', 'error'); return; }
        var name = document.getElementById('posNameSelect').value;
        var scope = document.getElementById('posScopeSelect').value;
        try {
          var r = await window.db.from('person_positions').insert({
            semester_id: currentSemesterId, person_id: editingPersonId,
            position_name: name, position_scope: scope, is_active: true,
            org_id: Number(document.getElementById('personOrgSelect').value) || null
          });
          if (r.error) throw r.error;
          showToast('职务已添加', 'success');
          if (currentSemesterId) {
            var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', editingPersonId).eq('is_active', true);
            editingPositions = rp.data || []; renderPositionTags();
          }
        } catch(e) { showToast('添加失败，可能已存在', 'error'); }
      }

      function removePosition(idx) {
        var pos = editingPositions[idx]; if (!pos) return;
        showConfirm('确定移除该职务吗？').then(function(ok) {
          if (!ok) return;
          window.db.from('person_positions').update({ is_active: false }).eq('id', pos.id).then(function() {
            editingPositions.splice(idx, 1); renderPositionTags();
          });
        });
      }

      // ---- Permissions ----
      async function findProfileIdForPerson(person) {
        if (!person || !person.phone) return null;
        try {
          var result = await window.db.from('profiles').select('id').eq('phone', person.phone).maybeSingle();
          return result.data ? result.data.id : null;
        } catch (e) {
          return null;
        }
      }

      function renderPermTags() {
        var container = document.getElementById('permTags');
        if (editingPersonId && !editingProfileId) {
          container.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">该人员未关联登录账号，无法分配模块权限</span>';
          return;
        }
        if (!editingPermissions.length) { container.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">暂未分配模块权限</span>'; return; }
        container.innerHTML = editingPermissions.map(function(perm, i) {
          var modLabel = MODULE_LABELS[perm.module_key] || perm.module_key;
          return '<span class="tag">' + modLabel + ' · ' + escapeHtml(perm.role) +
            ' <span class="remove" onclick="removePermission(' + i + ')">×</span></span>';
        }).join('');
      }

      async function reloadEditingPermissions() {
        if (!editingProfileId) { editingPermissions = []; renderPermTags(); return; }
        var rperm = currentSemesterId
          ? await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('semester_id', currentSemesterId).eq('enabled', true)
          : await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('enabled', true);
        editingPermissions = rperm.data || [];
        renderPermTags();
      }

      async function addPermission() {
        if (!editingPersonId) { showToast('请先保存人员基本信息', 'error'); return; }
        if (!editingProfileId) { showToast('该人员未关联登录账号，无法分配权限', 'error'); return; }
        if (!currentSemesterId) { showToast('请先选择一个学期', 'error'); return; }
        var moduleKey = document.getElementById('permModuleSelect').value;
        var role = document.getElementById('permRoleSelect').value;
        var orgId = document.getElementById('personOrgSelect').value;
        try {
          var r = await adminApi.grantModuleMembership({
            userId: editingProfileId,
            semesterId: currentSemesterId,
            moduleKey: moduleKey,
            role: role,
            orgId: orgId ? Number(orgId) : null
          });
          if (r.error) throw r.error;
          showToast('权限已分配', 'success');
          await reloadEditingPermissions();
        } catch(e) { showToast('添加失败: ' + (e.message || e), 'error'); }
      }

      function removePermission(idx) {
        var perm = editingPermissions[idx]; if (!perm) return;
        showConfirm('确定移除该权限吗？').then(function(ok) {
          if (!ok) return;
          adminApi.disableModuleMembership(perm.id).then(function(result) {
            if (result && result.error) throw new Error(result.error);
            editingPermissions.splice(idx, 1); renderPermTags();
          }).catch(function(e) {
            showToast('移除失败: ' + (e.message || e), 'error');
          });
        });
      }

      // ---- Save ----
      async function savePerson() {
        var id = document.getElementById('personId').value;
        var isEdit = !!id;
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;
        var status = document.getElementById('personStatus').value;
        var note = document.getElementById('personNote').value.trim();
        var orgId = document.getElementById('personOrgSelect').value;
        var shouldCreateAccount = !editingProfileId && document.getElementById('personCreateAccount').checked;
        var initialPassword = document.getElementById('personPassword').value;
        var grantInitialPermission = document.getElementById('personGrantInitialPermission').checked;
        if (!name) { showToast('请输入姓名', 'error'); return; }
        if (shouldCreateAccount) {
          if (!phone) { showToast('创建登录账号需要手机号', 'error'); return; }
          if (initialPassword.length < 6) { showToast('请输入至少 6 位初始密码', 'error'); return; }
          if (grantInitialPermission && !currentSemesterId) { showToast('请先选择一个学期', 'error'); return; }
        }

        document.getElementById('saveBtn').disabled = true;
        try {
          var payload = { name: name, phone: phone || null, gender: gender || null, status: status, note: note || null };
          var result;
          if (id) {
            result = await window.db.from('people').update(payload).eq('id', id);
          } else {
            result = await window.db.from('people').insert(payload).select('id');
            if (result.data && result.data[0]) id = result.data[0].id;
          }
          if (result.error) throw result.error;
          editingPersonId = id || editingPersonId;

          // Save org assignment
          if (currentSemesterId && orgId) {
            var existing = await window.db.from('person_org_assignments')
              .select('*').eq('semester_id', currentSemesterId).eq('person_id', Number(editingPersonId)).eq('org_id', Number(orgId)).maybeSingle();
            if (!existing.data) {
              var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
              // Deactivate old assignments
              await window.db.from('person_org_assignments').update({ status: 'left' })
                .eq('semester_id', currentSemesterId).eq('person_id', Number(editingPersonId)).eq('status', 'active');
              await window.db.from('person_org_assignments').insert({
                semester_id: currentSemesterId, person_id: Number(editingPersonId),
                org_id: Number(orgId), org_level: org ? org.level : '小组', status: 'active', sort_order: 0
              });
            }
          }

          if (shouldCreateAccount) {
            var moduleMembership = null;
            if (grantInitialPermission) {
              moduleMembership = {
                semesterId: currentSemesterId,
                moduleKey: document.getElementById('permModuleSelect').value,
                role: document.getElementById('permRoleSelect').value,
                orgId: orgId ? Number(orgId) : null
              };
            }
            var accountResult = await adminApi.createProfileAccount({
              name: name,
              phone: phone,
              password: initialPassword,
              profileRole: '普通成员',
              organizationId: orgId ? Number(orgId) : null,
              moduleMembership: moduleMembership
            });
            if (accountResult.error) throw new Error('人员已保存，但登录账号创建失败: ' + accountResult.error);
            editingProfileId = accountResult.userId;
            if (accountResult.membership) {
              editingPermissions = [accountResult.membership];
            }
          }

          logAction(isEdit ? '编辑人员' : '新增人员', 'people', name, 'secretariat');
          showToast(shouldCreateAccount ? '保存成功，登录账号已创建' : '保存成功', 'success');
          closeModal();
          orgMembersMap = {};
          if (currentSemesterId) {
            await loadPeopleHealthStats();
            var ro2 = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
            organizations = ro2.data || [];
            initCascadeSelector();
            // 重载当前选中的组织成员
            var selGrp = document.getElementById('groupSelect').value;
            var selCls = document.getElementById('classSelect').value;
            var selBc = document.getElementById('bigClassSelect').value;
            var targetOrg = selGrp || selCls || selBc;
            if (targetOrg && Number(targetOrg)) { var m2 = await getOrgMembers(Number(targetOrg)); renderMembers(Number(targetOrg), m2, document.getElementById('memberDisplay')); }
            else { await loadPeopleOverview(); }
          }
          initPeopleCache();
        } catch(e) { showToast('保存失败: ' + (e.message || e), 'error'); }
        finally { document.getElementById('saveBtn').disabled = false; }
      }

      init();
    </script>
