<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <style>
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.level-0 { font-weight: 600; }
      .org-node-header.level-1 { padding-left: 32px; }
      .org-node-header.level-2 { padding-left: 52px; }
      .org-toggle { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .org-toggle.expanded { transform: rotate(90deg); }
      .org-name { flex: 1; color: var(--ink-dark); font-size: 14px; }

      .person-card-list { display:flex; flex-direction:column; gap:10px; }
      .person-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:0 2px 12px var(--shadow); }
      .person-card-top { display:flex; align-items:flex-start; gap:10px; }
      .person-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--vermillion-light),rgba(224,176,78,0.22)); color:var(--vermillion); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; }
      .person-card-main { flex:1; min-width:0; }
      .person-card-title { display:flex; align-items:center; gap:6px; min-width:0; }
      .person-card-name { font-size:15px; font-weight:700; color:var(--ink-dark); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .person-card-meta { margin-top:4px; font-size:12px; color:var(--ink-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .person-card-actions { flex-shrink:0; display:flex; gap:6px; }
      .person-card-grid { display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; }
      .person-card-field { min-width:0; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg-primary); }
      .person-card-field-label { font-size:10px; color:var(--ink-muted); line-height:1.2; }
      .person-card-field-value { margin-top:3px; font-size:12px; color:var(--ink-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .person-position-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:8px; }
      .person-position-column { min-width:0; padding:8px 9px; border:1px solid var(--border); border-radius:8px; background:var(--bg-primary); }
      .person-position-label { font-size:10px; color:var(--ink-muted); line-height:1.2; }
      .person-position-list { display:flex; flex-direction:column; align-items:flex-start; gap:4px; margin-top:5px; min-height:17px; }
      .person-position-item { max-width:100%; color:var(--ink-dark); font-size:11px; line-height:1.35; overflow-wrap:anywhere; }
      .person-position-empty { color:var(--ink-muted); font-size:11px; }
      .person-card-note { margin-top:10px; font-size:12px; color:var(--ink-muted); line-height:1.5; }
      .status-badge { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 10px; flex-shrink:0; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: var(--gold-light); color: var(--ink-light); }

      .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); font-size: 11px; margin: 2px; }
      .tag .remove { cursor: pointer; color: var(--vermillion); font-size: 11px; line-height: 1; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; font-size: 13px; }
      .toolbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .person-empty { color: var(--ink-muted); font-size: 12px; padding: 12px 14px; }
      .people-breadcrumb { display:flex; align-items:center; gap:4px; margin-bottom:14px; flex-wrap:wrap; font-size:13px; }
      .people-breadcrumb-item { color:var(--ink-muted); cursor:pointer; padding:4px 8px; border-radius:4px; white-space:nowrap; }
      .people-breadcrumb-item:hover { color:var(--vermillion); background:var(--gold-light); }
      .people-breadcrumb-item.current { color:var(--ink-dark); font-weight:700; cursor:default; background:transparent; }
      .people-breadcrumb-sep { color:var(--border); }
      .people-card-list { display:flex; flex-direction:column; gap:10px; }
      .people-data-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
      .people-data-card:active { transform:scale(0.98); }
      .people-data-card:hover { border-color:rgba(179,45,55,0.28); }
      .people-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
      .people-card-title { font-size:15px; font-weight:700; color:var(--ink-dark); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .people-card-subtitle { margin-top:4px; font-size:12px; color:var(--ink-muted); }
      .people-card-action { flex-shrink:0; font-size:12px; color:var(--vermillion); font-weight:700; padding-top:2px; }
      .people-card-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
      .people-card-stat { background:var(--bg-primary); border-radius:8px; padding:8px 10px; text-align:center; min-width:0; }
      .people-card-value { font-size:18px; font-weight:700; color:var(--ink-dark); line-height:1.2; }
      .people-card-label { margin-top:2px; font-size:10px; color:var(--ink-muted); }
      .people-member-head { margin-bottom:8px; color:var(--ink-muted); font-size:13px; }
      .health-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
      .health-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; cursor:pointer; font-family:inherit; }
      .health-card.active { border-color: rgba(179,45,55,0.38); background: var(--vermillion-light); box-shadow: 0 2px 10px var(--shadow); }
      .health-card:active { transform: scale(0.98); }
      .health-value { font-size: 18px; font-weight: 700; color: var(--ink-dark); line-height: 1.2; }
      .health-label { margin-top: 3px; font-size: 11px; color: var(--ink-muted); }
      .health-card.warn .health-value { color: var(--vermillion); }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; align-items: flex-end; justify-content: center; padding: 0; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 30px; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .modal-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
      .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .modal-section-title { font-size: 14px; font-weight: 700; color: var(--ink-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 12px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }
      .inline-add { display: flex; gap: 6px; margin-top: 8px; }
      .inline-add select, .inline-add input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); font-size: 12px; font-family: inherit; }
      .inline-add .btn { flex: 0 0 auto; padding: 8px 12px; font-size: 12px; }
      .account-status { margin-bottom: 8px; font-size: 12px; color: var(--ink-muted); }
      .check-row { display: flex; align-items: center; gap: 8px; color: var(--ink-dark); font-size: 13px; margin: 8px 0; }
      .check-row input { width: 16px; height: 16px; accent-color: var(--vermillion); }
      .account-fields { display: none; margin-top: 10px; }
      .account-fields.show { display: block; }
      .person-edit-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; }
      .person-edit-head .modal-title { margin-bottom:0; }
      .person-edit-shell { padding-top:4px; }
      .manager-grid { display:grid; gap:10px; }
      .manager-card { width:100%; border:1px solid var(--border); border-radius:10px; background:var(--bg-primary); padding:12px; text-align:left; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; }
      .manager-card:active { background:var(--gold-light); }
      .manager-card.disabled { opacity:0.56; cursor:not-allowed; }
      .manager-main { min-width:0; }
      .manager-title { font-size:14px; font-weight:700; color:var(--ink-dark); }
      .manager-desc { margin-top:4px; font-size:12px; color:var(--ink-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .manager-chevron { color:var(--ink-muted); font-size:12px; flex-shrink:0; font-weight:700; }
      .sub-modal { z-index:2100; }
      .sub-modal .modal { max-width:500px; }
      .sub-modal .position-modal { max-width:820px; }
      .sub-modal .permission-modal { max-width:820px; }
      .position-board { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
      .position-column { border:1px solid var(--border); border-radius:8px; background:var(--bg-primary); padding:14px; min-width:0; }
      .position-column.locked { opacity:.58; }
      .position-column-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
      .position-column-title { font-size:14px; font-weight:700; color:var(--ink-dark); }
      .position-column-count { font-size:11px; color:var(--ink-muted); white-space:nowrap; }
      .position-column select { width:100%; height:40px; padding:0 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg-card); color:var(--ink-dark); font:inherit; font-size:13px; }
      .permission-fields { display:grid; gap:8px; }
      .position-column .btn { width:100%; margin-top:8px; }
      .position-scope-tags { min-height:32px; margin-top:12px; }
      .position-modal .position-scope-tags .tag { padding:6px 9px; font-size:12px; margin:3px; }
      .position-modal .position-scope-tags .tag .remove { padding:3px 4px; margin-left:2px; font-size:12px; font-weight:700; }
      .position-lock-note { display:none; margin-top:9px; color:var(--ink-muted); font-size:11px; line-height:1.5; }
      .position-column.locked .position-lock-note { display:block; }

      .search-results { margin-top: 10px; }

      .export-csv-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--ink-dark); margin-left: auto; }
      .export-csv-btn:active { background: var(--border); }
      .export-csv-btn.hidden { display: none; }
      .export-csv-btn svg { width: 18px; height: 18px; display: block; }
      .pending-btn { position:relative; height:36px; padding:0 14px; border:1px solid var(--vermillion); border-radius:8px; background:var(--vermillion-light); color:var(--vermillion); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:auto; font-family:inherit; }
      .pending-btn:active { opacity:0.8; }
      .pending-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; padding:0 6px; border-radius:10px; background:var(--vermillion); color:#fff; font-size:11px; font-weight:700; }
      .modal-lg { max-width:600px !important; }
      .record-list { display:grid; gap:10px; }
      .record-list-footer { margin-top:12px; display:flex; justify-content:center; }
      .pending-load-more { min-width:132px; }
      .record-card { border:1px solid rgba(179, 45, 55, 0.14); border-radius:12px; padding:14px; background:rgba(255,255,255,0.96); box-shadow:0 2px 10px var(--shadow); cursor:pointer; transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s; }
      .record-card:active { transform:scale(0.99); border-color:rgba(179,45,55,0.28); }
      .record-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
      .record-head { display:flex; align-items:center; gap:10px; min-width:0; }
      .record-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--vermillion-light),rgba(224,176,78,0.22)); color:var(--vermillion); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; }
      .record-main { flex:1; min-width:0; }
      .record-name-row { display:flex; align-items:center; gap:6px; }
      .record-name { font-size:15px; font-weight:700; color:var(--ink-dark); }
      .record-gender { font-size:11px; color:var(--ink-muted); }
      .record-phone { font-size:12px; color:var(--ink-light); margin-top:2px; }
      .record-action { height:32px; padding:0 10px; border:1px solid rgba(179,45,55,0.18); border-radius:8px; background:var(--vermillion-light); color:var(--vermillion); font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; }
      .record-action:active { transform:scale(0.98); }
      .record-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
      .record-tag { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--bg-primary); color:var(--ink-light); }
      .record-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
      .record-field { min-width:0; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:rgba(248,246,242,0.68); }
      .record-field-label { font-size:10px; color:var(--ink-muted); line-height:1.2; }
      .record-field-value { margin-top:3px; font-size:12px; color:var(--ink-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .record-location { font-size:12px; color:var(--ink-light); margin-top:6px; }
      .assign-summary { padding:12px; border:1px solid rgba(179,45,55,0.14); border-radius:10px; background:rgba(179,45,55,0.045); margin-bottom:14px; }
      .assign-summary-name { font-size:15px; font-weight:700; color:var(--ink-dark); }
      .assign-summary-meta { margin-top:4px; font-size:12px; color:var(--ink-muted); line-height:1.6; }
      .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
      .modal-header .modal-title { font-size:18px; font-weight:700; }
      .modal-close { min-width:48px; height:32px; padding:0 10px; border-radius:8px; border:none; background:var(--bg-primary); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-muted); font-family:inherit; }
      @media (max-width: 420px) {
        .position-board { grid-template-columns:1fr; }
        .record-top { flex-direction:column; align-items:stretch; }
        .record-action { width:100%; }
        .record-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">返回</a>
        <h1 class="page-title">人员管理</h1>
        <button class="pending-btn" id="pendingBtn" onclick="showPendingModal()" title="待处理进班申请">待处理 <span class="pending-badge" id="pendingBadge">0</span></button>
        <button class="export-csv-btn" id="exportPeopleBtn" onclick="exportPeopleCSV()" title="导出 CSV" aria-label="导出 CSV">
          <span data-icon="DownloadIcon"></span>
        </button>
      </header>
      <section class="section">
<div class="form-item">
  <div class="semester-wrap" id="currentSemesterDisplay"></div>
</div>
        <div class="health-grid" id="peopleHealthStats" style="display:none;">
          <button type="button" class="health-card active" data-people-view="assigned" onclick="setPeopleViewMode('assigned')"><div class="health-value">--</div><div class="health-label">已归属</div></button>
          <button type="button" class="health-card" data-people-view="unassigned" onclick="setPeopleViewMode('unassigned')"><div class="health-value">--</div><div class="health-label">未归属</div></button>
        </div>
      </section>
      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" id="addPersonBtn" onclick="showAddModal()" style="display:none;">新增人员</button>
        </div>
        <div class="toolbar">
          <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="onSearchInput()" />
        </div>
        <div class="people-breadcrumb" id="peopleBreadcrumb"></div>
        <div id="orgCardArea"></div>
        <div id="memberDisplay"><div class="empty-state">选择组织后查看成员</div></div>
        <div id="searchResults" class="search-results" style="display:none;"></div>
      </section>
    </div>

    <!-- 待处理进班申请 Modal -->
    <div class="modal-overlay" id="pendingModal" onclick="if(event.target===this)closePendingModal()">
      <div class="modal modal-lg">
        <div class="modal-header">
          <span class="modal-title">待处理进班申请</span>
          <button class="modal-close" onclick="closePendingModal()">关闭</button>
        </div>
        <div id="pendingRecordsList" class="empty-state">正在加载...</div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingModal()">关闭</button>
        </div>
      </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closePendingDetail()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="detailModalTitle">进班信息</span>
          <button class="modal-close" onclick="closePendingDetail()">关闭</button>
        </div>
        <div id="detailModalBody"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingDetail()">关闭</button>
        </div>
      </div>
    </div>

    <!-- 分配小组弹窗 -->
    <div class="modal-overlay" id="assignModal" onclick="if(event.target===this)closePendingAssign()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">分配到小组</span>
          <button class="modal-close" onclick="closePendingAssign()">关闭</button>
        </div>
        <input type="hidden" id="assignEntryId" />
        <div class="assign-summary" id="assignSummary">正在加载...</div>
        <div class="modal-section">
          <div class="modal-section-title">选择归属小组</div>
          <div class="org-cascade">
            <div class="org-group">
              <label class="org-label">大班</label>
              <select class="org-select" id="assignBcSelect" onchange="onAssignBcChange()"><option value="">选择大班</option></select>
            </div>
            <div class="org-group">
              <label class="org-label">班级</label>
              <select class="org-select" id="assignClsSelect" onchange="onAssignClsChange()"><option value="">选择班级</option></select>
            </div>
            <div class="org-group">
              <label class="org-label">小组</label>
              <select class="org-select" id="assignGrpSelect"><option value="">选择小组</option></select>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingAssign()">取消</button>
          <button class="btn btn-primary" id="assignSaveBtn" onclick="savePendingAssignment()">确认分配</button>
        </div>
      </div>
    </div>

    <!-- Person Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="person-edit-head">
          <div class="modal-title" id="modalTitle">新增人员</div>
          <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
        <div class="person-edit-shell">
          <div class="modal-section">
            <div class="modal-section-title">基础资料</div>
            <input type="hidden" id="personId" />
            <div class="form-item">
              <label class="form-label">姓名 *</label>
              <input class="form-input" id="personName" placeholder="请输入姓名" />
            </div>
            <div class="form-row">
              <div class="form-item">
                <label class="form-label">手机号</label>
                <input class="form-input" id="personPhone" placeholder="手机号" maxlength="11" />
              </div>
              <div class="form-item">
                <label class="form-label">性别</label>
                <select class="form-select" id="personGender"><option value="">选择</option><option>男</option><option>女</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-item">
                <label class="form-label">状态</label>
                <select class="form-select" id="personStatus"><option value="active">在读</option><option value="left">已离班</option><option value="suspended">暂停</option></select>
              </div>
              <div class="form-item">
                <label class="form-label">备注</label>

    <script>
      var currentSemesterId = null, organizations = [], selectedOrgId = null;
      var orgMembersMap = {}, personPositionsMap = {}, people = [], searchTimer = null;
      var peopleViewMode = 'assigned';
      var currentUserIsPlatformAdmin = false;
      var pendingAssignRecord = null;
      var pendingRecords = [], pendingRecordsLoaded = 0, pendingRecordsTotal = 0, pendingRecordsLoading = false, pendingRecordsHasMore = false;
      var PENDING_RECORDS_PAGE_SIZE = 20;
      var PENDING_RECORD_LIST_FIELDS = 'id,name,phone,gender,student_type,desired_role,desired_gains,province,city_old,district,submitted_at';
      var peopleDrillLevel = 'bigClass', peopleDrillParentId = null, peopleBreadcrumbs = [], peopleOrgCounts = {};
      var POSITION_OPTIONS = {
        '小组': ['组长', '副组长', '小组学委', '小组副学委', '小组督察', '小组副督察', '小组宣委', '小组副宣委', '小组生活委', '小组组织委'],
        '班级': ['班长', '执行班长', '副班长', '秘书长', '总学委', '副总学委', '总督察', '副总督察', '总宣委', '副总宣委', '总生活委', '总组织委'],
        '大班': ['大班长', '总秘书长', '副总秘书长', '总学委', '副总学委', '总督察', '副总督察']
      };
      var POSITION_SCOPE_UI = {
        '小组': { suffix: 'Group', label: '小组职务' },
        '班级': { suffix: 'Class', label: '班级职务' },
        '大班': { suffix: 'Big', label: '大班职务' }
      };
      var currentSecretariatManagerOrgIds = [];
      var MODULE_LABELS = { supervision: '督察', study: '晨读', publicity: '宣委', secretariat: '秘书处' };

      var editingPersonId = null;
      var editingProfileId = null;
      var orgManagerLockedClassId = null;
      var editingPositions = [];
      var editingPermissions = [];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        var ok = await guardModuleAccess('secretariat');
        if (!ok) return;
        var user = getCurrentUser();
        currentUserIsPlatformAdmin = isPlatformAdminUser(user);
        if (!currentUserIsPlatformAdmin) {
          var btn = document.getElementById('exportPeopleBtn');
          if (btn) btn.classList.add('hidden');
        }
        updatePermissionRoleOptions();
        await loadCurrentSemester();
        await loadCurrentSecretariatPositionAccess();
        await initPeopleCache();
        await loadPeopleHealthStats();
        await updatePendingBadge();
      }
      function initPeopleCache() { window.db.from('people').select('*').order('name').then(function(r) { people = r.data || []; }); }

      function isPlatformAdminUser(user) {
        return !!(user && (user.role === '超级管理员' || user.role === '管理员'));
      }

      async function loadCurrentSecretariatPositionAccess() {
        currentSecretariatManagerOrgIds = [];
        if (currentUserIsPlatformAdmin || !currentSemesterId) {
          renderPositionTags();
          return;
        }
        var user = getCurrentUser();
        if (!user || !user.id) return;
        var result = await window.db
          .from('module_memberships')
          .select('org_id')
          .eq('user_id', user.id)
          .eq('semester_id', currentSemesterId)
          .eq('module_key', 'secretariat')
          .eq('enabled', true);
        currentSecretariatManagerOrgIds = (result.data || []).map(function(item) {
          return Number(item.org_id);
        }).filter(Boolean);
        renderPositionTags();
      }

      function canManagePositionTarget(scope, targetOrg) {
        if (currentUserIsPlatformAdmin) return true;
        if (!targetOrg || targetOrg.level !== scope) return false;
        return currentSecretariatManagerOrgIds.some(function(managerOrgId) {
          var managerOrg = getOrgById(managerOrgId);
          if (!managerOrg) return false;
          if (managerOrg.level === '大班') {
            if (Number(targetOrg.id) === Number(managerOrg.id)) return true;
            var targetParent = getOrgById(targetOrg.parent_id);
            if (targetParent && Number(targetParent.id) === Number(managerOrg.id)) return true;
            var targetGrandparent = targetParent ? getOrgById(targetParent.parent_id) : null;
            return !!targetGrandparent && Number(targetGrandparent.id) === Number(managerOrg.id);
          }
          if (managerOrg.level === '班级') {
            return Number(targetOrg.id) === Number(managerOrg.id) ||
              Number(targetOrg.parent_id) === Number(managerOrg.id);
          }
          return managerOrg.level === '小组' && Number(targetOrg.id) === Number(managerOrg.id);
        });
      }

      function canManagePositionScope(scope) {
        if (currentUserIsPlatformAdmin) return true;
        return currentSecretariatManagerOrgIds.some(function(orgId) {
          var org = getOrgById(orgId);
          if (!org) return false;
          if (org.level === '大班') return true;
          if (org.level === '班级') return scope === '班级' || scope === '小组';
          return org.level === '小组' && scope === '小组';
        });
      }

      function getPermissionRoleOptions(scope, moduleKey) {
        if (moduleKey === 'supervision') {
          if (scope === '大班') return ['大班总督', '大班副督'];
          if (scope === '班级') return ['班级总督察', '班级副总督察'];
          return ['小组督察', '小组副督察'];
        }
        if (moduleKey === 'study') return ['学委', '副学委'];
        if (moduleKey === 'publicity') {
          return scope === '小组' ? ['宣委', '副宣委'] : ['总宣委', '副总宣委'];
        }
        if (scope === '大班' && currentUserIsPlatformAdmin) {
          return ['秘书处', '大班管理员'];
        }
        return ['秘书处'];
      }

      function updatePermissionRoleOptions(scope) {
        var scopes = scope ? [scope] : Object.keys(POSITION_SCOPE_UI);
        scopes.forEach(function(itemScope) {
          var ui = POSITION_SCOPE_UI[itemScope];
          var moduleSelect = document.getElementById('permissionModule' + ui.suffix);
          var roleSelect = document.getElementById('permissionRole' + ui.suffix);
          if (!moduleSelect || !roleSelect) return;
          var roles = getPermissionRoleOptions(itemScope, moduleSelect.value || 'supervision');
          var oldValue = roleSelect.value;
          roleSelect.innerHTML = roles.map(function(role) {
            return '<option value="' + escapeHtml(role) + '">' + escapeHtml(role) + '</option>';
          }).join('');
          if (oldValue && roles.indexOf(oldValue) >= 0) roleSelect.value = oldValue;
        });
      }

      function renderAccountState() {
        var status = document.getElementById('accountStatus');
        var row = document.getElementById('createAccountRow');
        var checkbox = document.getElementById('personCreateAccount');
        var password = document.getElementById('personPassword');
        var createBtn = document.getElementById('createAccountBtn');
        var deleteBtn = document.getElementById('deleteAccountBtn');
        if (editingProfileId) {
          status.textContent = '已创建账号';
          row.style.display = 'none';
          checkbox.checked = false;
          password.value = '';
          if (createBtn) {
            createBtn.textContent = '已创建账号';
            createBtn.disabled = true;
          }
          if (deleteBtn) {
            deleteBtn.style.display = '';
            deleteBtn.disabled = false;
          }
        } else {
          status.textContent = '未关联登录账号';
          row.style.display = 'flex';
          if (createBtn) {
            createBtn.textContent = '创建账号';
            createBtn.disabled = false;
          }
          if (deleteBtn) {
            deleteBtn.style.display = 'none';
            deleteBtn.disabled = false;
            deleteBtn.textContent = '清除账号';
          }
        }
        toggleAccountFields();
        refreshPersonManagerSummaries();
      }

      function toggleAccountFields() {
        var fields = document.getElementById('accountCreateFields');
        var checkbox = document.getElementById('personCreateAccount');
        if (!fields || !checkbox) return;
        fields.classList.toggle('show', !editingProfileId && checkbox.checked);
      }

      async function loadCurrentSemester() {
        currentSemesterId = await getCurrentSemesterId();
        if (!currentSemesterId) { setCurrentSemester('currentSemesterDisplay', '未设置当前学期', 'tag-lg'); return; }
        var r = await window.db.from('semesters').select('semester_name').eq('id', currentSemesterId).single();
        if (r.data) {
          setCurrentSemester('currentSemesterDisplay', r.data.semester_name, 'tag-lg');
        } else {
          setCurrentSemester('currentSemesterDisplay', '未知学期', 'tag-lg');
        }
        selectedOrgId = null; orgMembersMap = {}; peopleViewMode = 'assigned';
        var ro = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
        if (ro.error) {
          showToast('加载组织失败', 'error');
          organizations = [];
          await loadPeopleTreeCounts();
          initPeopleCards();
          return;
        }
        organizations = ro.data || [];
        if (!organizations.length) {
          var legacyOrgs = await window.db.from('organizations').select('*').is('semester_id', null).order('sort_order');
          organizations = legacyOrgs.data || [];
        }
        organizations.sort(function(a, b) {
          var sa = a.sort_order || 0, sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
        await loadAllPersonPositions();
        await loadPeopleTreeCounts();
        initPeopleCards();
      }

      async function loadAllPersonPositions() {
        personPositionsMap = {};
        if (!currentSemesterId) return;
        var result = await window.db
          .from('person_positions')
          .select('id,person_id,org_id,position_name,position_scope,is_active')
          .eq('semester_id', currentSemesterId)
          .eq('is_active', true)
          .order('id');
        if (result.error) {
          showToast('加载人员职务失败', 'error');
          return;
        }
        (result.data || []).forEach(function(position) {
          var personId = Number(position.person_id);
          if (!personPositionsMap[personId]) personPositionsMap[personId] = [];
          personPositionsMap[personId].push(position);
        });
      }

      function syncEditingPositionsToCardCache() {
        if (!editingPersonId) return;
        personPositionsMap[Number(editingPersonId)] = editingPositions.filter(function(position) {
          return position.is_active !== false;
        });
      }

      function refreshVisiblePersonCardsAfterPositionChange() {
        var searchInput = document.getElementById('searchInput');
        if (searchInput && searchInput.value.trim()) {
          doSearch();
          return;
        }
        renderCurrentPeopleView();
      }

      async function loadPeopleHealthStats() {
        var el = document.getElementById('peopleHealthStats');
        if (!el) return;
        if (!currentUserIsPlatformAdmin) {
          el.style.display = 'none';
          return;
        }
        el.style.display = 'grid';
        if (!currentSemesterId) return;
        try {
          var peopleResult = await window.db.from('people').select('id,status').eq('status', 'active');
          var assignResult = await window.db
            .from('person_org_assignments')
            .select('person_id')
            .eq('semester_id', currentSemesterId)
            .eq('status', 'active');
          var activePeople = peopleResult.data || [];
          var assignments = assignResult.data || [];
          var assignedIds = new Set(assignments.map(function(a) { return Number(a.person_id); }));
          var assignedCount = activePeople.filter(function(p) { return assignedIds.has(Number(p.id)); }).length;
          var unassignedCount = activePeople.length - assignedCount;
          renderPeopleHealthCards(assignedCount, unassignedCount);
        } catch (e) {
          renderPeopleHealthCards('--', '--');
        }
      }

      function renderPeopleHealthCards(assignedCount, unassignedCount) {
        var el = document.getElementById('peopleHealthStats');
        if (!el) return;
        if (!currentUserIsPlatformAdmin) {
          el.style.display = 'none';
          return;
        }
        el.style.display = 'grid';
        var unassignedWarn = Number(unassignedCount) > 0 ? ' warn' : '';
        el.innerHTML =
          '<button type="button" class="health-card" data-people-view="assigned" onclick="setPeopleViewMode(\'assigned\')"><div class="health-value">' + escapeHtml(String(assignedCount)) + '</div><div class="health-label">已归属</div></button>' +
          '<button type="button" class="health-card' + unassignedWarn + '" data-people-view="unassigned" onclick="setPeopleViewMode(\'unassigned\')"><div class="health-value">' + escapeHtml(String(unassignedCount)) + '</div><div class="health-label">未归属</div></button>';
        updatePeopleHealthActiveState();
      }

      function updatePeopleHealthActiveState() {
        var cards = document.querySelectorAll('#peopleHealthStats .health-card');
        Array.prototype.forEach.call(cards, function(card) {
          card.classList.toggle('active', card.getAttribute('data-people-view') === peopleViewMode);
        });
      }

      function setPeopleViewMode(mode) {
        peopleViewMode = mode === 'unassigned' ? 'unassigned' : 'assigned';
        updatePeopleHealthActiveState();
        clearTimeout(searchTimer);
        var searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = '';
        renderCurrentPeopleView();
      }

      function renderCurrentPeopleView() {
        if (peopleViewMode === 'unassigned') {
          loadUnassignedPeople();
          return;
        }
        renderPeopleCards();
      }

      async function loadUnassignedPeople() {

function getOrgPath(id) { var parts = []; var o = organizations.find(function(x) { return Number(x.id) === Number(id); }); while (o) { parts.unshift(o.name); o = organizations.find(function(x) { return Number(x.id) === Number(o.parent_id); }); } return parts.join(' / '); }

function getActiveOrgs(list) {
  return (list || []).filter(function(o) { return o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
}

function getTopLevelOrgs() {
  var bcs = getActiveOrgs(organizations.filter(function(o) { return o.level === '大班'; }));
  if (bcs.length) return bcs;
  return getActiveOrgs(organizations.filter(function(o) { return !o.parent_id; }));
}

function getSortedChildren(parentId, level) {
  return getActiveOrgs(organizations.filter(function(o) {
    var sameParent = Number(o.parent_id) === Number(parentId);
    return sameParent && (!level || o.level === level);
  }));
}

async function loadPeopleTreeCounts() {
  peopleOrgCounts = {};
  if (!currentSemesterId || !organizations.length) return;
  var result = await window.db
    .from('person_org_assignments')
    .select('person_id,org_id')
    .eq('semester_id', currentSemesterId)
    .eq('status', 'active');
  var assignments = result.data || [];
  var assignmentPersonIds = Array.from(new Set(assignments.map(function(item) { return Number(item.person_id); }).filter(Boolean)));
  var assignedPhones = new Set();
  if (assignmentPersonIds.length) {
    var assignedPeople = await window.db.from('people').select('id,phone').in('id', assignmentPersonIds);
    (assignedPeople.data || []).forEach(function(person) {
      if (person.phone) assignedPhones.add(person.phone);
    });
  }
  var legacyProfiles = await window.db.from('profiles').select('id,phone,organization_id');
  var legacyRows = (legacyProfiles.data || []).filter(function(profile) { return !!profile.organization_id; });
  organizations.forEach(function(org) {
    var orgIds = getOrgAndDescendantIds(org.id);
    var memberIds = new Set();
    assignments.forEach(function(item) {
      if (orgIds.indexOf(Number(item.org_id)) >= 0) memberIds.add('person:' + Number(item.person_id));
    });
    legacyRows.forEach(function(profile) {
      if (orgIds.indexOf(Number(profile.organization_id)) < 0) return;
      if (profile.phone && assignedPhones.has(profile.phone)) return;
      memberIds.add('legacy:' + (profile.phone || profile.id));
    });
    peopleOrgCounts[org.id] = memberIds.size;
  });
}

function buildOrgBreadcrumbs(orgId) {
  var parts = [];
  var current = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
  while (current) {
    parts.unshift({ id: current.id, name: current.name, level: current.level });
    current = organizations.find(function(o) { return Number(o.id) === Number(current.parent_id); });
  }
  return parts;
}

function initPeopleCards() {
  peopleDrillLevel = 'bigClass';
  peopleDrillParentId = null;
  selectedOrgId = null;
  peopleBreadcrumbs = [];
  try {
    var profile = JSON.parse(localStorage.getItem('supabase_user'));
    var userOrg = profile && profile.organization_id
      ? organizations.find(function(o) { return Number(o.id) === Number(profile.organization_id); })
      : null;
    if (userOrg) {
      peopleBreadcrumbs = buildOrgBreadcrumbs(userOrg.id);
      peopleDrillParentId = userOrg.id;
      selectedOrgId = userOrg.id;
      if (userOrg.level === '大班') peopleDrillLevel = 'class';
      else if (userOrg.level === '班级') peopleDrillLevel = 'group';
      else if (userOrg.level === '小组') peopleDrillLevel = 'members';
    }
  } catch(e) {}
  renderPeopleCards();
}

function renderPeopleBreadcrumbs() {
  var el = document.getElementById('peopleBreadcrumb');
  if (!el) return;
  var html = '';
  if (peopleDrillLevel !== 'bigClass' || peopleBreadcrumbs.length) {
    html += '<span class="people-breadcrumb-item" onclick="goPeopleBreadcrumb(-1)">全部</span>';
  } else {
    html += '<span class="people-breadcrumb-item current">全部</span>';
  }
  peopleBreadcrumbs.forEach(function(item, index) {
    var isCurrent = index === peopleBreadcrumbs.length - 1;
    html += '<span class="people-breadcrumb-sep">/</span>';
    html += '<span class="people-breadcrumb-item' + (isCurrent ? ' current' : '') + '"' + (isCurrent ? '' : ' onclick="goPeopleBreadcrumb(' + index + ')"') + '>' + escapeHtml(item.name) + '</span>';
  });
  el.innerHTML = html;
}

function goPeopleBreadcrumb(index) {
  if (index < 0) {
    peopleDrillLevel = 'bigClass';
    peopleDrillParentId = null;
    selectedOrgId = null;
    peopleBreadcrumbs = [];
    renderPeopleCards();
    return;
  }
  var item = peopleBreadcrumbs[index];
  if (!item) return;
  peopleBreadcrumbs = peopleBreadcrumbs.slice(0, index + 1);
  peopleDrillParentId = item.id;
  selectedOrgId = item.id;
  if (item.level === '大班') peopleDrillLevel = 'class';
  else if (item.level === '班级') peopleDrillLevel = 'group';
  else peopleDrillLevel = 'members';
  renderPeopleCards();
}

function drillPeopleInto(orgId) {
  var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
  if (!org) return;
  peopleBreadcrumbs = buildOrgBreadcrumbs(org.id);
  peopleDrillParentId = org.id;
  selectedOrgId = org.id;
  if (org.level === '大班') peopleDrillLevel = 'class';
  else if (org.level === '班级') peopleDrillLevel = 'group';
  else peopleDrillLevel = 'members';
  renderPeopleCards();
}

function renderPeopleCards() {
  peopleViewMode = 'assigned';
  updatePeopleHealthActiveState();
  var cardArea = document.getElementById('orgCardArea');
  var memberDisplay = document.getElementById('memberDisplay');
  var searchResults = document.getElementById('searchResults');
  if (!cardArea || !memberDisplay) return;
  updateAddPersonButton();
  if (searchResults) searchResults.style.display = 'none';
  cardArea.style.display = 'block';
  memberDisplay.style.display = 'block';
  renderPeopleBreadcrumbs();

  if (!organizations.length) {
    cardArea.innerHTML = '';
    memberDisplay.innerHTML = '<div class="empty-state">暂无组织架构</div>';
    return;
  }

  if (peopleDrillLevel === 'members') {
    cardArea.innerHTML = '';
    loadOrgMembers(peopleDrillParentId);
    return;
  }

  memberDisplay.innerHTML = '';
  var cards = [];
  var emptyText = '暂无组织';
  if (peopleDrillLevel === 'bigClass') {
    cards = getTopLevelOrgs();
    emptyText = '暂无大班';
  } else if (peopleDrillLevel === 'class') {
    cards = getSortedChildren(peopleDrillParentId, '班级');
    emptyText = '该大班下暂无班级';
  } else if (peopleDrillLevel === 'group') {
    cards = getSortedChildren(peopleDrillParentId, '小组');
    emptyText = '该班级下暂无小组';
  }
  renderPeopleOrgCards(cards, emptyText);
}

function getCurrentAddPersonGroup() {
  if (peopleDrillLevel !== 'members' || !peopleDrillParentId) return null;
  var org = organizations.find(function(o) { return Number(o.id) === Number(peopleDrillParentId); });
  if (!org || org.level !== '小组' || org.is_active === false) return null;
  return org;
}

function updateAddPersonButton() {
  var btn = document.getElementById('addPersonBtn');

    btn.style.display = 'none';

async function getOrgMembers(orgId) {
        if (!orgId || !currentSemesterId) return [];
        var cacheKey = String(orgId);
        if (orgMembersMap[cacheKey]) return orgMembersMap[cacheKey];

        var orgIds = getOrgAndDescendantIds(orgId);
        var result = await window.db
          .from('person_org_assignments')
          .select('id,person_id,org_id,sort_order,people(id,name,phone,status)')
          .eq('semester_id', currentSemesterId)
          .eq('status', 'active')
          .in('org_id', orgIds)
          .order('sort_order', { ascending: true });
        if (result.error) {
          showToast('加载成员失败', 'error');
          return [];
        }
        var members = result.data || [];
        var knownPersonIds = new Set(members.map(function(m) { return Number(m.person_id); }));
        var legacyProfiles = await window.db
          .from('profiles')
          .select('name,phone,organization_id')
          .in('organization_id', orgIds);
        var legacyPhones = (legacyProfiles.data || []).map(function(profile) { return profile.phone; }).filter(Boolean);
        var legacyPeopleByPhone = {};
        if (legacyPhones.length) {
          var legacyPeople = await window.db.from('people').select('id,name,phone,status').in('phone', legacyPhones);
          (legacyPeople.data || []).forEach(function(person) {
            if (person.phone) legacyPeopleByPhone[person.phone] = person;
          });
        }
        (legacyProfiles.data || []).forEach(function(profile, idx) {
          var person = profile.phone ? legacyPeopleByPhone[profile.phone] : null;
          if (!person || knownPersonIds.has(Number(person.id))) return;
          members.push({
            id: 'legacy-' + person.id,
            person_id: person.id,
            org_id: profile.organization_id,
            sort_order: 100000 + idx,
            people: person
          });
          knownPersonIds.add(Number(person.id));
        });
        members.sort(function(a, b) {
          var oa = orgIds.indexOf(Number(a.org_id));
          var ob = orgIds.indexOf(Number(b.org_id));
          if (oa !== ob) return oa - ob;
          var sa = a.sort_order || 0;
          var sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          var an = a.people ? a.people.name || '' : '';
          var bn = b.people ? b.people.name || '' : '';
          return an.localeCompare(bn, 'zh-CN');
        });
        orgMembersMap[cacheKey] = members;
        return members;
      }

      function renderMembers(orgId, members, container) {
        // 三级下拉模式：container 由调用方传入
        if (!container) { container = document.getElementById('members-' + orgId); }

        if (!members.length) { container.innerHTML = '<div class="person-empty">暂无成员</div>'; return; }
        container.innerHTML = '<div class="person-card-list">' + members.map(function(item, idx) {
          var p = item.people;
          if (!p) return '';
          var orgPath = item.org_id ? getOrgPath(item.org_id) : getOrgPath(orgId);
          return renderPersonCard(p, {
            orgName: orgPath || '当前组织',
            meta: (p.phone ? p.phone + ' · ' : '') + (orgPath || '当前组织')
          });
        }).join('') + '</div>';
      }

        if (!allP.length) { container.innerHTML = '<div class="empty-state">未找到匹配的人员</div>'; return; }
        var searchTitle = peopleViewMode === 'unassigned' ? '未归属中搜索到 ' : '搜索到 ';
        container.innerHTML = '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">' + searchTitle + allP.length + ' 人</div><div class="person-card-list">' +
          allP.map(function(p) {
            var a = orgAssigns.find(function(x) { return Number(x.person_id) === Number(p.id); });
            var orgLbl = a && a.org_id ? getOrgPath(a.org_id) : '未归属';
            return renderPersonCard(p, {
              orgName: orgLbl,
              meta: (p.phone ? p.phone + ' · ' : '') + orgLbl
            });
          }).join('') + '</div>';
      }

        document.getElementById('personPhone').value = '';
        document.getElementById('personGender').value = '';
        document.getElementById('personStatus').value = 'active';
        document.getElementById('personNote').value = '';
        document.getElementById('personBcSelect').value = '';

      function openPersonManager(kind) {
        if (!editingPersonId) {
          showToast('请先保存基础资料，再管理该功能', 'error');
          return;
        }
        refreshPersonManagerSummaries();

          document.getElementById('personCreateAccount').checked = true;
          toggleAccountFields();

      function closePersonManager(kind) {
        var modal = document.getElementById(kind + 'ManagerModal');
        if (modal) modal.classList.remove('show');
        if (kind === 'org') unlockOrgManagerClassLock();
        refreshPersonManagerSummaries();
      }

      function getSelectedPersonOrgId() {
        return document.getElementById('personGrpSelect').value ||
          document.getElementById('personClsSelect').value ||
          document.getElementById('personBcSelect').value ||
          '';
      }

      function refreshPersonManagerSummaries() {
        var hasPerson = !!editingPersonId;
        [
          ['orgManageBtn', 'orgManageSummary'],
          ['accountManageBtn', 'accountManageSummary'],
          ['positionManageBtn', 'positionManageSummary'],
          ['permissionManageBtn', 'permissionManageSummary']
        ].forEach(function(pair) {
          var btn = document.getElementById(pair[0]);
          if (btn) btn.classList.toggle('disabled', !hasPerson);
        });

        var orgId = getSelectedPersonOrgId();
        var orgSummary = document.getElementById('orgManageSummary');
        if (orgSummary) orgSummary.textContent = hasPerson ? (orgId ? getOrgPath(orgId) : '未归属组织') : '保存基础资料后可管理';

        var accountSummary = document.getElementById('accountManageSummary');
        if (accountSummary) accountSummary.textContent = hasPerson ? (editingProfileId ? '已创建账号' : '未创建账号') : '保存基础资料后可管理';

        var positionSummary = document.getElementById('positionManageSummary');
        if (positionSummary) {
          positionSummary.textContent = hasPerson
            ? (editingPositions.length ? editingPositions.map(function(p) { var org = p.org_id ? getOrgById(p.org_id) : null; return p.position_name + '·' + getScopeDisplay(p.position_scope || (org ? org.level : ''), '职务'); }).join('、') : '暂未设置职务')
            : '保存基础资料后可管理';
        }

        var permissionSummary = document.getElementById('permissionManageSummary');
        if (permissionSummary) {
          permissionSummary.textContent = hasPerson
            ? (editingPermissions.length ? editingPermissions.map(function(p) { var scope = getOrgScopeDisplay(p.org_id, '模块权限'); return (MODULE_LABELS[p.module_key] || p.module_key) + '·' + p.role + (scope ? '·' + scope : ''); }).join('、') : (editingProfileId ? '暂未分配模块权限' : '未创建账号'))
            : '保存基础资料后可管理';
        }
      }

      function populateOrgSelect() {
        var bcSel = document.getElementById('personBcSelect');
        var clsSel = document.getElementById('personClsSelect');
        var grpSel = document.getElementById('personGrpSelect');
        orgManagerLockedClassId = null;
        bcSel.disabled = false;
        clsSel.disabled = false;
        var bcs = organizations.filter(function(o) { return o.level === '大班' && o.is_active !== false; });
        bcSel.innerHTML = '<option value="">选择大班</option>' + bcs.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        populateScopedOrgCascade('pos');
        populateScopedOrgCascade('perm');
      }

      function getScopeDisplay(scope, suffix) {
        return scope ? scope + suffix : '';
      }

      function getOrgScopeDisplay(orgId, suffix) {
        var org = getOrgById(orgId);
        return org ? getScopeDisplay(org.level, suffix) : '';
      }

      function resolveCurrentPersonOrgByScope(scope) {
        var group = getOrgById(document.getElementById('personGrpSelect').value);
        if (!group || group.level !== '小组') {
          return { ok: false, message: '请先设置人员的小组归属' };
        }
        if (scope === '小组') return { ok: true, org: group };
        var cls = getOrgById(group.parent_id);
        if (!cls || cls.level !== '班级') {
          return { ok: false, message: '未找到人员所在班级' };
        }
        if (scope === '班级') return { ok: true, org: cls };
        var bc = getOrgById(cls.parent_id);
        if (!bc || bc.level !== '大班') {
          return { ok: false, message: '未找到人员所在大班' };
        }
        if (scope === '大班') return { ok: true, org: bc };
        return { ok: false, message: '请选择正确的级别' };
      }

      function populateScopedOrgCascade(prefix) {
        var bcSel = document.getElementById(prefix + 'BcSelect');
        var clsSel = document.getElementById(prefix + 'ClsSelect');
        var grpSel = document.getElementById(prefix + 'GrpSelect');
        if (!bcSel || !clsSel || !grpSel) return;
        var bcs = organizations.filter(function(o) { return o.level === '大班' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        bcSel.innerHTML = '<option value="">选择大班</option>' + bcs.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
      }

      function onScopedBcChange(prefix) {
        var bcId = document.getElementById(prefix + 'BcSelect').value;
        var clsSel = document.getElementById(prefix + 'ClsSelect');
        var grpSel = document.getElementById(prefix + 'GrpSelect');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!bcId) return;
        var classes = organizations.filter(function(o) { return Number(o.parent_id) === Number(bcId) && o.level === '班级' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        clsSel.innerHTML = '<option value="">选择班级</option>' + classes.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
      }

      function onScopedClsChange(prefix) {
        var clsId = document.getElementById(prefix + 'ClsSelect').value;
        var grpSel = document.getElementById(prefix + 'GrpSelect');
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!clsId) return;
        var groups = organizations.filter(function(o) { return Number(o.parent_id) === Number(clsId) && o.level === '小组' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        grpSel.innerHTML = '<option value="">' + (groups.length ? '选择小组' : '无小组') + '</option>' + groups.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
      }

      function setScopedOrgCascade(prefix, orgId) {
        if (!orgId) return;
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org) return;
        var cls = org.level === '班级' ? org : (org.level === '小组' ? organizations.find(function(o) { return Number(o.id) === Number(org.parent_id); }) : null);
        var bc = cls ? organizations.find(function(o) { return Number(o.id) === Number(cls.parent_id); }) : (org.level === '大班' ? org : null);
        if (bc) {
          document.getElementById(prefix + 'BcSelect').value = String(bc.id);
          onScopedBcChange(prefix);
        }
        if (cls) {
          document.getElementById(prefix + 'ClsSelect').value = String(cls.id);
          onScopedClsChange(prefix);
        }
        if (org.level === '小组') document.getElementById(prefix + 'GrpSelect').value = String(org.id);
      }

      function getScopedOrgId(prefix, scope) {
        if (scope === '大班') return document.getElementById(prefix + 'BcSelect').value;
        if (scope === '班级') return document.getElementById(prefix + 'ClsSelect').value;
        if (scope === '小组') return document.getElementById(prefix + 'GrpSelect').value;
        return document.getElementById(prefix + 'GrpSelect').value ||
          document.getElementById(prefix + 'ClsSelect').value ||
          document.getElementById(prefix + 'BcSelect').value ||
          '';
      }

      function getOrgById(orgId) {
        return organizations.find(function(o) { return Number(o.id) === Number(orgId); }) || null;
      }

      function getClassForOrg(orgId) {
        var org = getOrgById(orgId);
        if (!org) return null;
        if (org.level === '班级') return org;
        if (org.level === '小组') return getOrgById(org.parent_id);
        return null;
      }

      function populatePersonGroupsForClass(classId, selectedGroupId) {
        var grpSel = document.getElementById('personGrpSelect');
        var groups = organizations.filter(function(o) {
          return Number(o.parent_id) === Number(classId) && o.level === '小组' && o.is_active !== false;
        }).sort(function(a,b) {
          return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN');
        });
        grpSel.innerHTML = '<option value="">' + (groups.length ? '选择小组' : '无小组') + '</option>' + groups.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
        if (selectedGroupId && groups.some(function(o) { return Number(o.id) === Number(selectedGroupId); })) {
          grpSel.value = String(selectedGroupId);
        }
      }

      function lockOrgManagerToCurrentClass() {
        var currentGroupId = document.getElementById('personGrpSelect').value;
        var currentGroup = getOrgById(currentGroupId);
        var cls = currentGroup && currentGroup.level === '小组' ? getClassForOrg(currentGroup.id) : null;
        var bc = cls ? getOrgById(cls.parent_id) : null;
        if (!currentGroup || !cls || !bc) {
          showToast('该人员暂无小组归属，无法调整归属', 'error');
          return false;
        }
        orgManagerLockedClassId = Number(cls.id);
        document.getElementById('personBcSelect').value = String(bc.id);
        document.getElementById('personClsSelect').innerHTML = '<option value="' + cls.id + '">' + escapeHtml(cls.name) + '</option>';
        document.getElementById('personClsSelect').value = String(cls.id);
        populatePersonGroupsForClass(cls.id, currentGroup.id);
        document.getElementById('personBcSelect').disabled = true;
        document.getElementById('personClsSelect').disabled = true;
        refreshPersonManagerSummaries();
        return true;
      }

      function prepareOrgManager() {
        var currentGroupId = document.getElementById('personGrpSelect').value;
        var currentGroup = getOrgById(currentGroupId);
        if (currentGroup && currentGroup.level === '小组') {
          return lockOrgManagerToCurrentClass();
        }
        unlockOrgManagerClassLock();
        orgManagerLockedClassId = null;
        document.getElementById('personBcSelect').value = '';
        document.getElementById('personClsSelect').innerHTML = '<option value="">选择班级</option>';
        document.getElementById('personGrpSelect').innerHTML = '<option value="">选择小组</option>';
        refreshPersonManagerSummaries();
        return true;
      }

      function unlockOrgManagerClassLock() {
        orgManagerLockedClassId = null;
        var bcSel = document.getElementById('personBcSelect');
        var clsSel = document.getElementById('personClsSelect');
        if (bcSel) bcSel.disabled = false;
        if (clsSel) clsSel.disabled = false;
      }

      function validateOrgManagerTargetGroup(orgId) {
        var org = getOrgById(orgId);
        if (!org || org.level !== '小组') return { ok: false, message: '请选择小组' };
        if (orgManagerLockedClassId && Number(org.parent_id) !== Number(orgManagerLockedClassId)) {
          return { ok: false, message: '只能在当前班级的小组之间调整' };
        }
        return { ok: true, org: org };
      }

      function onPersonBcChange() {
        if (orgManagerLockedClassId) {
          lockOrgManagerToCurrentClass();
          return;
        }
        var bcId = document.getElementById('personBcSelect').value;
        var clsSel = document.getElementById('personClsSelect');
        var grpSel = document.getElementById('personGrpSelect');
        grpSel.innerHTML = '<option value="">选择小组</option>';
        refreshPersonManagerSummaries();
        if (!bcId) { clsSel.innerHTML = '<option value="">选择班级</option>'; return; }
        var classes = organizations.filter(function(o) { return Number(o.parent_id) === Number(bcId) && o.level === '班级' && o.is_active !== false; });
        clsSel.innerHTML = '<option value="">选择班级</option>' + classes.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
        refreshPersonManagerSummaries();
      }

      function onPersonClsChange() {
        if (orgManagerLockedClassId) {
          lockOrgManagerToCurrentClass();
          return;
        }
        var clsId = document.getElementById('personClsSelect').value;
        var grpSel = document.getElementById('personGrpSelect');
        if (!clsId) { grpSel.innerHTML = '<option value="">选择小组</option>'; refreshPersonManagerSummaries(); return; }
        var groups = organizations.filter(function(o) { return Number(o.parent_id) === Number(clsId) && o.level === '小组' && o.is_active !== false; });
        grpSel.innerHTML = '<option value="">' + (groups.length ? '选择小组' : '无小组') + '</option>' + groups.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
        }).join('');
        refreshPersonManagerSummaries();
      }

      function setPersonOrgCascade(orgId) {
        if (!orgId) return;
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org) return;
        var cls = org.level === '班级' ? org : (org.level === '小组' ? organizations.find(function(o) { return Number(o.id) === Number(org.parent_id); }) : null);
        var bc = cls ? organizations.find(function(o) { return Number(o.id) === Number(cls.parent_id); }) : (org.level === '大班' ? org : null);
        if (bc) {
          document.getElementById('personBcSelect').value = bc.id;
          onPersonBcChange();
        }
        if (cls) {
          document.getElementById('personClsSelect').value = cls.id;
          onPersonClsChange();
        }
        if (org.level === '大班' || org.level === '班级') {
          document.getElementById('personGrpSelect').innerHTML = '<option value="">不归属小组</option>';
        } else {
          document.getElementById('personGrpSelect').value = org.id;
        }
        refreshPersonManagerSummaries();
      }

      async function showEditPersonModal(personId) {
        var r = await window.db.from('people').select('*').eq('id', personId).single();
        var p = r.data; if (!p) return;
        editingPersonId = personId;
        editingProfileId = await findProfileIdForPerson(p);
        document.getElementById('modalTitle').textContent = '编辑人员';
        document.getElementById('personId').value = p.id;
        document.getElementById('personName').value = p.name || '';
        document.getElementById('personPhone').value = p.phone || '';
        document.getElementById('personGender').value = p.gender || '';
        document.getElementById('personStatus').value = p.status || 'active';
        document.getElementById('personNote').value = p.note || '';
        document.getElementById('personCreateAccount').checked = false;
        document.getElementById('personPassword').value = '';
        document.getElementById('personGrantInitialPermission').checked = true;
        document.getElementById('deletePersonBtn').style.display = '';
        populateOrgSelect();

        // Load org assignment
        if (currentSemesterId) {
          var ra = await window.db.from('person_org_assignments').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('status', 'active').maybeSingle();
          if (ra.data) setPersonOrgCascade(ra.data.org_id);
        }

        // Load positions
        if (currentSemesterId) {
          var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('is_active', true);
          editingPositions = rp.data || [];
        } else { editingPositions = []; }
        renderPositionTags();

        // Load permissions for linked login account, not people.id
        if (editingProfileId) {
          var rperm = currentSemesterId
            ? await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('semester_id', currentSemesterId).eq('enabled', true)
            : await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('enabled', true);
          editingPermissions = rperm.data || [];
        } else {
          editingPermissions = [];
        }
        updatePermissionRoleOptions();
        renderPermTags();
        renderAccountState();
        refreshPersonManagerSummaries();

        document.getElementById('personModal').classList.add('show');
      }

      // ---- Positions ----
      function renderPositionTags() {
        Object.keys(POSITION_SCOPE_UI).forEach(function(scope) {
          var ui = POSITION_SCOPE_UI[scope];
          var select = document.getElementById('positionSelect' + ui.suffix);
          var addButton = document.getElementById('positionAdd' + ui.suffix);
          var column = document.getElementById('positionColumn' + ui.suffix);
          var container = document.getElementById('positionTags' + ui.suffix);
          var count = document.getElementById('positionCount' + ui.suffix);
          if (!select || !addButton || !column || !container || !count) return;

          var manageable = canManagePositionScope(scope);
          select.innerHTML = '<option value="">选择职务</option>' + (POSITION_OPTIONS[scope] || []).map(function(name) {
            return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
          }).join('');
          select.disabled = !manageable;
          addButton.disabled = !manageable;
          column.classList.toggle('locked', !manageable);

          var scopedPositions = editingPositions.map(function(pos, index) {
            return { pos: pos, index: index };
          }).filter(function(item) {
            var org = item.pos.org_id ? getOrgById(item.pos.org_id) : null;
            return (item.pos.position_scope || (org ? org.level : '')) === scope;
          });
          count.textContent = scopedPositions.length + ' 项';
          if (!scopedPositions.length) {
            container.innerHTML = '<span style="color:var(--ink-muted);font-size:11px;">暂未设置</span>';
            return;
          }
          container.innerHTML = scopedPositions.map(function(item) {
            var org = item.pos.org_id ? getOrgById(item.pos.org_id) : null;
            var removable = canManagePositionTarget(scope, org);
            return '<span class="tag">' + escapeHtml(item.pos.position_name) +
              (removable ? ' <span class="remove" onclick="removePosition(' + item.index + ')">移除</span>' : '') +
              '</span>';
          }).join('');
        });
        refreshPersonManagerSummaries();
      }

      async function addPosition(scope) {
        if (!editingPersonId || !currentSemesterId) { showToast('请先保存人员基本信息', 'error'); return; }
        if (!POSITION_SCOPE_UI[scope] || !canManagePositionScope(scope)) {
          showToast('当前账号无权设置' + getScopeDisplay(scope, '职务'), 'error');
          return;
        }
        var name = document.getElementById('positionSelect' + POSITION_SCOPE_UI[scope].suffix).value;
        if ((POSITION_OPTIONS[scope] || []).indexOf(name) === -1) {
          showToast('请选择有效的' + getScopeDisplay(scope, '职务'), 'error');
          return;
        }
        var scopedOrg = resolveCurrentPersonOrgByScope(scope);
        if (!scopedOrg.ok) { showToast(scopedOrg.message, 'error'); return; }
        if (!canManagePositionTarget(scope, scopedOrg.org)) {
          showToast('当前秘书处权限不能管理该组织的' + getScopeDisplay(scope, '职务'), 'error');
          return;
        }
        var activeDuplicate = editingPositions.some(function(pos) {
          return pos.is_active !== false &&
            pos.position_name === name &&
            Number(pos.org_id) === Number(scopedOrg.org.id);
        });
        if (activeDuplicate) {
          showToast('该人员已设置此职务', 'error');
          return;
        }
        try {
          var existingResult = await window.db
            .from('person_positions')
            .select('id')
            .eq('semester_id', currentSemesterId)
            .eq('person_id', editingPersonId)
            .eq('position_name', name)
            .eq('org_id', Number(scopedOrg.org.id))
            .maybeSingle();
          if (existingResult.error) throw existingResult.error;
          var payload = {
            position_scope: scope,
            is_active: true,
            updated_at: new Date().toISOString()
          };
          var r = existingResult.data
            ? await window.db.from('person_positions').update(payload).eq('id', existingResult.data.id)
            : await window.db.from('person_positions').insert({
                semester_id: currentSemesterId,
                person_id: editingPersonId,
                position_name: name,
                position_scope: scope,
                is_active: true,
                org_id: Number(scopedOrg.org.id)
              });
          if (r.error) throw r.error;
          showToast('职务已添加', 'success');
          if (currentSemesterId) {
            var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', editingPersonId).eq('is_active', true);
            editingPositions = rp.data || [];
            syncEditingPositionsToCardCache();
            renderPositionTags();
            refreshVisiblePersonCardsAfterPositionChange();
          }
        } catch(e) { showToast('添加失败，可能已存在', 'error'); }
      }

      function removePosition(idx) {
        var pos = editingPositions[idx]; if (!pos) return;
        var org = pos.org_id ? getOrgById(pos.org_id) : null;
        var scope = pos.position_scope || (org ? org.level : '');
        if (!canManagePositionTarget(scope, org)) {
          showToast('当前秘书处权限不能移除该职务', 'error');
          return;
        }
        showConfirm('确定移除该职务吗？').then(function(ok) {
          if (!ok) return;
          window.db.from('person_positions').update({ is_active: false }).eq('id', pos.id).then(function(result) {
            if (result.error) {

            refreshVisiblePersonCardsAfterPositionChange();

      function renderPermTags() {
        updatePermissionRoleOptions();
        Object.keys(POSITION_SCOPE_UI).forEach(function(scope) {
          var ui = POSITION_SCOPE_UI[scope];
          var moduleSelect = document.getElementById('permissionModule' + ui.suffix);
          var roleSelect = document.getElementById('permissionRole' + ui.suffix);
          var addButton = document.getElementById('permissionAdd' + ui.suffix);
          var column = document.getElementById('permissionColumn' + ui.suffix);
          var container = document.getElementById('permissionTags' + ui.suffix);
          var count = document.getElementById('permissionCount' + ui.suffix);
          if (!moduleSelect || !roleSelect || !addButton || !column || !container || !count) return;

          var manageable = !!editingProfileId && canManagePositionScope(scope);
          moduleSelect.disabled = !manageable;
          roleSelect.disabled = !manageable;
          addButton.disabled = !manageable;
          column.classList.toggle('locked', !manageable);

          var scopedPermissions = editingPermissions.map(function(perm, index) {
            return { perm: perm, index: index };
          }).filter(function(item) {
            var org = item.perm.org_id ? getOrgById(item.perm.org_id) : null;
            return org && org.level === scope;
          });
          count.textContent = scopedPermissions.length + ' 项';
          if (!editingProfileId) {
            container.innerHTML = '<span style="color:var(--ink-muted);font-size:11px;">未创建登录账号</span>';
            return;
          }
          if (!scopedPermissions.length) {
            container.innerHTML = '<span style="color:var(--ink-muted);font-size:11px;">暂未设置</span>';
            return;
          }
          container.innerHTML = scopedPermissions.map(function(item) {
            var org = getOrgById(item.perm.org_id);
            var removable = canManagePositionTarget(scope, org);
            var modLabel = MODULE_LABELS[item.perm.module_key] || item.perm.module_key;
            return '<span class="tag">' + escapeHtml(modLabel + ' · ' + item.perm.role) +
              (removable ? ' <span class="remove" onclick="removePermission(' + item.index + ')">移除</span>' : '') +
              '</span>';
          }).join('');
        });
        refreshPersonManagerSummaries();
      }

      async function reloadEditingPermissions() {
        if (!editingProfileId) { editingPermissions = []; renderPermTags(); return; }
        var rperm = currentSemesterId
          ? await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('semester_id', currentSemesterId).eq('enabled', true)
          : await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('enabled', true);

      async function addPermission(scope) {
        if (!editingPersonId) { showToast('请先保存人员基本信息', 'error'); return; }
        if (!editingProfileId) { showToast('该人员未关联登录账号，无法分配权限', 'error'); return; }
        if (!currentSemesterId) { showToast('请先选择一个学期', 'error'); return; }
        if (!POSITION_SCOPE_UI[scope] || !canManagePositionScope(scope)) {
          showToast('当前账号无权设置' + getScopeDisplay(scope, '模块权限'), 'error');
          return;
        }
        var ui = POSITION_SCOPE_UI[scope];
        var moduleKey = document.getElementById('permissionModule' + ui.suffix).value;
        var role = document.getElementById('permissionRole' + ui.suffix).value;
        if (getPermissionRoleOptions(scope, moduleKey).indexOf(role) === -1) {
          showToast('请选择有效的模块角色', 'error');
          return;
        }
        var scopedOrg = resolveCurrentPersonOrgByScope(scope);
        if (!scopedOrg.ok) { showToast(scopedOrg.message, 'error'); return; }
        if (!canManagePositionTarget(scope, scopedOrg.org)) {
          showToast('当前秘书处权限不能管理该组织的模块权限', 'error');
          return;
        }
        var duplicate = editingPermissions.some(function(perm) {
          return perm.enabled !== false &&
            perm.module_key === moduleKey &&
            perm.role === role &&
            Number(perm.org_id) === Number(scopedOrg.org.id);
        });
        if (duplicate) {
          showToast('该人员已拥有此模块权限', 'error');
          return;
        }
        try {
          var r = await adminApi.grantModuleMembership({
            userId: editingProfileId,
            semesterId: currentSemesterId,
            moduleKey: moduleKey,
            role: role,
            orgId: Number(scopedOrg.org.id)
          });
          if (r.error) throw r.error;
          showToast('权限已分配', 'success');
          await reloadEditingPermissions();
        } catch(e) { showToast('添加失败: ' + (e.message || e), 'error'); }
      }

      function removePermission(idx) {
        var perm = editingPermissions[idx]; if (!perm) return;
        var org = perm.org_id ? getOrgById(perm.org_id) : null;
        var scope = org ? org.level : '';
        if (!canManagePositionTarget(scope, org)) {
          showToast('当前秘书处权限不能移除该模块权限', 'error');
          return;
        }
        showConfirm('确定移除该权限吗？').then(function(ok) {
          if (!ok) return;
          adminApi.disableModuleMembership(perm.id).then(function(result) {
            if (result && result.error) throw new Error(result.error);
            editingPermissions.splice(idx, 1); renderPermTags();
          }).catch(function(e) {
            showToast('移除失败: ' + (e.message || e), 'error');
          });
        });
      }

      async function applyPersonOrgAssignment(personId, orgId) {
        if (!currentSemesterId || !personId || !orgId) return;
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org || org.level !== '小组') throw new Error('人员必须归属到小组');
        if (orgManagerLockedClassId && Number(org.parent_id) !== Number(orgManagerLockedClassId)) {
          throw new Error('只能在当前班级的小组之间调整');
        }
        var deactivate = await window.db.from('person_org_assignments')
          .update({ status: 'left', left_at: new Date().toISOString().slice(0, 10) })
          .eq('semester_id', currentSemesterId)
          .eq('person_id', Number(personId))
          .eq('status', 'active')
          .neq('org_id', Number(orgId));
        if (deactivate.error) throw deactivate.error;
        var existing = await window.db.from('person_org_assignments')
          .select('*').eq('semester_id', currentSemesterId).eq('person_id', Number(personId)).eq('org_id', Number(orgId)).maybeSingle();
        if (existing.data) {
          var updateExisting = await window.db.from('person_org_assignments').update({
            org_level: '小组',
            status: 'active',
            left_at: null,
            updated_at: new Date().toISOString()
          }).eq('id', existing.data.id);
          if (updateExisting.error) throw updateExisting.error;
        } else {
          var insert = await window.db.from('person_org_assignments').insert({
            semester_id: currentSemesterId,
            person_id: Number(personId),
            org_id: Number(orgId),
            org_level: '小组',
            status: 'active',
            joined_at: new Date().toISOString().slice(0, 10),
            sort_order: 0
          });
          if (insert.error) throw insert.error;
        }
      }

        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;

          var addGroup = addGroupId ? organizations.find(function(o) { return Number(o.id) === Number(addGroupId); }) : null;

            showToast('新增人员必须在具体小组内创建', 'error');
            return;
