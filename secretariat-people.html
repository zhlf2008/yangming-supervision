<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; font-size: 18px; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.active { background: var(--gold-light); }
      .org-node-header.level-0 { font-weight: 600; }
      .org-node-header.level-1 { padding-left: 32px; }
      .org-node-header.level-2 { padding-left: 52px; }
      .org-toggle { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .org-toggle.expanded { transform: rotate(90deg); }
      .org-name { flex: 1; color: var(--ink-dark); font-size: 14px; }
      .org-count { color: var(--ink-muted); font-size: 12px; }

      .person-list { display: flex; flex-wrap: wrap; gap: 0; }
      .person-card { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #f0ece7; }
      .person-card:last-child { border-bottom: none; }
      .person-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold-light); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--ink-dark); flex-shrink: 0; }
      .person-info { flex: 1; min-width: 0; }
      .person-name { font-size: 13px; font-weight: 500; color: var(--ink-dark); }
      .person-meta { font-size: 11px; color: var(--ink-muted); }
      .person-actions { display: flex; gap: 4px; flex-shrink: 0; }
      .status-badge { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 10px; cursor: pointer; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: #fff3e0; color: #e65100; }
      .person-empty { color: var(--ink-muted); font-size: 12px; padding: 12px 14px; }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; font-size: 13px; }
      .toolbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .search-results { margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">人员管理</h1>
      </header>

      <section class="section">
        <div class="form-item">
          <label class="form-label">学期</label>
          <select class="form-select" id="semesterSelect" onchange="onSemesterChange()"></select>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div class="section-title" id="orgTreeTitle">组织架构</div>
          <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ 新增人员</button>
        </div>
        <div class="toolbar">
          <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="onSearchInput()" />
        </div>
        <div class="org-tree" id="orgTree">
          <div class="empty-state">请先选择学期</div>
        </div>
        <div id="searchResults" class="search-results" style="display:none;"></div>
      </section>
    </div>

    <!-- Person Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">新增人员</div>
        <input type="hidden" id="personId" />
        <div class="form-item">
          <label class="form-label">姓名 *</label>
          <input class="form-input" id="personName" placeholder="请输入姓名" />
        </div>
        <div class="form-item">
          <label class="form-label">手机号</label>
          <input class="form-input" id="personPhone" placeholder="请输入手机号" maxlength="11" />
        </div>
        <div class="form-row">
          <div class="form-item">
            <label class="form-label">性别</label>
            <select class="form-select" id="personGender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="form-item">
            <label class="form-label">状态</label>
            <select class="form-select" id="personStatus">
              <option value="active">在读</option>
              <option value="left">已离班</option>
              <option value="suspended">暂停</option>
            </select>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">备注</label>
          <input class="form-input" id="personNote" placeholder="备注信息" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" onclick="savePerson()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var semesters = [];
      var currentSemesterId = null;
      var organizations = [];
      var expandedNodes = new Set();
      var selectedOrgId = null;
      var orgMembersMap = {};
      var people = [];
      var searchTimer = null;

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadSemesters();
      }

      async function loadSemesters() {
        var { data, error } = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        if (error) { showToast('加载学期失败', 'error'); return; }
        semesters = data || [];
        var select = document.getElementById('semesterSelect');
        select.innerHTML = semesters.length
          ? semesters.map(function (s) {
              var selected = s.is_current === 1 ? ' selected' : '';
              return '<option value="' + s.id + '"' + selected + '>' + escapeHtml(s.semester_name) + '</option>';
            }).join('')
          : '<option value="">暂无学期</option>';
        if (semesters.length) await onSemesterChange();
      }

      async function onSemesterChange() {
        currentSemesterId = Number(document.getElementById('semesterSelect').value);
        selectedOrgId = null;
        expandedNodes.clear();
        orgMembersMap = {};
        await loadOrgs();
        renderOrgTree();
      }

      async function loadOrgs() {
        if (!currentSemesterId) return;
        var { data, error } = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId);
        if (!error) organizations = data || [];
      }

      function getChildren(parentId) {
        return organizations.filter(function (o) { return Number(o.parent_id) === Number(parentId); });
      }

      async function getOrgMembers(orgId) {
        if (orgMembersMap[orgId]) return orgMembersMap[orgId];
        var { data } = await window.db
          .from('person_org_assignments')
          .select('*, people!inner(*)')
          .eq('semester_id', currentSemesterId)
          .eq('org_id', orgId)
          .eq('status', 'active')
          .order('sort_order');
        var members = (data || []).filter(function (item) { return item.people; });
        orgMembersMap[orgId] = members;
        return members;
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        document.getElementById('searchResults').style.display = 'none';
        container.style.display = 'block';

        var bigClasses = organizations.filter(function (o) { return o.level === '大班'; });
        if (!bigClasses.length) { container.innerHTML = '<div class="empty-state">该学期暂无组织</div>'; return; }

        container.innerHTML = bigClasses.map(function (bc) {
          return renderNode(bc, 0);
        }).join('');
      }

      function renderNode(org, depth) {
        var children = getChildren(org.id);
        var nodeId = 'node-' + org.id;
        var isExpanded = expandedNodes.has(nodeId);
        var isActive = Number(selectedOrgId) === Number(org.id);
        var levelClass = depth === 0 ? 'level-0' : depth === 1 ? 'level-1' : 'level-2';

        var childrenHtml = '';
        if (children.length) {
          childrenHtml = '<div style="' + (isExpanded ? '' : 'display:none;') + '">' +
            '<div class="org-node" style="background:var(--bg-primary);">' +
            '<div class="person-list" id="members-' + org.id + '"></div>' +
            '</div>' +
            children.map(function (c) { return renderNode(c, depth + 1); }).join('') +
            '</div>';
        } else {
          childrenHtml = '<div style="' + (isExpanded ? '' : 'display:none;') + '">' +
            '<div class="org-node" style="background:var(--bg-primary);">' +
            '<div class="person-list" id="members-' + org.id + '"></div>' +
            '</div></div>';
        }

        return (
          '<div class="org-node">' +
          '<div class="org-node-header ' + levelClass + (isActive ? ' active' : '') + '" ' +
          'onclick="toggleNode(\'' + nodeId + '\',' + org.id + ')">' +
          '<span class="org-toggle' + (isExpanded ? ' expanded' : '') + '">' + (children.length ? '▶' : '▶') + '</span>' +
          '<span class="org-name">' + escapeHtml(org.name) + ' <span style="font-size:11px;color:var(--ink-muted);font-weight:400;">(' + (org.level || '') + ')</span></span>' +
          '</div>' +
          childrenHtml +
          '</div>'
        );
      }

      async function toggleNode(nodeId, orgId) {
        selectedOrgId = orgId;
        if (expandedNodes.has(nodeId)) {
          expandedNodes.delete(nodeId);
        } else {
          expandedNodes.add(nodeId);
        }
        renderOrgTree();
        // Load members for this org
        var members = await getOrgMembers(orgId);
        renderMembers(orgId, members);
        // Also load members for all expanded ancestors
        var allExpanded = [];
        expandedNodes.forEach(function (nid) {
          var id = nid.replace('node-', '');
          if (Number(id)) allExpanded.push(Number(id));
        });
        allExpanded.forEach(function (eid) {
          getOrgMembers(eid).then(function (m) { renderMembers(eid, m); });
        });
      }

      function renderMembers(orgId, members) {
        var container = document.getElementById('members-' + orgId);
        if (!container) return;
        if (!members.length) {
          container.innerHTML = '<div class="person-empty">暂无成员</div>';
          return;
        }
        container.innerHTML = members.map(function (item) {
          var p = item.people;
          return '<div class="person-card">' +
            '<div class="person-avatar">' + (p.name ? p.name.charAt(0) : '?') + '</div>' +
            '<div class="person-info">' +
            '<div class="person-name">' + escapeHtml(p.name) + '</div>' +
            '<div class="person-meta">' + (p.phone ? escapeHtml(p.phone) : '') + '</div>' +
            '</div>' +
            '<div class="person-actions">' +
            '<button class="btn btn-sm btn-secondary" onclick="showEditPersonModal(' + p.id + ')">编辑</button>' +
            '</div>' +
            '</div>';
        }).join('');
      }

      // ---- Search ----
      function onSearchInput() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(doSearch, 300);
      }

      async function doSearch() {
        var q = document.getElementById('searchInput').value.trim();
        if (!q) {
          document.getElementById('searchResults').style.display = 'none';
          document.getElementById('orgTree').style.display = 'block';
          return;
        }

        // Search in both people and person_org_assignments
        var { data: allPeople } = await window.db
          .from('people')
          .select('*')
          .or('name.ilike.%' + q + '%,phone.ilike.%' + q + '%')
          .order('name');

        // Also load their org assignments
        var personIds = (allPeople || []).map(function (p) { return p.id; });
        var orgAssigns = [];
        if (personIds.length && currentSemesterId) {
          var { data: assigns } = await window.db
            .from('person_org_assignments')
            .select('*, organizations(name,level)')
            .eq('semester_id', currentSemesterId)
            .in('person_id', personIds)
            .eq('status', 'active');
          orgAssigns = assigns || [];
        }

        document.getElementById('orgTree').style.display = 'none';
        var container = document.getElementById('searchResults');
        container.style.display = 'block';

        if (!allPeople || !allPeople.length) {
          container.innerHTML = '<div class="empty-state">未找到匹配的人员</div>';
          return;
        }

        container.innerHTML = '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">搜索到 ' + allPeople.length + ' 人</div>' +
          allPeople.map(function (p) {
            var asign = orgAssigns.find(function (a) { return Number(a.person_id) === Number(p.id); });
            var orgLabel = asign ? (asign.organizations ? asign.organizations.name : '') : '';
            var statusLabel = p.status === 'active' ? '在读' : p.status === 'left' ? '已离班' : '暂停';
            return '<div class="person-card">' +
              '<div class="person-avatar">' + p.name.charAt(0) + '</div>' +
              '<div class="person-info">' +
              '<div class="person-name">' + escapeHtml(p.name) + ' <span class="status-badge ' + p.status + '">' + statusLabel + '</span></div>' +
              '<div class="person-meta">' + (p.phone ? '📞 ' + escapeHtml(p.phone) : '') + (orgLabel ? ' · ' + escapeHtml(orgLabel) : '') + '</div>' +
              '</div>' +
              '<div class="person-actions">' +
              '<button class="btn btn-sm btn-secondary" onclick="showEditPersonModal(' + p.id + ')">编辑</button>' +
              '</div>' +
              '</div>';
          }).join('');
      }

      // ---- CRUD ----
      function showAddModal() {
        document.getElementById('modalTitle').textContent = '新增人员';
        document.getElementById('personId').value = '';
        document.getElementById('personName').value = '';
        document.getElementById('personPhone').value = '';
        document.getElementById('personGender').value = '';
        document.getElementById('personStatus').value = 'active';
        document.getElementById('personNote').value = '';
        document.getElementById('personModal').classList.add('show');
      }

      function closeModal() { document.getElementById('personModal').classList.remove('show'); }

      async function savePerson() {
        var id = document.getElementById('personId').value;
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;
        var status = document.getElementById('personStatus').value;
        var note = document.getElementById('personNote').value.trim();

        if (!name) { showToast('请输入姓名', 'error'); return; }

        document.getElementById('saveBtn').disabled = true;
        try {
          var payload = { name: name, phone: phone || null, gender: gender || null, status: status, note: note || null };
          var result = id
            ? await window.db.from('people').update(payload).eq('id', id)
            : await window.db.from('people').insert(payload);
          if (result.error) throw result.error;
          logAction(id ? '编辑人员' : '新增人员', 'people', name);
          showToast('保存成功', 'success');
          closeModal();
          // Refresh org members if applicable
          if (currentSemesterId) {
            orgMembersMap = {};
            // Re-render current tree
            var expanded = [];
            expandedNodes.forEach(function (n) { expanded.push(n); });
            expandedNodes.clear();
            expanded.forEach(function (n) { expandedNodes.add(n); });
            renderOrgTree();
            expanded.forEach(function (n) {
              var oid = n.replace('node-', '');
              if (Number(oid)) getOrgMembers(Number(oid)).then(function (m) { renderMembers(Number(oid), m); });
            });
          }
        } catch (error) { showToast('保存失败', 'error'); }
        finally { document.getElementById('saveBtn').disabled = false; }
      }

      async function showEditPersonModal(personId) {
        var p = people.find(function (item) { return Number(item.id) === Number(personId); });
        if (!p) {
          // Fetch from DB
          var { data } = await window.db.from('people').select('*').eq('id', personId).single();
          if (!data) return;
          p = data;
        }
        document.getElementById('modalTitle').textContent = '编辑人员';
        document.getElementById('personId').value = p.id;
        document.getElementById('personName').value = p.name || '';
        document.getElementById('personPhone').value = p.phone || '';
        document.getElementById('personGender').value = p.gender || '';
        document.getElementById('personStatus').value = p.status || 'active';
        document.getElementById('personNote').value = p.note || '';
        document.getElementById('personModal').classList.add('show');
      }

      // Load people list for edit modal lookups
      async function initPeopleCache() {
        var { data } = await window.db.from('people').select('*').order('name');
        people = data || [];
      }

      init();
      initPeopleCache();
    </script>
  </body>
</html>
