<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; font-size: 18px; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }
      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }
      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.level-0 { font-weight: 600; }
      .org-node-header.level-1 { padding-left: 32px; }
      .org-node-header.level-2 { padding-left: 52px; }
      .org-toggle { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .org-toggle.expanded { transform: rotate(90deg); }
      .org-name { flex: 1; color: var(--ink-dark); font-size: 14px; }

      .person-list { display: flex; flex-wrap: wrap; gap: 0; }
      .person-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px 7px 20px; border-bottom: 1px solid #f0ece7; width: 100%; }
      .person-item:last-child { border-bottom: none; }
      .person-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--gold-light); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--ink-dark); flex-shrink: 0; }
      .person-info { flex: 1; min-width: 0; }
      .person-name { font-size: 13px; font-weight: 500; color: var(--ink-dark); }
      .person-meta { font-size: 11px; color: var(--ink-muted); }
      .person-actions { display: flex; gap: 3px; flex-shrink: 0; }
      .sort-btn { background: none; border: none; color: var(--ink-muted); cursor: pointer; padding: 2px 4px; font-size: 11px; line-height: 1; }
      .sort-btn:hover { color: var(--ink-dark); }
      .sort-btn:disabled { opacity: 0.2; cursor: default; }
      .status-badge { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 10px; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: #fff3e0; color: #e65100; }

      .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); font-size: 11px; margin: 2px; }
      .tag .remove { cursor: pointer; color: var(--vermillion); font-size: 14px; line-height: 1; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; font-size: 13px; }
      .toolbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .person-empty { color: var(--ink-muted); font-size: 12px; padding: 12px 14px; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; align-items: flex-end; justify-content: center; padding: 0; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 30px; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .modal-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
      .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .modal-section-title { font-size: 14px; font-weight: 700; color: var(--ink-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 12px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }
      .inline-add { display: flex; gap: 6px; margin-top: 8px; }
      .inline-add select, .inline-add input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); font-size: 12px; font-family: inherit; }
      .inline-add .btn { flex: 0 0 auto; padding: 8px 12px; font-size: 12px; }

      .search-results { margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">人员管理</h1>
      </header>
      <section class="section">
        <div class="form-item">
          <label class="form-label">学期</label>
          <select class="form-select" id="semesterSelect" onchange="onSemesterChange()"></select>
        </div>
      </section>
      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ 新增人员</button>
        </div>
        <div class="toolbar">
          <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="onSearchInput()" />
        </div>
        <div class="org-tree" id="orgTree"><div class="empty-state">请先选择学期</div></div>
        <div id="searchResults" class="search-results" style="display:none;"></div>
      </section>
    </div>

    <!-- Person Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">新增人员</div>

        <!-- 基本信息 -->
        <div class="modal-section">
          <div class="modal-section-title">基本信息</div>
          <input type="hidden" id="personId" />
          <div class="form-item">
            <label class="form-label">姓名 *</label>
            <input class="form-input" id="personName" placeholder="请输入姓名" />
          </div>
          <div class="form-row">
            <div class="form-item">
              <label class="form-label">手机号</label>
              <input class="form-input" id="personPhone" placeholder="手机号" maxlength="11" />
            </div>
            <div class="form-item">
              <label class="form-label">性别</label>
              <select class="form-select" id="personGender"><option value="">选择</option><option>男</option><option>女</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-item">
              <label class="form-label">状态</label>
              <select class="form-select" id="personStatus"><option value="active">在读</option><option value="left">已离班</option><option value="suspended">暂停</option></select>
            </div>
            <div class="form-item">
              <label class="form-label">备注</label>
              <input class="form-input" id="personNote" placeholder="备注" />
            </div>
          </div>
        </div>

        <!-- 组织归属 -->
        <div class="modal-section">
          <div class="modal-section-title">组织归属</div>
          <div class="form-item">
            <label class="form-label">归属组织</label>
            <select class="form-select" id="personOrgSelect"><option value="">不归属</option></select>
          </div>
        </div>

        <!-- 职务 -->
        <div class="modal-section">
          <div class="modal-section-title">职务</div>
          <div id="positionTags" style="margin-bottom:6px;"></div>
          <div class="inline-add">
            <select id="posNameSelect">
              <option value="学委">学委</option>
              <option value="督察">督察</option>
              <option value="班长">班长</option>
              <option value="组长">组长</option>
              <option value="秘书处">秘书处</option>
              <option value="副学委">副学委</option>
              <option value="副督察">副督察</option>
            </select>
            <select id="posScopeSelect">
              <option value="大班">大班</option>
              <option value="班级">班级</option>
              <option value="小组">小组</option>
            </select>
            <button class="btn btn-sm btn-secondary" onclick="addPosition()">添加</button>
          </div>
        </div>

        <!-- 模块权限 -->
        <div class="modal-section">
          <div class="modal-section-title">模块权限</div>
          <div id="permTags" style="margin-bottom:6px;"></div>
          <div class="inline-add">
            <select id="permModuleSelect">
              <option value="supervision">督察</option>
              <option value="study">学委</option>
              <option value="secretariat">秘书处</option>
            </select>
            <select id="permRoleSelect">
              <option value="管理员">管理员</option>
              <option value="大班总督">大班总督</option>
              <option value="大班副督">大班副督</option>
              <option value="班级总督察">班级总督察</option>
              <option value="班级副总督察">班级副总督察</option>
              <option value="小组督察">小组督察</option>
              <option value="小组副督察">小组副督察</option>
            </select>
            <button class="btn btn-sm btn-secondary" onclick="addPermission()">添加</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" onclick="savePerson()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var semesters = [], currentSemesterId = null, organizations = [], expandedNodes = new Set(), selectedOrgId = null;
      var orgMembersMap = {}, people = [], searchTimer = null;
      var POSITION_NAMES = ['学委', '督察', '班长', '组长', '秘书处', '副学委', '副督察'];
      var MODULE_LABELS = { supervision: '督察', study: '学委', secretariat: '秘书处' };

      var editingPersonId = null;
      var editingPositions = [];
      var editingPermissions = [];

      async function init() { await waitForDb(); await refreshCurrentUser(); if (!checkLogin()) return; await loadSemesters(); await initPeopleCache(); }
      function initPeopleCache() { window.db.from('people').select('*').order('name').then(function(r) { people = r.data || []; }); }

      async function loadSemesters() {
        var r = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        semesters = r.data || [];
        var sel = document.getElementById('semesterSelect');
        sel.innerHTML = semesters.length ? semesters.map(function(s) {
          var selFlag = s.is_current === 1 ? ' selected' : '';
          return '<option value="' + s.id + '"' + selFlag + '>' + escapeHtml(s.semester_name) + '</option>';
        }).join('') : '<option value="">暂无学期</option>';
        if (semesters.length) await onSemesterChange();
      }

      async function onSemesterChange() {
        currentSemesterId = Number(document.getElementById('semesterSelect').value);
        selectedOrgId = null; expandedNodes.clear(); orgMembersMap = {};
        var r = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
        organizations = r.data || [];
        organizations.sort(function(a, b) {
          var sa = a.sort_order || 0, sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
        renderOrgTree();
      }

      function getChildren(pid) { return organizations.filter(function(o) { return Number(o.parent_id) === Number(pid); }); }
      function getOrgPath(id) { var parts = []; var o = organizations.find(function(x) { return Number(x.id) === Number(id); }); while (o) { parts.unshift(o.name); o = organizations.find(function(x) { return Number(x.id) === Number(o.parent_id); }); } return parts.join(' / '); }

      async function getOrgMembers(orgId) {
        if (orgMembersMap[orgId]) return orgMembersMap[orgId];
        var r = await window.db.from('person_org_assignments').select('*, people!inner(*)').eq('semester_id', currentSemesterId).eq('org_id', orgId).eq('status', 'active').order('sort_order');
        var members = (r.data || []).filter(function(item) { return item.people; });
        orgMembersMap[orgId] = members; return members;
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        document.getElementById('searchResults').style.display = 'none'; container.style.display = 'block';
        var bigClasses = organizations.filter(function(o) { return o.level === '大班'; });
        if (!bigClasses.length) { container.innerHTML = '<div class="empty-state">该学期暂无组织</div>'; return; }
        container.innerHTML = bigClasses.map(function(bc) { return renderNode(bc, 0); }).join('');
      }

      function renderNode(org, depth) {
        var children = getChildren(org.id);
        var nodeId = 'node-' + org.id, isExpanded = expandedNodes.has(nodeId);
        var levelClass = depth === 0 ? 'level-0' : depth === 1 ? 'level-1' : 'level-2';
        var childrenHtml = '<div style="' + (isExpanded ? '' : 'display:none;') + '"><div class="person-list" id="members-' + org.id + '"></div>' +
          children.map(function(c) { return renderNode(c, depth + 1); }).join('') + '</div>';
        return '<div class="org-node"><div class="org-node-header ' + levelClass + '" onclick="toggleNode(\'' + nodeId + '\',' + org.id + ')">' +
          '<span class="org-toggle' + (isExpanded ? ' expanded' : '') + '">▶</span>' +
          '<span class="org-name">' + escapeHtml(org.name) + ' <span style="font-size:11px;color:var(--ink-muted);font-weight:400;">(' + (org.level || '') + ')</span></span></div>' +
          childrenHtml + '</div>';
      }

      async function toggleNode(nodeId, orgId) {
        if (expandedNodes.has(nodeId)) expandedNodes.delete(nodeId); else expandedNodes.add(nodeId);
        renderOrgTree();
        var allExpanded = [orgId]; expandedNodes.forEach(function(n) { var id = n.replace('node-',''); if (Number(id)) allExpanded.push(Number(id)); });
        for (var i = 0; i < allExpanded.length; i++) { var m = await getOrgMembers(allExpanded[i]); renderMembers(allExpanded[i], m); }
      }

      function renderMembers(orgId, members) {
        var container = document.getElementById('members-' + orgId); if (!container) return;
        if (!members.length) { container.innerHTML = '<div class="person-empty">暂无成员</div>'; return; }
        container.innerHTML = members.map(function(item, idx) {
          var p = item.people; var assignId = item.id;
          var isFirst = idx === 0, isLast = idx === members.length - 1;
          return '<div class="person-item">' +
            '<div class="person-avatar">' + (p.name ? p.name.charAt(0) : '?') + '</div>' +
            '<div class="person-info"><div class="person-name">' + escapeHtml(p.name) + '</div></div>' +
            '<div style="display:flex;gap:1px;flex-shrink:0;">' +
            '<button class="sort-btn" ' + (isFirst ? 'disabled' : '') + ' onclick="event.stopPropagation();movePerson(' + assignId + ',-1)">▲</button>' +
            '<button class="sort-btn" ' + (isLast ? 'disabled' : '') + ' onclick="event.stopPropagation();movePerson(' + assignId + ',1)">▼</button>' +
            '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();showEditPersonModal(' + p.id + ')">编辑</button>' +
            '</div></div>';
        }).join('');
      }

      async function movePerson(assignId, direction) {
        var members = []; expandedNodes.forEach(function(n) {
          var id = n.replace('node-',''); if (Number(id)) {
            var m = orgMembersMap[Number(id)];
            if (m) { m.forEach(function(x) { members.push(x); }); }
          }
        });
        var idx = members.findIndex(function(m) { return m.id === assignId; });
        if (idx === -1) return;
        var swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= members.length) return;
        var currentSort = members[idx].sort_order || 0;
        var swapSort = members[swapIdx].sort_order || 0;
        try {
          await window.db.from('person_org_assignments').update({ sort_order: swapSort }).eq('id', assignId);
          await window.db.from('person_org_assignments').update({ sort_order: currentSort }).eq('id', members[swapIdx].id);
          orgMembersMap = {};
          var allExpanded = []; expandedNodes.forEach(function(n) { var id = n.replace('node-',''); if (Number(id)) allExpanded.push(Number(id)); });
          for (var i = 0; i < allExpanded.length; i++) { var m = await getOrgMembers(allExpanded[i]); renderMembers(allExpanded[i], m); }
        } catch(e) { showToast('操作失败', 'error'); }
      }

      function onSearchInput() {
        clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 300);
      }

      async function doSearch() {
        var q = document.getElementById('searchInput').value.trim();
        if (!q) { document.getElementById('searchResults').style.display = 'none'; document.getElementById('orgTree').style.display = 'block'; return; }
        var r = await window.db.from('people').select('*').or('name.ilike.%' + q + '%,phone.ilike.%' + q + '%').order('name');
        var allP = r.data || [];
        var personIds = allP.map(function(p) { return p.id; });
        var orgAssigns = [];
        if (personIds.length && currentSemesterId) {
          var ra = await window.db.from('person_org_assignments').select('*, organizations(name,level)').eq('semester_id', currentSemesterId).in('person_id', personIds).eq('status', 'active');
          orgAssigns = ra.data || [];
        }
        document.getElementById('orgTree').style.display = 'none'; var container = document.getElementById('searchResults'); container.style.display = 'block';
        if (!allP.length) { container.innerHTML = '<div class="empty-state">未找到匹配的人员</div>'; return; }
        container.innerHTML = '<div style="margin-bottom:8px;color:var(--ink-muted);font-size:13px;">搜索到 ' + allP.length + ' 人</div>' +
          allP.map(function(p) {
            var a = orgAssigns.find(function(x) { return Number(x.person_id) === Number(p.id); });
            var orgLbl = a && a.organizations ? a.organizations.name : '';
            var stLbl = p.status === 'active' ? '在读' : p.status === 'left' ? '已离班' : '暂停';
            return '<div class="person-item"><div class="person-avatar">' + p.name.charAt(0) + '</div>' +
              '<div class="person-info"><div class="person-name">' + escapeHtml(p.name) + ' <span class="status-badge ' + p.status + '">' + stLbl + '</span></div>' +
              '<div class="person-meta">' + (p.phone ? '📞 ' + escapeHtml(p.phone) : '') + (orgLbl ? ' · ' + escapeHtml(orgLbl) : '') + '</div></div>' +
              '<div class="person-actions"><button class="btn btn-sm btn-secondary" onclick="showEditPersonModal(' + p.id + ')">编辑</button></div></div>';
          }).join('');
      }

      // ---- Modal ----
      function showAddModal() {
        editingPersonId = null; editingPositions = []; editingPermissions = [];
        document.getElementById('modalTitle').textContent = '新增人员';
        document.getElementById('personId').value = '';
        document.getElementById('personName').value = '';
        document.getElementById('personPhone').value = '';
        document.getElementById('personGender').value = '';
        document.getElementById('personStatus').value = 'active';
        document.getElementById('personNote').value = '';
        document.getElementById('personOrgSelect').value = '';
        renderPositionTags();
        renderPermTags();
        populateOrgSelect();
        document.getElementById('personModal').classList.add('show');
      }

      function closeModal() { document.getElementById('personModal').classList.remove('show'); }

      function populateOrgSelect() {
        var sel = document.getElementById('personOrgSelect');
        var opts = organizations.filter(function(o) { return o.level === '小组'; });
        if (!opts.length) opts = organizations.filter(function(o) { return o.level === '班级'; });
        if (!opts.length) opts = organizations;
        sel.innerHTML = '<option value="">不归属</option>' + opts.map(function(o) {
          return '<option value="' + o.id + '">' + escapeHtml(getOrgPath(o.id)) + '</option>';
        }).join('');
      }

      async function showEditPersonModal(personId) {
        var r = await window.db.from('people').select('*').eq('id', personId).single();
        var p = r.data; if (!p) return;
        editingPersonId = personId;
        document.getElementById('modalTitle').textContent = '编辑人员';
        document.getElementById('personId').value = p.id;
        document.getElementById('personName').value = p.name || '';
        document.getElementById('personPhone').value = p.phone || '';
        document.getElementById('personGender').value = p.gender || '';
        document.getElementById('personStatus').value = p.status || 'active';
        document.getElementById('personNote').value = p.note || '';
        populateOrgSelect();

        // Load org assignment
        if (currentSemesterId) {
          var ra = await window.db.from('person_org_assignments').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('status', 'active').maybeSingle();
          if (ra.data) document.getElementById('personOrgSelect').value = ra.data.org_id || '';
        }

        // Load positions
        if (currentSemesterId) {
          var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('is_active', true);
          editingPositions = rp.data || [];
        } else { editingPositions = []; }
        renderPositionTags();

        // Load permissions
        var rperm = await window.db.from('module_memberships').select('*').eq('user_id', p.id).eq('enabled', true);
        editingPermissions = rperm.data || [];
        renderPermTags();

        document.getElementById('personModal').classList.add('show');
      }

      // ---- Positions ----
      function renderPositionTags() {
        var container = document.getElementById('positionTags');
        if (!editingPositions.length) { container.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">暂未设置职务</span>'; return; }
        container.innerHTML = editingPositions.map(function(pos, i) {
          return '<span class="tag">' + escapeHtml(pos.position_name) + ' · ' + pos.position_scope +
            ' <span class="remove" onclick="removePosition(' + i + ')">×</span></span>';
        }).join('');
      }

      async function addPosition() {
        if (!editingPersonId || !currentSemesterId) { showToast('请先保存人员基本信息', 'error'); return; }
        var name = document.getElementById('posNameSelect').value;
        var scope = document.getElementById('posScopeSelect').value;
        try {
          var r = await window.db.from('person_positions').insert({
            semester_id: currentSemesterId, person_id: editingPersonId,
            position_name: name, position_scope: scope, is_active: true,
            org_id: Number(document.getElementById('personOrgSelect').value) || null
          });
          if (r.error) throw r.error;
          showToast('职务已添加', 'success');
          if (currentSemesterId) {
            var rp = await window.db.from('person_positions').select('*').eq('semester_id', currentSemesterId).eq('person_id', editingPersonId).eq('is_active', true);
            editingPositions = rp.data || []; renderPositionTags();
          }
        } catch(e) { showToast('添加失败，可能已存在', 'error'); }
      }

      function removePosition(idx) {
        var pos = editingPositions[idx]; if (!pos) return;
        showConfirm('确定移除该职务吗？').then(function(ok) {
          if (!ok) return;
          window.db.from('person_positions').update({ is_active: false }).eq('id', pos.id).then(function() {
            editingPositions.splice(idx, 1); renderPositionTags();
          });
        });
      }

      // ---- Permissions ----
      function renderPermTags() {
        var container = document.getElementById('permTags');
        if (!editingPermissions.length) { container.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">暂未分配模块权限</span>'; return; }
        container.innerHTML = editingPermissions.map(function(perm, i) {
          var modLabel = MODULE_LABELS[perm.module_key] || perm.module_key;
          return '<span class="tag">' + modLabel + ' · ' + escapeHtml(perm.role) +
            ' <span class="remove" onclick="removePermission(' + i + ')">×</span></span>';
        }).join('');
      }

      async function addPermission() {
        if (!editingPersonId) { showToast('请先保存人员基本信息', 'error'); return; }
        var moduleKey = document.getElementById('permModuleSelect').value;
        var role = document.getElementById('permRoleSelect').value;
        try {
          var r = await window.db.from('module_memberships').insert({
            user_id: editingPersonId, module_key: moduleKey, role: role, enabled: true
          });
          if (r.error) throw r.error;
          showToast('权限已分配', 'success');
          var rperm = await window.db.from('module_memberships').select('*').eq('user_id', editingPersonId).eq('enabled', true);
          editingPermissions = rperm.data || []; renderPermTags();
        } catch(e) { showToast('添加失败，可能已存在', 'error'); }
      }

      function removePermission(idx) {
        var perm = editingPermissions[idx]; if (!perm) return;
        showConfirm('确定移除该权限吗？').then(function(ok) {
          if (!ok) return;
          window.db.from('module_memberships').update({ enabled: false }).eq('id', perm.id).then(function() {
            editingPermissions.splice(idx, 1); renderPermTags();
          });
        });
      }

      // ---- Save ----
      async function savePerson() {
        var id = document.getElementById('personId').value;
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;
        var status = document.getElementById('personStatus').value;
        var note = document.getElementById('personNote').value.trim();
        var orgId = document.getElementById('personOrgSelect').value;
        if (!name) { showToast('请输入姓名', 'error'); return; }

        document.getElementById('saveBtn').disabled = true;
        try {
          var payload = { name: name, phone: phone || null, gender: gender || null, status: status, note: note || null };
          var result;
          if (id) {
            result = await window.db.from('people').update(payload).eq('id', id);
          } else {
            result = await window.db.from('people').insert(payload).select('id');
            if (result.data && result.data[0]) id = result.data[0].id;
          }
          if (result.error) throw result.error;
          editingPersonId = id || editingPersonId;

          // Save org assignment
          if (currentSemesterId && orgId) {
            var existing = await window.db.from('person_org_assignments')
              .select('*').eq('semester_id', currentSemesterId).eq('person_id', Number(editingPersonId)).eq('org_id', Number(orgId)).maybeSingle();
            if (!existing.data) {
              var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
              // Deactivate old assignments
              await window.db.from('person_org_assignments').update({ status: 'left' })
                .eq('semester_id', currentSemesterId).eq('person_id', Number(editingPersonId)).eq('status', 'active');
              await window.db.from('person_org_assignments').insert({
                semester_id: currentSemesterId, person_id: Number(editingPersonId),
                org_id: Number(orgId), org_level: org ? org.level : '小组', status: 'active', sort_order: 0
              });
            }
          }

          logAction(id ? '编辑人员' : '新增人员', 'people', name);
          showToast('保存成功', 'success');
          closeModal();
          orgMembersMap = {};
          if (currentSemesterId) {
            var expanded = []; expandedNodes.forEach(function(n) { expanded.push(n); });
            if (!expanded.length && organizations.length) expanded.push('node-' + organizations[0].id);
            expandedNodes.clear(); expanded.forEach(function(n) { expandedNodes.add(n); });
            renderOrgTree();
            for (var i = 0; i < expanded.length; i++) { var oid = expanded[i].replace('node-',''); if (Number(oid)) { var m = await getOrgMembers(Number(oid)); renderMembers(Number(oid), m); } }
          }
          initPeopleCache();
        } catch(e) { showToast('保存失败', 'error'); }
        finally { document.getElementById('saveBtn').disabled = false; }
      }

      init();
    </script>
  </body>
</html>
