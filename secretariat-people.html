      async function exportPeopleCSV() {
        try {
          var user = getCurrentUser();
          if (!isPlatformAdminUser(user)) {
            showToast('无导出权限', 'error');
            return;
          }
          if (!currentSemesterId) {
            showToast('请先设置当前学期', 'error');
            return;
          }
          if (user.organization_id && !organizations.length) {
            var orgResult = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
            if (orgResult.error) throw orgResult.error;
            organizations = orgResult.data || [];
          }
          var scopeOrgIds = getExportScopeOrgIds(user);
          if (Array.isArray(scopeOrgIds) && !scopeOrgIds.length) {
            showToast('当前账号未绑定可导出的组织范围', 'error');
            return;
          }

          var assignQuery = window.db
            .from('person_org_assignments')
            .select('person_id,org_id')
            .eq('semester_id', currentSemesterId)
            .eq('status', 'active');
          if (Array.isArray(scopeOrgIds)) assignQuery = assignQuery.in('org_id', scopeOrgIds);
          var assignResult = await assignQuery;
          if (assignResult.error) throw assignResult.error;
          var assignments = assignResult.data || [];
          var personIds = Array.from(new Set(assignments.map(function(a) { return Number(a.person_id); }).filter(Boolean)));
          if (!personIds.length) { showToast('当前范围内没有人员数据', 'error'); return; }

          var peopleResult = await window.db
            .from('people')
            .select('id,name,phone,gender,status,note,created_at')
            .in('id', personIds)
            .order('name');
          if (peopleResult.error) throw peopleResult.error;
          var data = peopleResult.data || [];
          if (!data || !data.length) { showToast('没有人员数据', 'error'); return; }
          var orgByPersonId = {};
          assignments.forEach(function(a) {
            var pid = Number(a.person_id);
            if (!orgByPersonId[pid]) orgByPersonId[pid] = getOrgPath(a.org_id) || '';
          });
          var headers = ['姓名', '手机号', '性别', '归属组织', '状态', '备注', '创建时间'];
          var csv = '\ufeff' + headers.join(',') + '\n';
          data.forEach(function(p) {
            var v = function(x) { return x != null ? ('"' + String(x).replace(/"/g, '""') + '"') : ''; };
            var time = p.created_at ? new Date(p.created_at).toLocaleString('zh-CN') : '';
            var statusMap = { active: '正常', left: '已退出', suspended: '暂停' };
            csv += [v(p.name), v(p.phone), v(p.gender), v(orgByPersonId[Number(p.id)] || ''), v(statusMap[p.status] || p.status), v(p.note), v(time)].join(',') + '\n';
          });
          var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          var link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = '人员列表_' + new Date().toISOString().slice(0, 10) + '.csv';
          link.click();
          URL.revokeObjectURL(link.href);
          showToast('导出成功', 'success');
        } catch(e) {
          showToast('导出失败', 'error');
          console.error('exportPeopleCSV error:', e);
        }
      }

      function showPendingModal() {

      async function loadPendingRecords(options) {
        options = options || {};
        var append = options.append === true;
        var container = document.getElementById('pendingRecordsList');
        if (pendingRecordsLoading) return;
        pendingRecordsLoading = true;
        if (!append) {
          pendingRecords = [];
          pendingRecordsLoaded = 0;
          pendingRecordsTotal = getPendingBadgeCount();
          pendingRecordsHasMore = false;
          container.innerHTML = '<div class="empty-state">正在加载...</div>';
        } else {
          var loadMoreBtn = document.getElementById('pendingLoadMoreBtn');
          if (loadMoreBtn) {
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = '加载中...';
          }
        }
        try {
          var semId = currentSemesterId || await getCurrentSemesterId();
          if (!semId) { container.innerHTML = '<div class="empty-state">请先设置当前学期</div>'; return; }
          var from = append ? pendingRecordsLoaded : 0;
          var to = from + PENDING_RECORDS_PAGE_SIZE;
          var r = await window.db
            .from('entry_forms')
            .select(PENDING_RECORD_LIST_FIELDS)
            .eq('semester_id', semId)
            .eq('status', 'active')
            .order('submitted_at', { ascending: false })
            .order('id', { ascending: false })
            .range(from, to);
          if (r.error) throw r.error;
          var fetchedRecords = r.data || [];
          var records = fetchedRecords.length > PENDING_RECORDS_PAGE_SIZE
            ? fetchedRecords.slice(0, PENDING_RECORDS_PAGE_SIZE)
            : fetchedRecords;
          pendingRecordsHasMore = fetchedRecords.length > PENDING_RECORDS_PAGE_SIZE;
          pendingRecords = append ? pendingRecords.concat(records) : records;
          pendingRecordsLoaded = pendingRecords.length;
          if (!pendingRecordsHasMore) pendingRecordsTotal = pendingRecordsLoaded;
          else if (pendingRecordsTotal && pendingRecordsTotal < pendingRecordsLoaded) pendingRecordsTotal = pendingRecordsLoaded;
          renderPendingRecordsList();
        } catch(e) {
          if (append) {
            showToast('加载更多失败', 'error');
            renderPendingRecordsList();
          } else {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
          }
        } finally {
          pendingRecordsLoading = false;
        }
      }

      function renderPendingRecordsList() {
        var container = document.getElementById('pendingRecordsList');
        if (!container) return;
        var records = pendingRecords || [];
        if (!records.length) {
          var badge = document.getElementById('pendingBadge');
          if (badge) badge.textContent = '0';
          container.innerHTML = '<div class="empty-state">暂无待处理申请</div>';
          return;
        }
        var badge = document.getElementById('pendingBadge');
        if (badge) badge.textContent = pendingRecordsHasMore && (!pendingRecordsTotal || pendingRecordsTotal <= pendingRecordsLoaded) ? pendingRecordsLoaded + '+' : pendingRecordsTotal;
        var countText = pendingRecordsTotal && pendingRecordsTotal > pendingRecordsLoaded
          ? '（' + pendingRecordsLoaded + '/' + pendingRecordsTotal + '）'
          : '';
        var footer = pendingRecordsHasMore
          ? '<div class="record-list-footer"><button class="btn btn-secondary btn-sm pending-load-more" id="pendingLoadMoreBtn" onclick="loadMorePendingRecords()">加载更多' + countText + '</button></div>'
          : '';
        container.innerHTML = '<div class="record-list">' + records.map(renderPendingRecordCard).join('') + '</div>' + footer;
      }

      function loadMorePendingRecords() {
        loadPendingRecords({ append: true });
      }

      function getPendingBadgeCount() {
        var badge = document.getElementById('pendingBadge');
        if (!badge) return 0;
        var count = parseInt(badge.textContent, 10);
        return isNaN(count) ? 0 : count;
      }

      async function updatePendingBadge() {
        try {
          var semId = currentSemesterId || await getCurrentSemesterId();
          if (!semId) return;
          var r = await window.db.from('entry_forms').select('id', { count: 'exact', head: true }).eq('semester_id', semId).eq('status', 'active');
          var badge = document.getElementById('pendingBadge');
          if (badge) badge.textContent = r.count || 0;
        } catch(e) {}
      }

      function renderPendingRecordCard(r) {
        var std = {new:'本期新学员',midway:'上期中途加入',completed:'完整学过一期以上'};
        var time = new Date(r.submitted_at).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
        var initial = escapeHtml((r.name || '?').slice(0, 1));
        var student = r.student_type && std[r.student_type] ? std[r.student_type] : '';
        var location = [r.province || '', r.city_old || r.city || '', r.district || ''].filter(Boolean).join(' ');
        var gains = r.desired_gains || '';
        return '<div class="record-card" onclick="showPendingDetail(' + r.id + ')">' +
          '<div class="record-top">' +
            '<div class="record-head">' +
              '<div class="record-avatar">' + initial + '</div>' +
              '<div class="record-main">' +
                '<div class="record-name-row"><div class="record-name">' + escapeHtml(r.name || '未命名') + '</div>' + (r.gender ? '<span class="record-gender">' + escapeHtml(r.gender) + '</span>' : '') + '</div>' +
                (r.phone ? '<div class="record-phone">' + escapeHtml(r.phone) + '</div>' : '<div class="record-phone">未填写手机号</div>') +
              '</div>' +
            '</div>' +
            '<button class="record-action" onclick="event.stopPropagation();showPendingAssign(' + r.id + ')">分配小组</button>' +
          '</div>' +
          '<div class="record-tags">' +
            '<span class="record-tag">提交 ' + time + '</span>' +
            (r.desired_role ? '<span class="record-tag">' + escapeHtml(r.desired_role) + '</span>' : '') +
            (student ? '<span class="record-tag">' + student + '</span>' : '') +
          '</div>' +
          '<div class="record-grid">' +
            '<div class="record-field"><div class="record-field-label">所在地</div><div class="record-field-value">' + escapeHtml(location || '未填写') + '</div></div>' +
            '<div class="record-field"><div class="record-field-label">最想收获</div><div class="record-field-value">' + escapeHtml(gains || '未填写') + '</div></div>' +
          '</div>' +
          '</div>';
      }

      function closePendingAssign() {
        document.getElementById('assignModal').classList.remove('show');
        pendingAssignRecord = null;
      }

      function resetAssignCascade() {
        var bcSel = document.getElementById('assignBcSelect');
        var clsSel = document.getElementById('assignClsSelect');
        var grpSel = document.getElementById('assignGrpSelect');
        var bcs = organizations.filter(function(o) { return o.level === '大班' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        bcSel.innerHTML = '<option value="">选择大班</option>' + bcs.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (bcs.length === 1) {
          bcSel.value = String(bcs[0].id);
          onAssignBcChange();
        }
      }

      function onAssignBcChange() {
        var bcId = document.getElementById('assignBcSelect').value;
        var clsSel = document.getElementById('assignClsSelect');
        var grpSel = document.getElementById('assignGrpSelect');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!bcId) return;
        var classes = organizations.filter(function(o) { return Number(o.parent_id) === Number(bcId) && o.level === '班级' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        clsSel.innerHTML = '<option value="">选择班级</option>' + classes.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        if (classes.length === 1) {
          clsSel.value = String(classes[0].id);
          onAssignClsChange();
        }
      }

      function onAssignClsChange() {
        var clsId = document.getElementById('assignClsSelect').value;
        var grpSel = document.getElementById('assignGrpSelect');
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!clsId) return;
        var groups = organizations.filter(function(o) { return Number(o.parent_id) === Number(clsId) && o.level === '小组' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        grpSel.innerHTML = '<option value="">' + (groups.length ? '选择小组' : '暂无小组') + '</option>' + groups.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        if (groups.length === 1) grpSel.value = String(groups[0].id);
      }

      function setAssignOrgCascade(orgId) {
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org) return;
        var cls = org.level === '班级' ? org : (org.level === '小组' ? organizations.find(function(o) { return Number(o.id) === Number(org.parent_id); }) : null);
        var bc = cls ? organizations.find(function(o) { return Number(o.id) === Number(cls.parent_id); }) : null;
        if (bc) {
          document.getElementById('assignBcSelect').value = String(bc.id);
          onAssignBcChange();
        }
        if (cls) {
          document.getElementById('assignClsSelect').value = String(cls.id);
          onAssignClsChange();
        }
        if (org.level === '小组') document.getElementById('assignGrpSelect').value = String(org.id);
      }

      async function findExistingPersonIdFromEntry(record) {
        if (record.person_id) return Number(record.person_id);
        if (record.phone) {
          var byPhone = await window.db.from('people').select('id').eq('phone', record.phone).maybeSingle();
          if (byPhone.data) return Number(byPhone.data.id);
        }
        return null;
      }

      async function showPendingAssign(id) {
        document.getElementById('assignEntryId').value = id;
        document.getElementById('assignSummary').innerHTML = '正在加载...';
        resetAssignCascade();
        document.getElementById('assignModal').classList.add('show');
        try {
          var res = await window.db.from('entry_forms').select('*').eq('id', id).single();
          if (res.error || !res.data) throw res.error || new Error('未找到申请');
          pendingAssignRecord = res.data;
          var location = [res.data.province || '', res.data.city_old || res.data.city || '', res.data.district || ''].filter(Boolean).join(' ');
          document.getElementById('assignSummary').innerHTML =
            '<div class="assign-summary-name">' + escapeHtml(res.data.name || '未命名') + '</div>' +
            '<div class="assign-summary-meta">' +
              (res.data.phone ? '手机号：' + escapeHtml(res.data.phone) + '<br>' : '') +
              (location ? '所在地：' + escapeHtml(location) + '<br>' : '') +
              (res.data.desired_role ? '意向岗位：' + escapeHtml(res.data.desired_role) : '') +
            '</div>';
          var personId = await findExistingPersonIdFromEntry(res.data);
          if (personId && currentSemesterId) {
            var assign = await window.db.from('person_org_assignments').select('org_id').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('status', 'active').maybeSingle();
            if (assign.data) setAssignOrgCascade(assign.data.org_id);
          }
        } catch(e) {
          showToast('加载申请失败', 'error');
          closePendingAssign();
        }
      }

      async function getOrCreatePersonFromEntry(record) {
        var personId = await findExistingPersonIdFromEntry(record);
        if (personId) {
          var personPayload = { name: record.name || '未命名', source_form_id: record.id };
          if (record.phone) personPayload.phone = record.phone;
          if (record.gender) personPayload.gender = record.gender;
          var personUpdate = await window.db.from('people').update(personPayload).eq('id', personId);
          if (personUpdate.error) throw personUpdate.error;
          return personId;
        }
        var created = await window.db.from('people').insert({
          name: record.name || '未命名',
          phone: record.phone || null,
          gender: record.gender || null,
          source_form_id: record.id,
          status: 'active'
        }).select('id').single();
        if (created.error) throw created.error;
        return Number(created.data.id);
      }

      async function savePendingAssignment() {
        var btn = document.getElementById('assignSaveBtn');
        var entryId = Number(document.getElementById('assignEntryId').value);
        var groupId = Number(document.getElementById('assignGrpSelect').value);
        if (!entryId || !pendingAssignRecord) { showToast('请先选择申请', 'error'); return; }
        if (!groupId) { showToast('请选择小组', 'error'); return; }
        if (!currentSemesterId) { showToast('请先设置当前学期', 'error'); return; }
        var group = organizations.find(function(o) { return Number(o.id) === Number(groupId); });
        if (!group || group.level !== '小组') { showToast('请选择有效小组', 'error'); return; }
        btn.disabled = true;
        btn.textContent = '分配中...';
        try {
          var personId = await getOrCreatePersonFromEntry(pendingAssignRecord);
          var deactivate = await window.db.from('person_org_assignments').update({ status: 'left', left_at: new Date().toISOString().slice(0, 10) })
            .eq('semester_id', currentSemesterId)
            .eq('person_id', personId)
            .eq('status', 'active');
          if (deactivate.error) throw deactivate.error;
          var existing = await window.db.from('person_org_assignments').select('id').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('org_id', groupId).maybeSingle();
          if (existing.data) {
            var updateAssign = await window.db.from('person_org_assignments').update({
              org_level: '小组',
              status: 'active',
              joined_at: new Date().toISOString().slice(0, 10),
              left_at: null
            }).eq('id', existing.data.id);
            if (updateAssign.error) throw updateAssign.error;
          } else {
            var insertAssign = await window.db.from('person_org_assignments').insert({
              semester_id: currentSemesterId,
              person_id: personId,
              org_id: groupId,
              org_level: '小组',
              status: 'active',
              joined_at: new Date().toISOString().slice(0, 10),
              sort_order: 0
            });
            if (insertAssign.error) throw insertAssign.error;
          }
          var updateEntry = await window.db.from('entry_forms').update({ person_id: personId, status: 'assigned' }).eq('id', entryId);
          if (updateEntry.error) throw updateEntry.error;
          logAction('分配进班申请到小组', 'entry_forms', pendingAssignRecord.name || String(entryId), 'secretariat');
          showToast('已分配到 ' + group.name, 'success');
          closePendingAssign();
          orgMembersMap = {};
          await loadPendingRecords();
          await loadPeopleHealthStats();
          await refreshPeopleCards();
          initPeopleCache();
        } catch(e) {
          showToast('分配失败: ' + (e.message || e), 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '确认分配';
        }
      }

      function showPendingDetail(id) {
        window.db.from('entry_forms').select('*').eq('id', id).single().then(function(res) {
          if (res.error || !res.data) { showToast('加载失败', 'error'); return; }
          var r = res.data;
          var std = {new:'本期新学员',midway:'上期中途加入',completed:'完整学过一期以上'};
          var time = new Date(r.submitted_at).toLocaleString('zh-CN');
          var bd = r.birthday_date || r.birth_date || '';
          var hobbies = r.hobbies_interests;
          if (typeof hobbies === 'string') { try { hobbies = JSON.parse(hobbies); } catch(e) {} }
          var hobbyStr = Array.isArray(hobbies) ? hobbies.join('、') : (hobbies || '');
          var html =
            '<table style="width:100%;font-size:13px;line-height:1.8;border-collapse:collapse;">' +
            '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;width:70px;">姓名</td><td style="padding:4px 0;word-break:break-all;">' + escapeHtml(r.name) + '</td></tr>' +
            (r.phone ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">手机号</td><td style="padding:4px 0;">' + escapeHtml(r.phone) + '</td></tr>' : '') +
            (r.gender ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">性别</td><td style="padding:4px 0;">' + escapeHtml(r.gender) + '</td></tr>' : '') +
            (bd ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">生日</td><td style="padding:4px 0;">' + escapeHtml(bd) + '</td></tr>' : '') +
            (r.province || r.city_old || r.city ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">所在地</td><td style="padding:4px 0;">' + escapeHtml(r.province||'') + ' ' + escapeHtml(r.city_old || r.city||'') + (r.district ? ' ' + escapeHtml(r.district) : '') + '</td></tr>' : '') +
            (r.occupation_category ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">行业</td><td style="padding:4px 0;">' + escapeHtml(r.occupation_category) + '</td></tr>' : '') +
            (r.position_type ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">职业</td><td style="padding:4px 0;">' + escapeHtml(r.position_type) + '</td></tr>' : '') +
            (hobbyStr ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">兴趣爱好</td><td style="padding:4px 0;">' + escapeHtml(hobbyStr) + '</td></tr>' : '') +
            (r.student_type ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">学员类型</td><td style="padding:4px 0;">' + escapeHtml(std[r.student_type]||r.student_type) + '</td></tr>' : '') +
            (r.desired_gains ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">最想收获</td><td style="padding:4px 0;">' + escapeHtml(r.desired_gains) + '</td></tr>' : '') +
            (r.desired_role ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">意向岗位</td><td style="padding:4px 0;">' + escapeHtml(r.desired_role) + '</td></tr>' : '') +
            (r.schedule_acknowledged ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">安排确认</td><td style="padding:4px 0;">' + escapeHtml(r.schedule_acknowledged) + '</td></tr>' : '') +
            (r.commitment_signature ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">承诺人</td><td style="padding:4px 0;">' + escapeHtml(r.commitment_signature) + '</td></tr>' : '') +
            '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">提交时间</td><td style="padding:4px 0;">' + time + '</td></tr>' +
            '</table>';
          document.getElementById('detailModalTitle').textContent = (r.name || '') + ' 的进班信息';
          document.getElementById('detailModalBody').innerHTML = html;
          document.getElementById('detailModal').classList.add('show');
        });
      }

      function closePendingDetail() {
        document.getElementById('detailModal').classList.remove('show');
      }

      init();
    </script>
  </body>
</html>
