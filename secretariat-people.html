<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .toolbar .filter-select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-card); font-size: 14px; }
      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .person-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: var(--bg-card); }
      .person-name { font-weight: 700; color: var(--ink-dark); }
      .person-meta { margin-top: 4px; color: var(--ink-muted); font-size: 12px; }
      .person-actions { display: flex; gap: 8px; margin-top: 10px; }
      .status-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: #fff3e0; color: #e65100; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .pagination { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 12px; color: var(--ink-muted); font-size: 13px; }
      .pagination button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; color: var(--ink-dark); }
      .pagination button:disabled { opacity: 0.4; cursor: default; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">人员管理</h1>
      </header>

      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="loadPeople()" />
        <select class="filter-select" id="statusFilter" onchange="loadPeople()">
          <option value="">全部状态</option>
          <option value="active">在读</option>
          <option value="left">已离班</option>
          <option value="suspended">暂停</option>
        </select>
        <button class="btn btn-primary" onclick="showAddModal()">+ 新增</button>
      </div>

      <section class="section">
        <div class="section-header">
          <div class="section-title">人员列表</div>
          <span id="peopleCount" style="font-size:13px;color:var(--ink-muted);">--</span>
        </div>
        <div id="peopleList" class="empty-state">正在加载...</div>
        <div class="pagination" id="pagination">
          <button id="prevBtn" onclick="prevPage()">上一页</button>
          <span id="pageInfo">第 1 页</span>
          <button id="nextBtn" onclick="nextPage()">下一页</button>
        </div>
      </section>
    </div>

    <!-- 新增/编辑 Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="modal-title" id="modalTitle">新增人员</div>
        <input type="hidden" id="personId" />
        <div class="form-item">
          <label class="form-label">姓名 *</label>
          <input class="form-input" id="personName" placeholder="请输入姓名" />
        </div>
        <div class="form-item">
          <label class="form-label">手机号</label>
          <input class="form-input" id="personPhone" placeholder="请输入手机号" maxlength="11" />
        </div>
        <div class="form-row">
          <div class="form-item">
            <label class="form-label">性别</label>
            <select class="form-select" id="personGender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="form-item">
            <label class="form-label">状态</label>
            <select class="form-select" id="personStatus">
              <option value="active">在读</option>
              <option value="left">已离班</option>
              <option value="suspended">暂停</option>
            </select>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">备注</label>
          <input class="form-input" id="personNote" placeholder="备注信息" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" onclick="savePerson()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var PAGE_SIZE = 50;
      var currentPage = 0;
      var totalPeople = 0;
      var people = [];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        var profile = checkLogin();
        if (!profile) return;
        await loadPeople();
      }

      async function loadPeople() {
        var search = document.getElementById('searchInput').value.trim();
        var statusFilter = document.getElementById('statusFilter').value;

        var query = window.db.from('people').select('*', { count: 'exact' });

        if (search) {
          query = query.or('name.ilike.%' + search + '%,phone.ilike.%' + search + '%');
        }
        if (statusFilter) {
          query = query.eq('status', statusFilter);
        }

        query = query.order('created_at', { ascending: false });

        var { data, count, error } = await query.range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

        if (error) {
          showToast('加载人员失败', 'error');
          return;
        }

        people = data || [];
        totalPeople = count || 0;
        renderPeople();
      }

      function renderPeople() {
        var container = document.getElementById('peopleList');
        document.getElementById('peopleCount').textContent = '共 ' + totalPeople + ' 人';

        if (!people.length) {
          container.innerHTML = '<div class="empty-state">暂无人员</div>';
          updatePagination();
          return;
        }

        container.innerHTML = people
          .map(function (p) {
            var statusClass = p.status === 'active' ? 'active' : p.status === 'left' ? 'left' : 'suspended';
            var statusLabel = p.status === 'active' ? '在读' : p.status === 'left' ? '已离班' : '暂停';
            return (
              '<div class="person-card">' +
              '<div style="display:flex;align-items:center;gap:10px;">' +
              '<div class="person-name">' +
              escapeHtml(p.name) +
              '</div>' +
              '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
              '</div>' +
              '<div class="person-meta">' +
              (p.phone ? '📞 ' + escapeHtml(p.phone) : '未填手机号') +
              (p.gender ? ' · ' + p.gender : '') +
              (p.note ? ' · ' + escapeHtml(p.note) : '') +
              '</div>' +
              '<div class="person-actions">' +
              '<button class="btn btn-secondary" onclick="editPerson(' + p.id + ')">编辑</button>' +
              '<button class="btn btn-danger" onclick="togglePersonStatus(' + p.id + ')">' +
              (p.status === 'active' ? '停用' : p.status === 'left' ? '恢复' : '恢复') +
              '</button>' +
              '</div>' +
              '</div>'
            );
          })
          .join('');

        updatePagination();
      }

      function updatePagination() {
        var totalPages = Math.ceil(totalPeople / PAGE_SIZE) || 1;
        document.getElementById('pageInfo').textContent = '第 ' + (currentPage + 1) + ' / ' + totalPages + ' 页';
        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
      }

      function prevPage() {
        if (currentPage > 0) { currentPage--; loadPeople(); }
      }

      function nextPage() {
        var totalPages = Math.ceil(totalPeople / PAGE_SIZE) || 1;
        if (currentPage < totalPages - 1) { currentPage++; loadPeople(); }
      }

      function showAddModal() {
        document.getElementById('modalTitle').textContent = '新增人员';
        document.getElementById('personId').value = '';
        document.getElementById('personName').value = '';
        document.getElementById('personPhone').value = '';
        document.getElementById('personGender').value = '';
        document.getElementById('personStatus').value = 'active';
        document.getElementById('personNote').value = '';
        document.getElementById('personModal').classList.add('show');
      }

      function closeModal() {
        document.getElementById('personModal').classList.remove('show');
      }

      async function savePerson() {
        var id = document.getElementById('personId').value;
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;
        var status = document.getElementById('personStatus').value;
        var note = document.getElementById('personNote').value.trim();

        if (!name) { showToast('请输入姓名', 'error'); return; }

        document.getElementById('saveBtn').disabled = true;
        try {
          var payload = { name: name, phone: phone || null, gender: gender || null, status: status, note: note || null };
          var result;
          if (id) {
            result = await window.db.from('people').update(payload).eq('id', id);
          } else {
            result = await window.db.from('people').insert(payload);
          }
          if (result.error) throw result.error;
          logAction(id ? '编辑人员' : '新增人员', 'people', name);
          showToast('保存成功', 'success');
          closeModal();
          await loadPeople();
        } catch (error) {
          showToast('保存失败，请检查权限或网络', 'error');
        } finally {
          document.getElementById('saveBtn').disabled = false;
        }
      }

      function editPerson(id) {
        var p = people.find(function (item) { return Number(item.id) === Number(id); });
        if (!p) return;
        document.getElementById('modalTitle').textContent = '编辑人员';
        document.getElementById('personId').value = p.id;
        document.getElementById('personName').value = p.name || '';
        document.getElementById('personPhone').value = p.phone || '';
        document.getElementById('personGender').value = p.gender || '';
        document.getElementById('personStatus').value = p.status || 'active';
        document.getElementById('personNote').value = p.note || '';
        document.getElementById('personModal').classList.add('show');
      }

      async function togglePersonStatus(id) {
        var p = people.find(function (item) { return Number(item.id) === Number(id); });
        if (!p) return;
        var newStatus = p.status === 'active' ? 'suspended' : 'active';
        var label = newStatus === 'active' ? '恢复' : '停用';
        var confirmed = await showConfirm('确定' + label + '「' + p.name + '」吗？');
        if (!confirmed) return;
        try {
          var result = await window.db.from('people').update({ status: newStatus }).eq('id', id);
          if (result.error) throw result.error;
          showToast(label + '成功', 'success');
          await loadPeople();
        } catch (error) {
          showToast('操作失败', 'error');
        }
      }

      init();
    </script>
  </body>
</html>
