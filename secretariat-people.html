<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 人员管理</title>
    <link rel="stylesheet" href="css/common.css?v=5" />
    <style>
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .page-header .back-btn { width:auto; min-width:48px; padding:0 10px; font-size:12px; font-family:inherit; }
      .page-header .back-btn::before { display:none; }
      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.level-0 { font-weight: 600; }
      .org-node-header.level-1 { padding-left: 32px; }
      .org-node-header.level-2 { padding-left: 52px; }
      .org-toggle { width: 16px; text-align: center; color: var(--ink-muted); font-size: 12px; transition: transform 0.15s; }
      .org-toggle.expanded { transform: rotate(90deg); }
      .org-name { flex: 1; color: var(--ink-dark); font-size: 14px; }

      .person-card-list { display:flex; flex-direction:column; gap:10px; }
      .person-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:0 2px 12px var(--shadow); }
      .person-card-top { display:flex; align-items:flex-start; gap:10px; }
      .person-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--vermillion-light),rgba(224,176,78,0.22)); color:var(--vermillion); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; }
      .person-card-main { flex:1; min-width:0; }
      .person-card-title { display:flex; align-items:center; gap:6px; min-width:0; }
      .person-card-name { font-size:15px; font-weight:700; color:var(--ink-dark); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .person-card-meta { margin-top:4px; font-size:12px; color:var(--ink-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .person-card-actions { flex-shrink:0; display:flex; gap:6px; }
      .person-card-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px; }
      .person-card-field { min-width:0; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg-primary); }
      .person-card-field-label { font-size:10px; color:var(--ink-muted); line-height:1.2; }
      .person-card-field-value { margin-top:3px; font-size:12px; color:var(--ink-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .person-card-note { margin-top:10px; font-size:12px; color:var(--ink-muted); line-height:1.5; }
      .status-badge { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 10px; flex-shrink:0; }
      .status-badge.active { background: var(--green-light); color: var(--green); }
      .status-badge.left { background: var(--vermillion-light); color: var(--vermillion); }
      .status-badge.suspended { background: var(--gold-light); color: var(--ink-light); }

      .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); font-size: 11px; margin: 2px; }
      .tag .remove { cursor: pointer; color: var(--vermillion); font-size: 11px; line-height: 1; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; font-size: 13px; }
      .toolbar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .toolbar .search-input { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .person-empty { color: var(--ink-muted); font-size: 12px; padding: 12px 14px; }
      .people-breadcrumb { display:flex; align-items:center; gap:4px; margin-bottom:14px; flex-wrap:wrap; font-size:13px; }
      .people-breadcrumb-item { color:var(--ink-muted); cursor:pointer; padding:4px 8px; border-radius:4px; white-space:nowrap; }
      .people-breadcrumb-item:hover { color:var(--vermillion); background:var(--gold-light); }
      .people-breadcrumb-item.current { color:var(--ink-dark); font-weight:700; cursor:default; background:transparent; }
      .people-breadcrumb-sep { color:var(--border); }
      .people-card-list { display:flex; flex-direction:column; gap:10px; }
      .people-data-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
      .people-data-card:active { transform:scale(0.98); }
      .people-data-card:hover { border-color:rgba(179,45,55,0.28); }
      .people-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
      .people-card-title { font-size:15px; font-weight:700; color:var(--ink-dark); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .people-card-subtitle { margin-top:4px; font-size:12px; color:var(--ink-muted); }
      .people-card-action { flex-shrink:0; font-size:12px; color:var(--vermillion); font-weight:700; padding-top:2px; }
      .people-card-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
      .people-card-stat { background:var(--bg-primary); border-radius:8px; padding:8px 10px; text-align:center; min-width:0; }
      .people-card-value { font-size:18px; font-weight:700; color:var(--ink-dark); line-height:1.2; }
      .people-card-label { margin-top:2px; font-size:10px; color:var(--ink-muted); }
      .people-member-head { margin-bottom:8px; color:var(--ink-muted); font-size:13px; }
      .health-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
      .health-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
      .health-value { font-size: 18px; font-weight: 700; color: var(--ink-dark); line-height: 1.2; }
      .health-label { margin-top: 3px; font-size: 11px; color: var(--ink-muted); }
      .health-card.warn .health-value { color: var(--vermillion); }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; align-items: flex-end; justify-content: center; padding: 0; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; padding: 24px 20px 30px; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .modal-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
      .modal-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .modal-section-title { font-size: 14px; font-weight: 700; color: var(--ink-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 12px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }
      .inline-add { display: flex; gap: 6px; margin-top: 8px; }
      .inline-add select, .inline-add input { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); font-size: 12px; font-family: inherit; }
      .inline-add .btn { flex: 0 0 auto; padding: 8px 12px; font-size: 12px; }
      .account-status { margin-bottom: 8px; font-size: 12px; color: var(--ink-muted); }
      .check-row { display: flex; align-items: center; gap: 8px; color: var(--ink-dark); font-size: 13px; margin: 8px 0; }
      .check-row input { width: 16px; height: 16px; accent-color: var(--vermillion); }
      .account-fields { display: none; margin-top: 10px; }
      .account-fields.show { display: block; }
      .person-edit-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; }
      .person-edit-head .modal-title { margin-bottom:0; }
      .person-edit-shell { padding-top:4px; }
      .manager-grid { display:grid; gap:10px; }
      .manager-card { width:100%; border:1px solid var(--border); border-radius:10px; background:var(--bg-primary); padding:12px; text-align:left; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; }
      .manager-card:active { background:var(--gold-light); }
      .manager-card.disabled { opacity:0.56; cursor:not-allowed; }
      .manager-main { min-width:0; }
      .manager-title { font-size:14px; font-weight:700; color:var(--ink-dark); }
      .manager-desc { margin-top:4px; font-size:12px; color:var(--ink-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .manager-chevron { color:var(--ink-muted); font-size:12px; flex-shrink:0; font-weight:700; }
      .sub-modal { z-index:2100; }
      .sub-modal .modal { max-width:500px; }

      .search-results { margin-top: 10px; }

      .export-csv-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--ink-dark); margin-left: auto; }
      .export-csv-btn:active { background: var(--border); }
      .export-csv-btn.hidden { display: none; }
      .pending-btn { position:relative; height:36px; padding:0 14px; border:1px solid var(--vermillion); border-radius:8px; background:var(--vermillion-light); color:var(--vermillion); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:auto; font-family:inherit; }
      .pending-btn:active { opacity:0.8; }
      .pending-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; padding:0 6px; border-radius:10px; background:var(--vermillion); color:#fff; font-size:11px; font-weight:700; }
      .modal-lg { max-width:600px !important; }
      .record-list { display:grid; gap:10px; }
      .record-card { border:1px solid rgba(179, 45, 55, 0.14); border-radius:12px; padding:14px; background:rgba(255,255,255,0.96); box-shadow:0 2px 10px var(--shadow); cursor:pointer; transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s; }
      .record-card:active { transform:scale(0.99); border-color:rgba(179,45,55,0.28); }
      .record-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
      .record-head { display:flex; align-items:center; gap:10px; min-width:0; }
      .record-avatar { width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg,var(--vermillion-light),rgba(224,176,78,0.22)); color:var(--vermillion); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; }
      .record-main { flex:1; min-width:0; }
      .record-name-row { display:flex; align-items:center; gap:6px; }
      .record-name { font-size:15px; font-weight:700; color:var(--ink-dark); }
      .record-gender { font-size:11px; color:var(--ink-muted); }
      .record-phone { font-size:12px; color:var(--ink-light); margin-top:2px; }
      .record-action { height:32px; padding:0 10px; border:1px solid rgba(179,45,55,0.18); border-radius:8px; background:var(--vermillion-light); color:var(--vermillion); font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; }
      .record-action:active { transform:scale(0.98); }
      .record-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
      .record-tag { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--bg-primary); color:var(--ink-light); }
      .record-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
      .record-field { min-width:0; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:rgba(248,246,242,0.68); }
      .record-field-label { font-size:10px; color:var(--ink-muted); line-height:1.2; }
      .record-field-value { margin-top:3px; font-size:12px; color:var(--ink-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .record-location { font-size:12px; color:var(--ink-light); margin-top:6px; }
      .assign-summary { padding:12px; border:1px solid rgba(179,45,55,0.14); border-radius:10px; background:rgba(179,45,55,0.045); margin-bottom:14px; }
      .assign-summary-name { font-size:15px; font-weight:700; color:var(--ink-dark); }
      .assign-summary-meta { margin-top:4px; font-size:12px; color:var(--ink-muted); line-height:1.6; }
      .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
      .modal-header .modal-title { font-size:18px; font-weight:700; }
      .modal-close { min-width:48px; height:32px; padding:0 10px; border-radius:8px; border:none; background:var(--bg-primary); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-muted); font-family:inherit; }
      @media (max-width: 420px) {
        .record-top { flex-direction:column; align-items:stretch; }
        .record-action { width:100%; }
        .record-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">返回</a>
        <h1 class="page-title">人员管理</h1>
        <button class="pending-btn" id="pendingBtn" onclick="showPendingModal()" title="待处理进班申请">待处理 <span class="pending-badge" id="pendingBadge">0</span></button>
        <button class="export-csv-btn" id="exportPeopleBtn" onclick="exportPeopleCSV()" title="导出 CSV">CSV</button>
      </header>
      <section class="section">
<div class="form-item">
  <div class="semester-wrap" id="currentSemesterDisplay"></div>
</div>
        <div class="health-grid" id="peopleHealthStats">
          <div class="health-card"><div class="health-value">--</div><div class="health-label">已归属</div></div>
          <div class="health-card"><div class="health-value">--</div><div class="health-label">未归属</div></div>
          <div class="health-card"><div class="health-value">--</div><div class="health-label">旧兜底</div></div>
        </div>
      </section>
      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" id="addPersonBtn" onclick="showAddModal()" style="display:none;">新增人员</button>
        </div>
        <div class="toolbar">
          <input class="search-input" id="searchInput" placeholder="搜索姓名或手机号..." oninput="onSearchInput()" />
        </div>
        <div class="people-breadcrumb" id="peopleBreadcrumb"></div>
        <div id="orgCardArea"></div>
        <div id="memberDisplay"><div class="empty-state">选择组织后查看成员</div></div>
        <div id="searchResults" class="search-results" style="display:none;"></div>
      </section>
    </div>

    <!-- 待处理进班申请 Modal -->
    <div class="modal-overlay" id="pendingModal" onclick="if(event.target===this)closePendingModal()">
      <div class="modal modal-lg">
        <div class="modal-header">
          <span class="modal-title">待处理进班申请</span>
          <button class="modal-close" onclick="closePendingModal()">关闭</button>
        </div>
        <div id="pendingRecordsList" class="empty-state">正在加载...</div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingModal()">关闭</button>
        </div>
      </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closePendingDetail()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="detailModalTitle">进班信息</span>
          <button class="modal-close" onclick="closePendingDetail()">关闭</button>
        </div>
        <div id="detailModalBody"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingDetail()">关闭</button>
        </div>
      </div>
    </div>

    <!-- 分配小组弹窗 -->
    <div class="modal-overlay" id="assignModal" onclick="if(event.target===this)closePendingAssign()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">分配到小组</span>
          <button class="modal-close" onclick="closePendingAssign()">关闭</button>
        </div>
        <input type="hidden" id="assignEntryId" />
        <div class="assign-summary" id="assignSummary">正在加载...</div>
        <div class="modal-section">
          <div class="modal-section-title">选择归属小组</div>
          <div class="org-cascade">
            <div class="org-group">
              <label class="org-label">大班</label>
              <select class="org-select" id="assignBcSelect" onchange="onAssignBcChange()"><option value="">选择大班</option></select>
            </div>
            <div class="org-group">
              <label class="org-label">班级</label>
              <select class="org-select" id="assignClsSelect" onchange="onAssignClsChange()"><option value="">选择班级</option></select>
            </div>
            <div class="org-group">
              <label class="org-label">小组</label>
              <select class="org-select" id="assignGrpSelect"><option value="">选择小组</option></select>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePendingAssign()">取消</button>
          <button class="btn btn-primary" id="assignSaveBtn" onclick="savePendingAssignment()">确认分配</button>
        </div>
      </div>
    </div>

    <!-- Person Modal -->
    <div class="modal-overlay" id="personModal">
      <div class="modal">
        <div class="person-edit-head">
          <div class="modal-title" id="modalTitle">新增人员</div>
          <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
        <div class="person-edit-shell">
          <div class="modal-section">
            <div class="modal-section-title">基础资料</div>
            <input type="hidden" id="personId" />
            <div class="form-item">
              <label class="form-label">姓名 *</label>
              <input class="form-input" id="personName" placeholder="请输入姓名" />
            </div>
            <div class="form-row">
              <div class="form-item">
                <label class="form-label">手机号</label>
                <input class="form-input" id="personPhone" placeholder="手机号" maxlength="11" />
              </div>
              <div class="form-item">
                <label class="form-label">性别</label>
                <select class="form-select" id="personGender"><option value="">选择</option><option>男</option><option>女</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-item">
                <label class="form-label">状态</label>
                <select class="form-select" id="personStatus"><option value="active">在读</option><option value="left">已离班</option><option value="suspended">暂停</option></select>
              </div>
              <div class="form-item">
                <label class="form-label">备注</label>
                <input class="form-input" id="personNote" placeholder="备注" />
              </div>
            </div>
          </div>

          <div class="modal-section">
            <div class="modal-section-title">功能管理</div>
            <div class="manager-grid">
              <button class="manager-card" id="orgManageBtn" onclick="openPersonManager('org')">
                <span class="manager-main"><span class="manager-title">组织归属</span><span class="manager-desc" id="orgManageSummary">保存基础资料后可管理</span></span>
                <span class="manager-chevron">管理</span>
              </button>
              <button class="manager-card" id="accountManageBtn" onclick="openPersonManager('account')">
                <span class="manager-main"><span class="manager-title">登录账号</span><span class="manager-desc" id="accountManageSummary">保存基础资料后可管理</span></span>
                <span class="manager-chevron">管理</span>
              </button>
              <button class="manager-card" id="positionManageBtn" onclick="openPersonManager('position')">
                <span class="manager-main"><span class="manager-title">职务</span><span class="manager-desc" id="positionManageSummary">保存基础资料后可管理</span></span>
                <span class="manager-chevron">管理</span>
              </button>
              <button class="manager-card" id="permissionManageBtn" onclick="openPersonManager('permission')">
                <span class="manager-main"><span class="manager-title">模块权限</span><span class="manager-desc" id="permissionManageSummary">保存基础资料后可管理</span></span>
                <span class="manager-chevron">管理</span>
              </button>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="saveBtn" onclick="savePerson()">保存基础资料</button>
        </div>
      </div>
    </div>

    <!-- 组织归属管理 -->
    <div class="modal-overlay sub-modal" id="orgManagerModal" onclick="if(event.target===this)closePersonManager('org')">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">管理组织归属</span>
          <button class="modal-close" onclick="closePersonManager('org')">关闭</button>
        </div>
        <div class="modal-section">
          <div class="org-cascade">
            <div class="org-group">
              <label class="org-label">大班</label>
              <select class="org-select" id="personBcSelect" onchange="onPersonBcChange()"><option value="">选择大班</option></select>
            </div>
            <div class="org-group">
              <label class="org-label">班级</label>
              <select class="org-select" id="personClsSelect" onchange="onPersonClsChange()"><option value="">选择班级</option></select>
            </div>

      var MODULE_ROLE_OPTIONS = {
        supervision: ['大班总督', '大班副督', '班级总督察', '班级副总督察', '小组督察', '小组副督察', '管理员'],

      async function init() { await waitForDb(); await refreshCurrentUser(); if (!checkLogin()) return; var ok = await guardModuleAccess('secretariat'); if (!ok) return; var user = getCurrentUser(); if (!(user && (user.role === '超级管理员' || user.role === '管理员'))) { var btn = document.getElementById('exportPeopleBtn'); if (btn) btn.classList.add('hidden'); } updatePermissionRoleOptions(); await loadCurrentSemester(); await initPeopleCache(); await loadPeopleHealthStats(); await updatePendingBadge(); }
      function initPeopleCache() { window.db.from('people').select('*').order('name').then(function(r) { people = r.data || []; }); }

      function updatePermissionRoleOptions() {
        var moduleKey = document.getElementById('permModuleSelect').value || 'supervision';
        var roleSelect = document.getElementById('permRoleSelect');
        var roles = (MODULE_ROLE_OPTIONS[moduleKey] || MODULE_ROLE_OPTIONS.supervision).slice();
        var currentUser = getCurrentUser();
        var isAdmin = currentUser && (currentUser.role === '超级管理员' || currentUser.role === '管理员');
        if (!isAdmin) {
          roles = roles.filter(function(role) { return role !== '管理员'; });
        }
        var oldValue = roleSelect.value;
        roleSelect.innerHTML = roles.map(function(role) {
          return '<option value="' + escapeHtml(role) + '">' + escapeHtml(role) + '</option>';
        }).join('');
        if (oldValue && roles.indexOf(oldValue) >= 0) roleSelect.value = oldValue;
      }

      function renderAccountState() {
        var status = document.getElementById('accountStatus');

        var checkbox = document.getElementById('personCreateAccount');

          password.value = '';

            createBtn.disabled = true;
          }
        } else {
          status.textContent = '未关联登录账号';
          row.style.display = 'flex';
          if (createBtn) {
            createBtn.textContent = '创建账号';
            createBtn.disabled = false;
          }
        }
        toggleAccountFields();
        refreshPersonManagerSummaries();

      function toggleAccountFields() {
        var fields = document.getElementById('accountCreateFields');

        if (!fields || !checkbox) return;
        fields.classList.toggle('show', !editingProfileId && checkbox.checked);

      async function loadCurrentSemester() {
        currentSemesterId = await getCurrentSemesterId();
        if (!currentSemesterId) { setCurrentSemester('currentSemesterDisplay', '未设置当前学期', 'tag-lg'); return; }
        var r = await window.db.from('semesters').select('semester_name').eq('id', currentSemesterId).single();
        if (r.data) {
          setCurrentSemester('currentSemesterDisplay', r.data.semester_name, 'tag-lg');
        } else {
          setCurrentSemester('currentSemesterDisplay', '未知学期', 'tag-lg');
        }
        selectedOrgId = null; orgMembersMap = {};
        var ro = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
        if (ro.error) {
          showToast('加载组织失败', 'error');
          organizations = [];
          await loadPeopleTreeCounts();
          initPeopleCards();
          return;
        }
        organizations = ro.data || [];
        if (!organizations.length) {
          var legacyOrgs = await window.db.from('organizations').select('*').is('semester_id', null).order('sort_order');
          organizations = legacyOrgs.data || [];
        }
        organizations.sort(function(a, b) {
          var sa = a.sort_order || 0, sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          return a.name.localeCompare(b.name, 'zh-CN');
        });
        await loadPeopleTreeCounts();
        initPeopleCards();
      }

      async function loadPeopleHealthStats() {
        var el = document.getElementById('peopleHealthStats');
        if (!el || !currentSemesterId) return;
        try {
          var peopleResult = await window.db.from('people').select('id,name,phone,status').eq('status', 'active');
          var assignResult = await window.db
            .from('person_org_assignments')
            .select('person_id')
            .eq('semester_id', currentSemesterId)
            .eq('status', 'active');
          var activePeople = peopleResult.data || [];
          var assignments = assignResult.data || [];
          var assignedIds = new Set(assignments.map(function(a) { return Number(a.person_id); }));
          var unassigned = activePeople.filter(function(p) { return !assignedIds.has(Number(p.id)); });
          var fallbackCount = 0;
          var phones = unassigned.map(function(p) { return p.phone; }).filter(Boolean);
          if (phones.length) {
            var profileResult = await window.db.from('profiles').select('phone,organization_id').in('phone', phones);
            fallbackCount = (profileResult.data || []).filter(function(p) { return !!p.organization_id; }).length;
          }
          el.innerHTML =
            '<div class="health-card"><div class="health-value">' + assignedIds.size + '</div><div class="health-label">已归属</div></div>' +
            '<div class="health-card' + (unassigned.length ? ' warn' : '') + '"><div class="health-value">' + unassigned.length + '</div><div class="health-label">未归属</div></div>' +
            '<div class="health-card' + (fallbackCount ? ' warn' : '') + '"><div class="health-value">' + fallbackCount + '</div><div class="health-label">旧兜底</div></div>';
        } catch (e) {
          el.innerHTML =
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">已归属</div></div>' +
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">未归属</div></div>' +
            '<div class="health-card"><div class="health-value">--</div><div class="health-label">旧兜底</div></div>';
        }
      }

      function getChildren(pid) { return organizations.filter(function(o) { return Number(o.parent_id) === Number(pid); }); }
function getOrgPath(id) { var parts = []; var o = organizations.find(function(x) { return Number(x.id) === Number(id); }); while (o) { parts.unshift(o.name); o = organizations.find(function(x) { return Number(x.id) === Number(o.parent_id); }); } return parts.join(' / '); }

// ====== 逐级卡片人员管理 ======
function initCascadeSelector() {
  initPeopleCards();
}

function getActiveOrgs(list) {
  return (list || []).filter(function(o) { return o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
}

function getTopLevelOrgs() {
  var bcs = getActiveOrgs(organizations.filter(function(o) { return o.level === '大班'; }));
  if (bcs.length) return bcs;
  return getActiveOrgs(organizations.filter(function(o) { return !o.parent_id; }));
}

function getSortedChildren(parentId, level) {
  return getActiveOrgs(organizations.filter(function(o) {
    var sameParent = Number(o.parent_id) === Number(parentId);
    return sameParent && (!level || o.level === level);
  }));
}

async function loadPeopleTreeCounts() {
  peopleOrgCounts = {};
  if (!currentSemesterId || !organizations.length) return;
  var result = await window.db
    .from('person_org_assignments')
    .select('person_id,org_id')
    .eq('semester_id', currentSemesterId)
    .eq('status', 'active');
  var assignments = result.data || [];
  var assignmentPersonIds = Array.from(new Set(assignments.map(function(item) { return Number(item.person_id); }).filter(Boolean)));
  var assignedPhones = new Set();
  if (assignmentPersonIds.length) {
    var assignedPeople = await window.db.from('people').select('id,phone').in('id', assignmentPersonIds);
    (assignedPeople.data || []).forEach(function(person) {
      if (person.phone) assignedPhones.add(person.phone);
    });
  }
  var legacyProfiles = await window.db.from('profiles').select('id,phone,organization_id');
  var legacyRows = (legacyProfiles.data || []).filter(function(profile) { return !!profile.organization_id; });
  organizations.forEach(function(org) {
    var orgIds = getOrgAndDescendantIds(org.id);
    var memberIds = new Set();
    assignments.forEach(function(item) {
      if (orgIds.indexOf(Number(item.org_id)) >= 0) memberIds.add('person:' + Number(item.person_id));
    });
    legacyRows.forEach(function(profile) {
      if (orgIds.indexOf(Number(profile.organization_id)) < 0) return;
      if (profile.phone && assignedPhones.has(profile.phone)) return;
      memberIds.add('legacy:' + (profile.phone || profile.id));
    });
    peopleOrgCounts[org.id] = memberIds.size;
  });
}

function buildOrgBreadcrumbs(orgId) {
  var parts = [];
  var current = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
  while (current) {
    parts.unshift({ id: current.id, name: current.name, level: current.level });
    current = organizations.find(function(o) { return Number(o.id) === Number(current.parent_id); });
  }
  return parts;
}

function initPeopleCards() {
  peopleDrillLevel = 'bigClass';
  peopleDrillParentId = null;
  selectedOrgId = null;
  peopleBreadcrumbs = [];
  try {
    var profile = JSON.parse(localStorage.getItem('supabase_user'));
    var userOrg = profile && profile.organization_id
      ? organizations.find(function(o) { return Number(o.id) === Number(profile.organization_id); })
      : null;
    if (userOrg) {
      peopleBreadcrumbs = buildOrgBreadcrumbs(userOrg.id);
      peopleDrillParentId = userOrg.id;
      selectedOrgId = userOrg.id;
      if (userOrg.level === '大班') peopleDrillLevel = 'class';
      else if (userOrg.level === '班级') peopleDrillLevel = 'group';
      else if (userOrg.level === '小组') peopleDrillLevel = 'members';
    }
  } catch(e) {}
  renderPeopleCards();
}

function renderPeopleBreadcrumbs() {
  var el = document.getElementById('peopleBreadcrumb');
  if (!el) return;
  var html = '';
  if (peopleDrillLevel !== 'bigClass' || peopleBreadcrumbs.length) {
    html += '<span class="people-breadcrumb-item" onclick="goPeopleBreadcrumb(-1)">全部</span>';
  } else {
    html += '<span class="people-breadcrumb-item current">全部</span>';
  }
  peopleBreadcrumbs.forEach(function(item, index) {
    var isCurrent = index === peopleBreadcrumbs.length - 1;
    html += '<span class="people-breadcrumb-sep">/</span>';
    html += '<span class="people-breadcrumb-item' + (isCurrent ? ' current' : '') + '"' + (isCurrent ? '' : ' onclick="goPeopleBreadcrumb(' + index + ')"') + '>' + escapeHtml(item.name) + '</span>';
  });
  el.innerHTML = html;
}

function goPeopleBreadcrumb(index) {
  if (index < 0) {
    peopleDrillLevel = 'bigClass';
    peopleDrillParentId = null;
    selectedOrgId = null;
    peopleBreadcrumbs = [];
    renderPeopleCards();
    return;
  }
  var item = peopleBreadcrumbs[index];
  if (!item) return;
  peopleBreadcrumbs = peopleBreadcrumbs.slice(0, index + 1);
  peopleDrillParentId = item.id;
  selectedOrgId = item.id;
  if (item.level === '大班') peopleDrillLevel = 'class';
  else if (item.level === '班级') peopleDrillLevel = 'group';
  else peopleDrillLevel = 'members';
  renderPeopleCards();
}

function drillPeopleInto(orgId) {
  var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
  if (!org) return;
  peopleBreadcrumbs = buildOrgBreadcrumbs(org.id);
  peopleDrillParentId = org.id;
  selectedOrgId = org.id;
  if (org.level === '大班') peopleDrillLevel = 'class';
  else if (org.level === '班级') peopleDrillLevel = 'group';
  else peopleDrillLevel = 'members';
  renderPeopleCards();
}

function renderPeopleCards() {
  var cardArea = document.getElementById('orgCardArea');
  var memberDisplay = document.getElementById('memberDisplay');
  var searchResults = document.getElementById('searchResults');
  if (!cardArea || !memberDisplay) return;
  updateAddPersonButton();
  if (searchResults) searchResults.style.display = 'none';
  cardArea.style.display = 'block';
  memberDisplay.style.display = 'block';
  renderPeopleBreadcrumbs();

  if (!organizations.length) {
    cardArea.innerHTML = '';
    memberDisplay.innerHTML = '<div class="empty-state">暂无组织架构</div>';
    return;
  }

  if (peopleDrillLevel === 'members') {
    cardArea.innerHTML = '';
    loadOrgMembers(peopleDrillParentId);
    return;
  }

  memberDisplay.innerHTML = '';
  var cards = [];
  var emptyText = '暂无组织';
  if (peopleDrillLevel === 'bigClass') {
    cards = getTopLevelOrgs();
    emptyText = '暂无大班';
  } else if (peopleDrillLevel === 'class') {
    cards = getSortedChildren(peopleDrillParentId, '班级');
    emptyText = '该大班下暂无班级';
  } else if (peopleDrillLevel === 'group') {
    cards = getSortedChildren(peopleDrillParentId, '小组');
    emptyText = '该班级下暂无小组';
  }
  renderPeopleOrgCards(cards, emptyText);
}

function getCurrentAddPersonGroup() {
  if (peopleDrillLevel !== 'members' || !peopleDrillParentId) return null;
  var org = organizations.find(function(o) { return Number(o.id) === Number(peopleDrillParentId); });
  if (!org || org.level !== '小组' || org.is_active === false) return null;
  return org;
}

function updateAddPersonButton() {
  var btn = document.getElementById('addPersonBtn');
  if (!btn) return;
  var group = getCurrentAddPersonGroup();
  btn.style.display = group ? '' : 'none';
  if (group) btn.textContent = '新增人员';
}

function renderPeopleOrgCards(cards, emptyText) {
  var cardArea = document.getElementById('orgCardArea');
  if (!cardArea) return;
  if (!cards.length) {
    cardArea.innerHTML = '<div class="empty-state">' + escapeHtml(emptyText) + '</div>';
    return;
  }
  cardArea.innerHTML = '<div class="people-card-list">' + cards.map(function(org) {
    var nextLabel = org.level === '大班' ? '查看班级' : (org.level === '班级' ? '查看小组' : '查看成员');
    var childLabel = org.level === '大班' ? '班级' : (org.level === '班级' ? '小组' : '直属成员');
    var nextLevel = org.level === '大班' ? '班级' : (org.level === '班级' ? '小组' : null);
    var childCount = nextLevel ? getSortedChildren(org.id, nextLevel).length : (peopleOrgCounts[org.id] || 0);
    var memberCount = peopleOrgCounts[org.id] || 0;
    return '<div class="people-data-card" onclick="drillPeopleInto(' + Number(org.id) + ')">' +
      '<div class="people-card-header">' +
        '<div style="min-width:0;"><div class="people-card-title">' + escapeHtml(org.name) + '</div>' +
        '<div class="people-card-subtitle">' + escapeHtml(org.level || '组织') + '</div></div>' +
        '<div class="people-card-action">' + nextLabel + '</div>' +
      '</div>' +
      '<div class="people-card-stats">' +
        '<div class="people-card-stat"><div class="people-card-value">' + childCount + '</div><div class="people-card-label">' + childLabel + '</div></div>' +
        '<div class="people-card-stat"><div class="people-card-value">' + memberCount + '</div><div class="people-card-label">在册人员</div></div>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

async function refreshPeopleCards() {
  await loadPeopleTreeCounts();
  renderPeopleCards();
}

function onBigClassChange() { renderPeopleCards(); }
function onClassChange() { renderPeopleCards(); }
function onGroupChange() { renderPeopleCards(); }

function getPersonStatusLabel(status) {
  if (status === 'left') return '已离班';
  if (status === 'suspended') return '暂停';
  return '在读';
}

function renderPersonCard(person, options) {
  options = options || {};
  person = person || {};
  var name = person.name || options.name || '未命名';
  var phone = person.phone || options.phone || '';
  var status = person.status || options.status || 'active';
  var statusHtml = options.showStatus === false
    ? ''
    : '<span class="status-badge ' + escapeHtml(status) + '">' + escapeHtml(getPersonStatusLabel(status)) + '</span>';
  var meta = options.meta || '';
  var orgName = options.orgName || '';
  var role = options.role || '';
  var note = options.note || '';
  var actionHtml = options.actionHtml;
  if (actionHtml == null) {
    actionHtml = person.id
      ? '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();showEditPersonModal(' + Number(person.id) + ')">编辑</button>'
      : '';
  }
  var fields = [];
  fields.push({ label: '手机号', value: phone || '未填写' });
  fields.push({ label: orgName ? '归属组织' : (role ? '账号角色' : '状态'), value: orgName || role || getPersonStatusLabel(status) });
  var fieldsHtml = fields.map(function(field) {

function getOrgAndDescendantIds(orgId) {
  var ids = [Number(orgId)];
  organizations
    .filter(function(o) { return Number(o.parent_id) === Number(orgId); })
    .forEach(function(child) {
      ids = ids.concat(getOrgAndDescendantIds(child.id));
    });
  return ids;
}

async function getOrgMembers(orgId) {
        if (!orgId || !currentSemesterId) return [];
        var cacheKey = String(orgId);
        if (orgMembersMap[cacheKey]) return orgMembersMap[cacheKey];

        var orgIds = getOrgAndDescendantIds(orgId);
        var result = await window.db
          .from('person_org_assignments')
          .select('id,person_id,org_id,sort_order,people(id,name,phone,status)')
          .eq('semester_id', currentSemesterId)
          .eq('status', 'active')
          .in('org_id', orgIds)
          .order('sort_order', { ascending: true });
        if (result.error) {
          showToast('加载成员失败', 'error');
          return [];
        }
        var members = result.data || [];
        var knownPersonIds = new Set(members.map(function(m) { return Number(m.person_id); }));
        var legacyProfiles = await window.db
          .from('profiles')
          .select('name,phone,organization_id')
          .in('organization_id', orgIds);
        var legacyPhones = (legacyProfiles.data || []).map(function(profile) { return profile.phone; }).filter(Boolean);
        var legacyPeopleByPhone = {};
        if (legacyPhones.length) {
          var legacyPeople = await window.db.from('people').select('id,name,phone,status').in('phone', legacyPhones);
          (legacyPeople.data || []).forEach(function(person) {
            if (person.phone) legacyPeopleByPhone[person.phone] = person;
          });
        }
        (legacyProfiles.data || []).forEach(function(profile, idx) {
          var person = profile.phone ? legacyPeopleByPhone[profile.phone] : null;
          if (!person || knownPersonIds.has(Number(person.id))) return;
          members.push({
            id: 'legacy-' + person.id,
            person_id: person.id,
            org_id: profile.organization_id,
            sort_order: 100000 + idx,
            people: person
          });
          knownPersonIds.add(Number(person.id));
        });
        members.sort(function(a, b) {
          var oa = orgIds.indexOf(Number(a.org_id));
          var ob = orgIds.indexOf(Number(b.org_id));
          if (oa !== ob) return oa - ob;
          var sa = a.sort_order || 0;
          var sb = b.sort_order || 0;
          if (sa !== sb) return sa - sb;
          var an = a.people ? a.people.name || '' : '';
          var bn = b.people ? b.people.name || '' : '';
          return an.localeCompare(bn, 'zh-CN');
        });
        orgMembersMap[cacheKey] = members;
        return members;
      }

      function renderMembers(orgId, members, container) {
        // 三级下拉模式：container 由调用方传入
        if (!container) { container = document.getElementById('members-' + orgId); }

        if (!members.length) { container.innerHTML = '<div class="person-empty">暂无成员</div>'; return; }
        container.innerHTML = '<div class="person-card-list">' + members.map(function(item, idx) {
          var p = item.people;
          if (!p) return '';
          var orgPath = item.org_id ? getOrgPath(item.org_id) : getOrgPath(orgId);
          return renderPersonCard(p, {
            orgName: orgPath || '当前组织',
            meta: (p.phone ? p.phone + ' · ' : '') + (orgPath || '当前组织')
          });
        }).join('') + '</div>';
      }

        var cls = org.level === '班级' ? org : (org.level === '小组' ? organizations.find(function(o) { return Number(o.id) === Number(org.parent_id); }) : null);

        if (bc) {

          if (!ok) return;

      // ---- Permissions ----

        if (!person || !person.phone) return null;

      function renderPermTags() {
        var container = document.getElementById('permTags');
        if (editingPersonId && !editingProfileId) {

          refreshPersonManagerSummaries();
          return;
        }

      async function reloadEditingPermissions() {
        if (!editingProfileId) { editingPermissions = []; renderPermTags(); return; }
        var rperm = currentSemesterId
          ? await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('semester_id', currentSemesterId).eq('enabled', true)
          : await window.db.from('module_memberships').select('*').eq('user_id', editingProfileId).eq('enabled', true);

      async function addPermission() {
        if (!editingPersonId) { showToast('请先保存人员基本信息', 'error'); return; }
        if (!editingProfileId) { showToast('该人员未关联登录账号，无法分配权限', 'error'); return; }
        if (!currentSemesterId) { showToast('请先选择一个学期', 'error'); return; }
        var moduleKey = document.getElementById('permModuleSelect').value;
        var role = document.getElementById('permRoleSelect').value;
        var orgId = getScopedOrgId('perm');
        if (!orgId) { showToast('请选择权限对应组织', 'error'); return; }
        try {
          var r = await adminApi.grantModuleMembership({
            userId: editingProfileId,
            semesterId: currentSemesterId,
            moduleKey: moduleKey,
            role: role,
            orgId: Number(orgId)
          });
          if (r.error) throw r.error;
          showToast('权限已分配', 'success');
          await reloadEditingPermissions();
        } catch(e) { showToast('添加失败: ' + (e.message || e), 'error'); }

      function removePermission(idx) {
        var perm = editingPermissions[idx]; if (!perm) return;
        showConfirm('确定移除该权限吗？').then(function(ok) {
          if (!ok) return;
          adminApi.disableModuleMembership(perm.id).then(function(result) {
            if (result && result.error) throw new Error(result.error);
            editingPermissions.splice(idx, 1); renderPermTags();
          }).catch(function(e) {
            showToast('移除失败: ' + (e.message || e), 'error');
          });
        });
      }

      async function applyPersonOrgAssignment(personId, orgId) {
        if (!currentSemesterId || !personId || !orgId) return;
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org || org.level !== '小组') throw new Error('人员必须归属到小组');
        var deactivate = await window.db.from('person_org_assignments')
          .update({ status: 'left', left_at: new Date().toISOString().slice(0, 10) })
          .eq('semester_id', currentSemesterId)
          .eq('person_id', Number(personId))
          .eq('status', 'active')
          .neq('org_id', Number(orgId));
        if (deactivate.error) throw deactivate.error;
        var existing = await window.db.from('person_org_assignments')
          .select('*').eq('semester_id', currentSemesterId).eq('person_id', Number(personId)).eq('org_id', Number(orgId)).maybeSingle();
        if (existing.data) {
          var updateExisting = await window.db.from('person_org_assignments').update({
            org_level: '小组',
            status: 'active',
            left_at: null,
            updated_at: new Date().toISOString()
          }).eq('id', existing.data.id);
          if (updateExisting.error) throw updateExisting.error;
        } else {
          var insert = await window.db.from('person_org_assignments').insert({
            semester_id: currentSemesterId,
            person_id: Number(personId),
            org_id: Number(orgId),
            org_level: '小组',
            status: 'active',
            joined_at: new Date().toISOString().slice(0, 10),
            sort_order: 0
          });
          if (insert.error) throw insert.error;
        }
      }

      async function createAccountFromManager() {
        if (!editingPersonId) { showToast('请先保存基础资料', 'error'); return; }
        if (editingProfileId) { showToast('已关联登录账号', 'success'); return; }
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();

      // ---- Save ----
      async function savePerson() {
        var id = document.getElementById('personId').value;
        var isEdit = !!id;
        var name = document.getElementById('personName').value.trim();
        var phone = document.getElementById('personPhone').value.trim();
        var gender = document.getElementById('personGender').value;
        var status = document.getElementById('personStatus').value;
        var note = document.getElementById('personNote').value.trim();
        if (!name) { showToast('请输入姓名', 'error'); return; }
        var addGroupId = !isEdit ? document.getElementById('personGrpSelect').value : '';
        if (!isEdit) {
          var addGroup = addGroupId ? organizations.find(function(o) { return Number(o.id) === Number(addGroupId); }) : null;
          if (!addGroup || addGroup.level !== '小组') {
            showToast('新增人员必须在具体小组内创建', 'error');
            return;
          }
        }

        document.getElementById('saveBtn').disabled = true;
        var createdPersonId = null;
        try {
          var payload = { name: name, phone: phone || null, gender: gender || null, status: status, note: note || null };
          var result;
          if (id) {
            result = await window.db.from('people').update(payload).eq('id', id);
          } else {
            result = await window.db.from('people').insert(payload).select('id');
            if (result.data && result.data[0]) id = result.data[0].id;
            createdPersonId = id;
          }
          if (result.error) throw result.error;
          editingPersonId = id || editingPersonId;
          if (!isEdit) {
            await applyPersonOrgAssignment(id, addGroupId);
          }

          logAction(isEdit ? '编辑人员' : '新增人员', 'people', name, 'secretariat');
          showToast('基础资料已保存', 'success');
          refreshPersonManagerSummaries();
          closeModal();
          orgMembersMap = {};
          if (currentSemesterId) {
            await loadPeopleHealthStats();
            var ro2 = await window.db.from('organizations').select('*').eq('semester_id', currentSemesterId).order('sort_order');
            organizations = ro2.data || [];
            await refreshPeopleCards();
          }
          initPeopleCache();
        } catch(e) {
          if (!isEdit && createdPersonId) {
            await window.db.from('people').delete().eq('id', createdPersonId);
          }
          showToast('保存失败: ' + (e.message || e), 'error');
        }
        finally { document.getElementById('saveBtn').disabled = false; }
      }

      // ====== 导出人员 CSV ======
      async function exportPeopleCSV() {
        try {
          var { data } = await window.db.from('people').select('id,name,phone,gender,status,note,created_at').order('name');
          if (!data || !data.length) { showToast('没有人员数据', 'error'); return; }
          var headers = ['姓名', '手机号', '性别', '状态', '备注', '创建时间'];
          var csv = '\ufeff' + headers.join(',') + '\n';
          data.forEach(function(p) {
            var v = function(x) { return x != null ? ('"' + String(x).replace(/"/g, '""') + '"') : ''; };
            var time = p.created_at ? new Date(p.created_at).toLocaleString('zh-CN') : '';
            var statusMap = { active: '正常', left: '已退出', suspended: '暂停' };
            csv += [v(p.name), v(p.phone), v(p.gender), v(statusMap[p.status] || p.status), v(p.note), v(time)].join(',') + '\n';
          });
          var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          var link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = '人员列表_' + new Date().toISOString().slice(0, 10) + '.csv';
          link.click();
          URL.revokeObjectURL(link.href);
          showToast('导出成功', 'success');
        } catch(e) {
          showToast('导出失败', 'error');
          console.error('exportPeopleCSV error:', e);
        }
      }

        document.getElementById('assignModal').classList.remove('show');
        pendingAssignRecord = null;
      }

      function resetAssignCascade() {
        var bcSel = document.getElementById('assignBcSelect');
        var clsSel = document.getElementById('assignClsSelect');
        var grpSel = document.getElementById('assignGrpSelect');
        var bcs = organizations.filter(function(o) { return o.level === '大班' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        bcSel.innerHTML = '<option value="">选择大班</option>' + bcs.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (bcs.length === 1) {
          bcSel.value = String(bcs[0].id);
          onAssignBcChange();
        }
      }

      function onAssignBcChange() {
        var bcId = document.getElementById('assignBcSelect').value;
        var clsSel = document.getElementById('assignClsSelect');
        var grpSel = document.getElementById('assignGrpSelect');
        clsSel.innerHTML = '<option value="">选择班级</option>';
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!bcId) return;
        var classes = organizations.filter(function(o) { return Number(o.parent_id) === Number(bcId) && o.level === '班级' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        clsSel.innerHTML = '<option value="">选择班级</option>' + classes.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        if (classes.length === 1) {
          clsSel.value = String(classes[0].id);
          onAssignClsChange();
        }
      }

      function onAssignClsChange() {
        var clsId = document.getElementById('assignClsSelect').value;
        var grpSel = document.getElementById('assignGrpSelect');
        grpSel.innerHTML = '<option value="">选择小组</option>';
        if (!clsId) return;
        var groups = organizations.filter(function(o) { return Number(o.parent_id) === Number(clsId) && o.level === '小组' && o.is_active !== false; }).sort(function(a,b) { return (a.sort_order||0)-(b.sort_order||0) || a.name.localeCompare(b.name,'zh-CN'); });
        grpSel.innerHTML = '<option value="">' + (groups.length ? '选择小组' : '暂无小组') + '</option>' + groups.map(function(o) { return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>'; }).join('');
        if (groups.length === 1) grpSel.value = String(groups[0].id);
      }

      function setAssignOrgCascade(orgId) {
        var org = organizations.find(function(o) { return Number(o.id) === Number(orgId); });
        if (!org) return;
        var cls = org.level === '班级' ? org : (org.level === '小组' ? organizations.find(function(o) { return Number(o.id) === Number(org.parent_id); }) : null);
        var bc = cls ? organizations.find(function(o) { return Number(o.id) === Number(cls.parent_id); }) : null;
        if (bc) {
          document.getElementById('assignBcSelect').value = String(bc.id);
          onAssignBcChange();
        }
        if (cls) {
          document.getElementById('assignClsSelect').value = String(cls.id);
          onAssignClsChange();
        }
        if (org.level === '小组') document.getElementById('assignGrpSelect').value = String(org.id);
      }

          if (byPhone.data) return Number(byPhone.data.id);

      async function showPendingAssign(id) {
        document.getElementById('assignEntryId').value = id;
        document.getElementById('assignSummary').innerHTML = '正在加载...';
        resetAssignCascade();
        document.getElementById('assignModal').classList.add('show');

          var res = await window.db.from('entry_forms').select('*').eq('id', id).single();

      async function getOrCreatePersonFromEntry(record) {
        var personId = await findExistingPersonIdFromEntry(record);
        if (personId) {
          var personPayload = { name: record.name || '未命名', source_form_id: record.id };
          if (record.phone) personPayload.phone = record.phone;
          if (record.gender) personPayload.gender = record.gender;
          var personUpdate = await window.db.from('people').update(personPayload).eq('id', personId);
          if (personUpdate.error) throw personUpdate.error;
          return personId;
        }
        var created = await window.db.from('people').insert({
          name: record.name || '未命名',
          phone: record.phone || null,
          gender: record.gender || null,
          source_form_id: record.id,
          status: 'active'
        }).select('id').single();
        if (created.error) throw created.error;
        return Number(created.data.id);
      }

      async function savePendingAssignment() {
        var btn = document.getElementById('assignSaveBtn');
        var entryId = Number(document.getElementById('assignEntryId').value);
        var groupId = Number(document.getElementById('assignGrpSelect').value);
        if (!entryId || !pendingAssignRecord) { showToast('请先选择申请', 'error'); return; }
        if (!groupId) { showToast('请选择小组', 'error'); return; }
        if (!currentSemesterId) { showToast('请先设置当前学期', 'error'); return; }
        var group = organizations.find(function(o) { return Number(o.id) === Number(groupId); });
        if (!group || group.level !== '小组') { showToast('请选择有效小组', 'error'); return; }
        btn.disabled = true;
        btn.textContent = '分配中...';
        try {
          var personId = await getOrCreatePersonFromEntry(pendingAssignRecord);
          var deactivate = await window.db.from('person_org_assignments').update({ status: 'left', left_at: new Date().toISOString().slice(0, 10) })
            .eq('semester_id', currentSemesterId)
            .eq('person_id', personId)
            .eq('status', 'active');
          if (deactivate.error) throw deactivate.error;
          var existing = await window.db.from('person_org_assignments').select('id').eq('semester_id', currentSemesterId).eq('person_id', personId).eq('org_id', groupId).maybeSingle();
          if (existing.data) {
            var updateAssign = await window.db.from('person_org_assignments').update({
              org_level: '小组',
              status: 'active',
              joined_at: new Date().toISOString().slice(0, 10),
              left_at: null
            }).eq('id', existing.data.id);
            if (updateAssign.error) throw updateAssign.error;
          } else {
            var insertAssign = await window.db.from('person_org_assignments').insert({
              semester_id: currentSemesterId,
              person_id: personId,
              org_id: groupId,
              org_level: '小组',
              status: 'active',
              joined_at: new Date().toISOString().slice(0, 10),
              sort_order: 0
            });
            if (insertAssign.error) throw insertAssign.error;
          }
          var updateEntry = await window.db.from('entry_forms').update({ person_id: personId, status: 'assigned' }).eq('id', entryId);
          if (updateEntry.error) throw updateEntry.error;
          logAction('分配进班申请到小组', 'entry_forms', pendingAssignRecord.name || String(entryId), 'secretariat');
          showToast('已分配到 ' + group.name, 'success');
          closePendingAssign();
          orgMembersMap = {};
          await loadPendingRecords();
          await loadPeopleHealthStats();
          await refreshPeopleCards();
          initPeopleCache();
        } catch(e) {
          showToast('分配失败: ' + (e.message || e), 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '确认分配';
        }
      }

      function showPendingDetail(id) {
        window.db.from('entry_forms').select('*').eq('id', id).single().then(function(res) {
          if (res.error || !res.data) { showToast('加载失败', 'error'); return; }
          var r = res.data;
          var std = {new:'本期新学员',midway:'上期中途加入',completed:'完整学过一期以上'};
          var time = new Date(r.submitted_at).toLocaleString('zh-CN');
          var bd = r.birthday_date || r.birth_date || '';
          var hobbies = r.hobbies_interests;
          if (typeof hobbies === 'string') { try { hobbies = JSON.parse(hobbies); } catch(e) {} }
          var hobbyStr = Array.isArray(hobbies) ? hobbies.join('、') : (hobbies || '');
          var html =
            '<table style="width:100%;font-size:13px;line-height:1.8;border-collapse:collapse;">' +
            '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;width:70px;">姓名</td><td style="padding:4px 0;word-break:break-all;">' + escapeHtml(r.name) + '</td></tr>' +
            (r.phone ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">手机号</td><td style="padding:4px 0;">' + escapeHtml(r.phone) + '</td></tr>' : '') +
            (r.gender ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">性别</td><td style="padding:4px 0;">' + r.gender + '</td></tr>' : '') +
            (bd ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">生日</td><td style="padding:4px 0;">' + bd + '</td></tr>' : '') +
            (r.province || r.city_old || r.city ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">所在地</td><td style="padding:4px 0;">' + escapeHtml(r.province||'') + ' ' + escapeHtml(r.city_old || r.city||'') + (r.district ? ' ' + r.district : '') + '</td></tr>' : '') +
            (r.occupation_category ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">行业</td><td style="padding:4px 0;">' + escapeHtml(r.occupation_category) + '</td></tr>' : '') +
            (r.position_type ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">职业</td><td style="padding:4px 0;">' + escapeHtml(r.position_type) + '</td></tr>' : '') +
            (hobbyStr ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">兴趣爱好</td><td style="padding:4px 0;">' + escapeHtml(hobbyStr) + '</td></tr>' : '') +
            (r.student_type ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">学员类型</td><td style="padding:4px 0;">' + escapeHtml(std[r.student_type]||r.student_type) + '</td></tr>' : '') +
            (r.desired_gains ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">最想收获</td><td style="padding:4px 0;">' + escapeHtml(r.desired_gains) + '</td></tr>' : '') +
            (r.desired_role ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">意向岗位</td><td style="padding:4px 0;">' + escapeHtml(r.desired_role) + '</td></tr>' : '') +
            (r.schedule_acknowledged ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">安排确认</td><td style="padding:4px 0;">' + escapeHtml(r.schedule_acknowledged) + '</td></tr>' : '') +
            (r.commitment_signature ? '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">承诺人</td><td style="padding:4px 0;">' + escapeHtml(r.commitment_signature) + '</td></tr>' : '') +
            '<tr><td style="color:var(--ink-muted);padding:4px 10px 4px 0;white-space:nowrap;vertical-align:top;">提交时间</td><td style="padding:4px 0;">' + time + '</td></tr>' +
            '</table>';
          document.getElementById('detailModalTitle').textContent = (r.name || '') + ' 的进班信息';
          document.getElementById('detailModalBody').innerHTML = html;
          document.getElementById('detailModal').classList.add('show');
        });
      }

      function closePendingDetail() {
        document.getElementById('detailModal').classList.remove('show');
      }

      init();
    </script>
  </body>
</html>
