    <!-- 快速session检查：新设备无session则直接跳转登录，避免闪现首页 -->
    <script>
      (function(){
        var supabaseKey = 'sb-whvjfurrkusdwujjodwc-auth-token';
        var raw = localStorage.getItem(supabaseKey);
        if (!raw) { window.location.replace('login.html'); return; }
        try {
          var session = JSON.parse(raw);
          if (!session || !session.access_token) { window.location.replace('login.html'); }
        } catch(e) {
          window.location.replace('login.html');
        }
      })();
    </script>

    <style>
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 16px 100px;
      }

      /* Header */
      .header {
        text-align: center;
        padding: 32px 20px 24px;
        position: relative;
      }

      .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, var(--vermillion) 0%, var(--gold) 100%);
        border-radius: 2px;
      }

      .header-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 4px;
        letter-spacing: 1px;
      }

      .header-subtitle {
        font-size: 13px;
        color: var(--ink-muted);
      }

      /* User Card */
      .user-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 24px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .user-card:active {
        transform: scale(0.98);
      }

      .user-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--vermillion-light) 0%, var(--gold-light) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        color: var(--vermillion);
        flex-shrink: 0;
      }

      .user-info {
        flex: 1;
      }

      .user-name {
        font-size: 17px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 4px;
      }

      .user-role {
        font-size: 13px;
        color: var(--ink-muted);
      }

      .user-arrow {
        width: 24px;
        height: 24px;
        color: var(--ink-muted);
      }

      /* Section Title */
      .section-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 14px;
        padding-left: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-title::before {
        content: '';
        width: 3px;
        height: 16px;
        background: linear-gradient(180deg, var(--vermillion) 0%, var(--gold) 100%);
        border-radius: 2px;
      }

      /* Quick Actions */
      .quick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 28px;
      }

      .action-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 24px 18px;
        text-align: center;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .action-card:active {
        transform: scale(0.96);
      }

      .action-card:hover {
        text-decoration: none;
      }

      .action-icon {
        width: 52px;
        height: 52px;
        margin: 0 auto 14px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
      }

      .action-icon.attendance {
        background: linear-gradient(135deg, var(--vermillion-light) 0%, #ffeced 100%);
      }

      .action-icon.summary {
        background: linear-gradient(135deg, var(--gold-light) 0%, #fbf7f2 100%);
      }

      .action-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 6px;
      }

      .action-desc {
        font-size: 12px;
        color: var(--ink-muted);
        line-height: 1.4;
      }

      /* Stats Preview */
      .stats-preview {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: 0 2px 12px var(--shadow);
        border: 1px solid var(--border);
        margin-bottom: 24px;
      }

      .stats-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .stats-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-dark);
      }

      .stats-date {
        font-size: 12px;
        color: var(--ink-muted);
      }

      .carousel-wrapper {
        overflow: hidden;
        touch-action: pan-y;
      }
      .carousel-track {
        display: flex;
        transition: transform 0.3s ease;
      }
      .carousel-slide {
        flex: 0 0 100%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 0 4px;
      }
      .carousel-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 12px;
      }
      .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        transition: background 0.2s;
        cursor: pointer;
      }
      .carousel-dot.active {
        background: var(--vermillion);
      }

      .stat-item {
        text-align: center;
        padding: 12px 8px;
        background: var(--bg-primary);
        border-radius: var(--radius-sm);
      }
      .stat-value {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .stat-value.high {
        color: #2e7d32;
      }
      .stat-value.medium {
        color: var(--ink-dark);
      }
      .stat-value.low {
        color: var(--vermillion);
      }
      .stat-label {
        font-size: 12px;
        color: var(--ink-muted);
      }
      .carousel-group-name {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-dark);
        margin-bottom: 4px;
        padding: 0 8px;
        line-height: 1.3;
      }
      .carousel-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--bg-card);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--ink-muted);
        cursor: pointer;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .carousel-arrow.left {
        left: 4px;
      }
      .carousel-arrow.right {
        right: 4px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--ink-muted);
      }

      /* Decorative */
      .seal {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 36px;
        height: 36px;
        opacity: 0.12;
      }

      .header {
        animation: fadeInDown 0.5s ease-out;
      }
      .user-card {
        animation: fadeInUp 0.5s ease-out 0.1s backwards;
      }
      .action-card:nth-child(1) {
        animation: fadeInUp 0.5s ease-out 0.15s backwards;
      }
      .action-card:nth-child(2) {
        animation: fadeInUp 0.5s ease-out 0.2s backwards;
      }
      .stats-preview {
        animation: fadeInUp 0.5s ease-out 0.25s backwards;
      }
    </style>
  </head>

    <script>
      async function init() {
        await waitForDb();
        await refreshCurrentUser();

        var profile = checkLogin();
        if (!profile) return;
        const userName = profile.name || '未知';
        const userRole = profile.role || '';

        // Update user card
        document.getElementById('userName').textContent = userName;
        document.getElementById('userAvatar').textContent = userName.charAt(0);

        // 根据角色追加管理入口
        if (userRole === '超级管理员' || userRole === '管理员') {
          document.getElementById('quickActions').insertAdjacentHTML(
            'beforeend',
            `
          <a href="org-management.html" class="action-card">
            <div class="action-icon summary">🏢</div>
            <div class="action-title">组织架构</div>
            <div class="action-desc">管理组织与人员</div>
          </a>
          <a href="semester-settings.html" class="action-card">
            <div class="action-icon attendance">📆</div>
            <div class="action-title">学期设置</div>
            <div class="action-desc">管理学期与试晨读</div>
          </a>
          <a href="audit-log.html" class="action-card">
            <div class="action-icon attendance">📜</div>
            <div class="action-title">操作日志</div>
            <div class="action-desc">查看用户操作记录</div>
          </a>
          <a href="reminder-settings.html" class="action-card">
            <div class="action-icon attendance">📢</div>
            <div class="action-title">填报提醒</div>
            <div class="action-desc">企业微信自动提醒</div>
          </a>
        `
          );
          // 学期相关的快捷入口（需要当前学期ID）
          window.db
            .from('semesters')
            .select('id')
            .eq('is_current', 1)
            .single()
            .then(function (res) {
              if (res.data) {
                var sid = res.data.id;
                document.getElementById('quickActions').insertAdjacentHTML(
                  'beforeend',
                  `
              <a href="schedule-management.html?semester_id=${sid}" class="action-card">
                <div class="action-icon summary">📅</div>
                <div class="action-title">日程管理</div>
                <div class="action-desc">管理每日考核日程</div>
              </a>
              <a href="assessment-management.html?semester_id=${sid}" class="action-card">
                <div class="action-icon summary">📝</div>
                <div class="action-title">考核项目</div>
                <div class="action-desc">配置考核模板</div>
              </a>
              <a href="data-management.html?semester_id=${sid}" class="action-card">
                <div class="action-icon summary">🗄️</div>
                <div class="action-title">数据管理</div>
                <div class="action-desc">管理所有填报记录</div>
              </a>
            `
                );
              }
            })
            .catch(function (err) {
              console.error('加载当前学期失败:', err);
            });
        } else if (userRole === '大班总督' || userRole === '大班副督') {
          document.getElementById('quickActions').insertAdjacentHTML(
            'beforeend',
            `
          <a href="org-management.html" class="action-card">
            <div class="action-icon summary">🏢</div>
            <div class="action-title">组织架构</div>
            <div class="action-desc">管理组织与人员</div>
          </a>
        `
          );
          // 日程管理入口（仅自己的大班）
          window.db
            .from('semesters')
            .select('id')
            .eq('is_current', 1)
            .single()
            .then(function (res) {
              if (res.data) {
                document.getElementById('quickActions').insertAdjacentHTML(
                  'beforeend',
                  `
              <a href="schedule-management.html?semester_id=${res.data.id}&org_id=${userOrgId}" class="action-card">
                <div class="action-icon summary">📅</div>
                <div class="action-title">日程管理</div>
                <div class="action-desc">管理本大班考核日程</div>
              </a>
            `
                );
              }
            });
        } else if (userRole === '班级总督察' || userRole === '班级副总督察') {
          document.getElementById('quickActions').insertAdjacentHTML(
            'beforeend',
            `
          <a href="org-management.html" class="action-card">
            <div class="action-icon summary">🏢</div>
            <div class="action-title">组织架构</div>
            <div class="action-desc">管理组织与人员</div>
          </a>
        `
          );
        }
        // Update role display
        const roleMap = {
          超级管理员: '超级管理员',
          管理员: '管理员',
          大班总督: '大班总督',
          大班副督: '大班副督',
          班级总督察: '班级总督察',
          班级副总督察: '班级副总督察',
          小组督察: '小组督察',
          小组副督察: '小组副督察'
        };
        document.querySelector('.user-role').textContent = roleMap[userRole] || userRole;

        // Load organization info
        if (profile.organization_id) {
          const orgData = localStorage.getItem('supabase_user');
          const org = profile.organizations;
          if (org) {
            document.querySelector('.user-role').textContent += ' · ' + org.name;
          }
        }

        // Load current semester and update subtitle
        await loadCurrentSemester();

        // Load today's stats based on user's scope
        await loadTodayStats(profile);
      }

      // Load today's stats for the user's scope
      async function loadCurrentSemester() {
        const today = getToday();
        const { data } = await window.db
          .from('semesters')
          .select('semester_name')
          .lte('start_date', today)
          .gte('end_date', today)
          .single();
        if (data) {
          document.querySelector('.header-subtitle').textContent = data.semester_name;
        }
      }

      // Helper: get formulas from assessment types for a schedule (matched by type_name)
      function getScheduleFormulas(s, assessmentTypes) {
        var result = { online: null, video: null, hw: null };
        if (!s || !s.item_ids) return result;
        var ids = s.item_ids.split(',').map(Number).filter(Boolean);
        ids.forEach(function (id) {
          var at = null;
          assessmentTypes.forEach(function (t) {
            if (t.id === id) at = t;
          });
          if (!at || !at.formula) return;
          var name = at.type_name || '';
          if (name.indexOf('上线率') !== -1) result.online = at.formula;
          else if (name.indexOf('视频率') !== -1) result.video = at.formula;
          else if (name.indexOf('作业率') !== -1) result.hw = at.formula;
        });
        return result;
      }

      function hasMult100(f) {
        return f && (f.indexOf('*100') !== -1 || f.indexOf('×100') !== -1);
      }

      function computeRatesFromFormulas(fieldMap, formulas) {
        var online = null,
          video = null,
          hw = null;
        if (formulas.online) {
          var r = calcFormula(formulas.online, fieldMap);
          if (r != null) online = r * (hasMult100(formulas.online) ? 1 : 100);
        }
        if (formulas.video) {
          var r = calcFormula(formulas.video, fieldMap);
          if (r != null) video = r * (hasMult100(formulas.video) ? 1 : 100);
        }
        if (formulas.hw) {
          var r = calcFormula(formulas.hw, fieldMap);
          if (r != null) hw = r * (hasMult100(formulas.hw) ? 1 : 100);
        }
        return { online: online, video: video, hw: hw };
      }

      var carouselData = [];
      var carouselIndex = 0;
      var touchStartX = 0;

      async function loadTodayStats(profile) {
        var today = getToday();
        var role = profile.role;
        var userOrgId = profile.organization_id;

        var semId = await getCurrentSemesterId();
        var { data: orgs } = semId
          ? await window.db.from('organizations').select('id,name,parent_id,level').eq('semester_id', semId).eq('is_active', true)
          : { data: [] };
        orgs = orgs || [];

        var accessibleGroupIds = getAccessibleGroupIds(role, userOrgId, orgs);
        var groups = [...accessibleGroupIds]
          .map(function (id) {
            return orgs.find(function (o) {
              return o.id === id;
            });
          })
          .filter(Boolean);

        if (groups.length === 0) {
          document.getElementById('statsDate').textContent = today;
          document.getElementById('carouselEmpty').style.display = 'block';
          return;
        }

        // 按组织路径排序
        groups.sort(function (a, b) {
          return buildOrgPath(a.id, orgs).localeCompare(buildOrgPath(b.id, orgs), 'zh-CN');
        });

        var groupIds = groups.map(function (g) {
          return g.id;
        });
        document.getElementById('statsDate').textContent = today;

        // 建立小组→大班映射
        var groupDabanMap = {};
        groups.forEach(function (g) {
          var cls = orgs.find(function (o) {
            return o.id === g.parent_id;
          });
          if (cls) {
            var daban = orgs.find(function (o) {
              return o.id === cls.parent_id;
            });
            if (daban && daban.level === '大班') groupDabanMap[g.id] = daban.id;
          }
        });

        // 查今天的日程（含 org_id 用于匹配大班）
        var { data: schedules } = await window.db
          .from('schedules')
          .select('id,schedule_date,item_ids,org_id')
          .eq('schedule_date', today)
          .eq('is_valid', 1);
        if (!schedules || schedules.length === 0) {
          renderCarousel(groups, {});
          return;
        }

        // 查考核类型公式
        var { data: assessmentTypes } = semId
          ? await window.db.from('assessment_types').select('*').eq('semester_id', semId)
          : { data: [] };
        assessmentTypes = assessmentTypes || [];

        // 建立日程→公式映射
        var scheduleFormulas = {};
        schedules.forEach(function (s) {
          scheduleFormulas[s.id] = getScheduleFormulas(s, assessmentTypes);
        });
        var scheduleIds = schedules.map(function (s) {
          return s.id;
        });

        // 查记录
        var { data: records } = await window.db
          .from('attendance_records')
          .select('schedule_id,organization_id,fill_data')
          .in('schedule_id', scheduleIds)
          .in('organization_id', groupIds);

        records = records || [];

        // 大班→日程映射
        var dabanScheduleMap = {};
        schedules.forEach(function (s) {
          if (s.org_id) dabanScheduleMap[s.org_id] = s;
        });

        // 统计各日程是否有各类考核
        var scheduleCats = {};
        schedules.forEach(function (s) {
          var f = scheduleFormulas[s.id] || {};
          scheduleCats[s.id] = {
            hasOnline: f.online !== null,
            hasHw: f.hw !== null,
            hasVideo: f.video !== null
          };
        });

        // 按小组按日程汇总（未填报的天按 0 计入）
        var groupRates = {};
        groups.forEach(function (g) {
          groupRates[g.id] = { name: buildOrgPath(g.id, orgs), online: [], hw: [], video: [], hasData: false };
        });

        // 建立记录索引 (schedule_id + organization_id → record)
        var recIndex = {};
        records.forEach(function (r) {
          recIndex[r.schedule_id + '_' + r.organization_id] = r;
        });

        groups.forEach(function (g) {
          var gr = groupRates[g.id];
          // 只使用该小组所属大班的日程
          var dabanId = groupDabanMap[g.id];
          var s = dabanId ? dabanScheduleMap[dabanId] : null;
          if (!s) return;
          var cats = scheduleCats[s.id];
          var key = s.id + '_' + g.id;
          var rec = recIndex[key];
          var fd = rec && rec.fill_data ? rec.fill_data : {};
          var fieldMap = {};
          Object.keys(fd).forEach(function (k) {
            fieldMap[k] = parseInt(fd[k]) || 0;
          });
          var hasAnyData = Object.values(fieldMap).some(function (v) {
            return v > 0;
          });
          if (hasAnyData) gr.hasData = true;

          var formulas = scheduleFormulas[s.id];
          var rates = hasAnyData
            ? computeRatesFromFormulas(fieldMap, formulas)
            : { online: null, hw: null, video: null };

          if (cats.hasOnline) gr.online.push(rates.online !== null ? rates.online : 0);
          if (cats.hasHw) gr.hw.push(rates.hw !== null ? rates.hw : 0);
          if (cats.hasVideo) gr.video.push(rates.video !== null ? rates.video : 0);
        });

        // 构建 groupData（平均率）
        var groupData = {};
        Object.keys(groupRates).forEach(function (gid) {
          var gr = groupRates[gid];
          if (!gr.hasData) return;
          groupData[gid] = {
            name: gr.name,
            online:
              gr.online.length > 0
                ? gr.online.reduce(function (a, b) {
                    return a + b;
                  }, 0) / gr.online.length
                : null,
            hw:
              gr.hw.length > 0
                ? gr.hw.reduce(function (a, b) {
                    return a + b;
                  }, 0) / gr.hw.length
                : null,
            video:
              gr.video.length > 0
                ? gr.video.reduce(function (a, b) {
                    return a + b;
                  }, 0) / gr.video.length
                : null
          };
        });

        renderCarousel(groups, groupData);
      }

      function renderCarousel(groups, groupData) {
        var track = document.getElementById('carouselTrack');
        var dots = document.getElementById('carouselDots');
        var empty = document.getElementById('carouselEmpty');

        carouselData = [];
        carouselIndex = 0;

        groups.forEach(function (g) {
          var gd = groupData[g.id];
          if (!gd) return;
          var online = gd.online != null ? gd.online.toFixed(1) : '--';
          var video = gd.video != null ? gd.video.toFixed(1) : '--';
          var hw = gd.hw != null ? gd.hw.toFixed(1) : '--';
          carouselData.push({ name: gd.name, online: online, video: video, hw: hw });
        });

        if (carouselData.length === 0) {
          empty.style.display = 'block';
          track.innerHTML = '';
          dots.innerHTML = '';
          return;
        }
        empty.style.display = 'none';

        // 生成 slide HTML
        var slidesHtml = carouselData
          .map(function (d) {
            return (
              '<div class="carousel-slide"><div class="carousel-group-name">' +
              d.name +
              '</div>' +
              '<div class="stat-item"><div class="stat-value high">' +
              d.online +
              (d.online !== '--' ? '%' : '') +
              '</div><div class="stat-label">上线率</div></div>' +
              '<div class="stat-item"><div class="stat-value medium">' +
              d.hw +
              (d.hw !== '--' ? '%' : '') +
              '</div><div class="stat-label">作业率</div></div>' +
              '<div class="stat-item"><div class="stat-value high">' +
              d.video +
              (d.video !== '--' ? '%' : '') +
              '</div><div class="stat-label">视频率</div></div>' +
              '</div>'
            );
          })
          .join('');

        track.innerHTML = slidesHtml;
        dots.innerHTML = carouselData
          .map(function (_, i) {
            return (
              '<span class="carousel-dot' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"></span>'
            );
          })
          .join('');

        updateCarousel();
      }

      function updateCarousel() {
        var track = document.getElementById('carouselTrack');
        track.style.transform = 'translateX(-' + carouselIndex * 100 + '%)';
        var dots = document.querySelectorAll('.carousel-dot');
        dots.forEach(function (d, i) {
          d.classList.toggle('active', i === carouselIndex);
        });
      }

      function goToSlide(i) {
        if (i < 0) i = carouselData.length - 1;
        if (i >= carouselData.length) i = 0;
        carouselIndex = i;
        updateCarousel();
      }

      function prevSlide() {
        goToSlide(carouselIndex - 1);
      }
      function nextSlide() {
        goToSlide(carouselIndex + 1);
      }

      // 触摸滑动
      document.getElementById('carouselWrapper').addEventListener('touchstart', function (e) {
        touchStartX = e.touches[0].clientX;
      });
      document.getElementById('carouselWrapper').addEventListener('touchend', function (e) {
        var diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) nextSlide();
          else prevSlide();
        }
      });

      init();
    </script>
  </body>
</html>
