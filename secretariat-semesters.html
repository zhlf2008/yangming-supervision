<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 学期管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; font-size: 18px; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .semester-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
      .semester-card.current { border-color: var(--vermillion); background: #fff5f5; }
      .semester-name { font-weight: 700; color: var(--ink-dark); }
      .semester-dates { margin-top: 4px; color: var(--ink-light); font-size: 13px; }
      .semester-meta { margin-top: 4px; color: var(--ink-muted); font-size: 12px; }
      .semester-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
      .toggle-group:last-child { border-bottom: none; }
      .toggle-label { font-size: 14px; color: var(--ink-dark); }
      .toggle-switch { width: 44px; height: 24px; border-radius: 12px; background: #ddd; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
      .toggle-switch.active { background: var(--vermillion); }
      .toggle-switch::after { content: ''; width: 20px; height: 20px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
      .toggle-switch.active::after { transform: translateX(20px); }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">学期管理</h1>
      </header>

      <section class="section">
        <div class="section-header">
          <div class="section-title">学期列表</div>
          <button class="btn btn-primary btn-sm" onclick="showSemesterModal()">+ 新增学期</button>
        </div>
        <div id="semesterList" class="empty-state">正在加载...</div>
      </section>
    </div>

    <!-- Semester Modal -->
    <div class="modal-overlay" id="semesterModal">
      <div class="modal">
        <div class="modal-title" id="semesterModalTitle">新增学期</div>
        <input type="hidden" id="semesterId" />
        <div class="form-item">
          <label class="form-label">学期名称</label>
          <input class="form-input" id="semesterName" placeholder="如：阳明心学第14期" />
        </div>
        <div class="toggle-group">
          <span class="toggle-label">启用试晨读</span>
          <div id="trialToggle" class="toggle-switch" onclick="toggleTrial()"></div>
        </div>
        <div id="trialStartGroup" class="form-item" style="display:none; margin-top:8px;">
          <label class="form-label">试晨读开始日期</label>
          <input type="date" class="form-input" id="trialStart" />
        </div>
        <div class="form-item">
          <label class="form-label">正式开始日期</label>
          <input type="date" class="form-input" id="semesterStart" />
        </div>
        <div class="form-item">
          <label class="form-label">结束日期</label>
          <input type="date" class="form-input" id="semesterEnd" />
        </div>
        <div class="toggle-group">
          <span class="toggle-label">设为当前学期</span>
          <div id="currentToggle" class="toggle-switch active" onclick="toggleCurrent()"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeSemesterModal()">取消</button>
          <button class="btn btn-primary" id="semesterSaveBtn" onclick="saveSemester()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var semesters = [];
      var isTrialEnabled = false;
      var isCurrentEnabled = true;

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadSemesters();
      }

      async function loadSemesters() {
        var { data, error } = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        if (error) { showToast('加载学期失败', 'error'); return; }
        semesters = data || [];
        renderSemesters();
      }

      function renderSemesters() {
        var container = document.getElementById('semesterList');
        if (!semesters.length) { container.innerHTML = '<div class="empty-state">暂无学期，点击上方添加</div>'; return; }
        container.innerHTML = semesters.map(function (sem) {
          return '<div class="semester-card' + (sem.is_current === 1 ? ' current' : '') + '">' +
            '<div class="semester-name">' + escapeHtml(sem.semester_name) + (sem.trial_start_date ? ' <span style="font-size:11px;color:var(--gold);">试晨读</span>' : '') + '</div>' +
            '<div class="semester-dates">' + (sem.start_date || '?') + ' ~ ' + (sem.end_date || '?') + '</div>' +
            (sem.trial_start_date ? '<div class="semester-meta">试晨读：' + sem.trial_start_date + '</div>' : '') +
            '<div class="semester-actions">' +
            '<button class="btn btn-sm btn-secondary" onclick="editSemester(' + sem.id + ')">编辑</button>' +
            '<button class="btn btn-sm btn-danger" onclick="deleteSemester(' + sem.id + ')">删除</button>' +
            (sem.is_current === 1 ? '<span style="font-size:11px;color:var(--vermillion);padding:6px 0;">当前学期</span>' : '') +
            '</div></div>';
        }).join('');
      }

      function showSemesterModal(sem) {
        document.getElementById('semesterId').value = sem ? sem.id : '';
        document.getElementById('semesterName').value = sem ? sem.semester_name : '';
        document.getElementById('semesterStart').value = sem ? sem.start_date : '';
        document.getElementById('semesterEnd').value = sem ? sem.end_date : '';
        document.getElementById('trialStart').value = sem ? (sem.trial_start_date || '') : '';
        isTrialEnabled = !!(sem && sem.trial_start_date);
        isCurrentEnabled = sem ? sem.is_current === 1 : true;
        document.getElementById('trialToggle').className = 'toggle-switch' + (isTrialEnabled ? ' active' : '');
        document.getElementById('currentToggle').className = 'toggle-switch' + (isCurrentEnabled ? ' active' : '');
        document.getElementById('trialStartGroup').style.display = isTrialEnabled ? 'block' : 'none';
        document.getElementById('semesterModalTitle').textContent = sem ? '编辑学期' : '新增学期';
        document.getElementById('semesterModal').classList.add('show');
      }

      function closeSemesterModal() { document.getElementById('semesterModal').classList.remove('show'); }
      function toggleTrial() { isTrialEnabled = !isTrialEnabled; document.getElementById('trialToggle').className = 'toggle-switch' + (isTrialEnabled ? ' active' : ''); document.getElementById('trialStartGroup').style.display = isTrialEnabled ? 'block' : 'none'; }
      function toggleCurrent() { isCurrentEnabled = !isCurrentEnabled; document.getElementById('currentToggle').className = 'toggle-switch' + (isCurrentEnabled ? ' active' : ''); }

      async function saveSemester() {
        var id = document.getElementById('semesterId').value;
        var name = document.getElementById('semesterName').value.trim();
        var startDate = document.getElementById('semesterStart').value;
        var endDate = document.getElementById('semesterEnd').value;
        var trialStart = isTrialEnabled ? document.getElementById('trialStart').value : null;

        if (!name) { showToast('请填写学期名称', 'error'); return; }
        if (!startDate || !endDate) { showToast('请填写起止日期', 'error'); return; }

        document.getElementById('semesterSaveBtn').disabled = true;
        try {
          var payload = { semester_name: name, start_date: startDate, end_date: endDate, trial_start_date: trialStart };
          if (id) {
            // 编辑：更新并处理设为当前
            if (isCurrentEnabled) {
              await window.db.from('semesters').update({ is_current: 0 }).neq('id', id);
            }
            var result = await window.db.from('semesters').update(payload).eq('id', id);
            if (result.error) throw result.error;
            if (isCurrentEnabled) {
              await window.db.from('semesters').update({ is_current: 1 }).eq('id', id);
            }
          } else {
            if (isCurrentEnabled) {
              await window.db.from('semesters').update({ is_current: 0 }).neq('id', 0);
            }
            payload.is_current = isCurrentEnabled ? 1 : 0;
            var result = await window.db.from('semesters').insert(payload);
            if (result.error) throw result.error;
          }
          logAction(id ? '编辑学期' : '新增学期', 'semesters', name);
          showToast('保存成功', 'success');
          closeSemesterModal();
          await loadSemesters();
        } catch (error) { showToast('保存失败', 'error'); }
        finally { document.getElementById('semesterSaveBtn').disabled = false; }
      }

      function editSemester(id) {
        var sem = semesters.find(function (s) { return Number(s.id) === Number(id); });
        if (sem) showSemesterModal(sem);
      }

      async function deleteSemester(id) {
        var sem = semesters.find(function (s) { return Number(s.id) === Number(id); });
        if (!sem) return;
        var confirmed = await showConfirm('确定删除学期「' + sem.semester_name + '」吗？');
        if (!confirmed) return;
        try {
          await window.db.from('semesters').delete().eq('id', id);
          showToast('已删除', 'success');
          await loadSemesters();
        } catch (error) { showToast('删除失败', 'error'); }
      }

      init();
    </script>
  </body>
</html>
