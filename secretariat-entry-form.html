<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 进班表单</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.get('view') === 'records' && params.get('public') !== '1' && params.get('external') !== '1') {
          document.documentElement.classList.add('initial-records');
        }
      })();
    </script>
    <style>
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 0;
      }
      .page-header.public-mode {
        display: block;
        text-align: center;
        padding: 32px 20px 24px;
        position: relative;
        border: none;
        background: none;
      }
      .page-header.public-mode::before {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, var(--vermillion) 0%, var(--gold) 100%);
        border-radius: 2px;
      }
      .page-header.public-mode .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 600;
        color: var(--ink-dark);
        margin-bottom: 4px;
        letter-spacing: 1px;
      }
      .page-header.public-mode .share-btn {
        display: none;
      }
      .page-header.public-mode .back-btn {
        display: none;
      }
      .page-header.public-mode .header-subtitle {
        display: block !important;
        font-size: 13px;
        color: var(--ink-muted);
        margin: 0;
      }
      .share-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--ink-dark);
        margin-left: auto;
      }
      .share-btn:active {
        background: var(--border);
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 22px;
        flex: 1;
        color: var(--ink-dark);
      }

      .form-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 18px;
        margin-bottom: 14px;
        box-shadow: 0 2px 12px var(--shadow);
      }
      .form-card-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--ink-dark);
        margin-bottom: 16px;
        padding-bottom: 10px;
        border-bottom: 2px solid rgba(179, 45, 55, 0.16);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-card-title .num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--vermillion);
        color: #fff;
        font-size: 12px;
        font-family: sans-serif;
        flex-shrink: 0;
      }
      .form-card-title .hint {
        font-weight: 400;
        font-size: 12px;
        color: var(--ink-muted);
      }

      .form-item {
        margin-bottom: 16px;
      }
      .form-item:last-child {
        margin-bottom: 0;
      }
      .form-label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-dark);
      }
      .form-label .required {
        color: var(--vermillion);
      }
      .form-label .sub-hint {
        font-weight: 400;
        font-size: 12px;
        color: var(--ink-muted);
        margin-left: 4px;
      }
      .form-input,
      .form-textarea,
      .form-select {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-primary);
        font-size: 14px;
        color: var(--ink-dark);
        font-family: inherit;
        box-sizing: border-box;
      }
      .form-input:focus,
      .form-textarea:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--vermillion);
        box-shadow: 0 0 0 3px var(--vermillion-light);
      }
      .form-textarea {
        min-height: 80px;
        resize: vertical;
      }
      .form-row {
        display: flex;
        gap: 10px;
      }
      .form-row .form-item {
        flex: 1;
      }

      .option-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 4px;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-primary);
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        color: var(--ink-dark);
        user-select: none;
      }
      .option-item:hover {
        border-color: var(--vermillion);
        background: rgba(179, 45, 55, 0.04);
      }
      .option-item.selected {
        border-color: var(--vermillion);
        background: var(--vermillion-light);
        color: var(--vermillion);
      }
      .option-item.checkbox.selected {
        border-color: var(--vermillion);
        background: var(--vermillion-light);
        color: var(--vermillion);
      }
      .option-item input {
        display: none;
      }

      .role-grid {
        display: grid;
        gap: 10px;
        margin-top: 4px;
      }
      .role-group-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-muted);
        margin-bottom: 2px;
        padding-left: 2px;
      }

      .sig-box {
        margin-top: 12px;
        padding: 18px;
        background: rgba(179, 45, 55, 0.045);
        border: 1px solid rgba(179, 45, 55, 0.28);
        border-radius: 12px;
        text-align: center;
      }
      .sig-box .quote {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 16px;
        color: var(--ink-dark);
        line-height: 2;
        margin-bottom: 14px;
      }
      .sig-box .sig-line {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
      }
      .sig-box .sig-line input {
        width: 160px;
        padding: 6px 10px;
        border: none;
        border-bottom: 2px solid var(--ink-muted);
        background: transparent;
        font-size: 16px;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        text-align: center;
        outline: none;
      }
      .sig-box .sig-line input:focus {
        border-bottom-color: var(--vermillion);
      }

      /* ---- 弹窗样式 ---- */
      .modal-overlay {
        display: flex;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .modal-overlay.show {
        visibility: visible;
        opacity: 1;
      }
      .modal {
        background: rgba(255, 255, 255, 0.96);
        border-radius: var(--radius);
        padding: 24px;
        width: 100%;
        max-width: 440px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
      }
      #qrArea {
        max-width: 100%;
        overflow: hidden;
      }
      #qrCanvas {
        max-width: min(100%, 360px);
      }

      .submit-area {
        text-align: center;
        padding: 12px 0 24px;
      }
      .entry-action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid rgba(179, 45, 55, 0.18);
        background: var(--bg-card);
        color: var(--ink-dark);
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 1px 4px rgba(36, 24, 18, 0.04);
      }
      .entry-action-btn.primary {
        background: var(--vermillion);
        border-color: var(--vermillion);
        color: #fff;
      }
      .entry-action-btn.secondary {
        background: var(--vermillion-light);
        color: var(--vermillion);
      }
      .entry-action-btn.success {
        background: #2f8f4e;
        border-color: #2f8f4e;
        color: #fff;
      }
      .entry-action-btn:active {
        transform: scale(0.98);
      }
      .link-output-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .link-output-row .form-input {
        flex: 1;
        min-width: 0;
      }
      .captcha-wrap {
        display: none;
        margin-bottom: 12px;
        padding: 14px;
        background: rgba(179, 45, 55, 0.045);
        border: 1px solid rgba(179, 45, 55, 0.18);
        border-radius: 10px;
      }
      .captcha-wrap.show {
        display: block;
      }
      .captcha-wrap .q {
        font-size: 13px;
        color: var(--ink-dark);
        margin-bottom: 6px;
      }
      .captcha-wrap input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        background: var(--bg-card);
        box-sizing: border-box;
      }
      .submit-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--vermillion), #c62e3a);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .submit-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .submit-btn:active:not(:disabled) {
        opacity: 0.85;
      }

      .view-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .view-toggle button {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-card);
        color: var(--ink-muted);
        font-size: 13px;
        cursor: pointer;
      }
      .view-toggle button.active {
        border-color: var(--vermillion);
        background: var(--vermillion-light);
        color: var(--vermillion);
        font-weight: 600;
      }
      html.initial-records #formView {
        display: none;
      }
      html.initial-records #recordsView {
        display: block !important;
      }
      html.initial-records .view-toggle button[data-view='form'] {
        border-color: var(--border);
        background: var(--bg-card);
        color: var(--ink-muted);
        font-weight: 400;
      }
      html.initial-records .view-toggle button[data-view='records'] {
        border-color: var(--vermillion);
        background: var(--vermillion-light);
        color: var(--vermillion);
        font-weight: 600;
      }
      .empty-state {
        text-align: center;
        padding: 40px 8px;
        color: var(--ink-muted);
      }

      /* ====== 双历日期选择器 ====== */
      .datepicker-wrap {
        position: relative;
      }
      .datepicker-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-primary);
        font-size: 14px;
        color: var(--ink-dark);
        cursor: pointer;
        box-sizing: border-box;
        font-family: inherit;
      }
      .datepicker-trigger:focus {
        outline: none;
        border-color: var(--vermillion);
        box-shadow: 0 0 0 3px var(--vermillion-light);
      }
      .datepicker-trigger .placeholder {
        color: var(--ink-muted);
      }
      .datepicker-trigger .lunar-show {
        color: var(--ink-muted);
        font-size: 12px;
        margin-left: auto;
      }

      .datepicker-popup {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      }
      .datepicker-popup.open {
        display: block;
      }

      .dp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 8px;
      }
      .dp-nav {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: var(--bg-primary);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-dark);
      }
      .dp-nav:active {
        background: var(--vermillion-light);
      }
      .dp-year-month {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-dark);
        text-align: center;
      }

      .dp-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        padding: 4px 8px;
      }
      .dp-weekday {
        text-align: center;
        font-size: 11px;
        color: var(--ink-muted);
        padding: 4px 0;
      }
      .dp-weekday.sun {
        color: var(--vermillion);
      }

      .dp-days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        padding: 0 8px 8px;
      }
      .dp-day {
        text-align: center;
        padding: 4px 2px;
        cursor: pointer;
        border-radius: 8px;
        position: relative;
        min-height: 44px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .dp-day:hover {
        background: var(--vermillion-light);
      }
      .dp-day.other-month {
        opacity: 0.25;
      }
      .dp-day.today {
        border: 1px solid rgba(179, 45, 55, 0.42);
      }
      .dp-day.selected {
        background: var(--vermillion);
      }
      .dp-day.selected .dp-solar {
        color: #fff;
        font-weight: 700;
      }
      .dp-day.selected .dp-lunar {
        color: rgba(255, 255, 255, 0.8);
      }
      .dp-day.past {
        opacity: 0.35;
        cursor: default;
      }
      .dp-day.past:hover {
        background: transparent;
      }
      .dp-solar {
        font-size: 14px;
        color: var(--ink-dark);
        line-height: 1.3;
      }
      .dp-day.selected .dp-solar {
        color: #fff;
      }
      .dp-lunar {
        font-size: 10px;
        color: var(--ink-muted);
        line-height: 1.2;
        transform: scale(0.92);
      }

      .dp-footer {
        display: flex;
        gap: 6px;
        padding: 8px 14px 12px;
        border-top: 1px solid var(--border);
      }
      .dp-footer button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .dp-footer .dp-today-btn {
        background: var(--vermillion-light);
        color: var(--vermillion);
      }
      .dp-footer .dp-confirm-btn {
        background: var(--vermillion);
        color: #fff;
      }
      .dp-footer .dp-cancel-btn {
        background: var(--bg-primary);
        color: var(--ink-muted);
      }

      @media (max-width: 400px) {
        .option-item {
          padding: 6px 10px;
          font-size: 13px;
        }
        .form-row {
          flex-direction: column;
        }
        .modal-overlay {
          padding: 12px;
        }
        .modal {
          padding: 18px;
        }
        #qrArea {
          padding: 10px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html" id="backBtn"></a>
        <div style="flex: 1; min-width: 0">
          <h1 class="page-title" id="pageTitle">进班表单</h1>
          <p
            class="header-subtitle"
            id="semesterSubtitle"
            style="display: none; font-size: 13px; color: var(--ink-muted); margin-top: 2px"
          ></p>
        </div>
        <button class="share-btn" onclick="showShareModal()" id="shareBtn" title="转发表单" aria-label="转发表单">
          <span data-icon="LinkIcon"></span>
        </button>
      </header>

      <div class="view-toggle" id="viewToggle" style="display: none">
        <button class="active" data-view="form">填写</button>
      </div>

      <div id="formView">
        <form id="entryForm" onsubmit="return false;">
          <!-- 1. 基本信息 -->
          <div class="form-card">
            <div class="form-card-title"><span class="num">1</span> 基本信息</div>
            <div class="form-item">
              <label class="form-label">您的姓名 <span class="required">*</span></label>
              <input class="form-input" id="fieldName" placeholder="请输入姓名" />
            </div>
            <div class="form-item">
              <label class="form-label">手机号 <span class="required">*</span></label>
              <input class="form-input" id="fieldPhone" type="tel" placeholder="请输入手机号" maxlength="11" />
            </div>
            <div class="form-item">
              <label class="form-label">性别 <span class="required">*</span></label>
              <div class="option-group" id="fieldGender">
                <label class="option-item" data-value="男"><input type="radio" name="gender" value="男" /> 男</label>
                <label class="option-item" data-value="女"><input type="radio" name="gender" value="女" /> 女</label>
              </div>
            </div>
            <div class="form-item">
              <label class="form-label">
                下次生日 <span class="sub-hint">（请选择您下次过生日的具体日期）</span>
                <span class="required">*</span>
              </label>
              <div class="datepicker-wrap" id="birthdayPickerWrap">
                <div class="datepicker-trigger" id="birthdayTrigger" tabindex="0">
                  <span class="placeholder" id="birthdayDisplay">点击选择日期</span>
                  <span class="lunar-show" id="lunarDisplay"></span>
                </div>
                <div class="datepicker-popup" id="birthdayPopup">
                  <div class="dp-header">
                    <button class="dp-nav" onclick="dpPrevMonth()"></button>
                    <div class="dp-year-month" id="dpYearMonth"></div>
                    <button class="dp-nav" onclick="dpNextMonth()"></button>
                  </div>
                  <div class="dp-weekdays">
                    <div class="dp-weekday sun">日</div>
                    <div class="dp-weekday">一</div>
                    <div class="dp-weekday">二</div>
                    <div class="dp-weekday">三</div>
                    <div class="dp-weekday">四</div>
                    <div class="dp-weekday">五</div>
                    <div class="dp-weekday sun">六</div>
                  </div>
                  <div class="dp-days" id="dpDays"></div>
                  <div class="dp-footer">
                    <button class="dp-cancel-btn" onclick="dpClose()">取消</button>
                    <button class="dp-today-btn" onclick="dpGoToday()">今天</button>
                    <button class="dp-confirm-btn" onclick="dpConfirm()">确定</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 2. 所在地 + 行业/职业 -->
          <div class="form-card">
            <div class="form-card-title"><span class="num">2</span> 所在地与职业</div>
            <div class="form-item">
              <label class="form-label">您所在的城市？ <span class="required">*</span></label>
              <div class="form-row">
                <div class="form-item">
                  <label style="font-size: 12px; color: var(--ink-muted); margin-bottom: 4px; display: block"
                    >省份</label
                  >
                  <select class="form-select" id="fieldProvince" onchange="onProvinceChange()">
                    <option value="">请选择省份</option>
                    <option value="安徽省">安徽省</option>
                    <option value="澳门">澳门</option>
                    <option value="北京市">北京市</option>
                    <option value="重庆市">重庆市</option>
                    <option value="福建省">福建省</option>
                    <option value="甘肃省">甘肃省</option>
                    <option value="广东省">广东省</option>
                    <option value="广西">广西</option>
                    <option value="贵州省">贵州省</option>
                    <option value="海南省">海南省</option>
                    <option value="河北省">河北省</option>
                    <option value="河南省">河南省</option>
                    <option value="黑龙江省">黑龙江省</option>
                    <option value="湖北省">湖北省</option>
                    <option value="湖南省">湖南省</option>
                    <option value="吉林省">吉林省</option>
                    <option value="江苏省">江苏省</option>
                    <option value="江西省">江西省</option>
                    <option value="辽宁省">辽宁省</option>
                    <option value="内蒙古">内蒙古</option>
                    <option value="宁夏">宁夏</option>
                    <option value="青海省">青海省</option>
                    <option value="山东省">山东省</option>
                    <option value="山西省">山西省</option>
                    <option value="陕西省">陕西省</option>
                    <option value="上海市">上海市</option>
                    <option value="四川省">四川省</option>
                    <option value="台湾省">台湾省</option>
                    <option value="天津市">天津市</option>
                    <option value="西藏">西藏</option>
                    <option value="香港">香港</option>
                    <option value="新疆">新疆</option>
                    <option value="云南省">云南省</option>
                    <option value="浙江省">浙江省</option>
                  </select>
                </div>
                <div class="form-item">
                  <label style="font-size: 12px; color: var(--ink-muted); margin-bottom: 4px; display: block"
                    >城市</label

      var LUNAR_MONTH_NAMES = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
      var LUNAR_DAY_NAMES = [
        '初一',
        '初二',
        '初三',
        '初四',
        '初五',
        '初六',
        '初七',
        '初八',

        '廿五',
        '廿六',
        '廿七',
        '廿八',
        '廿九',
        '三十'
      ];

      function lunarYearInfo(year) {
        return LUNAR_INFO[year - 1900] || 0x04ae0;
      }

      function solarToLunar(year, month, day) {
        // 从 1900-01-31（农历庚子年正月初一）到目标日期的天数
        var baseDate = new Date(1900, 0, 31);
        var targetDate = new Date(year, month - 1, day);
        var offset = Math.floor((targetDate - baseDate) / 86400000);
        if (offset < 0) return { year: year, month: 1, day: 1, isLeap: false };

        var i,
          temp = 0,
          lunarYear;

        // 确定农历年
        for (i = 1900; i < 2101 && offset > 0; i++) {
          temp = lunarYearDays(i);
          offset -= temp;
        }
        if (offset < 0) {
          offset += temp;
          i--;
        }
        lunarYear = i;

        // 确定农历月
        var leapMonth = lunarLeapMonth(lunarYear);
        var isLeap = false;

        for (i = 1; i <= 12 && offset > 0; i++) {
          if (leapMonth > 0 && i === leapMonth + 1 && !isLeap) {
            // 先过闰月
            i--;
            isLeap = true;
            temp = lunarLeapDays(lunarYear);
          } else {
            temp = lunarMonthDays(lunarYear, i);
            isLeap = false;
          }
          offset -= temp;
        }

        // 修正：offset=0 时如果正好在闰月入口
        if (offset === 0 && leapMonth > 0 && !isLeap && i === leapMonth + 1) {
          isLeap = true;
          i = leapMonth;
          temp = lunarLeapDays(lunarYear);
        }
        // 修正边界情况
        if (offset < 0) {
          offset += temp;
          i--;
        }

        var lunarMonth = i;
        var lunarDay = offset + 1;
        // 防溢出
        if (lunarDay < 1) lunarDay = 1;
        if (lunarMonth < 1) lunarMonth = 1;
        return { year: lunarYear, month: lunarMonth, day: lunarDay, isLeap: isLeap };
      }

      function lunarYearDays(year) {
        var sum = 348;
        var info = lunarYearInfo(year);
        for (var i = 0x8000; i > 0x8; i >>= 1) {
          sum += info & i ? 1 : 0;
        }
        return sum + (lunarLeapMonth(year) ? lunarLeapDays(year) : 0);
      }

      function lunarLeapMonth(year) {
        return lunarYearInfo(year) & 0xf;
      }
      function lunarLeapDays(year) {
        var info = lunarYearInfo(year);
        return info & 0x10000 ? 30 : 29;
      }
      function lunarMonthDays(year, month) {
        var info = lunarYearInfo(year);
        return info & (0x10000 >> month) ? 30 : 29;
      }

      function lunarDayName(day) {
        return LUNAR_DAY_NAMES[day - 1] || day + '日';
      }
      function lunarMonthName(month) {
        return LUNAR_MONTH_NAMES[month - 1] || month + '月';
      }

      function formatLunarShort(l) {
        if (l.day === 1) return (l.isLeap ? '闰' : '') + lunarMonthName(l.month) + '月';
        return lunarDayName(l.day);
      }
      function formatLunar(l) {
        var prefix = l.isLeap ? '闰' : '';
        if (l.day === 1) return prefix + lunarMonthName(l.month) + '月';
        return prefix + lunarMonthName(l.month) + '月' + lunarDayName(l.day);
      }

      var dpYear, dpMonth;

      }

      function dpRender() {
        document.getElementById('dpYearMonth').textContent = dpYear + '年' + dpMonth + '月';
        var firstDay = new Date(dpYear, dpMonth - 1, 1).getDay();
        var daysInMonth = new Date(dpYear, dpMonth, 0).getDate();
        var prevMonthDays = new Date(dpYear, dpMonth - 1, 0).getDate();

        var html = '';
        var today = new Date();
        var todayStr = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();

        // 上月末尾
        for (var i = firstDay - 1; i >= 0; i--) {
          var d = prevMonthDays - i;
          html +=
            '<div class="dp-day other-month past"><div class="dp-solar">' +
            d +
            '</div><div class="dp-lunar"></div></div>';
        }

        // 本月
        for (var d = 1; d <= daysInMonth; d++) {
          var dateObj = new Date(dpYear, dpMonth - 1, d);
          var dateStr = dpYear + '-' + dpMonth + '-' + d;
          var isPast = dateObj < new Date(today.getFullYear(), today.getMonth(), today.getDate());
          var isToday = dateStr === todayStr;
          var lunar = solarToLunar(dpYear, dpMonth, d);
          var lunarStr = formatLunarShort(lunar);

          var selected =
            dpSelected && dpSelected.year === dpYear && dpSelected.month === dpMonth && dpSelected.day === d;
          var cls = 'dp-day';
          if (isPast) cls += ' past';
          if (isToday) cls += ' today';
          if (selected) cls += ' selected';
          html +=
            '<div class="' +
            cls +
            '" data-year="' +
            dpYear +
            '" data-month="' +
            dpMonth +
            '" data-day="' +
            d +
            '" onclick="dpClick(this)">';
          html += '<div class="dp-solar">' + d + '</div>';
          html += '<div class="dp-lunar">' + lunarStr + '</div>';
          html += '</div>';
        }

        // 下月开头补位
        var totalCells = firstDay + daysInMonth;
        var remaining = (7 - (totalCells % 7)) % 7;
        for (var i = 1; i <= remaining; i++) {
          html +=
            '<div class="dp-day other-month past"><div class="dp-solar">' +
            i +
            '</div><div class="dp-lunar"></div></div>';
        }

        document.getElementById('dpDays').innerHTML = html;
        // 左箭头：当月在当前月或之前时隐藏
        var today2 = new Date();
        var nowYear = today2.getFullYear(),
          nowMonth = today2.getMonth() + 1;
        var prevBtn = document.querySelector('.dp-nav:first-child');
        if (prevBtn) {
          prevBtn.style.visibility = dpYear <= nowYear && dpMonth <= nowMonth ? 'hidden' : '';
        }
      }

      function dpPrevMonth() {
        var today = new Date();
        // 如果当前月就是今月，或已经切到今月之前，不允许再往前
        var nowYear = today.getFullYear(),
          nowMonth = today.getMonth() + 1;
        if (dpYear <= nowYear && dpMonth <= nowMonth) return;
        dpMonth--;
        if (dpMonth < 1) {
          dpMonth = 12;
          dpYear--;
        }
        dpRender();
      }

      function dpNextMonth() {
        dpMonth++;
        if (dpMonth > 12) {
          dpMonth = 1;
          dpYear++;
        }
        dpRender();
      }

      function dpGoToday() {
        var today = new Date();
        dpYear = today.getFullYear();
        dpMonth = today.getMonth() + 1;
        dpRender();
      }

      // ====== 选项点击：移动端滚动时不触发切换，视觉状态始终跟随 input.checked ======
      var optionPointerStart = null;

      function syncOptionVisuals() {
        document.querySelectorAll('.option-item').forEach(function (item) {
          var input = item.querySelector('input');
          if (!input || (input.type !== 'radio' && input.type !== 'checkbox')) return;
          item.classList.toggle('selected', input.checked);
        });
      }

      function toggleOptionItem(item) {
        var input = item.querySelector('input');
        if (!input) return;

        if (input.type === 'radio') {
          document.querySelectorAll('input[name="' + input.name + '"]').forEach(function (radio) {
            radio.checked = false;
          });
          input.checked = true;
        } else if (input.type === 'checkbox') {
          input.checked = !input.checked;
        }

        syncOptionVisuals();
      }

      document.addEventListener('pointerdown', function (e) {
        var item = e.target.closest('.option-item');
        if (!item || !item.querySelector('input')) return;
        optionPointerStart = {
          id: e.pointerId,
          item: item,
          x: e.clientX,
          y: e.clientY
        };
      });

      document.addEventListener('pointerup', function (e) {
        if (!optionPointerStart || optionPointerStart.id !== e.pointerId) return;
        var start = optionPointerStart;
        optionPointerStart = null;

        var item = e.target.closest('.option-item');
        var moved = Math.abs(e.clientX - start.x) > 8 || Math.abs(e.clientY - start.y) > 8;
        if (item !== start.item || moved) return;

        e.preventDefault();
        e.stopPropagation();
        toggleOptionItem(item);
      });

      document.addEventListener('pointercancel', function (e) {
        if (optionPointerStart && optionPointerStart.id === e.pointerId) optionPointerStart = null;
      });

      document.addEventListener(
        'click',
        function (e) {
          var item = e.target.closest('.option-item');
          if (!item) return;
          e.preventDefault();
        },
        true
      );

      // ====== 视图切换 ======
      async function loadOrgsForLink() {
        try {
          var semId = await getCurrentSemesterId();
          if (!semId) return;
          var user = getCurrentUser();
          if (!user) return;
          // 查找当前用户归属的组织
          var myOrgId = null;
          var ppl = await window.db.from('people').select('id').eq('phone', user.phone).maybeSingle();
          if (ppl.data) {
            var assign = await window.db
              .from('person_org_assignments')
              .select('org_id')
              .eq('person_id', ppl.data.id)
              .eq('semester_id', semId)
              .eq('status', 'active')
              .maybeSingle();
            if (assign.data) myOrgId = assign.data.org_id;
          }
          // 如果没找到归属，回退到所有班级
          if (!myOrgId) {
            var fallback = await window.db
              .from('organizations')
              .select('id,name')
              .eq('semester_id', semId)
              .eq('level', '班级')
              .eq('is_active', true)
              .order('sort_order');
            var sel = document.getElementById('linkOrgSelect');
            sel.innerHTML =
              '<option value="">请选择班级</option>' +
              (fallback.data || [])
                .map(function (o) {
                  return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
                })
                .join('');
            return;
          }
          // 从当前组织向上找到大班
          var orgs = await window.db.from('organizations').select('id,name,level,parent_id').eq('semester_id', semId);
          if (!orgs.data) return;
          var allOrgs = orgs.data;
          var myOrg = allOrgs.find(function (o) {
            return o.id === myOrgId;
          });
          if (!myOrg) return;
          // 找到所属大班
          var bcId = null;
          if (myOrg.level === '大班') bcId = myOrg.id;
          else if (myOrg.level === '班级') bcId = myOrg.parent_id;
          else if (myOrg.level === '小组') {
            var cls = allOrgs.find(function (o) {
              return o.id === myOrg.parent_id;
            });
            if (cls) bcId = cls.parent_id;
          }
          if (!bcId) return;
          // 获取该大班下的所有班级
          var classes = allOrgs.filter(function (o) {
            return o.parent_id === bcId && o.level === '班级' && o.is_active !== false;
          });
          var sel = document.getElementById('linkOrgSelect');
          var parentDiv = sel.closest('.form-item') || sel.parentNode;
          if (classes.length <= 1) {
            // 只有一个班级，自动选择并隐藏下拉
            sel.value = classes.length ? String(classes[0].id) : '';
            parentDiv.style.display = 'none';
          } else {
            // 多个班级，显示下拉让用户选择
            parentDiv.style.display = 'block';
            sel.innerHTML =
              '<option value="">请选择班级</option>' +
              classes
                .map(function (o) {
                  return '<option value="' + o.id + '">' + escapeHtml(o.name) + '</option>';
                })
                .join('');
          }
        } catch (e) {
          console.warn('loadOrgsForLink error:', e);
        }
      }

      // ====== 生成外部填写链接 ======
      function generateLink() {
        var orgId = document.getElementById('linkOrgSelect').value;
        if (!orgId) {
          showToast('请先选择一个班级', 'error');
          return;
        }
        var url = location.origin + location.pathname + '?public=1&org_id=' + orgId;
        document.getElementById('linkUrl').value = url;

        // 加载二维码图片并绘制到 canvas
        var img = new Image();

        img.onload = function () {
          drawQRPoster(img, orgId);
        };
        img.onerror = function () {
          // 图片加载失败时仍尝试绘制
          drawQRPoster(null, orgId);
        };
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url);
      }

      function drawQRPoster(qrImg, orgId) {
        var canvas = document.getElementById('qrCanvas');
        var ctx = canvas.getContext('2d');
        var w = 360,
          h = 480;
        canvas.width = w;
        canvas.height = h;

        // 白色背景
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);

        // 获取班级名称
        window.db
          .from('organizations')
          .select('name,parent_id')
          .eq('id', orgId)
          .maybeSingle()
          .then(function (res) {
            var line1 = '进班申请表';
            if (res.data) {
              var clsName = res.data.name;
              if (res.data.parent_id) {
                window.db
                  .from('organizations')
                  .select('name')
                  .eq('id', res.data.parent_id)
                  .maybeSingle()
                  .then(function (r2) {
                    var bcName = r2.data ? r2.data.name : '';
                    drawPosterContent(ctx, canvas, qrImg, bcName + clsName, '进班申请表');
                  });
              } else {
                drawPosterContent(ctx, canvas, qrImg, clsName, '进班申请表');
              }
            } else {
              drawPosterContent(ctx, canvas, qrImg, '', '进班申请表');
            }
          });
      }

      function drawPosterContent(ctx, canvas, qrImg, line1, line2) {
        var w = canvas.width,
          h = canvas.height;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);

        var pad = Math.round(w * 0.08);
        var contentW = w - pad * 2;
        var titleY1 = pad + 22;
        var titleY2 = titleY1 + 30;
        var gapAfterTitle = 32;
        var qrSize = contentW;
        var qrY = titleY2 + gapAfterTitle;
        var gapBeforeTip = 28;
        var tipY = qrY + qrSize + gapBeforeTip;

        // 第一行：大班班级名称（字号自适应宽度）
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (line1) {
          var fs1 = Math.min(26, Math.floor(contentW * 0.09));
          ctx.font = 'bold ' + fs1 + 'px "STSong","SimSun","Noto Serif SC",serif';
          ctx.fillText(line1, w / 2, titleY1);
        }

        // 第二行：进班申请表
        var fs2 = Math.min(22, Math.floor(contentW * 0.07));
        ctx.font = 'bold ' + fs2 + 'px "STSong","SimSun","Noto Serif SC",serif';
        ctx.fillStyle = '#666';
        ctx.fillText(line2, w / 2, titleY2);

        // 二维码
        if (qrImg) {
          ctx.drawImage(qrImg, pad, qrY, qrSize, qrSize);
        }

        // 提示文字
        var fs3 = Math.min(14, Math.floor(contentW * 0.045));
        ctx.font = fs3 + 'px sans-serif';
        ctx.fillStyle = '#999';
        ctx.fillText('长按或扫码填写进班申请表', w / 2, tipY);

        // 设置画布显示尺寸适应容器宽度
        var displayWidth = Math.min(canvas.clientWidth || 340, 360);
        var displayHeight = (displayWidth * h) / w;
        canvas.style.width = displayWidth + 'px';
        canvas.style.height = displayHeight + 'px';

        // 显示二维码区域 + 保存按钮
        document.getElementById('qrArea').style.display = 'block';
        document.getElementById('saveQrBtn').style.display = 'inline-block';
      }

          return;
        }

        var hobbyInputs = document.querySelectorAll('#fieldHobbies input[type="checkbox"]:checked');

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (isPublicMode) {
          // 外部模式：隐藏返回按钮，居中标题
          document.getElementById('backBtn').style.display = 'none';
          document.getElementById('bottomNavContainer').style.display = 'none';
          document.getElementById('pageTitle').textContent = '进班申请表';
          document.getElementById('viewToggle').style.display = 'none';
          document.querySelector('.page-header').classList.add('public-mode');
          // 加载学期名称
          getCurrentSemesterId().then(function (semId) {
            if (semId)
              window.db
                .from('semesters')
                .select('semester_name')
                .eq('id', semId)
                .maybeSingle()
                .then(function (r) {
                  if (r.data) setCurrentSemester('semesterSubtitle', r.data.semester_name);
                });
          });
          // 加载班级名称作为标题
          var orgId = new URLSearchParams(location.search).get('org_id');
          if (orgId) {
            window.db
              .from('organizations')
              .select('name,parent_id')
              .eq('id', orgId)
              .maybeSingle()
              .then(function (res) {
                if (!res.data) return;
                var className = res.data.name;
                // 查询大班名称
                if (res.data.parent_id) {
                  window.db
                    .from('organizations')
                    .select('name')
                    .eq('id', res.data.parent_id)
                    .maybeSingle()
                    .then(function (r2) {
                      var prefix = r2.data ? escapeHtml(r2.data.name) : '';
                      document.getElementById('pageTitle').textContent = prefix + escapeHtml(className) + '进班申请表';
                    });
                } else {
                  document.getElementById('pageTitle').textContent = escapeHtml(className) + '进班申请表';
                }
              });
          }
          // 生成验证码
          initCaptcha();
        } else {
          if (!checkLogin()) return;
          var ok = await guardModuleAccess('secretariat');
          if (!ok) return;
        }
        initLocations();
        dpInit();

      function pySort(a, b) {
        var pa = PINYIN_FIRST[a[0]] || a[0];
        var pb = PINYIN_FIRST[b[0]] || b[0];
        return pa.localeCompare(pb, 'zh-CN') || a.localeCompare(b, 'zh-CN');
      }
      function initLocations() {
        var sel = document.getElementById('fieldProvince');
        if (!sel) return;
        var provKeys = Object.keys(LOCATIONS).sort(pySort);
        sel.innerHTML =
          '<option value="">请选择省份</option>' +
          provKeys
            .map(function (p) {
              return '<option value="' + p + '">' + p + '</option>';
            })
            .join('');
      }
      function onProvinceChange() {
        var p = document.getElementById('fieldProvince').value;
        var citySel = document.getElementById('fieldCity');
        var distSel = document.getElementById('fieldDistrict');
        distSel.innerHTML = '<option value="">请选择区/县</option>';
        if (!p || !LOCATIONS[p]) {
          citySel.innerHTML = '<option value="">请选择城市</option>';
          return;
        }
        var cities = LOCATIONS[p] || {};
        var cityKeys = Object.keys(cities).sort(pySort);
        citySel.innerHTML =
          '<option value="">请选择城市</option>' +
          cityKeys
            .map(function (c) {
              return '<option value="' + c + '">' + c + '</option>';
            })
            .join('');
      }
      function onCityChange() {
        var p = document.getElementById('fieldProvince').value;
        var c = document.getElementById('fieldCity').value;
        var distSel = document.getElementById('fieldDistrict');
        if (!p || !c || !LOCATIONS[p] || !LOCATIONS[p][c]) {
          distSel.innerHTML = '<option value="">请选择区/县</option>';
          return;
        }
        var dists = LOCATIONS[p][c];
        if (!dists || !dists.length) {
          distSel.innerHTML = '<option value="">全市</option>';
          return;
        }
        distSel.innerHTML =
          '<option value="">请选择区/县</option>' +
          dists
            .sort(pySort)
            .map(function (d) {
              return '<option value="' + d + '">' + d + '</option>';
            })
            .join('');
