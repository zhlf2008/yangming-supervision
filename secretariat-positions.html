<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 职务管理</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.active { background: var(--gold-light); }
      .org-node-children { padding-left: 20px; }
      .org-name { flex: 1; font-weight: 500; color: var(--ink-dark); }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }
      .pos-group { margin-bottom: 16px; }
      .pos-group-title { font-weight: 600; color: var(--ink-dark); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
      .pos-person { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); margin: 4px; }
      .pos-person .remove { cursor: pointer; color: var(--vermillion); font-size: 16px; line-height: 1; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .POSITION_NAMES = ['学委', '督察', '班长', '组长', '秘书处', '副学委', '副督察', '副班长', '副组委', '纪委', '财务', '宣传委员'];
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">职务管理</h1>
      </header>

      <section class="section">
        <div class="form-item">
          <label class="form-label">学期</label>
          <select class="form-select" id="semesterSelect" onchange="onSemesterChange()"></select>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" id="addPosBtn" onclick="showAddPositionModal()" disabled>+ 新增职务</button>
        </div>
        <div class="org-tree" id="orgTree">
          <div class="empty-state">请先选择学期</div>
        </div>
      </section>

      <section class="section">
        <div class="section-title" id="posSectionTitle">选择组织查看职务</div>
        <div id="positionList" class="empty-state">请先选择左侧组织</div>
      </section>
    </div>

    <!-- 新增职务 Modal -->
    <div class="modal-overlay" id="addPosModal">
      <div class="modal">
        <div class="modal-title">新增职务</div>
        <div class="form-item">
          <label class="form-label">职务</label>
          <select class="form-select" id="posName"></select>
        </div>
        <div class="form-item">
          <label class="form-label">人员</label>
          <select class="form-select" id="posPersonSelect">
            <option value="">先选择学期和组织</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">生效范围</label>
          <input class="form-input" id="posScope" readonly style="background:var(--bg-card);" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closePositionModal()">取消</button>
          <button class="btn btn-primary" id="savePosBtn" onclick="savePosition()">保存</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var POSITION_NAMES = ['学委', '督察', '班长', '组长', '秘书处', '副学委', '副督察', '副班长', '副组委', '纪委', '财务', '宣传委员'];
      var semesters = [];
      var orgs = [];
      var selectedOrgId = null;
      var selectedOrgLevel = null;
      var positions = [];
      var orgPeople = [];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadSemesters();
        await loadOrgs();
      }

      async function loadSemesters() {
        var { data, error } = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        if (error) { showToast('加载学期失败', 'error'); return; }
        semesters = data || [];
        var select = document.getElementById('semesterSelect');
        select.innerHTML = semesters.length
          ? semesters.map(function (s) {
              var selected = s.is_current === 1 ? ' selected' : '';
              return '<option value="' + s.id + '"' + selected + '>' + escapeHtml(s.semester_name) + '</option>';
            }).join('')
          : '<option value="">暂未学期</option>';
        if (semesters.length) await onSemesterChange();
      }

      async function loadOrgs() {
        var { data, error } = await window.db.from('organizations').select('*').order('sort_order');
        if (!error) orgs = data || [];
      }

      function getOrgName(id) {
        var o = orgs.find(function (x) { return Number(x.id) === Number(id); });
        return o ? o.name : '';
      }

      async function onSemesterChange() {
        selectedOrgId = null;
        renderOrgTree();
        document.getElementById('positionList').innerHTML = '<div class="empty-state">请先选择左侧组织</div>';
        document.getElementById('addPosBtn').disabled = true;
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId) { container.innerHTML = '<div class="empty-state">请先选择学期</div>'; return; }

        var semesterOrgs = orgs.filter(function (o) { return Number(o.semester_id) === semesterId; });
        var bigClasses = semesterOrgs.filter(function (o) { return o.level === '大班'; });
        if (!bigClasses.length) { container.innerHTML = '<div class="empty-state">该学期下暂无组织</div>'; return; }
        container.innerHTML = bigClasses.map(function (bc) { return renderNode(bc, semesterOrgs); }).join('');
      }

      function renderNode(org, allOrgs) {
        var children = allOrgs.filter(function (o) { return Number(o.parent_id) === Number(org.id); });
        var isActive = Number(selectedOrgId) === Number(org.id);
        return (
          '<div class="org-node">' +
          '<div class="org-node-header' + (isActive ? ' active' : '') + '" onclick="selectOrg(' + org.id + ',\'' + org.level + '\')">' +
          '<span class="org-name">' + escapeHtml(org.name) + ' <span style="font-size:11px;color:var(--ink-muted);">(' + org.level + ')</span></span>' +
          '</div>' +
          (children.length
            ? '<div class="org-node-children"' + (isActive ? '' : ' style="display:none;"') + '>' + children.map(function (c) { return renderNode(c, allOrgs); }).join('') + '</div>'
            : '') +
          '</div>'
        );
      }

      async function selectOrg(orgId, level) {
        selectedOrgId = orgId;
        selectedOrgLevel = level;
        document.getElementById('addPosBtn').disabled = false;
        renderOrgTree();
        await loadPositions();
        await loadOrgPeople();
      }

      async function loadPositions() {
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId || !selectedOrgId) return;

        document.getElementById('posSectionTitle').textContent = getOrgName(selectedOrgId) + ' · 职务';

        var { data, error } = await window.db
          .from('person_positions')
          .select('*, people!inner(*)')
          .eq('semester_id', semesterId)
          .eq('org_id', selectedOrgId)
          .eq('is_active', true)
          .order('position_name');

        if (error) { showToast('加载职务失败', 'error'); return; }
        positions = data || [];
        renderPositions();
      }

      function renderPositions() {
        var container = document.getElementById('positionList');
        if (!positions.length) { container.innerHTML = '<div class="empty-state">暂无职务</div>'; return; }

        var grouped = {};
        positions.forEach(function (pos) {
          if (!grouped[pos.position_name]) grouped[pos.position_name] = [];
          grouped[pos.position_name].push(pos);
        });

        container.innerHTML = Object.keys(grouped).sort().map(function (key) {
          var items = grouped[key];
          return (
            '<div class="pos-group">' +
            '<div class="pos-group-title">' + escapeHtml(key) + '</div>' +
            items.map(function (pos) {
              var p = pos.people;
              return (
                '<span class="pos-person">' + escapeHtml(p.name) +
                '<span class="remove" onclick="removePosition(' + pos.id + ',\'' + escapeHtml(p.name) + '\')">×</span></span>'
              );
            }).join('') +
            '</div>'
          );
        }).join('');
      }

      async function loadOrgPeople() {
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId || !selectedOrgId) { orgPeople = []; return; }

        var { data, error } = await window.db
          .from('person_org_assignments')
          .select('*, people!inner(*)')
          .eq('semester_id', semesterId)
          .eq('org_id', selectedOrgId)
          .eq('status', 'active')
          .order('sort_order');

        orgPeople = (data || []).filter(function (item) { return item.people; });
      }

      function showAddPositionModal() {
        if (!selectedOrgId) { showToast('请先选择组织', 'error'); return; }

        var nameSelect = document.getElementById('posName');
        nameSelect.innerHTML = POSITION_NAMES.map(function (n) { return '<option value="' + n + '">' + n + '</option>'; }).join('');

        var personSelect = document.getElementById('posPersonSelect');
        if (orgPeople.length) {
          personSelect.innerHTML = orgPeople.map(function (item) {
            return '<option value="' + item.person_id + '">' + escapeHtml(item.people.name) + '</option>';
          }).join('');
        } else {
          personSelect.innerHTML = '<option value="">该组织暂无成员</option>';
        }

        document.getElementById('posScope').value = selectedOrgLevel;
        document.getElementById('addPosModal').classList.add('show');
      }

      function closePositionModal() {
        document.getElementById('addPosModal').classList.remove('show');
      }

      async function savePosition() {
        var semesterId = Number(document.getElementById('semesterSelect').value);
        var positionName = document.getElementById('posName').value;
        var personId = Number(document.getElementById('posPersonSelect').value);

        if (!personId) { showToast('请选择人员', 'error'); return; }

        document.getElementById('savePosBtn').disabled = true;
        try {
          var result = await window.db.from('person_positions').insert({
            semester_id: semesterId,
            person_id: personId,
            org_id: selectedOrgId,
            position_name: positionName,
            position_scope: selectedOrgLevel,
            is_active: true
          });
          if (result.error) throw result.error;
          var person = orgPeople.find(function (item) { return item.person_id === personId; });
          var personName = person && person.people ? person.people.name : '';
          logAction('新增职务', 'person_positions', personName + ' → ' + positionName + ' @ ' + getOrgName(selectedOrgId));
          showToast('职务已添加', 'success');
          closePositionModal();
          await loadPositions();
        } catch (error) {
          showToast('保存失败，可能该职务已存在', 'error');
        } finally {
          document.getElementById('savePosBtn').disabled = false;
        }
      }

      async function removePosition(id, name) {
        var confirmed = await showConfirm('确定移除「' + name + '」的职务吗？');
        if (!confirmed) return;
        try {
          var result = await window.db.from('person_positions').update({ is_active: false }).eq('id', id);
          if (result.error) throw result.error;
          showToast('已移除', 'success');
          await loadPositions();
        } catch (error) {
          showToast('操作失败', 'error');
        }
      }

      init();
    </script>
  </body>
</html>
