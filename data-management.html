<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数据管理 - 阳明心学督察管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #FAFAF8; --bg-card: #FFFFFF; --ink-dark: #2D2D2D; --ink-light: #5C5C5C; --ink-muted: #8A8A8A; --vermillion: #E63946; --border: #E8E4DF; --radius: 16px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-primary); color: var(--ink-dark); min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px 16px 100px; }
    .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; color: var(--ink-dark); }
    .page-title { font-size: 18px; font-weight: 600; }
    .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .input-group { flex: 1; }
    .input-label { display: block; font-size: 11px; color: var(--ink-muted); margin-bottom: 3px; }
    .period-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .period-tab { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-card); cursor: pointer; text-align: center; }
    .period-tab.active { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }
    .record-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
    .record-header { display: flex; justify-content: space-between; margin-bottom: 4px; padding-right: 42px; }
    .record-user { font-size: 14px; font-weight: 500; }
    .record-date { font-size: 11px; color: var(--ink-muted); white-space: nowrap; margin-left: auto; }
    .record-org { font-size: 12px; color: var(--ink-muted); margin-bottom: 6px; }
    .record-stats { display: flex; gap: 14px; font-size: 12px; }
    .record-stat span { font-weight: 600; }
    .record-del { position: absolute; right: 10px; top: 10px; width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: #fff; color: var(--vermillion); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--ink-muted); padding: 8px 20px; cursor: pointer; }
    .nav-item.active { color: var(--vermillion); }
    .nav-icon { font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <a href="index.html" class="back-btn">←</a>
      <h1 class="page-title">数据管理</h1>
    </div>
    <div class="period-tabs">
      <button class="period-tab active" onclick="switchPeriod('all',this)">全部</button>
      <button class="period-tab" onclick="switchPeriod('week',this)">本周</button>
      <button class="period-tab" onclick="switchPeriod('lastWeek',this)">上周</button>
      <button class="period-tab" onclick="switchPeriod('month',this)">本月</button>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label class="input-label">大班</label>
        <select id="bigClassSelect" onchange="onOrgFilterChange()" style="width:100%;padding:5px 4px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);">
          <option value="">全部</option>
        </select>
      </div>
      <div class="input-group">
        <label class="input-label">班级</label>
        <select id="classSelect" onchange="onOrgFilterChange()" style="width:100%;padding:5px 4px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);">
          <option value="">全部</option>
        </select>
      </div>
      <div class="input-group">
        <label class="input-label">小组</label>
        <select id="groupSelect" onchange="onOrgFilterChange()" style="width:100%;padding:5px 4px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);">
          <option value="">全部</option>
        </select>
      </div>
    </div>
    <div id="recordList"><div class="empty-state">加载中...</div></div>
  </div>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">首页</span></a>
    <a href="attendance-page.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">考勤</span></a>
    <a href="summary-page.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">汇总</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">我的</span></a>
  </nav>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    var allRecords = [];
    var orgsList = [];
    var currentPeriod = 'all';

    async function init() {
      var user = checkLogin();
      if (!user) return;
      if (user.role !== '管理员' && user.role !== '地区督委') { alert('无权访问'); window.location.href = 'index.html'; return; }
      await waitForDb();

      // 加载组织数据（用于级联）
      var { data: orgs } = await window.db.from('organizations').select('*');
      orgsList = orgs || [];
      var bigClasses = orgsList.filter(function(o){return o.level==='大班';});
      document.getElementById('bigClassSelect').innerHTML = '<option value="">全部</option>'+
        bigClasses.map(function(b){return '<option value="'+b.id+'">'+b.name+'</option>';}).join('');

      await loadRecords();
    }

    function onOrgFilterChange() {
      var bigId = document.getElementById('bigClassSelect').value;
      var classSelect = document.getElementById('classSelect');
      var groupSelect = document.getElementById('groupSelect');
      
      if (!bigId) { classSelect.innerHTML = '<option value="">全部</option>'; groupSelect.innerHTML = '<option value="">全部</option>'; loadRecords(); return; }

      var classes = orgsList.filter(function(o){return o.parent_id===parseInt(bigId)&&o.level==='班级';});
      classSelect.innerHTML = '<option value="">全部</option>'+
        classes.map(function(c){return '<option value="'+c.id+'">'+c.name+'</option>';}).join('');

      var classId = classSelect.value;
      if (!classId) { groupSelect.innerHTML = '<option value="">全部</option>'; loadRecords(); return; }

      var groups = orgsList.filter(function(o){return o.parent_id===parseInt(classId)&&o.level==='小组';});
      groupSelect.innerHTML = '<option value="">全部</option>'+
        groups.map(function(g){return '<option value="'+g.id+'">'+g.name+'</option>';}).join('');

      loadRecords();
    }

    function switchPeriod(period, el) {
      currentPeriod = period;
      document.querySelectorAll('.period-tab').forEach(function(t){t.classList.remove('active');});
      el.classList.add('active');
      loadRecords();
    }

    async function loadRecords() {
      var { data, error } = await window.db.from('attendance_records')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(500);
      if (error) { document.getElementById('recordList').innerHTML = '<div class="empty-state">加载失败</div>'; return; }
      allRecords = data || [];

      // 按周次过滤
      if (currentPeriod !== 'all') {
        var range = getPeriodRange(currentPeriod);
        if (range) {
          var { data: scheds } = await window.db.from('schedules')
            .select('id').gte('schedule_date', range.start).lte('schedule_date', range.end);
          var schedIds = (scheds||[]).map(function(s){return s.id;});
          allRecords = allRecords.filter(function(r){return schedIds.indexOf(r.schedule_id)!==-1;});
        }
      }

      // 按组织过滤
      var groupId = document.getElementById('groupSelect').value;
      var classId = !groupId ? document.getElementById('classSelect').value : null;
      var bigClassId = !groupId && !classId ? document.getElementById('bigClassSelect').value : null;

      if (groupId) {
        allRecords = allRecords.filter(function(r){return r.organization_id===parseInt(groupId);});
      } else if (classId) {
        var grpIds = orgsList.filter(function(o){return o.parent_id===parseInt(classId)&&o.level==='小组';}).map(function(g){return g.id;});
        allRecords = allRecords.filter(function(r){return grpIds.indexOf(r.organization_id)!==-1;});
      } else if (bigClassId) {
        var allChildGrps = getAllGroups(parseInt(bigClassId), orgsList).filter(function(o){return o.level==='小组';}).map(function(g){return g.id;});
        allRecords = allRecords.filter(function(r){return allChildGrps.indexOf(r.organization_id)!==-1;});
      }

      if (allRecords.length === 0) { document.getElementById('recordList').innerHTML = '<div class="empty-state">暂无匹配记录</div>'; return; }

      var userIds = [...new Set(allRecords.map(function(r){return r.fill_user_id;}).filter(Boolean))];
      var orgIds = [...new Set(allRecords.map(function(r){return r.organization_id;}))];
      var scheduleIds = [...new Set(allRecords.map(function(r){return r.schedule_id;}))];
      var [{data:profiles},{data:orgs},{data:schedules}] = await Promise.all([
        userIds.length>0?window.db.from('profiles').select('id,name').in('id',userIds):Promise.resolve({data:[]}),
        window.db.from('organizations').select('id,name').in('id',orgIds),
        window.db.from('schedules').select('id,schedule_date').in('id',scheduleIds)
      ]);
      var userMap={}; (profiles||[]).forEach(function(p){userMap[p.id]=p.name;});
      var dateMap={}; (schedules||[]).forEach(function(s){dateMap[s.id]=s.schedule_date;});

      // 构建组织完整路径
      var orgPathMap={};
      (orgs||[]).forEach(function(o){orgPathMap[o.id]=buildOrgPath(o.id,orgsList);});

      var html='';
      allRecords.forEach(function(r){
        var fd=r.fill_data||{};
        var yd=parseInt(fd['应到人数'])||0,sd=parseInt(fd['实到人数'])||0;
        var yz=parseInt(fd['应做作业人数'])||0,zw=parseInt(fd['作业完成人数'])||0,sp=parseInt(fd['视频人数'])||0;
        var online=yd>0?(sd/yd*100).toFixed(1):'0.0',hw=yz>0?(zw/yz*100).toFixed(1):'0.0',video=sd>0?(sp/sd*100).toFixed(1):'0.0';
        var dateStr=dateMap[r.schedule_id]||(r.created_at||'').slice(0,10);
        var timeStr=r.created_at?new Date(r.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';
        html+='<div class="record-item">'+
          '<span class="record-del" onclick="delRecord('+r.id+')">✕</span>'+
          '<div class="record-header"><span class="record-user">'+(userMap[r.fill_user_id]||'')+'</span><span class="record-date">'+dateStr+' '+timeStr+'</span></div>'+
          '<div class="record-org">'+(orgPathMap[r.organization_id]||'')+'</div>'+
          '<div class="record-stats"><div class="record-stat">上线 '+online+'%</div><div class="record-stat">作业 '+hw+'%</div><div class="record-stat">视频 '+video+'%</div></div></div>';
      });
      document.getElementById('recordList').innerHTML=html;
    }

    function fmtDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getPeriodRange(period) {
      var now=new Date(),today=fmtDate(now);
      if (period==='week'){
        var dow=now.getDay(),monOff=dow===0?-6:1-dow;
        var mon=new Date(now);mon.setDate(now.getDate()+monOff);
        return {start:fmtDate(mon),end:today};
      }
      if (period==='lastWeek'){
        var dow2=now.getDay(),lmOff=dow2===0?-13:-6-dow2,lsOff=dow2===0?-7:-dow2;
        var lm=new Date(now);lm.setDate(now.getDate()+lmOff);
        var ls=new Date(now);ls.setDate(now.getDate()+lsOff);
        return {start:fmtDate(lm),end:fmtDate(ls)};
      }
      if (period==='month'){
        var ms=new Date(now.getFullYear(),now.getMonth(),1);
        return {start:fmtDate(ms),end:today};
      }
      return null;
    }

    async function delRecord(id){
      if(!confirm('确定删除？'))return;
      var { error } = await window.db.from('attendance_records').delete().eq('id',id);
      if(error){ alert('删除失败: '+error.message); return; }
      logAction('删除填报记录','id:'+id);
      // 从本地列表移除，避免等待网络重载
      allRecords = allRecords.filter(function(r){return r.id !== id;});
      loadRecords();
    }

    init();
  </script>
</body>
</html>
