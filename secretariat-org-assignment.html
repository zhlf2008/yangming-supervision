<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘书处 - 分班分组</title>
    <link rel="stylesheet" href="css/common.css?v=3" />
    <style>
      .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 0; }
      .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-dark); text-decoration: none; }
      .page-title { font-family: 'STSong','SimSun','Noto Serif SC',serif; font-size: 22px; flex: 1; }

      .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow); }
      .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .section-title { font-size: 16px; font-weight: 700; }

      .form-item { margin-bottom: 12px; }
      .form-label { display: block; margin-bottom: 6px; color: var(--ink-light); font-size: 13px; }
      .form-input, .form-select { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); padding: 11px 12px; color: var(--ink-dark); font-size: 14px; font-family: inherit; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      .btn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
      .btn-primary { background: var(--vermillion); color: #fff; }
      .btn-secondary { background: var(--gold-light); color: var(--ink-dark); }
      .btn-danger { background: var(--vermillion-light); color: var(--vermillion); }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      .org-tree { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
      .org-node { border-bottom: 1px solid var(--border); }
      .org-node:last-child { border-bottom: none; }
      .org-node-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; background: var(--bg-primary); transition: background 0.15s; }
      .org-node-header:hover { background: var(--gold-light); }
      .org-node-header.active { background: var(--gold-light); }
      .org-node-children { padding-left: 20px; }
      .org-toggle { width: 20px; text-align: center; color: var(--ink-muted); }
      .org-name { flex: 1; font-weight: 500; color: var(--ink-dark); }
      .org-count { color: var(--ink-muted); font-size: 12px; }

      .empty-state { text-align: center; color: var(--ink-muted); padding: 24px 8px; }

      .person-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-primary); margin: 4px; }
      .person-chip .remove { cursor: pointer; color: var(--vermillion); font-size: 16px; line-height: 1; }
      .person-chip .remove:hover { font-weight: 700; }

      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
      .modal-overlay.show { display: flex; }
      .modal { background: var(--bg-card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
      .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
      .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
      .modal-actions .btn { flex: 1; }
      .btn-cancel { background: var(--bg-primary); color: var(--ink-dark); border: 1px solid var(--border); }

      .search-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-primary); font-size: 14px; font-family: inherit; }
      .candidate-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
      .candidate-item:last-child { border-bottom: none; }
      .candidate-checkbox { width: 20px; height: 20px; flex-shrink: 0; }
      .candidate-name { flex: 1; }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <a class="back-btn" href="secretariat-dashboard.html">←</a>
        <h1 class="page-title">分班分组</h1>
      </header>

      <!-- 学期选择 -->
      <section class="section">
        <div class="form-item">
          <label class="form-label">学期</label>
          <select class="form-select" id="semesterSelect" onchange="onSemesterChange()"></select>
        </div>
      </section>

      <!-- 组织树与成员 -->
      <section class="section">
        <div class="section-header">
          <div class="section-title">组织架构</div>
          <button class="btn btn-primary btn-sm" id="addMemberBtn" onclick="showAddMemberModal()" disabled>+ 添加成员</button>
        </div>
        <div class="org-tree" id="orgTree">
          <div class="empty-state">请先选择学期</div>
        </div>
        <div style="margin-top: 12px;" id="selectedOrgInfo">
          <div style="color: var(--ink-muted); font-size: 13px;">点击左侧组织查看成员</div>
        </div>
        <div id="orgMembers" style="display: flex; flex-wrap: wrap; gap: 0; margin-top: 8px;"></div>
      </section>
    </div>

    <!-- 添加成员 Modal -->
    <div class="modal-overlay" id="addMemberModal">
      <div class="modal">
        <div class="modal-title">添加成员</div>
        <input class="search-input" id="candidateSearch" placeholder="搜索姓名或手机号..." oninput="loadCandidates()" />
        <div id="candidateList" style="margin-top: 12px; max-height: 50vh; overflow-y: auto;">
          <div class="empty-state">正在加载...</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeCandidateModal()">取消</button>
          <button class="btn btn-primary" id="addSelectedBtn" onclick="addSelectedPeople()">添加选中</button>
        </div>
      </div>
    </div>

    <div id="bottomNavContainer"></div>

    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
      var semesters = [];
      var orgs = [];
      var selectedOrgId = null;
      var selectedOrgLevel = null;
      var currentPeople = [];
      var candidates = [];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        if (!checkLogin()) return;
        await loadSemesters();
        await loadOrgs();
      }

      async function loadSemesters() {
        var { data, error } = await window.db.from('semesters').select('*').order('start_date', { ascending: false });
        if (error) { showToast('加载学期失败', 'error'); return; }
        semesters = data || [];
        var select = document.getElementById('semesterSelect');
        select.innerHTML = semesters.length
          ? semesters.map(function (s) {
              var selected = s.is_current === 1 ? ' selected' : '';
              return '<option value="' + s.id + '"' + selected + '>' + escapeHtml(s.semester_name) + '</option>';
            }).join('')
          : '<option value="">暂未学期</option>';
        if (semesters.length) await onSemesterChange();
      }

      async function loadOrgs() {
        var { data, error } = await window.db.from('organizations').select('*').order('sort_order');
        if (!error) orgs = data || [];
      }

      async function onSemesterChange() {
        selectedOrgId = null;
        selectedOrgLevel = null;
        renderOrgTree();
        document.getElementById('orgMembers').innerHTML = '';
        document.getElementById('selectedOrgInfo').innerHTML = '<div style="color:var(--ink-muted);font-size:13px;">点击左侧组织查看成员</div>';
        document.getElementById('addMemberBtn').disabled = true;
      }

      function renderOrgTree() {
        var container = document.getElementById('orgTree');
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId) { container.innerHTML = '<div class="empty-state">请先选择学期</div>'; return; }

        var semesterOrgs = orgs.filter(function (o) { return Number(o.semester_id) === semesterId; });
        var bigClasses = semesterOrgs.filter(function (o) { return o.level === '大班'; });

        if (!bigClasses.length) {
          container.innerHTML = '<div class="empty-state">该学期下暂无组织</div>';
          return;
        }

        container.innerHTML = bigClasses.map(function (bc) {
          return renderOrgNode(bc, semesterOrgs, 0);
        }).join('');
      }

      function renderOrgNode(org, allOrgs, depth) {
        var children = allOrgs.filter(function (o) { return Number(o.parent_id) === Number(org.id); });
        var hasChildren = children.length > 0;
        var isActive = Number(selectedOrgId) === Number(org.id);

        return (
          '<div class="org-node">' +
          '<div class="org-node-header' + (isActive ? ' active' : '') + '" onclick="selectOrg(' + org.id + ',\'' + org.level + '\')">' +
          '<span class="org-toggle">' + (hasChildren ? '▸' : '') + '</span>' +
          '<span class="org-name">' + escapeHtml(org.name) + ' <span style="font-size:11px;color:var(--ink-muted);">(' + (org.level || '') + ')</span></span>' +
          '</div>' +
          (hasChildren && isActive
            ? '<div class="org-node-children">' + children.map(function (c) { return renderOrgNode(c, allOrgs, depth + 1); }).join('') + '</div>'
            : '') +
          '</div>'
        );
      }

      async function selectOrg(orgId, level) {
        selectedOrgId = orgId;
        selectedOrgLevel = level;
        renderOrgTree();
        document.getElementById('addMemberBtn').disabled = false;
        await loadOrgMembers();
      }

      async function loadOrgMembers() {
        if (!selectedOrgId) return;
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId) return;

        var org = orgs.find(function (o) { return Number(o.id) === Number(selectedOrgId); });
        var orgName = org ? org.name : '--';
        document.getElementById('selectedOrgInfo').innerHTML =
          '<div style="font-weight:600;color:var(--ink-dark);">' + escapeHtml(orgName) +
          ' <span style="font-weight:400;color:var(--ink-muted);font-size:12px;">(' + (selectedOrgLevel || '') + ') 成员</span></div>';

        var { data, error } = await window.db
          .from('person_org_assignments')
          .select('*, people!inner(*)')
          .eq('semester_id', semesterId)
          .eq('org_id', selectedOrgId)
          .eq('status', 'active')
          .order('sort_order');

        if (error) { showToast('加载成员失败', 'error'); return; }
        currentPeople = data || [];

        var container = document.getElementById('orgMembers');
        if (!currentPeople.length) {
          container.innerHTML = '<div style="color:var(--ink-muted);font-size:13px;padding:8px 0;">暂无成员</div>';
          return;
        }

        container.innerHTML = currentPeople.map(function (item) {
          var p = item.people;
          return (
            '<span class="person-chip">' +
            escapeHtml(p.name) +
            (p.phone ? ' (' + p.phone + ')' : '') +
            '<span class="remove" onclick="removeMember(' + item.id + ',\'' + escapeHtml(p.name) + '\')">×</span>' +
            '</span>'
          );
        }).join('');
      }

      async function removeMember(assignmentId, name) {
        var confirmed = await showConfirm('确定将「' + name + '」移出该组织吗？');
        if (!confirmed) return;
        try {
          var result = await window.db.from('person_org_assignments').delete().eq('id', assignmentId);
          if (result.error) throw result.error;
          showToast('已移除', 'success');
          await loadOrgMembers();
        } catch (error) {
          showToast('操作失败', 'error');
        }
      }

      async function showAddMemberModal() {
        if (!selectedOrgId) return;
        document.getElementById('addMemberModal').classList.add('show');
        document.getElementById('candidateSearch').value = '';
        await loadCandidates();
      }

      function closeCandidateModal() {
        document.getElementById('addMemberModal').classList.remove('show');
      }

      async function loadCandidates() {
        var semesterId = Number(document.getElementById('semesterSelect').value);
        var search = document.getElementById('candidateSearch').value.trim();

        // 查已在该组织的人员 ID
        var { data: existing } = await window.db
          .from('person_org_assignments')
          .select('person_id')
          .eq('semester_id', semesterId)
          .eq('org_id', selectedOrgId)
          .eq('status', 'active');

        var existingIds = (existing || []).map(function (e) { return e.person_id; });

        // 查所有 active 人员
        var query = window.db.from('people').select('*');
        if (existingIds.length) query = query.not('id', 'in', '(' + existingIds.join(',') + ')');
        query = query.eq('status', 'active');

        if (search) query = query.or('name.ilike.%' + search + '%,phone.ilike.%' + search + '%');
        query = query.order('name');

        var { data, error } = await query;
        if (error) { showToast('加载候选人失败', 'error'); return; }
        candidates = data || [];

        var container = document.getElementById('candidateList');
        if (!candidates.length) {
          container.innerHTML = '<div class="empty-state">暂无可选人员</div>';
          return;
        }

        container.innerHTML = candidates.map(function (c) {
          return (
            '<div class="candidate-item">' +
            '<input type="checkbox" class="candidate-checkbox" value="' + c.id + '" data-name="' + escapeHtml(c.name) + '" />' +
            '<span class="candidate-name">' + escapeHtml(c.name) + (c.phone ? ' · ' + c.phone : '') + '</span>' +
            '</div>'
          );
        }).join('');
      }

      async function addSelectedPeople() {
        var semesterId = Number(document.getElementById('semesterSelect').value);
        if (!semesterId) return;

        var checkboxes = document.querySelectorAll('#candidateList .candidate-checkbox:checked');
        if (!checkboxes.length) { showToast('请选择人员', 'error'); return; }

        var selected = [];
        checkboxes.forEach(function (cb) {
          selected.push({ person_id: Number(cb.value), name: cb.getAttribute('data-name') });
        });

        document.getElementById('addSelectedBtn').disabled = true;
        try {
          var records = selected.map(function (s) {
            return {
              semester_id: semesterId,
              person_id: s.person_id,
              org_id: selectedOrgId,
              org_level: selectedOrgLevel,
              status: 'active',
              sort_order: 0
            };
          });

          var result = await window.db.from('person_org_assignments').insert(records);
          if (result.error) throw result.error;

          logAction('分班分组', 'person_org_assignments',
            selected.map(function (s) { return s.name; }).join('、') + ' → ' + selectedOrgLevel + '#' + selectedOrgId);
          showToast('已添加 ' + selected.length + ' 人', 'success');
          closeCandidateModal();
          await loadOrgMembers();
        } catch (error) {
          showToast('添加失败，可能个别人员已存在', 'error');
        } finally {
          document.getElementById('addSelectedBtn').disabled = false;
        }
      }

      init();
    </script>
  </body>
</html>
