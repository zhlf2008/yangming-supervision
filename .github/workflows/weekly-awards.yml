name: 每周获奖推送

on:
  workflow_dispatch:  # 由 cron-job.org 在每周日 08:00 触发

jobs:
  send-awards:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd scripts
          npm init -y > /dev/null 2>&1
          npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run weekly awards script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          AWARD_NOTIFICATION_SECRET: ${{ secrets.AWARD_NOTIFICATION_SECRET }}
          REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/weekly-awards.js
