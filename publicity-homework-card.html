<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>优秀作业宣发制作 - 宣委管理</title>
    <link rel="stylesheet" href="css/common.css?v=9" />
    <link rel="stylesheet" href="css/publicity-long-poster.css?v=1" />
    <style>
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .page-title {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 20px;
        font-weight: 600;
      }
      .header-card,
      .section,
      .card-workbench {
        padding: 20px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        box-shadow: 0 2px 12px var(--shadow);
      }
      .header-card {
        padding: 16px 18px;
      }
      .header-body {
        display: flex;
        gap: 16px;
      }
      .header-col {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 8px;
      }
      .header-col + .header-col {
        padding-left: 16px;
        border-left: 1px solid var(--border);
      }
      .header-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .header-label {
        width: 42px;
        flex-shrink: 0;
        color: var(--ink-muted);
        font-size: 12px;
      }
      .header-value {
        overflow: hidden;
        color: var(--ink-dark);
        font-size: 13px;
        font-weight: 500;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .header-value.date {
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
      }
      .section-title,
      .workbench-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 600;
      }
      .section-icon {
        display: flex;
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--gold-light);
        color: #28685d;
      }
      .workbench-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .workbench-title {
        min-width: 0;
        margin: 0;
      }
      .status-badge {
        flex-shrink: 0;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--gold-light);
        color: #8a5d2e;
        font-size: 11px;
        font-weight: 700;
      }
      .status-badge.ready {
        background: var(--green-light);
        color: var(--green);
      }
      .settings-toolbar {
        display: grid;
        gap: 12px;
        padding: 14px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fcfbf9;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .setting-label {
        flex-shrink: 0;
        color: var(--ink-light);
        font-size: 12px;
        font-weight: 600;
      }
      .theme-swatches {
        display: flex;
        gap: 9px;
      }
      .theme-swatch {
        width: 30px;
        height: 30px;
        border: 2px solid #fff;
        border-radius: 50%;
        box-shadow: 0 0 0 1px var(--border);
        cursor: pointer;
      }
      .theme-swatch.active {
        box-shadow: 0 0 0 2px var(--ink-dark);
      }
      .theme-swatch[data-theme='vermillion'] {
        background: #b83b3f;
      }
      .theme-swatch[data-theme='ink'] {
        background: #303b44;
      }
      .theme-swatch[data-theme='jade'] {
        background: #2e6b5f;
      }
      .theme-swatch[data-theme='paper'] {
        background: #8a5b3d;
      }
      .segmented {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        padding: 3px;
        border-radius: 7px;
        background: #efede9;
      }
      .segment-btn {
        min-width: 64px;
        min-height: 30px;
        padding: 5px 10px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--ink-muted);
        font-size: 12px;
        cursor: pointer;
      }
      .segment-btn.active {
        background: #fff;
        color: var(--ink-dark);
        box-shadow: 0 1px 4px rgba(45, 45, 45, 0.12);
        font-weight: 600;
      }
      .tool-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 34px;
        padding: 7px 11px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: #fff;
        color: var(--ink-dark);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .tool-btn svg {
        width: 16px;
        height: 16px;
      }
      .editor-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 14px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }
      .editor-fields[hidden],
      .export-preview-panel[hidden] {
        display: none;
      }
      .field-wide {
        grid-column: 1 / -1;
      }
      .field-label {
        display: block;
        margin-bottom: 6px;
        color: var(--ink-light);
        font-size: 12px;
        font-weight: 600;
      }
      .field-control {
        width: 100%;
        min-width: 0;
        min-height: 42px;
        padding: 10px 11px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-primary);
        color: var(--ink-dark);
        font: inherit;
        font-size: 13px;
      }
      textarea.field-control {
        min-height: 72px;
        resize: vertical;
        line-height: 1.55;
      }
      .field-control:focus {
        border-color: #4f8b80;
        outline: 2px solid rgba(40, 104, 93, 0.12);
      }
      .preview-label {
        margin: 0 0 9px;
        color: var(--ink-light);
        font-size: 12px;
        font-weight: 600;
      }
      .preview-shell {
        padding: 12px;
        border-radius: 12px;
        background: #24231f;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .publicity-card {
        --card-bg: #f2ede3;
        --card-accent: #791f2a;
        --card-secondary: #a64b3f;
        --card-text: #25231f;
        --card-line: rgba(37, 35, 31, 0.18);
        --card-muted: #716c63;
        --card-wash: rgba(121, 31, 42, 0.045);
        position: relative;
        display: flex;
        isolation: isolate;
        width: 100%;
        aspect-ratio: 3 / 4;
        flex-direction: column;
        overflow: hidden;
        padding: 25px 24px 20px;
        border: 0;
        background:
          linear-gradient(115deg, transparent 0 62%, var(--card-wash) 62% 100%),
          radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.5), transparent 34%), var(--card-bg);
        color: var(--card-text);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.16);
      }
      .publicity-card::before {
        position: absolute;
        z-index: -1;
        top: -15px;
        right: -9px;
        color: var(--card-accent);
        content: '知';
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 132px;
        font-weight: 700;
        line-height: 1;
        opacity: 0.035;
        pointer-events: none;
      }
      .publicity-card::after {
        position: absolute;
        z-index: 3;
        border: 1px solid var(--card-line);
        content: '';
        inset: 8px;
        pointer-events: none;
      }
      .publicity-card.theme-ink {
        --card-bg: #20221f;
        --card-accent: #f0ece2;
        --card-secondary: #c05244;
        --card-text: #e8e4da;
        --card-line: rgba(240, 236, 226, 0.2);
        --card-muted: #aaa79f;
        --card-wash: rgba(255, 255, 255, 0.025);
      }
      .publicity-card.theme-jade {
        --card-bg: #e7ede8;
        --card-accent: #174c43;
        --card-secondary: #a64b3f;
        --card-text: #20322d;
        --card-line: rgba(23, 76, 67, 0.2);
        --card-muted: #66756f;
        --card-wash: rgba(23, 76, 67, 0.045);
      }
      .publicity-card.theme-paper {
        --card-bg: #eadfc9;
        --card-accent: #282621;
        --card-secondary: #92352f;
        --card-text: #282621;
        --card-line: rgba(40, 38, 33, 0.2);
        --card-muted: #6d665a;
        --card-wash: rgba(146, 53, 47, 0.045);
      }
      .card-brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--card-accent);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.16em;
      }
      .card-brand::before {
        content: '';
        width: 7px;
        height: 7px;
        flex: 0 0 7px;
        background: var(--card-secondary);
      }
      .card-brand-main {
        flex: 1;
      }
      .card-brand-en {
        color: var(--card-muted);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 6px;
        font-weight: 400;
        letter-spacing: 0.13em;
        white-space: nowrap;
      }
      .card-title {
        max-width: 88%;
        margin-top: 15px;
        color: var(--card-accent);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 29px;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.13;
      }
      .card-subtitle {
        margin-top: 6px;
        color: var(--card-muted);
        font-size: 9px;
        letter-spacing: 0.08em;
      }
      .card-intro {
        position: relative;
        margin-top: 13px;
        padding: 10px 0 9px 15px;
        border-top: 1px solid var(--card-line);
        border-bottom: 1px solid var(--card-line);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 10px;
        line-height: 1.55;
      }
      .card-intro::before {
        position: absolute;
        top: 7px;
        left: 0;
        color: var(--card-secondary);
        content: '“';
        font-family: Georgia, serif;
        font-size: 20px;
        line-height: 1;
      }
      .card-entries {
        display: grid;
        flex: 1;
        grid-template-rows: repeat(var(--entry-count, 1), minmax(0, 1fr));
        min-height: 0;
        overflow: hidden;
      }
      .card-entry {
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr);
        gap: 9px;
        min-height: 0;
        overflow: hidden;
        padding: 10px 0 9px;
        border-bottom: 1px solid var(--card-line);
      }
      .card-entry-index {
        padding-top: 1px;
        color: var(--card-secondary);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 8px;
        font-style: italic;
        letter-spacing: 0.04em;
      }
      .card-entry-body {
        min-width: 0;
        overflow: hidden;
      }
      .card-entry-meta {
        display: flex;
        min-width: 0;
        align-items: baseline;
        gap: 6px;
      }
      .card-entry-name {
        color: var(--card-accent);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 10px;
        font-weight: 700;
      }
      .card-entry-group {
        overflow: hidden;
        color: var(--card-muted);
        font-size: 7px;
        letter-spacing: 0.06em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .card-entry-text {
        display: -webkit-box;
        margin-top: 3px;
        overflow: hidden;
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        font-size: 10px;
        letter-spacing: 0.015em;
        line-height: 1.58;
        text-align: justify;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }
      .publicity-card.entries-1 .card-entry {
        padding-top: 14px;
      }
      .publicity-card.layout-single .card-entry-text {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.8;
        -webkit-line-clamp: 10;
      }
      .publicity-card.layout-single .card-entry-name {
        font-size: 12px;
      }
      .publicity-card.entries-2 .card-entry-text {
        -webkit-line-clamp: 5;
      }
      .card-footer {
        display: flex;
        min-height: 30px;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding-top: 9px;
        font-size: 8px;
      }
      .card-footer-copy {
        max-width: 68%;
        color: var(--card-muted);
        font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
        line-height: 1.4;
      }
      .card-folio {
        display: flex;
        flex-shrink: 0;
        align-items: baseline;
        gap: 6px;
      }
      .card-folio span {
        color: var(--card-muted);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 5px;
        letter-spacing: 0.12em;
      }
      .card-date {
        flex-shrink: 0;
        color: var(--card-accent);
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 12px;
        font-weight: 700;
      }
      .action-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
        margin-top: 12px;
      }
      .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 44px;
        padding: 10px 11px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: #fff;
        color: var(--ink-dark);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .action-btn.primary {
        border-color: #28685d;
        background: #28685d;
        color: #fff;
      }
      .action-btn.ready {
        border-color: var(--vermillion);
        background: var(--vermillion);
        color: #fff;
      }
      .action-btn svg {
        width: 17px;
        height: 17px;
      }
      .action-btn:disabled {
        cursor: wait;
        opacity: 0.58;
      }
      .empty-panel {
        padding: 42px 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-card);
        color: var(--ink-muted);
        text-align: center;
        font-size: 13px;
        line-height: 1.7;
      }
      .export-preview-panel {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        text-align: center;
      }
      .export-preview-panel img {
        display: block;
        width: 100%;
        height: auto;
      }
      .export-preview-hint {
        margin-top: 9px;
        color: var(--ink-muted);
        font-size: 12px;
      }
      @media (max-width: 390px) {
        .container {
          padding-inline: 12px;
        }
        .editor-fields {
          grid-template-columns: 1fr;
        }
        .field-wide {
          grid-column: auto;
        }
        .publicity-card {
          padding: 22px 20px 18px;
        }
        .card-title {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body class="app-loading">
    <main class="container">
      <header class="page-header">
        <a class="back-btn" href="publicity-dashboard.html" aria-label="返回宣委管理首页"></a>
        <h1 class="page-title">优秀作业宣发制作</h1>
      </header>

      <div class="header-card">
        <div class="semester-wrap" id="semesterName"></div>
        <div class="header-body">
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">日期</span><span class="header-value date" id="currentDate">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">星期</span><span class="header-value" id="currentWeekday">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">制卡人</span><span class="header-value" id="operatorName">--</span>
            </div>
          </div>
          <div class="header-col">
            <div class="header-row">
              <span class="header-label">大班</span><span class="header-value" id="bigClassName">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">班级</span><span class="header-value" id="className">--</span>
            </div>
            <div class="header-row">
              <span class="header-label">小组</span><span class="header-value" id="groupName">--</span>
            </div>
          </div>
        </div>
      </div>

      <section class="section" id="orgSelectorSection">
        <div class="section-title">
          <span class="section-icon" data-icon="BuildingIcon"></span>
          选择宣发范围
        </div>
        <div class="publish-scope-row">
          <span class="publish-scope-label">生成范围</span>
          <div class="publish-scope-switch" role="group" aria-label="宣发范围">
            <button
              class="publish-scope-btn active"
              id="scopeGroupBtn"
              type="button"
              onclick="setPublishScope('group')"
            >
              当前小组
            </button>
            <button class="publish-scope-btn" id="scopeClassBtn" type="button" onclick="setPublishScope('class')">
              整个班级
            </button>
          </div>
        </div>
        <div class="org-cascade">
          <div class="org-group">
            <label class="org-label" for="bigClassSelect">大班</label>
            <select class="org-select" id="bigClassSelect" onchange="onBigClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group">
            <label class="org-label" for="classSelect">班级</label>
            <select class="org-select" id="classSelect" onchange="onClassChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
          <div class="org-group" id="groupSelectWrap">
            <label class="org-label" for="groupSelect">小组</label>
            <select class="org-select" id="groupSelect" onchange="onGroupChange(this.value)">
              <option>识别中...</option>
            </select>
          </div>
        </div>
      </section>

      <section class="card-workbench" id="editorSection" hidden>
        <div class="workbench-head">
          <div class="workbench-title">
            <span class="section-icon" data-icon="FileEditIcon"></span>
            <span id="workbenchTitle">优秀作业金句设置</span>
          </div>
          <span class="status-badge" id="cardStatus">待填报</span>
        </div>

        <section class="highlight-panel" aria-labelledby="highlightPanelTitle">
          <div class="highlight-panel-title" id="highlightPanelTitle">从原文选择金句</div>
          <div class="highlight-panel-note">
            金句只允许选择原文中的完整句子；留空时长图直接展示原文。选择完成后请保存金句。
          </div>
          <div class="highlight-list" id="highlightList"></div>
        </section>

        <div class="action-bar">
          <button class="action-btn primary" id="saveDraftBtn" onclick="saveCard('draft')">
            <span data-icon="SaveIcon"></span><span>保存金句</span>
          </button>
          <button class="action-btn ready" id="markReadyBtn" onclick="saveCard('ready')">
            <span data-icon="CheckIcon"></span><span>标记可发布</span>
          </button>
        </div>
      </section>

      <section class="long-poster-workbench" id="longPosterSection" hidden>
        <div class="long-poster-head">
          <div class="long-poster-title">
            <span class="section-icon" data-icon="FileEditIcon"></span>
            <span id="longPosterTitle">优秀作业完整长图</span>
          </div>
          <span class="long-poster-meta" id="longPosterMeta">原文呈现</span>
        </div>
        <div class="long-poster-help" id="longPosterHelp">
          长图包含封面、完整原文和封底；导出宽度为 1080px。班级模式可同时生成每个小组的独立长图。
        </div>
        <div class="long-poster-actions">
          <button
            class="action-btn ready"
            id="downloadLongPosterBtn"
            type="button"
            onclick="downloadCurrentLongPoster()"
          >
            <span data-icon="DownloadIcon"></span><span id="downloadLongPosterLabel">导出小组长图</span>
          </button>
          <button
            class="action-btn primary"
            id="generateGroupPostersBtn"
            type="button"
            onclick="generateAllGroupPosters()"
            hidden
          >
            <span data-icon="FileEditIcon"></span><span>生成各小组长图</span>
          </button>
        </div>
        <div class="long-poster-preview-frame">
          <div class="long-poster-preview" id="longPosterPreview"></div>
        </div>
        <div class="poster-export-gallery" id="posterExportGallery" hidden></div>
      </section>

      <div class="empty-panel" id="emptyPanel">正在加载优秀作业...</div>
    </main>

    <div id="bottomNavContainer"></div>
    <div class="poster-render-host" id="posterRenderHost" aria-hidden="true"></div>

    <script src="js/supabase-config.js?v=11"></script>
    <script src="js/utils.js?v=12"></script>
    <script src="js/components.js?v=17"></script>
    <script src="js/excellent-homework.js?v=2"></script>
    <script src="js/publicity-long-poster.js?v=1"></script>
    <script>
      renderModuleBottomNav('publicity', 'cards');

      var publicityContext = null;
      var currentUser = null;
      var accessibleGroups = [];
      var publicitySchedules = [];
      var publishScope = 'group';
      var currentClass = null;
      var currentGroup = null;
      var currentSchedule = null;
      var currentEntries = [];
      var currentCard = null;
      var selectedEntryIds = [];
      var highlightTexts = {};
      var currentPosterGroups = [];
      var weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

      async function init() {
        await waitForDb();
        await refreshCurrentUser();
        currentUser = checkLogin();
        if (!currentUser) return;
        if (!(await guardModuleAccess('publicity'))) return;

        try {
          publicityContext = await ExcellentHomework.loadAccessContext('publicity', {
            adminAllOrgScopes: true
          });
          var semesterResult = await window.db
            .from('semesters')
            .select('semester_name')
            .eq('id', publicityContext.semesterId)
            .single();
          setCurrentSemester(
            'semesterName',
            semesterResult.data ? semesterResult.data.semester_name : '当前学期',
            'tag-lg'
          );
          renderTodayInfo();
          accessibleGroups = getAccessibleGroups();
          publicitySchedules = await ExcellentHomework.loadEligibleSchedules(publicityContext);
          if (!accessibleGroups.length) {
            renderOrganizationSelector(null);
            showEmpty('当前账号在本学期没有可查看的下属小组');
            return;
          }
          var detectedGroup = await resolveCurrentUserGroup();
          currentGroup =
            accessibleGroups.find(function (group) {
              return detectedGroup && Number(group.id) === Number(detectedGroup.id);
            }) || accessibleGroups[0];
          renderOrganizationSelector(currentGroup);
          await loadCurrentGroup();
        } catch (error) {
          showEmpty('加载失败：' + (error.message || error));
        }
      }

      function renderTodayInfo() {
        var today = getToday();
        document.getElementById('currentDate').textContent = today;
        document.getElementById('currentWeekday').textContent = weekDays[new Date().getDay()];
        document.getElementById('operatorName').textContent = currentUser.name || '未知';
      }

      async function resolveCurrentUserGroup() {
        var orgs = publicityContext.orgs || [];
        if (currentUser.phone) {
          var personResult = await window.db.from('people').select('id').eq('phone', currentUser.phone).maybeSingle();
          if (personResult.error) throw personResult.error;
          if (personResult.data) {
            var assignmentResult = await window.db
              .from('person_org_assignments')
              .select('org_id,sort_order')
              .eq('semester_id', publicityContext.semesterId)
              .eq('person_id', personResult.data.id)
              .eq('org_level', '小组')
              .eq('status', 'active')
              .order('sort_order')
              .limit(1);
            if (assignmentResult.error) throw assignmentResult.error;
            var assignment = (assignmentResult.data || [])[0];
            var assignedGroup = assignment ? ExcellentHomework.getOrg(orgs, assignment.org_id) : null;
            if (assignedGroup && assignedGroup.level === '小组') return assignedGroup;
          }
        }
        var membershipGroup = (publicityContext.memberships || [])
          .map(function (membership) {
            return ExcellentHomework.getOrg(orgs, membership.org_id);
          })
          .find(function (org) {
            return org && org.level === '小组';
          });
        return membershipGroup || null;
      }

      function getAccessibleGroups() {
        var groups = [];
        (publicityContext.scopes || []).forEach(function (scope) {
          ExcellentHomework.getGroupsForScope(publicityContext.orgs, scope.id).forEach(function (group) {
            if (
              !groups.some(function (item) {
                return Number(item.id) === Number(group.id);
              })
            ) {
              groups.push(group);
            }
          });
        });
        return groups.sort(function (a, b) {
          return (
            (a.sort_order || 0) - (b.sort_order || 0) ||
            String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN')
          );
        });
      }

      function uniqueOrgs(orgs) {
        var seen = {};
        return orgs.filter(function (org) {
          if (!org || seen[org.id]) return false;
          seen[org.id] = true;
          return true;
        });
      }

      function getClassesForBigClass(bigClassId) {
        return uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = ExcellentHomework.getOrg(publicityContext.orgs, group.parent_id);
            return classOrg && Number(classOrg.parent_id) === Number(bigClassId) ? classOrg : null;
          })
        );
      }

      function getGroupsForClass(classId) {
        return accessibleGroups.filter(function (group) {
          return Number(group.parent_id) === Number(classId);
        });
      }

      function renderOptions(select, orgs, placeholder) {
        select.innerHTML =
          (orgs.length === 1 ? '' : '<option value="">' + placeholder + '</option>') +
          orgs
            .map(function (org) {
              return '<option value="' + org.id + '">' + escapeHtml(org.name) + '</option>';
            })
            .join('');
      }

      function renderOrganizationSelector(defaultGroup) {
        var bigClassSelect = document.getElementById('bigClassSelect');
        var classSelect = document.getElementById('classSelect');
        var groupSelect = document.getElementById('groupSelect');
        var bigClasses = uniqueOrgs(
          accessibleGroups.map(function (group) {
            var classOrg = ExcellentHomework.getOrg(publicityContext.orgs, group.parent_id);
            return classOrg ? ExcellentHomework.getOrg(publicityContext.orgs, classOrg.parent_id) : null;
          })
        );
        renderOptions(bigClassSelect, bigClasses, '请选择');
        if (!defaultGroup) {
          classSelect.innerHTML = '<option value="">--</option>';
          groupSelect.innerHTML = '<option value="">--</option>';
          renderCurrentPath(null);
          return;
        }
        var classOrg = ExcellentHomework.getOrg(publicityContext.orgs, defaultGroup.parent_id);
        var bigClass = classOrg ? ExcellentHomework.getOrg(publicityContext.orgs, classOrg.parent_id) : null;
        if (!classOrg || !bigClass) return;
        currentClass = classOrg;
        bigClassSelect.value = String(bigClass.id);
        renderOptions(classSelect, getClassesForBigClass(bigClass.id), '请选择');
        classSelect.value = String(classOrg.id);
        renderOptions(groupSelect, getGroupsForClass(classOrg.id), '请选择');
        groupSelect.value = String(defaultGroup.id);
        renderCurrentPath(defaultGroup);
      }

      async function setPublishScope(scope) {
        publishScope = scope === 'class' ? 'class' : 'group';
        document.getElementById('scopeGroupBtn').classList.toggle('active', publishScope === 'group');
        document.getElementById('scopeClassBtn').classList.toggle('active', publishScope === 'class');
        document.getElementById('groupSelectWrap').classList.toggle('scope-hidden', publishScope === 'class');
        document.getElementById('posterExportGallery').hidden = true;

        if (publishScope === 'class') {
          var classId = document.getElementById('classSelect').value || (currentClass ? currentClass.id : '');
          if (!classId) {
            showEmpty('请选择需要生成长图的班级');
            return;
          }
          try {
            await loadCurrentClass(classId);
          } catch (error) {
            showEmpty('班级优秀作业加载失败：' + (error.message || error));
          }
          return;
        }

        var groupId = document.getElementById('groupSelect').value || (currentGroup ? currentGroup.id : '');
        if (!groupId) {
          showEmpty('请选择需要生成长图的小组');
          return;
        }
        await onGroupChange(groupId);
      }

      async function onBigClassChange(bigClassId) {
        currentClass = null;
        currentGroup = null;
        renderCurrentPath(null);
        var classes = bigClassId ? getClassesForBigClass(bigClassId) : [];
        var classSelect = document.getElementById('classSelect');
        renderOptions(classSelect, classes, '请选择');
        document.getElementById('groupSelect').innerHTML = '<option value="">请选择</option>';
        if (classes.length === 1) {
          classSelect.value = String(classes[0].id);
          await onClassChange(classes[0].id);
        } else {
          showEmpty('请选择班级');
        }
      }

      async function onClassChange(classId) {
        currentClass = classId ? ExcellentHomework.getOrg(publicityContext.orgs, classId) : null;
        currentGroup = null;
        renderCurrentPath(null, currentClass);
        var groups = classId ? getGroupsForClass(classId) : [];
        var groupSelect = document.getElementById('groupSelect');
        renderOptions(groupSelect, groups, '请选择');
        if (publishScope === 'class') {
          if (currentClass) {
            try {
              await loadCurrentClass(classId);
            } catch (error) {
              showEmpty('班级优秀作业加载失败：' + (error.message || error));
            }
          } else {
            showEmpty('请选择需要生成长图的班级');
          }
          return;
        }
        if (groups.length === 1) {
          groupSelect.value = String(groups[0].id);
          await onGroupChange(groups[0].id);
        } else {
          showEmpty('请选择小组查看优秀作业卡片');
        }
      }

      async function onGroupChange(groupId) {
        currentGroup =
          accessibleGroups.find(function (group) {
            return Number(group.id) === Number(groupId);
          }) || null;
        currentClass = currentGroup ? ExcellentHomework.getOrg(publicityContext.orgs, currentGroup.parent_id) : null;
        renderCurrentPath(currentGroup);
        if (!currentGroup) {
          showEmpty('请选择小组查看优秀作业卡片');
          return;
        }
        showEmpty('正在加载该小组的优秀作业...');
        try {
          await loadCurrentGroup();
        } catch (error) {
          showEmpty('优秀作业加载失败：' + (error.message || error));
        }
      }

      function renderCurrentPath(group, classOverride) {
        var classOrg =
          classOverride || (group ? ExcellentHomework.getOrg(publicityContext.orgs, group.parent_id) : null);
        var bigClass = classOrg ? ExcellentHomework.getOrg(publicityContext.orgs, classOrg.parent_id) : null;
        document.getElementById('bigClassName').textContent = bigClass ? bigClass.name : '--';
        document.getElementById('className').textContent = classOrg ? classOrg.name : '--';
        document.getElementById('groupName').textContent = group
          ? group.name
          : publishScope === 'class' && classOrg
            ? '全部小组'
            : '--';
      }

      async function loadCurrentClass(classId) {
        currentClass = ExcellentHomework.getOrg(publicityContext.orgs, classId);
        if (!currentClass) {
          showEmpty('未找到所选班级');
          return;
        }
        var groups = getGroupsForClass(currentClass.id);
        renderCurrentPath(null, currentClass);
        if (!groups.length) {
          showEmpty('当前班级没有可查看的小组');
          return;
        }

        var dabanId = ExcellentHomework.getDabanId(publicityContext.orgs, groups[0].id);
        currentSchedule =
          publicitySchedules.find(function (schedule) {
            return schedule.schedule_date === getToday() && Number(schedule.org_id) === Number(dabanId);
          }) || null;
        var groupIds = groups.map(function (group) {
          return Number(group.id);
        });
        var entries = currentSchedule ? await ExcellentHomework.loadEntries(currentSchedule.id, groupIds) : [];
        highlightTexts = {};

        if (currentSchedule) {
          var cardsResult = await window.db
            .from('publicity_homework_cards')
            .select('id,org_id')
            .eq('schedule_id', currentSchedule.id)
            .in('org_id', groupIds);
          if (cardsResult.error) throw cardsResult.error;
          var cardIds = (cardsResult.data || []).map(function (card) {
            return Number(card.id);
          });
          if (cardIds.length) {
            var highlightsResult = await window.db
              .from('publicity_homework_card_items')
              .select('entry_id,highlight_text')
              .in('card_id', cardIds);
            if (highlightsResult.error) throw highlightsResult.error;
            (highlightsResult.data || []).forEach(function (item) {
              if (item.highlight_text) {
                highlightTexts[Number(item.entry_id)] = item.highlight_text;
              }
            });
          }
        }

        currentPosterGroups = groups.map(function (group) {
          return {
            id: group.id,
            name: group.name,
            entries: entries
              .filter(function (entry) {
                return Number(entry.org_id) === Number(group.id);
              })
              .slice(0, 3)
              .map(withHighlight)
          };
        });
        document.getElementById('editorSection').hidden = true;
        document.getElementById('emptyPanel').style.display = 'none';
        renderLongPoster();
      }

      async function loadCurrentGroup() {
        var groupId = Number(currentGroup.id);
        var dabanId = ExcellentHomework.getDabanId(publicityContext.orgs, groupId);
        currentSchedule =
          publicitySchedules.find(function (schedule) {
            return schedule.schedule_date === getToday() && Number(schedule.org_id) === Number(dabanId);
          }) || null;
        currentEntries = currentSchedule ? await ExcellentHomework.loadEntries(currentSchedule.id, [groupId]) : [];
        currentCard = null;
        highlightTexts = {};
        selectedEntryIds = currentEntries.slice(0, 3).map(function (entry) {
          return Number(entry.id);
        });
        await loadCardEditor();
        renderWorkbench();
        currentPosterGroups = [
          {
            id: currentGroup.id,
            name: currentGroup.name,
            entries: getSelectedEntriesWithHighlights()
          }
        ];
        renderLongPoster();
      }

      async function loadCardEditor() {
        if (currentSchedule) {
          var cardResult = await window.db
            .from('publicity_homework_cards')
            .select('*')
            .eq('schedule_id', currentSchedule.id)
            .eq('org_id', currentGroup.id)
            .maybeSingle();
          if (cardResult.error) throw cardResult.error;
          currentCard = cardResult.data || null;
          if (currentCard) {
            var itemResult = await window.db
              .from('publicity_homework_card_items')
              .select('entry_id,sort_order,highlight_text')
              .eq('card_id', currentCard.id)
              .order('sort_order');
            if (itemResult.error) throw itemResult.error;
            highlightTexts = {};
            (itemResult.data || []).forEach(function (item) {
              if (item.highlight_text) {
                highlightTexts[Number(item.entry_id)] = item.highlight_text;
              }
            });
          }
        }
      }

      function renderWorkbench() {
        document.getElementById('editorSection').hidden = false;
        document.getElementById('emptyPanel').style.display = 'none';
        document.getElementById('workbenchTitle').textContent = currentGroup.name + ' · 金句设置';
        renderCardStatus(currentCard ? currentCard.status : '');
        renderHighlightFields();
      }

      function getSelectedEntries() {
        var selected = selectedEntryIds
          .map(function (id) {
            return currentEntries.find(function (entry) {
              return Number(entry.id) === Number(id);
            });
          })
          .filter(Boolean);
        return selected.slice(0, 3);
      }

      function withHighlight(entry) {
        return Object.assign({}, entry, {
          highlight_text: highlightTexts[Number(entry.id)] || ''
        });
      }

      function getSelectedEntriesWithHighlights() {
        return getSelectedEntries().map(withHighlight);
      }

      function splitOriginalSentences(content) {
        var matches = String(content || '').match(/[^。！？!?；;\n]+[。！？!?；;]?/g) || [];
        return matches
          .map(function (sentence) {
            return sentence.trim();
          })
          .filter(function (sentence, index, list) {
            return sentence.length >= 4 && sentence.length <= 500 && list.indexOf(sentence) === index;
          });
      }

      function renderHighlightFields() {
        var list = document.getElementById('highlightList');
        var selected = getSelectedEntries();
        if (!selected.length) {
          list.innerHTML = '<div class="highlight-panel-note">当前没有可选择金句的优秀作业。</div>';
          return;
        }
        list.innerHTML = selected
          .map(function (entry) {
            var sentences = splitOriginalSentences(entry.content);
            var selectedValue = highlightTexts[Number(entry.id)] || '';
            var options =
              '<option value="">不显示金句，仅展示原文</option>' +
              sentences
                .map(function (sentence) {
                  return (
                    '<option value="' +
                    escapeHtml(sentence) +
                    '"' +
                    (sentence === selectedValue ? ' selected' : '') +
                    '>' +
                    escapeHtml(sentence) +
                    '</option>'
                  );
                })
                .join('');
            return (
              '<div class="highlight-item">' +
              '<div class="highlight-item-head"><span class="highlight-person">' +
              escapeHtml(entry.person_name_snapshot) +
              '</span><span class="highlight-count">' +
              sentences.length +
              ' 个原文句子</span></div>' +
              '<select class="highlight-select" data-highlight-entry="' +
              entry.id +
              '" onchange="setHighlightText(' +
              entry.id +
              ', this.value)">' +
              options +
              '</select></div>'
            );
          })
          .join('');
      }

      function setHighlightText(entryId, value) {
        var entry = currentEntries.find(function (item) {
          return Number(item.id) === Number(entryId);
        });
        var highlight = String(value || '').trim();
        if (highlight && (!entry || String(entry.content || '').indexOf(highlight) === -1)) {
          showToast('金句必须来自对应作业原文', 'error');
          renderHighlightFields();
          return;
        }
        if (highlight) {
          highlightTexts[Number(entryId)] = highlight;
        } else {
          delete highlightTexts[Number(entryId)];
        }
        if (publishScope === 'group' && currentGroup) {
          currentPosterGroups = [
            {
              id: currentGroup.id,
              name: currentGroup.name,
              entries: getSelectedEntriesWithHighlights()
            }
          ];
          renderLongPoster();
        }
      }

      function renderCardStatus(status) {
        var badge = document.getElementById('cardStatus');
        var entryCount = currentEntries.length;
        badge.className = 'status-badge' + (status === 'ready' || status === 'published' ? ' ready' : '');
        badge.textContent =
          status === 'ready'
            ? '可发布'
            : status === 'published'
              ? '已发布'
              : status === 'draft'
                ? '草稿'
                : entryCount + '/3';
      }

      async function saveCard(status) {
        var selected = getSelectedEntries();
        if (!currentSchedule || !selected.length) {
          showToast('本组今天暂无可保存的优秀作业', 'error');
          return;
        }
        var button =
          status === 'ready' ? document.getElementById('markReadyBtn') : document.getElementById('saveDraftBtn');
        button.disabled = true;
        try {
          var payload = {
            semester_id: publicityContext.semesterId,
            schedule_id: Number(currentSchedule.id),
            org_id: Number(currentGroup.id),
            title: currentGroup.name + '优秀作业',
            subtitle: getCurrentClassName() + ' · ' + ExcellentHomework.formatDate(getToday(), false),
            intro_text: '',
            closing_text: '知行合一，日日精进。',
            theme: 'vermillion',
            layout: 'collection',
            status: status,
            created_by: currentCard ? currentCard.created_by : publicityContext.profile.id,
            updated_by: publicityContext.profile.id,
            updated_at: new Date().toISOString()
          };
          var cardResult = await window.db
            .from('publicity_homework_cards')
            .upsert(payload, { onConflict: 'schedule_id,org_id' })
            .select('*')
            .single();
          if (cardResult.error) throw cardResult.error;
          currentCard = cardResult.data;
          var deleteResult = await window.db
            .from('publicity_homework_card_items')
            .delete()
            .eq('card_id', currentCard.id);
          if (deleteResult.error) throw deleteResult.error;
          var itemRows = selected.map(function (entry, index) {
            return {
              card_id: currentCard.id,
              entry_id: entry.id,
              sort_order: index + 1,
              highlight_text: highlightTexts[Number(entry.id)] || null
            };
          });
          var itemResult = await window.db.from('publicity_homework_card_items').insert(itemRows);
          if (itemResult.error) throw itemResult.error;
          renderCardStatus(status);
          renderLongPoster();
          showToast(status === 'ready' ? '已保存金句并标记为可发布' : '金句已保存', 'success');
        } catch (error) {
          showToast('保存失败：' + (error.message || error), 'error');
        } finally {
          button.disabled = false;
        }
      }

      function getCurrentClassName() {
        return currentClass && currentClass.name ? currentClass.name : '未命名班级';
      }

      function getLongPosterOptions(scope, groups) {
        return {
          scope: scope,
          className: getCurrentClassName(),
          date: currentSchedule && currentSchedule.schedule_date ? currentSchedule.schedule_date : getToday(),
          groups: groups
        };
      }

      function renderLongPoster() {
        var section = document.getElementById('longPosterSection');
        var preview = document.getElementById('longPosterPreview');
        if (!currentPosterGroups.length || !window.PublicityLongPoster) {
          section.hidden = true;
          return;
        }
        var entryCount = currentPosterGroups.reduce(function (count, group) {
          return count + (group.entries || []).length;
        }, 0);
        var scope = publishScope === 'class' ? 'class' : 'group';
        PublicityLongPoster.mount(preview, getLongPosterOptions(scope, currentPosterGroups));
        document.getElementById('longPosterTitle').textContent =
          scope === 'class'
            ? getCurrentClassName() + ' · 班级完整长图'
            : (currentGroup ? currentGroup.name : '当前小组') + ' · 小组完整长图';
        document.getElementById('longPosterMeta').textContent =
          scope === 'class' ? currentPosterGroups.length + '组 · ' + entryCount + '篇' : entryCount + '篇原文';
        document.getElementById('downloadLongPosterLabel').textContent = isWechatBrowser()
          ? scope === 'class'
            ? '生成班级长图图片'
            : '生成当前小组图片'
          : scope === 'class'
            ? '导出班级完整长图'
            : '导出当前小组长图';
        document.getElementById('generateGroupPostersBtn').hidden = scope !== 'class';
        document.getElementById('longPosterHelp').textContent =
          (scope === 'class'
            ? '当前预览包含班级封面、全部小组原文和班级封底；也可批量生成每个小组各自的独立长图。'
            : '当前预览包含小组封面、3篇优秀作业原文和小组封底；金句只取自上方选择的原文句子。') +
          (isWechatBrowser() ? ' 微信内生成后，请长按图片选择“保存图片”或“发送给朋友”。' : '');
        section.hidden = false;
        document.getElementById('emptyPanel').style.display = 'none';
        if (window.renderAppIcons) window.renderAppIcons(section);
      }

      function cleanFileName(name) {
        return String(name || '优秀作业').replace(/[\\/:*?"<>|]/g, '_');
      }

      function isWechatBrowser() {
        return /MicroMessenger/i.test(navigator.userAgent || '');
      }

      function isMobileBrowser() {
        return /Android|iPhone|iPad|iPod|MicroMessenger/i.test(navigator.userAgent || '');
      }

      async function renderLongPosterCanvas(element) {
        await loadHtml2Canvas();
        if (document.fonts && document.fonts.ready) await document.fonts.ready;
        await new Promise(function (resolve) {
          requestAnimationFrame(function () {
            requestAnimationFrame(resolve);
          });
        });
        var height = Math.max(element.scrollHeight, element.offsetHeight);
        var scale = Math.min(3, Math.floor((30000 / Math.max(height, 1)) * 10) / 10);
        if (scale < 1) {
          throw new Error('长图内容超过浏览器单图上限，请减少单篇字数后重试');
        }
        return html2canvas(element, {
          scale: scale,
          backgroundColor: '#eee8dc',
          useCORS: true,
          allowTaint: false,
          logging: false
        });
      }

      function canvasToJpegBlob(canvas) {
        return new Promise(function (resolve) {
          if (!canvas.toBlob) {
            resolve(null);
            return;
          }
          canvas.toBlob(resolve, 'image/jpeg', 0.94);
        });
      }

      function triggerBlobDownload(blob, fileName) {
        if (!blob) return false;
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = fileName;
        link.href = url;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 2000);
        return true;
      }

      function addPosterGalleryItem(title, dataUrl, fileName) {
        var gallery = document.getElementById('posterExportGallery');
        var card = document.createElement('article');
        card.className = 'poster-export-card';
        var saveAction = isMobileBrowser()
          ? '<div class="poster-save-hint">请长按上方图片，选择“保存图片”或“发送给朋友”</div>'
          : '<a download="' + escapeHtml(fileName) + '" href="' + dataUrl + '">下载这张长图</a>';
        card.innerHTML =
          '<h3>' + escapeHtml(title) + '</h3><img alt="' + escapeHtml(title) + '" src="' + dataUrl + '">' + saveAction;
        gallery.appendChild(card);
        gallery.hidden = false;
      }

      async function downloadCurrentLongPoster() {
        var button = document.getElementById('downloadLongPosterBtn');
        var poster = document.querySelector('#longPosterPreview .editorial-long-poster');
        if (!poster) return showToast('暂无可导出的长图', 'error');
        button.disabled = true;
        try {
          var canvas = await renderLongPosterCanvas(poster);
          var scopeName =
            publishScope === 'class'
              ? getCurrentClassName()
              : getCurrentClassName() + '_' + (currentGroup ? currentGroup.name : '小组');
          var fileName = cleanFileName(scopeName + '_优秀作业_' + getToday()) + '.jpg';
          var blob = await canvasToJpegBlob(canvas);
          if (!isMobileBrowser() && triggerBlobDownload(blob, fileName)) {
            showToast('完整长图已导出', 'success');
            return;
          }
          var dataUrl = canvas.toDataURL('image/jpeg', 0.94);
          var gallery = document.getElementById('posterExportGallery');
          gallery.innerHTML = '';
          addPosterGalleryItem(scopeName + ' · 完整长图', dataUrl, fileName);
          gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
          showToast('长图已生成，请长按图片保存或转发', 'success');
        } catch (error) {
          showToast('长图导出失败：' + (error.message || error), 'error');
        } finally {
          button.disabled = false;
        }
      }

      async function generateAllGroupPosters() {
        if (publishScope !== 'class' || !currentPosterGroups.length) return;
        var button = document.getElementById('generateGroupPostersBtn');
        var gallery = document.getElementById('posterExportGallery');
        var host = document.getElementById('posterRenderHost');
        button.disabled = true;
        gallery.innerHTML = '';
        gallery.hidden = true;
        try {
          for (var i = 0; i < currentPosterGroups.length; i += 1) {
            var group = currentPosterGroups[i];
            host.innerHTML = '';
            var poster = PublicityLongPoster.create(getLongPosterOptions('group', [group]));
            host.appendChild(poster);
            var canvas = await renderLongPosterCanvas(poster);
            var dataUrl = canvas.toDataURL('image/jpeg', 0.94);
            var fileName = cleanFileName(getCurrentClassName() + '_' + group.name + '_优秀作业_' + getToday()) + '.jpg';
            addPosterGalleryItem(getCurrentClassName() + ' · ' + group.name, dataUrl, fileName);
          }
          gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
          showToast('已生成 ' + currentPosterGroups.length + ' 张小组长图', 'success');
        } catch (error) {
          showToast('批量生成失败：' + (error.message || error), 'error');
        } finally {
          host.innerHTML = '';
          button.disabled = false;
        }
      }

      function loadHtml2Canvas() {
        if (typeof html2canvas === 'function') return Promise.resolve();
        return new Promise(function (resolve, reject) {
          var existing = document.querySelector('script[data-html2canvas]');
          if (existing) {
            existing.addEventListener('load', resolve, { once: true });
            existing.addEventListener(
              'error',
              function () {
                reject(new Error('图片组件加载失败，请检查网络'));
              },
              { once: true }
            );
            return;
          }
          var script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
          script.dataset.html2canvas = 'true';
          script.onload = resolve;
          script.onerror = function () {
            reject(new Error('图片组件加载失败，请检查网络'));
          };
          document.head.appendChild(script);
        });
      }

      function showEmpty(message) {
        document.getElementById('editorSection').hidden = true;
        document.getElementById('longPosterSection').hidden = true;
        var panel = document.getElementById('emptyPanel');
        panel.textContent = message;
        panel.style.display = '';
      }

      init().finally(function () {
        document.body.classList.remove('app-loading');
      });
    </script>
  </body>
</html>
